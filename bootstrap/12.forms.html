<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complex Bootstrap Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

  <div class="container bg-white p-5 rounded shadow">
    <h2 class="mb-4 text-center">Registration Form</h2>
    <form>

      <!-- 1. Full Name -->
      <div class="mb-3">
        <label for="fullName" class="form-label">1. Full Name</label>
        <input type="text" class="form-control" id="fullName" placeholder="John Doe">
      </div>

      <!-- 2. Email and Password in same row -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="email" class="form-label">2a. Email</label>
          <input type="email" class="form-control" id="email" placeholder="name@example.com">
        </div>
        <div class="col-md-6">
          <label for="password" class="form-label">2b. Password</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••">
        </div>
      </div>

      <!-- 3. Gender (Radio) -->
      <div class="mb-3">
        <label class="form-label d-block">3. Gender</label>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="gender" id="male" value="male">
          <label class="form-check-label" for="male">Male</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="gender" id="female" value="female">
          <label class="form-check-label" for="female">Female</label>
        </div>
      </div>

      <!-- 4. Skills (Checkboxes) -->
      <div class="mb-3">
        <label class="form-label d-block">4. Skills</label>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" id="htmlSkill">
          <label class="form-check-label" for="htmlSkill">HTML</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" id="cssSkill">
          <label class="form-check-label" for="cssSkill">CSS</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="checkbox" id="jsSkill">
          <label class="form-check-label" for="jsSkill">JavaScript</label>
        </div>
      </div>

      <!-- 5. Country (Select) -->
      <div class="mb-3">
        <label for="country" class="form-label">5. Country</label>
        <select class="form-select" id="country">
          <option selected disabled>Select your country</option>
          <option>USA</option>
          <option>Canada</option>
          <option>UK</option>
          <option>Israel</option>
        </select>
      </div>

      <!-- 6. Bio (Textarea) -->
      <div class="mb-3">
        <label for="bio" class="form-label">6. Short Bio</label>
        <textarea class="form-control" id="bio" rows="3" placeholder="Tell us about yourself..."></textarea>
      </div>

      <!-- 7. File Upload -->
      <div class="mb-3">
        <label for="formFile" class="form-label">7. Upload Resume</label>
        <input class="form-control" type="file" id="formFile">
      </div>

      <!-- 8. Terms Checkbox -->
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="termsCheck">
        <label class="form-check-label" for="termsCheck">8. I agree to the terms and conditions</label>
      </div>

      <!-- 9. Buttons -->
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">9a. Submit</button>
        <button type="reset" class="btn btn-secondary">9b. Reset</button>
      </div>

    </form>
  </div>

</body>
</html>
