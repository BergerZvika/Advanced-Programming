<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bootstrap Text and Button Utilities</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light py-4">

  <div class="container">
    <h1 class="text-center text-primary mb-4">Bootstrap Text and Button Utilities</h1>

    <!-- ========================================= -->
    <!-- TEXT COLOR CLASSES (previous section) -->
    <!-- ========================================= -->
    <h2 class="mt-5 mb-3">Text Color Examples</h2>

    <!-- (Previous examples 1-11 for text classes remain here) -->

    <!-- ========================================= -->
    <!-- BUTTON CLASSES SECTION -->
    <!-- ========================================= -->
    <h2 class="mt-5 mb-3">Bootstrap Button Examples</h2>

    <!-- 1. Primary button -->
    <p><strong>1. btn-primary</strong></p>
    <button class="btn btn-primary">Primary</button>
    <!-- A blue primary action button -->

    <!-- 2. Secondary button -->
    <p><strong>2. btn-secondary</strong></p>
    <button class="btn btn-secondary">Secondary</button>
    <!-- A gray secondary action button -->

    <!-- 3. Success button -->
    <p><strong>3. btn-success</strong></p>
    <button class="btn btn-success">Success</button>
    <!-- A green button often used for confirming actions -->

    <!-- 4. Danger button -->
    <p><strong>4. btn-danger</strong></p>
    <button class="btn btn-danger">Danger</button>
    <!-- A red button typically used for delete/warning actions -->

    <!-- 5. Warning button -->
    <p><strong>5. btn-warning</strong></p>
    <button class="btn btn-warning">Warning</button>
    <!-- A yellow/orange button for warning actions -->

    <!-- 6. Info button -->
    <p><strong>6. btn-info</strong></p>
    <button class="btn btn-info">Info</button>
    <!-- A light blue button for informational actions -->

    <!-- 7. Light and Dark buttons -->
    <p><strong>7. btn-light and btn-dark</strong></p>
    <button class="btn btn-light">Light</button>
    <button class="btn btn-dark">Dark</button>
    <!-- Light and dark colored buttons for general use -->

    <!-- 8. Outline buttons -->
    <p><strong>8. Outline buttons</strong></p>
    <button class="btn btn-outline-primary">Outline Primary</button>
    <button class="btn btn-outline-danger">Outline Danger</button>
    <!-- Outline buttons are border-only versions of solid buttons -->

    <!-- 9. Button sizes -->
    <p><strong>9. Button sizes</strong></p>
    <button class="btn btn-primary btn-sm">Small</button>
    <button class="btn btn-primary">Default</button>
    <button class="btn btn-primary btn-lg">Large</button>
    <!-- Change button size with btn-sm and btn-lg -->

    <!-- 10. Block-level button -->
    <p><strong>10. Block button</strong></p>
    <button class="btn btn-success w-100">Full-width button</button>
    <!-- Use w-100 to make a button take full width -->

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
