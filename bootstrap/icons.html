<!-- https://icons.getbootstrap.com/ -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Icons Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      padding: 2rem;
      background: #f8f9fa;
    }
    .icon-example {
      font-size: 2rem;
      margin: 1rem 0;
    }
  </style>
</head>
<body>

  <h1 class="text-center mb-4">🔤 Bootstrap Icons Examples</h1>

  <!-- 1️⃣ Basic Icon -->
  <div class="icon-example">
    <strong>1️⃣ Basic icon:</strong> <i class="bi bi-alarm"></i>
    <!-- This shows a basic alarm icon -->
  </div>

  <!-- 2️⃣ Colored Icon -->
  <div class="icon-example text-primary">
    <strong>2️⃣ Colored icon:</strong> <i class="bi bi-heart-fill"></i>
    <!-- Heart icon with Bootstrap's primary color -->
  </div>

  <!-- 3️⃣ Icon with Text -->
  <div class="icon-example">
    <strong>3️⃣ Icon with text:</strong> <i class="bi bi-envelope-fill"></i> Mail us anytime!
  </div>

  <!-- 4️⃣ Icon Button -->
  <div class="icon-example">
    <strong>4️⃣ Icon inside button:</strong>
    <button class="btn btn-success">
      <i class="bi bi-check-circle"></i> Confirm
    </button>
  </div>

  <!-- 5️⃣ Large Icon -->
  <div class="icon-example">
    <strong>5️⃣ Large icon (3rem):</strong>
    <i class="bi bi-star-fill text-warning" style="font-size: 3rem;"></i>
  </div>

  <!-- 6️⃣ Inline Multiple Icons -->
  <div class="icon-example">
    <strong>6️⃣ Inline icons:</strong>
    <i class="bi bi-facebook text-primary"></i>
    <i class="bi bi-twitter text-info"></i>
    <i class="bi bi-instagram text-danger"></i>
  </div>

</body>
</html>
