<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bootstrap Lab — Advanced Programming</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/dracula.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/dialog/dialog.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/hint/show-hint.min.css">

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/css/css.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/selection/active-line.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/comment/comment.min.js"></script>

<style>
:root{
  --bg-0:#06060c;
  --bg-1:#0c0c18;
  --bg-2:#15152a;
  --surface:rgba(255,255,255,0.04);
  --surface-2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.09);
  --border-strong:rgba(255,255,255,0.18);
  --text:#e8e8f3;
  --text-dim:#9a9ab0;
  --text-faint:#666680;
  --accent:#7c5cff;
  --accent-2:#35d0ff;
  --accent-3:#ff6ec7;
  --bs-purple:#7952b3;
  --bs-purple-2:#a585d8;
  --success:#38d39f;
  --warn:#ffb547;
  --error:#ff5a7a;
  --radius:18px;
  --radius-sm:12px;
  --shadow-lg: 0 30px 80px -30px rgba(124,92,255,0.35), 0 10px 30px -15px rgba(0,0,0,0.6);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg-0);color:var(--text);font-family:'Inter',system-ui,sans-serif;height:100%;overflow:hidden}
code,pre,textarea,.mono,.CodeMirror{font-family:'JetBrains Mono',ui-monospace,monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* 3D Three.js canvas — background layer */
#bg-3d{
  position:fixed; inset:0; z-index:-2;
  display:block;
  background:
    radial-gradient(1200px 700px at 8% -10%, rgba(124,92,255,0.30), transparent 60%),
    radial-gradient(1000px 600px at 110% 0%,  rgba(53,208,255,0.22), transparent 60%),
    radial-gradient(900px 600px at 50% 130%,  rgba(255,110,199,0.18), transparent 60%),
    linear-gradient(180deg, #050510 0%, #08081a 50%, #050510 100%);
}
/* tiny stars overlay */
body::after{
  content:""; position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.32;
  background-image:
    radial-gradient(1px 1px at 20% 30%, #ffffff 100%, transparent),
    radial-gradient(1px 1px at 70% 60%, #ffffff 100%, transparent),
    radial-gradient(1.5px 1.5px at 40% 80%, #ffffff 100%, transparent),
    radial-gradient(1px 1px at 85% 20%, #ffffff 100%, transparent),
    radial-gradient(1px 1px at 15% 65%, #ffffff 100%, transparent);
  background-size: 1200px 800px;
  mask-image:linear-gradient(180deg,transparent,#000 20%,#000 80%,transparent);
}

/* Layout */
.app{
  display:grid; grid-template-columns: 300px 1fr; height:100vh;
}
@media (max-width: 980px){
  .app{ grid-template-columns: 1fr; height:auto; min-height:100vh; overflow:auto }
  html,body{ overflow:auto; height:auto }
}

/* Sidebar */
.sidebar{
  padding:22px 16px; position:relative; z-index:5;
  background:linear-gradient(180deg, rgba(12,12,24,0.85), rgba(8,8,18,0.85));
  backdrop-filter: blur(22px) saturate(140%);
  -webkit-backdrop-filter: blur(22px) saturate(140%);
  border-right:1px solid var(--border);
  overflow-y:auto;
  scrollbar-width:thin;
}
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:6px}

.brand{
  display:flex;align-items:center;gap:12px;margin-bottom:18px;
  padding:6px 4px;border-radius:14px;user-select:none;
}
.brand-cube{
  width:46px;height:46px;border-radius:12px;position:relative;
  background:linear-gradient(135deg,#a585d8,#7952b3);
  box-shadow:
    0 12px 30px -10px rgba(247,223,30,0.45),
    inset 0 0 0 1px rgba(255,255,255,0.25),
    inset 0 -10px 20px -8px rgba(0,0,0,0.35);
  transform: rotate(-6deg);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;color:#1a1a2a;letter-spacing:0.5px;
  animation: floatY 5s ease-in-out infinite;
}
.brand-cube::after{
  content:""; position:absolute; inset:auto -6px -6px auto;
  width:100%;height:100%; border-radius:12px;
  background:linear-gradient(135deg, rgba(124,92,255,0.5), rgba(53,208,255,0.5));
  filter:blur(14px); z-index:-1;
}
@keyframes floatY{
  0%,100%{ transform: rotate(-6deg) translateY(0) }
  50%   { transform: rotate(-2deg) translateY(-4px) }
}
.brand h1{margin:0;font-size:17px;font-weight:700;letter-spacing:-0.02em}
.brand .sub{font-size:11px;color:var(--text-faint);letter-spacing:0.14em;text-transform:uppercase}

.search-wrap{ position:relative; margin-bottom:14px }
.search{
  width:100%;padding:10px 14px 10px 34px;border-radius:12px;border:1px solid var(--border);
  background:rgba(255,255,255,0.03);color:var(--text);font-size:13.5px;outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,255,0.2)}
.search-wrap::before{
  content:"⌕"; position:absolute; left:11px; top:50%; transform:translateY(-50%);
  color:var(--text-faint); font-size:14px; pointer-events:none;
}

.section-label{
  font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-faint);
  padding:14px 8px 6px;
}

.file-list{ list-style:none; padding:0; margin:0 }
.file-list li{ margin:2px 0 }
.file-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  background:transparent;color:var(--text-dim);
  padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:500;text-align:left;
  transition: background .15s, color .15s, transform .15s, box-shadow .2s;
  border:1px solid transparent;
}
.file-btn:hover{ background:var(--surface); color:var(--text); transform:translateX(2px) }
.file-btn.active{
  background:linear-gradient(135deg,rgba(124,92,255,0.22),rgba(53,208,255,0.12));
  color:#fff; border-color:rgba(124,92,255,0.32);
  box-shadow: inset 0 0 0 1px rgba(124,92,255,0.18), 0 8px 24px -16px rgba(124,92,255,0.55);
}
.file-btn .ico{
  width:24px; height:24px; flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;
  background:linear-gradient(135deg,#a585d8,#7952b3);
  color:#1a1a2a; font-weight:800; font-size:9.5px; letter-spacing:0.5px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2);
}
.file-btn .label{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.file-btn .lines{
  font-size:10.5px; color:var(--text-faint); padding:1px 6px; border-radius:20px;
  background:rgba(255,255,255,0.04); flex-shrink:0;
}
.file-btn.active .lines{ background:rgba(124,92,255,0.22); color:#dcd5ff }
.file-btn.dirty::before{
  content:""; width:6px; height:6px; border-radius:50%;
  background:var(--accent-2); flex-shrink:0;
  box-shadow: 0 0 8px var(--accent-2);
}

.back-link{
  display:flex;align-items:center;gap:8px;
  margin-top:18px; padding:10px 12px;border-radius:10px;
  color:var(--text-dim); font-size:13px; text-decoration:none;
  border:1px solid var(--border);
  transition: background .15s, color .15s, border-color .15s;
}
.back-link:hover{ background:var(--surface); color:var(--text); border-color:var(--border-strong) }

/* Main pane */
.editor-pane{
  position:relative; padding:22px 22px 22px 22px;
  display:grid;
  /* Both columns default to 1fr; the drag handle overrides --col-1/--col-2 with px values */
  grid-template-columns: var(--col-1, 1fr) 6px var(--col-2, 1fr);
  grid-template-rows: auto 1fr;
  grid-template-areas:
    "topbar  topbar  topbar"
    "editor  split   preview";
  gap:14px;
  min-width:0; min-height:0; overflow:hidden;
}
.editor-pane > .top-bar     { grid-area: topbar }
.editor-pane > .editor-card { grid-area: editor;  min-width: 0 }
.editor-pane > .preview-card{ grid-area: preview; min-width: 0 }

/* Drag handle to resize editor / preview split */
.splitter{
  grid-area: split;
  cursor: col-resize;
  position: relative;
  background: transparent;
  user-select: none;
  touch-action: none;
}
.splitter::before{
  content: ""; position: absolute;
  left: 50%; top: 50%; transform: translate(-50%, -50%);
  width: 4px; height: 64px; border-radius: 2px;
  background: var(--border-strong);
  transition: background .18s, height .18s, box-shadow .18s;
}
.splitter:hover::before,
.splitter.active::before{
  background: linear-gradient(180deg, var(--accent), var(--accent-2));
  height: 110px;
  box-shadow: 0 0 16px -2px rgba(124,92,255,0.55);
}

@media (max-width: 980px){
  .editor-pane{
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr 1fr;
    grid-template-areas:
      "topbar"
      "editor"
      "preview";
  }
  .splitter{ display:none }
}

/* Top header bar with file info & actions */
.top-bar{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;
  background: linear-gradient(135deg, rgba(20,20,40,0.7), rgba(12,12,24,0.7));
  border:1px solid var(--border); border-radius: var(--radius);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  box-shadow: var(--shadow-lg);
}
.file-meta{ display:flex; align-items:center; gap:12px; min-width:0 }
.file-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#a585d8,#7952b3);
  color:#1a1a2a; font-weight:800; font-size:13px; letter-spacing:0.5px;
  display:flex;align-items:center;justify-content:center;
  box-shadow: 0 6px 18px -8px rgba(247,223,30,0.55), inset 0 0 0 1px rgba(255,255,255,0.25);
  flex-shrink:0;
}
.file-name{ font-size:15px; font-weight:600; letter-spacing:-0.01em }
.file-name .dirty-mark{ color:var(--accent-2); margin-left:6px; opacity:0; transition:opacity .15s }
.file-name.dirty .dirty-mark{ opacity:1 }
.file-sub{ font-size:11.5px; color:var(--text-faint); margin-top:1px; font-family:'JetBrains Mono',monospace }
.spacer{ flex:1 }

.action-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:8px 14px; border-radius:10px;
  border:1px solid var(--border); background:rgba(255,255,255,0.03);
  color:var(--text-dim); font-size:13px; font-weight:600;
  transition: background .15s, color .15s, border-color .15s, transform .15s;
}
.action-btn:hover{ background:var(--surface-2); color:var(--text); border-color:var(--border-strong) }
.action-btn:active{ transform:translateY(1px) }
.action-btn .k{ font-family:'JetBrains Mono',monospace; font-size:10.5px; opacity:.6; padding:1px 5px; border-radius:5px; background:rgba(255,255,255,0.06) }
.run-btn{
  background:linear-gradient(135deg,#7c5cff,#35d0ff);
  color:#fff; border-color:transparent;
  box-shadow: 0 10px 30px -12px rgba(124,92,255,0.7);
}
.run-btn:hover{ filter:brightness(1.08); transform:translateY(-1px); border-color:transparent }
.stop-btn{
  background:linear-gradient(135deg,#ff5a7a,#ff8c5a);
  color:#fff; border-color:transparent;
  box-shadow: 0 10px 30px -12px rgba(255,90,122,0.65);
}
.stop-btn:hover{ filter:brightness(1.08); transform:translateY(-1px); border-color:transparent }
.stop-btn .k{ background:rgba(255,255,255,0.16) }

/* Editor card with 3D float */
.editor-card{
  position:relative; min-height:0;
  background: linear-gradient(180deg, rgba(20,20,40,0.65), rgba(8,8,18,0.65));
  border:1px solid var(--border); border-radius: var(--radius);
  overflow:hidden;
  backdrop-filter: blur(22px) saturate(150%);
  -webkit-backdrop-filter: blur(22px) saturate(150%);
  box-shadow: var(--shadow-lg);
  transform-style: preserve-3d;
  transition: transform .25s cubic-bezier(.2,.7,.2,1);
}
.editor-card::before{
  content:""; position:absolute; inset:-1px; border-radius: calc(var(--radius) + 1px); pointer-events:none;
  background: linear-gradient(135deg, rgba(124,92,255,0.45), rgba(53,208,255,0.0) 40%, rgba(255,110,199,0.35));
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  padding:1px;
  opacity:.55;
}
.editor-chrome{
  display:flex; align-items:center; gap:10px; padding:9px 14px;
  border-bottom:1px solid var(--border);
  background: linear-gradient(180deg, rgba(255,255,255,0.025), transparent);
}
.dot{ width:11px; height:11px; border-radius:50% }
.dot.r{ background:#ff5a7a; box-shadow:0 0 10px rgba(255,90,122,0.55) }
.dot.y{ background:#ffb547; box-shadow:0 0 10px rgba(255,181,71,0.55) }
.dot.g{ background:#38d39f; box-shadow:0 0 10px rgba(56,211,159,0.55) }
.editor-chrome .filename{
  margin-left:8px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-dim);
}
.editor-chrome .badge{
  margin-left:auto; font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase;
  color:var(--text-faint); padding:3px 9px; border-radius:20px;
  background:rgba(121,82,179,0.12); border:1px solid rgba(121,82,179,0.38);
  color:#d6c2f0;
}

/* Step tabs (per-file numbered runners) */
.step-tabs{
  display:flex; gap:5px; margin: 0 6px 0 12px;
  flex:1; min-width:0; overflow-x:auto;
  scrollbar-width:none;
}
.step-tabs::-webkit-scrollbar{ display:none }
.step-tabs:empty{ display:none }
.step-tab{
  flex-shrink:0;
  padding: 3px 11px; font-size:11px; border-radius:7px;
  border:1px solid var(--border); background:rgba(255,255,255,0.025);
  color:var(--text-dim); font-weight:600;
  font-family:'JetBrains Mono',ui-monospace,monospace;
  transition: background .15s, color .15s, border-color .15s, transform .15s;
}
.step-tab:hover{ background:var(--surface-2); color:var(--text); border-color:var(--border-strong) }
.step-tab.active{
  background:linear-gradient(135deg, rgba(124,92,255,0.32), rgba(53,208,255,0.20));
  color:#fff; border-color:rgba(124,92,255,0.45);
  box-shadow: 0 0 0 1px rgba(124,92,255,0.28), 0 6px 14px -8px rgba(124,92,255,0.55);
}
.step-tab .lbl{ opacity:.85; margin-left:2px; font-weight:500 }

/* Sub-file tabs (when a lesson has companion .css/.js files) */
.file-tabs{
  display:flex; gap:4px; margin: 0 6px 0 12px;
  flex:1; min-width:0; overflow-x:auto;
  scrollbar-width:none;
}
.file-tabs::-webkit-scrollbar{ display:none }
.file-tabs:empty{ display:none }
.file-tab{
  flex-shrink:0;
  padding: 3px 11px; font-size:11.5px; border-radius:7px;
  border:1px solid var(--border); background:rgba(255,255,255,0.025);
  color:var(--text-dim); font-weight:500;
  font-family:'JetBrains Mono', ui-monospace, monospace;
  transition: background .15s, color .15s, border-color .15s;
}
.file-tab:hover{ background:var(--surface-2); color:var(--text); border-color:var(--border-strong) }
.file-tab.active{
  background:linear-gradient(135deg, rgba(165,133,216,0.32), rgba(121,82,179,0.20));
  color:#fff; border-color:rgba(165,133,216,0.45);
  box-shadow: 0 0 0 1px rgba(121,82,179,0.30), 0 6px 14px -8px rgba(121,82,179,0.5);
}

/* Per-file external links (e.g. wikipedia / MDN) */
.file-links{
  display:flex; gap:6px; margin-top:6px; flex-wrap:wrap;
}
.file-links:empty{ display:none }
.file-link{
  display:inline-flex; align-items:center; gap:6px;
  padding: 4px 9px; border-radius: 8px;
  font-size: 11.5px; line-height:1.2;
  border:1px solid rgba(53,208,255,0.28);
  background:linear-gradient(135deg, rgba(53,208,255,0.10), rgba(124,92,255,0.08));
  color:#cfeaff; text-decoration:none;
  transition: background .15s, color .15s, border-color .15s, transform .15s;
}
.file-link:hover{
  background:linear-gradient(135deg, rgba(53,208,255,0.20), rgba(124,92,255,0.16));
  border-color:rgba(53,208,255,0.55);
  color:#fff; transform: translateY(-1px);
}
.file-link .ico{ font-size:12px; opacity:.85 }
.file-link .arrow{ font-size:10px; opacity:.65 }
.file-link .host{ font-size:10px; color:var(--text-faint); font-family:'JetBrains Mono',monospace }
.cm-host{ position:relative; height:calc(100% - 41px) }
.CodeMirror{
  height:100% !important; background:transparent;
  font-size:14px; line-height:1.55;
  padding: 6px 0;
}
.CodeMirror-gutters{ background:transparent; border-right:1px solid var(--border) }
.CodeMirror-linenumber{ color:rgba(154,154,176,0.4) }
.CodeMirror-cursor{ border-left-color:#fff }
.CodeMirror-activeline-background{ background:rgba(124,92,255,0.05) !important }
.CodeMirror-selected{ background:rgba(124,92,255,0.22) !important }
.CodeMirror-matchingbracket{ color:#35d0ff !important; text-shadow:0 0 8px rgba(53,208,255,0.6) }

/* Console card */
.preview-card{
  background: linear-gradient(180deg, rgba(20,20,40,0.7), rgba(8,8,18,0.7));
  border:1px solid var(--border); border-radius: var(--radius);
  display:flex; flex-direction:column; min-height:0;
  backdrop-filter: blur(22px) saturate(150%);
  -webkit-backdrop-filter: blur(22px) saturate(150%);
  box-shadow: var(--shadow-lg);
  overflow:hidden;
  position: relative;
}
.preview-card::before{
  content:""; position: absolute; inset:-1px; border-radius: calc(var(--radius) + 1px); pointer-events:none;
  background: linear-gradient(135deg, rgba(121,82,179,0.55), rgba(124,92,255,0) 40%, rgba(255,110,199,0.40));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; padding: 1px;
  opacity: .55;
}
.preview-head{
  display:flex; align-items:center; gap:10px; padding:9px 14px;
  border-bottom:1px solid var(--border);
  background: linear-gradient(180deg, rgba(255,255,255,0.025), transparent);
  position: relative; z-index: 1;
}
.preview-head .label{
  font-size:11.5px; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-dim);
  display:flex; align-items:center; gap:8px;
}
.preview-head .label::before{
  content:""; width:8px; height:8px; border-radius:50%;
  background: var(--success); box-shadow: 0 0 10px rgba(56,211,159,0.7);
}
.preview-head .label.rendering::before{ background: var(--accent-2); box-shadow: 0 0 10px rgba(53,208,255,0.7); animation: pulse 1s ease infinite }
@keyframes pulse{
  0%,100%{ transform: scale(1); opacity:1 }
  50%   { transform: scale(1.4); opacity:.55 }
}
.preview-head .right{ margin-left:auto; display:flex; gap:6px; align-items:center }
.preview-head .icon-btn{
  padding:5px 10px; border-radius:8px; border:1px solid var(--border);
  background:rgba(255,255,255,0.02); color:var(--text-dim); font-size:11.5px;
  transition: background .15s, color .15s, border-color .15s;
}
.preview-head .icon-btn:hover{ background:var(--surface-2); color:var(--text); border-color:var(--border-strong) }
.preview-head .icon-btn.active{
  background: linear-gradient(135deg, rgba(124,92,255,0.30), rgba(53,208,255,0.20));

.console-head .label.running::before{ background: var(--accent-2); box-shadow: 0 0 10px rgba(53,208,255,0.7); animation: pulse 1s ease infinite }

@keyframes pulse{
  0%,100%{ transform: scale(1); opacity:1 }

.ambient{
  position:absolute; border-radius:50%; pointer-events:none; z-index:0;

}
.ambient.a{ width:340px;height:340px; background:rgba(124,92,255,0.35); top:-80px; right:-100px; animation:floatA 14s ease-in-out infinite }

/* ==========================================================
   3D background — Three.js scene with floating wireframes
   ========================================================== */
(function init3D(){
  const canvas = document.getElementById('bg-3d');
  if(!window.THREE){ return; }
  const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);
  camera.position.z = 7;

  // Group of floating wireframe shapes
  const group = new THREE.Group();
  scene.add(group);

  const palette = [0x7c5cff, 0x35d0ff, 0xff6ec7, 0xf7df1e];

  function addShape(geom, color, scale, position){
    const mat = new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.55 });
    const wire = new THREE.WireframeGeometry(geom);
    const line = new THREE.LineSegments(wire, mat);
    line.scale.setScalar(scale);
    line.position.set(position.x, position.y, position.z);
    line.userData.spinSpeed = {
      x: (Math.random() - 0.5) * 0.004,
      y: (Math.random() - 0.5) * 0.004,
      z: (Math.random() - 0.5) * 0.0025
    };
    line.userData.float = { phase: Math.random()*Math.PI*2, amp: 0.3 + Math.random()*0.4 };
    group.add(line);
    return line;
  }

  addShape(new THREE.IcosahedronGeometry(1, 0), palette[0], 1.6,  { x:-4.5, y:1.6, z:-2 });
  addShape(new THREE.TorusKnotGeometry(0.7, 0.22, 80, 12), palette[1], 1.4, { x: 4.5, y:-1.8, z:-1 });
  addShape(new THREE.OctahedronGeometry(1, 0), palette[2], 1.0,  { x: 3.0, y: 2.2, z:-3 });
  addShape(new THREE.TetrahedronGeometry(1, 0), palette[3], 0.9, { x:-3.2, y:-2.0, z:-2.5 });
  addShape(new THREE.IcosahedronGeometry(1, 0), palette[1], 0.6, { x: 0.2, y: 0.0, z:-4 });
  addShape(new THREE.DodecahedronGeometry(1, 0), palette[0], 0.7,{ x:-1.6, y: 2.6, z:-3.5 });
  addShape(new THREE.OctahedronGeometry(1, 0), palette[3], 0.55, { x: 1.8, y:-2.6, z:-3.5 });

  // Particle field
  const pCount = 220;
  const pGeom = new THREE.BufferGeometry();
  const pPos = new Float32Array(pCount * 3);
  for(let i=0; i<pCount; i++){
    pPos[i*3+0] = (Math.random() - 0.5) * 18;
    pPos[i*3+1] = (Math.random() - 0.5) * 12;
    pPos[i*3+2] = (Math.random() - 0.5) * 10 - 2;
  }
  pGeom.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  const pMat = new THREE.PointsMaterial({ color:0xffffff, size:0.025, transparent:true, opacity:0.65 });
  const points = new THREE.Points(pGeom, pMat);
  scene.add(points);

  // Mouse parallax
  const target = { x:0, y:0 };
  const current = { x:0, y:0 };
  window.addEventListener('mousemove', (e)=>{
    target.x = (e.clientX / window.innerWidth - 0.5) * 0.6;
    target.y = (e.clientY / window.innerHeight - 0.5) * 0.4;
  });

  function resize(){
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  let t = 0;
  function tick(){
    t += 0.01;
    current.x += (target.x - current.x) * 0.05;
    current.y += (target.y - current.y) * 0.05;

    group.children.forEach((m)=>{
      m.rotation.x += m.userData.spinSpeed.x;
      m.rotation.y += m.userData.spinSpeed.y;
      m.rotation.z += m.userData.spinSpeed.z;
      m.position.y += Math.sin(t + m.userData.float.phase) * 0.0025 * m.userData.float.amp;
    });
    group.rotation.y = current.x * 0.4;
    group.rotation.x = -current.y * 0.3;
    points.rotation.y += 0.0006;
    points.rotation.x = -current.y * 0.05;

    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }
  tick();
})();

  loaded: {},             // any path -> bool

/* Parse "// N) title" headings into step snippets. A step is included only if
   its extracted code contains at least one console.* call (otherwise running
   it would produce no visible output). The file gets step tabs only if 2+
   steps qualify. Bodies that are mostly commented-out get their leading "// "
   stripped; bodies that already contain live code are left as-is. */
function parseSteps(source){
  if(!source) return null;
  const lines = source.split('\n');
  const headingRe = /^(\s*)\/\/\s*(\d+)\)\s*(.*)$/;
  const headings = [];
  for(let i=0; i<lines.length; i++){
    const m = lines[i].match(headingRe);
    if(m) headings.push({ n: parseInt(m[2],10), title: m[3].trim(), line: i });
  }
  if(headings.length < 2) return null;

  const result = [];
  for(let h=0; h<headings.length; h++){
    const start = headings[h].line;
    const end = (h+1 < headings.length) ? headings[h+1].line : lines.length;
    const block = lines.slice(start, end);

    // Decide commented-mode vs live-mode by counting body lines (skip heading)
    let commented = 0, live = 0;
    for(let j=1; j<block.length; j++){
      const t = block[j].trim();
      if(!t) continue;
      if(t.startsWith('//')) commented++;
      else live++;
    }
    let code;
    if(commented > live){
      // Strip a single "// " (or "//") from each non-heading line
      code = [block[0]].concat(
        block.slice(1).map(line => line.replace(/^(\s*)\/\/ ?/, '$1'))
      ).join('\n');
    }else{
      code = block.join('\n');
    }

    if(/\bconsole\.(log|info|warn|error|table|dir|trace)\b/.test(code)){
      result.push({ n: headings[h].n, title: headings[h].title, code });
    }
  }
  return result.length >= 2 ? result : null;
}

/* Save whatever's in the editor into the right slot for the active file/step. */
function saveCurrentEditor(){
  const file = state.active;
  if(!file) return;
  const step = state.activeStep[file] || 0;
  const v = editor.getValue();
  if(step === 0){
    state.buffers[file] = v;
    // Editing the canonical "All" view invalidates per-step caches —
    // they should be regenerated from the new buffer next time.
    if(state.stepEdits[file]) delete state.stepEdits[file];
    state.steps[file] = parseSteps(v);
  }else{
    if(!state.stepEdits[file]) state.stepEdits[file] = {};
    state.stepEdits[file][step] = v;
  }
}

/* Set the editor content + chrome labels for the currently-active step. */
function loadEditorForCurrentStep(){
  const file = state.active;
  if(!file) return;
  const step = state.activeStep[file] || 0;
  let content;
  if(step === 0){
    content = state.buffers[file] ?? state.originals[file] ?? '';
    chromeNameEl.textContent = file;
    fileSubEl.textContent = 'bootstrap/' + file;
  }else{
    const cached = state.stepEdits[file] && state.stepEdits[file][step];
    if(cached != null){
      content = cached;
    }else{
      const steps = parseSteps(state.buffers[file] ?? state.originals[file] ?? '');
      const s = (steps || []).find(x => x.n === step);
      content = s ? s.code : '// step ' + step + ' not found';
    }
    const s = (state.steps[file] || []).find(x => x.n === step);
    chromeNameEl.textContent = file + '  ·  step ' + step;
    fileSubEl.textContent = s ? `step ${step} — ${s.title}` : `step ${step}`;
  }
  editor.setValue(content);
  editor.clearHistory();
}

function switchStep(stepN){
  const file = state.active;
  if(!file) return;
  saveCurrentEditor();
  state.activeStep[file] = stepN;
  loadEditorForCurrentStep();
  renderStepTabs();
  refreshDirty(file);
  editor.focus();
}

function renderStepTabs(){
  const tabsEl = document.getElementById('stepTabs');
  const file = state.active;
  const steps = state.steps[file];
  if(!steps || steps.length < 2){
    tabsEl.innerHTML = '';
    return;
  }
  const cur = state.activeStep[file] || 0;
  const esc = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  let html = '';
  steps.forEach(s => {
    const tip = `${s.n}) ${s.title || 'Step '+s.n}`;
    html += `<button class="step-tab ${cur===s.n?'active':''}" data-step="${s.n}" title="${esc(tip)}">${s.n}</button>`;
  });
  html += `<button class="step-tab ${cur===0?'active':''}" data-step="0" title="Run the full file">All</button>`;
  tabsEl.innerHTML = html;
  tabsEl.querySelectorAll('.step-tab').forEach(b => {
    b.addEventListener('click', () => switchStep(parseInt(b.dataset.step, 10)));
  });
}

/* Pull every <a href> out of an HTML string. Returns a deduped list of
   {title, url} pairs. Skips empty / "#" / "javascript:" hrefs and pure
   in-page anchors. The link's visible text becomes the chip title;
   if it's empty or just markup, fall back to the URL. */
function extractLinks(html){
  if(!html) return [];
  const out = [];
  const seen = new Set();
  const re = /<a\b[^>]*\bhref\s*=\s*("([^"]*)"|'([^']*)')[^>]*>([\s\S]*?)<\/a>/gi;
  let m;
  while((m = re.exec(html)) !== null){
    const url = (m[2] ?? m[3] ?? '').trim();
    if(!url || url === '#' || url.startsWith('javascript:')) continue;
    // Skip pure same-page anchors (#section) — they don't navigate to anything useful here
    if(url.startsWith('#')) continue;
    if(seen.has(url)) continue;
    seen.add(url);
    let text = m[4].replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
    if(!text) text = url;
    out.push({ title: text, url, autoFromFile: true });
  }
  return out;
}

function renderFileLinks(){
  const linksEl = document.getElementById('fileLinks');
  const entry = FILES.find(f => f.file === state.active);
  const manual = (entry && entry.links) || [];
  // Auto-extract <a href> links from the lesson's current HTML buffer
  const lesson = state.active;
  const lessonHtml = lesson ? (state.buffers[lesson] ?? state.originals[lesson] ?? '') : '';
  const auto = extractLinks(lessonHtml);
  // Merge: keep manual entries first, then auto entries that aren't duplicates
  const seenUrls = new Set(manual.filter(l => l.url).map(l => l.url));
  const links = [...manual, ...auto.filter(l => !seenUrls.has(l.url))];
  if(!links.length){ linksEl.innerHTML = ''; return; }
  const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  linksEl.innerHTML = links.map((l, i) => {
    let host = '';
    try { host = new URL(l.url).hostname.replace(/^www\./,''); } catch {}
    const isEmbed = !!l.embed;
    const defaultIco = isEmbed
      ? (l.embed.type === 'video' ? '▶' : (l.embed.type === 'html' ? '📥' : '⤢'))
      : (l.autoFromFile ? '🔗' : '📚');
    const ico = l.icon || defaultIco;
    const arrow = isEmbed ? '⤢' : '↗';
    const tag = isEmbed ? 'button type="button"' : `a href="${esc(l.url || '#')}" target="_blank" rel="noopener noreferrer"`;
    const close = isEmbed ? 'button' : 'a';
    const tip = l.url ? esc(l.url) : esc(l.title);
    return `<${tag} class="file-link" data-link-index="${i}" title="${tip}">`
         + `<span class="ico">${esc(ico)}</span><span>${esc(l.title)}</span>`
         + (host ? `<span class="host">${esc(host)}</span>` : '')
         + `<span class="arrow">${arrow}</span></${close}>`;
  }).join('');
  // Attach click handlers for embed-style links
  linksEl.querySelectorAll('button.file-link').forEach(btn => {
    const idx = parseInt(btn.dataset.linkIndex, 10);
    const link = links[idx];
    if(!link) return;
    btn.addEventListener('click', () => openMediaModal(link));
  });
}

/* ==========================================================
   Media modal — plays cross-origin video (and optional separate
   audio track, e.g. Reddit DASH) inside the lab.
   ========================================================== */
const mediaModalEl = document.getElementById('mediaModal');
const mediaTitleEl = document.getElementById('mediaTitle');
const mediaHostEl  = document.getElementById('mediaHost');
const mediaBodyEl  = document.getElementById('mediaBody');
const mediaSrcLink = document.getElementById('mediaSource');

function openMediaModal(link){
  if(!link || !link.embed) return;
  const e = link.embed;
  const foot = document.getElementById('mediaFoot');
  mediaTitleEl.textContent = link.title || 'Embedded media';
  let host = '';
  try { if(link.url) host = new URL(link.url).hostname.replace(/^www\./,''); } catch {}
  mediaHostEl.textContent = host;
  // Footer is only meaningful when there's an external source URL
  if(link.url){
    foot.style.display = '';
    mediaSrcLink.href = link.url;
    mediaSrcLink.textContent = host || 'source';
    mediaSrcLink.title = link.url;
  }else{
    foot.style.display = 'none';
  }

  mediaBodyEl.classList.remove('html-mode');
  mediaBodyEl.innerHTML = '<div class="media-loading">Loading…</div>';
  mediaModalEl.classList.add('open');

  if(e.type === 'html'){
    mediaBodyEl.classList.add('html-mode');
    mediaBodyEl.innerHTML = e.html || '';
    return;
  }
  if(e.type === 'video'){
    const video = document.createElement('video');
    video.src = e.videoSrc;
    video.controls = true;
    video.playsInline = true;
    video.preload = 'metadata';
    if(e.poster) video.poster = e.poster;
    if(e.width) video.width = e.width;
    if(e.height) video.height = e.height;

    let audio = null;
    if(e.audioSrc){
      // Reddit DASH videos have audio in a separate file; play in sync
      audio = document.createElement('audio');
      audio.src = e.audioSrc;
      audio.preload = 'metadata';
      const sync = () => { try { audio.currentTime = video.currentTime; } catch {} };
      video.addEventListener('play',   () => { sync(); audio.play().catch(()=>{}); });
      video.addEventListener('pause',  () => audio.pause());
      video.addEventListener('seeking',() => sync());
      video.addEventListener('seeked', () => sync());
      video.addEventListener('ratechange', () => { audio.playbackRate = video.playbackRate; });
      video.addEventListener('volumechange', () => { audio.volume = video.volume; audio.muted = video.muted; });
      // Periodically nudge if drift > 0.25s
      setInterval(() => {
        if(audio.paused || video.paused) return;
        const drift = audio.currentTime - video.currentTime;
        if(Math.abs(drift) > 0.25) sync();
      }, 1000);
    }

    mediaBodyEl.innerHTML = '';
    mediaBodyEl.appendChild(video);
    if(audio) mediaBodyEl.appendChild(audio);
  } else if(e.type === 'iframe'){
    mediaBodyEl.innerHTML = '';
    const ifr = document.createElement('iframe');
    ifr.src = e.src;
    ifr.style.cssText = 'border:0;width:100%;height:60vh;border-radius:10px;background:#000';
    if(e.allow) ifr.allow = e.allow;
    mediaBodyEl.appendChild(ifr);
  } else {
    mediaBodyEl.innerHTML = '<div class="media-loading">Unsupported embed type.</div>';
  }
}

function closeMediaModal(){
  mediaModalEl.classList.remove('open');
  // Tear down media to stop playback and free the network stream
  mediaBodyEl.querySelectorAll('video, audio, iframe').forEach(n => {
    if(n.tagName === 'IFRAME'){ n.src = 'about:blank'; }
    else { try { n.pause(); } catch {} n.removeAttribute('src'); n.load && n.load(); }
  });
  mediaBodyEl.classList.remove('html-mode');
  mediaBodyEl.innerHTML = '';
}

document.getElementById('mediaClose').addEventListener('click', closeMediaModal);
mediaModalEl.addEventListener('click', (e) => {
  if(e.target === mediaModalEl) closeMediaModal();
});
window.addEventListener('keydown', (e) => {

searchEl.addEventListener('input', ()=>{
  const q = searchEl.value.toLowerCase().trim();

    const f = b.dataset.file;
    const label = b.querySelector('.label').textContent.toLowerCase();
    const match = !q || f.toLowerCase().includes(q) || label.includes(q);
    b.parentElement.style.display = match ? '' : 'none';
  });
  // Hide a group header when all its items are filtered out
  document.querySelectorAll('.file-group-head').forEach(head => {
    let n = head.nextElementSibling;
    let anyVisible = false;
    while(n && !n.classList.contains('file-group-head')){
      if(n.style.display !== 'none') { anyVisible = true; break; }
      n = n.nextElementSibling;
    }
    head.style.display = anyVisible ? '' : 'none';
  });
});

function readEmbedded(name){
  const node = document.querySelector(`script[type="text/plain"][data-bsfile="${CSS.escape(name)}"]`);
  if(!node) return null;
  // Restore "<\/script" → "</script" in case anything was neutralized at embed time
  return node.textContent.replace(/<\\\/script/gi, '</script');
}

async function loadFile(name){
  if(state.loaded[name]) return state.originals[name];
  let text = readEmbedded(name);
  if(text == null){
    // Fall back to fetch when served over http(s) and a file isn't embedded
    try{
      const r = await fetch(name + '?t=' + Date.now());
      if(!r.ok) throw new Error('HTTP ' + r.status);
      text = await r.text();
    }catch(err){
      text = `// Source for ${name} is not embedded in this page and could not be fetched.\n// ${err.message}\n`;
    }
  }
  state.originals[name] = text;
  state.buffers[name] = text;
  state.loaded[name] = true;
  state.lineCounts[name] = text.split('\n').length;
  const btn = document.querySelector(`.file-btn[data-file="${name}"]`);
  if(btn){
    const lines = btn.querySelector('[data-lines]');
    if(lines) lines.textContent = state.lineCounts[name] + 'L';
  }
  return text;
}

async function activate(name){
  // Save current view (current sub-file inside the current lesson) into its slot
  if(state.active){
    saveCurrentSubEditor();
    refreshDirty(state.active);
  }
  state.active = name;
  document.querySelectorAll('.file-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.file === name);
  });
  fileNameEl.firstChild.textContent = name;
  if(!state.loaded[name]){
    editor.setValue('// Loading ' + name + '…');
    await loadFile(name);
  }
  // Also pre-load any companion files declared via `related`
  const entry = FILES.find(f => f.file === name);
  const related = (entry && entry.related) || [];
  for(const rel of related){
    if(!state.loaded[rel]) await loadFile(rel);
  }
  // (Re)compute steps from the current "All" buffer (no-op for HTML lessons)
  state.steps[name] = parseSteps(state.buffers[name] ?? state.originals[name] ?? '');
  if(state.activeStep[name] == null){
    const ss = state.steps[name];
    state.activeStep[name] = (ss && ss.length >= 2) ? ss[ss.length - 1].n : 0;
  }
  if(state.activeStep[name] !== 0 && !(state.steps[name] || []).some(s => s.n === state.activeStep[name])){
    const ss = state.steps[name];
    state.activeStep[name] = (ss && ss.length) ? ss[ss.length - 1].n : 0;
  }
  // Default the sub-file selector to the lesson itself
  if(!state.activeSubfile[name]) state.activeSubfile[name] = name;
  loadSubfileIntoEditor();
  renderStepTabs();
  renderFileTabs();
  renderFileLinks();
  refreshDirty(name);
  editor.focus();
  // Refresh the iframe preview for the newly-active file
  if(typeof renderPreview === 'function') renderPreview();
}

function refreshDirty(name){
  // "Dirty" = the lesson's HTML buffer OR any of its related-file buffers
  // differs from the originals on disk. Switching sub-file tabs is just a
  // view change, so the editor's current text isn't read here.
  if(!state.loaded[name]) return;
  const entry = FILES.find(f => f.file === name);
  const all = [name, ...((entry && entry.related) || [])];
  let dirty = false;
  for(const p of all){
    if(state.buffers[p] != null && state.buffers[p] !== state.originals[p]){ dirty = true; break; }
  }
  const btn = document.querySelector(`.file-btn[data-file="${name}"]`);
  if(btn) btn.classList.toggle('dirty', dirty);
  if(name === state.active){
    fileNameEl.classList.toggle('dirty', dirty);
  }
}

/* Sub-file tabs (when a lesson has companion .css/.js files) */
function saveCurrentSubEditor(){
  const lesson = state.active;
  if(!lesson) return;
  const sub = state.activeSubfile[lesson] || lesson;
  state.buffers[sub] = editor.getValue();
}
function loadSubfileIntoEditor(){
  const lesson = state.active;
  if(!lesson) return;
  const sub = state.activeSubfile[lesson] || lesson;
  const content = state.buffers[sub] ?? state.originals[sub] ?? '';
  // Match syntax mode to the file's extension
  const mode = sub.endsWith('.css') ? 'css'
             : sub.endsWith('.js')  ? 'javascript'
             : 'htmlmixed';
  editor.setOption('mode', mode);
  editor.setValue(content);
  editor.clearHistory();
  // Update chrome name + sub-path display
  chromeNameEl.textContent = sub.split('/').pop();
  fileSubEl.textContent = 'bootstrap/' + sub;
}
function renderFileTabs(){
  const tabsEl = document.getElementById('fileTabs');
  const lesson = state.active;
  if(!lesson){ tabsEl.innerHTML = ''; chromeNameEl.style.display = ''; return; }
  const entry = FILES.find(f => f.file === lesson);
  const related = (entry && entry.related) || [];
  const all = [lesson, ...related];
  if(all.length < 2){
    tabsEl.innerHTML = '';
    chromeNameEl.style.display = '';
    return;
  }
  // Tabs replace the static filename in the chrome
  chromeNameEl.style.display = 'none';
  const cur = state.activeSubfile[lesson] || lesson;
  const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
  tabsEl.innerHTML = all.map(p => {
    const name = p.split('/').pop();
    const cls  = 'file-tab' + (p === cur ? ' active' : '');
    return `<button class="${cls}" data-path="${esc(p)}" title="${esc(p)}">${esc(name)}</button>`;
  }).join('');
  tabsEl.querySelectorAll('.file-tab').forEach(b => {
    b.addEventListener('click', () => switchSubfile(b.dataset.path));
  });
}
function switchSubfile(path){
  const lesson = state.active;
  if(!lesson) return;
  saveCurrentSubEditor();
  state.activeSubfile[lesson] = path;
  loadSubfileIntoEditor();
  renderFileTabs();
  refreshDirty(lesson);
  editor.focus();
}

editor.on('change', ()=>{
  if(!state.active) return;
  const lesson = state.active;
  const sub = state.activeSubfile[lesson] || lesson;
  state.buffers[sub] = editor.getValue();
  refreshDirty(lesson);
  // If the user just edited the lesson HTML, the set of <a href> links
  // can change — refresh the chip strip (debounced so we don't churn DOM
  // on every keystroke).
  if(sub === lesson){
    clearTimeout(renderFileLinks._t);
    renderFileLinks._t = setTimeout(renderFileLinks, 250);
  }
});

/* ==========================================================
   Reset / Render / Preview
   ========================================================== */
document.getElementById('resetBtn').addEventListener('click', ()=>{
  const lesson = state.active;
  if(!lesson || state.originals[lesson] == null) return;
  // Reset both the lesson's HTML and every related companion file
  const entry = FILES.find(f => f.file === lesson);
  const all = [lesson, ...((entry && entry.related) || [])];
  for(const p of all){
    if(state.originals[p] != null) state.buffers[p] = state.originals[p];
  }
  loadSubfileIntoEditor();
  refreshDirty(lesson);
  renderPreview();
  toast('Reset ' + lesson);
});
document.getElementById('runBtn').addEventListener('click', () => renderPreview());
window.addEventListener('keydown', (e)=>{
  if((e.metaKey || e.ctrlKey) && e.key === 'Enter'){
    e.preventDefault();
    renderPreview();
  }
});

/* ==========================================================
   Live preview
   ========================================================== */
const previewEl = document.getElementById('preview');
const previewCardEl = document.getElementById('previewCard');
const previewStatusEl = document.getElementById('previewStatus');
const autoChk = document.getElementById('autoChk');

/* Compose the lesson's HTML with each companion file inlined, so the user's
   in-editor edits to a sibling .css / .js show up in the preview. */
function buildPreviewHtml(){
  const lesson = state.active;
  if(!lesson) return '';
  // Make sure the active sub-file's editor content is captured before we read
  // the buffers (the change handler usually does this, but be explicit).
  saveCurrentSubEditor();
  let html = state.buffers[lesson] ?? state.originals[lesson] ?? '';
  const entry = FILES.find(f => f.file === lesson);
  const related = (entry && entry.related) || [];
  for(const rel of related){
    const buf = state.buffers[rel] ?? state.originals[rel] ?? '';
    const fname = rel.split('/').pop();
    const escName = fname.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    if(rel.endsWith('.css')){
      const re = new RegExp(`<link\\b[^>]*\\bhref=(?:"${escName}"|'${escName}')[^>]*/?>`, 'i');
      html = html.replace(re, `<style>\n${buf}\n<\/style>`);
    } else if(rel.endsWith('.js')){
      const re = new RegExp(`<script\\b[^>]*\\bsrc=(?:"${escName}"|'${escName}')[^>]*><\/script>`, 'i');
      html = html.replace(re, `<script>\n${buf}\n<\/script>`);
    }
  }
  return html;
}

function renderPreview(){
  let html = buildPreviewHtml();
  // Inject <base href="..."> so relative URLs the lesson does NOT have us
  // inline (images, fonts, sibling files we don't manage) resolve to the
  // lesson's folder instead of the synthetic about:srcdoc origin.
  const file = state.active;
  if(file){
    const dir = file.split('/').slice(0, -1).join('/');
    const baseUrl = dir ? new URL(encodeURI(dir) + '/', document.baseURI).href : document.baseURI;
    const baseTag = `<base href="${baseUrl}">`;
    if(/<head\b[^>]*>/i.test(html)){
      html = html.replace(/<head\b[^>]*>/i, (m) => m + baseTag);
    } else {
      html = `<!DOCTYPE html><head>${baseTag}</head>` + html;
    }
  }
  previewStatusEl.classList.add('rendering');
  previewStatusEl.textContent = 'Rendering';
  previewEl.srcdoc = html;
}

function schedulePreview(){
  // debounced auto-render while typing
  if(!autoChk.checked) return;
  clearTimeout(schedulePreview._t);
  schedulePreview._t = setTimeout(renderPreview, 350);
}

previewEl.addEventListener('load', ()=>{
  previewStatusEl.classList.remove('rendering');
  previewStatusEl.textContent = 'Preview';
});

document.getElementById('bgToggleBtn').addEventListener('click', (e)=>{
  previewCardEl.classList.toggle('dark-bg');
  e.currentTarget.classList.toggle('active', previewCardEl.classList.contains('dark-bg'));
});

document.getElementById('popoutBtn').addEventListener('click', ()=>{
  const code = editor.getValue();
  const w = window.open('', '_blank', 'noopener,noreferrer');
  if(!w){ toast('Pop-up blocked — allow popups for this page'); return; }
  w.document.open(); w.document.write(code); w.document.close();
});

editor.on('change', schedulePreview);

/* ==========================================================
   Toast helper
   ========================================================== */
const toastEl = document.getElementById('toast');
let toastTimer;
function toast(msg, kind){
  toastEl.textContent = msg;
  toastEl.classList.toggle('error', kind === 'error');
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> toastEl.classList.remove('show'), 1800);
}

/* ==========================================================
   Drag-to-resize splitter between editor and preview
   ========================================================== */
(function initSplitter(){
  const pane     = document.querySelector('.editor-pane');
  const splitter = document.getElementById('splitter');
  const editorCardEl  = document.querySelector('.editor-pane > .editor-card');
  const previewCardEl_ = document.querySelector('.editor-pane > .preview-card');
  if(!pane || !splitter || !editorCardEl || !previewCardEl_) return;
  const HANDLE_W = 6;        // matches the middle column width in the grid
  const MIN_PANE = 160;      // minimum width for either side
  const STORAGE  = 'css-lab-split-ratio';

  // Restore previously-saved ratio (a number between 0 and 1, editor's share)
  let savedRatio = null;
  try { const v = parseFloat(localStorage.getItem(STORAGE)); if(v > 0 && v < 1) savedRatio = v; } catch {}

  function applyRatio(ratio){
    const total = pane.clientWidth - parseFloat(getComputedStyle(pane).paddingLeft) * 2 - HANDLE_W - 14 * 2;
    // ^^ subtract paddings + two gaps (one on each side of the splitter)
    if(total <= 0) return;
    const left  = Math.max(MIN_PANE, Math.min(total - MIN_PANE, total * ratio));
    const right = total - left;
    pane.style.setProperty('--col-1', left  + 'px');
    pane.style.setProperty('--col-2', right + 'px');
    if(typeof editor !== 'undefined' && editor.refresh){
      clearTimeout(applyRatio._t);
      applyRatio._t = setTimeout(() => editor.refresh(), 30);
    }
  }
  if(savedRatio != null) applyRatio(savedRatio);

  let drag = null;
  function start(e){
    e.preventDefault();
    const rect = pane.getBoundingClientRect();
    const padL = parseFloat(getComputedStyle(pane).paddingLeft) || 0;
    drag = {
      paneLeft: rect.left + padL,
      total: pane.clientWidth - padL * 2 - HANDLE_W - 14 * 2,
      pointerId: e.pointerId ?? null,
    };
    splitter.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  }
  function move(e){
    if(!drag) return;
    // editor's effective column = pointer X minus the pane's left padding edge
    let editorPx = e.clientX - drag.paneLeft;
    editorPx = Math.max(MIN_PANE, Math.min(drag.total - MIN_PANE, editorPx));
    const ratio = editorPx / drag.total;
    applyRatio(ratio);
  }
  function end(){
    if(!drag) return;
    drag = null;
    splitter.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    // Persist current ratio
    const total = pane.clientWidth - parseFloat(getComputedStyle(pane).paddingLeft) * 2 - HANDLE_W - 14 * 2;
    const colL = parseFloat(pane.style.getPropertyValue('--col-1')) || total / 2;
    try { localStorage.setItem(STORAGE, (colL / total).toFixed(4)); } catch {}
  }
  splitter.addEventListener('pointerdown', start);
  window.addEventListener('pointermove', move);
  window.addEventListener('pointerup',   end);
  window.addEventListener('pointercancel', end);

  // Double-click resets to 50/50
  splitter.addEventListener('dblclick', () => {
    pane.style.removeProperty('--col-1');
    pane.style.removeProperty('--col-2');
    try { localStorage.removeItem(STORAGE); } catch {}
    if(typeof editor !== 'undefined' && editor.refresh) setTimeout(() => editor.refresh(), 30);
  });

  // Keep CodeMirror's layout correct when the window resizes
  window.addEventListener('resize', () => {
    if(savedRatio != null) applyRatio(parseFloat(localStorage.getItem(STORAGE)) || 0.5);
    if(typeof editor !== 'undefined' && editor.refresh){
      clearTimeout(applyRatio._t);
      applyRatio._t = setTimeout(() => editor.refresh(), 60);
    }
  });
})();

/* ==========================================================
   Boot
   ========================================================== */
(async function boot(){
  // Pre-fetch line counts for sidebar in the background
  FILES.forEach(f => loadFile(f.file));
  // Activate first file
  await activate(FILES[0].file);
})();
</script>
