<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Shadow Examples</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      padding: 2rem;
    }
    .example-box {
      width: 100%;
      max-width: 300px;
      height: 100px;
      margin: 1rem auto;
      background-color: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
    }
  </style>
</head>
<body>

  <h1 class="text-center mb-4">🌟 Bootstrap Shadow Examples</h1>

  <!-- 1. No shadow -->
  <div class="example-box shadow-none">
    <!-- .shadow-none: No shadow -->
    <strong>1. No Shadow</strong>
  </div>

  <!-- 2. Small shadow -->
  <div class="example-box shadow-sm">
    <!-- .shadow-sm: Small subtle shadow -->
    <strong>2. Small Shadow</strong>
  </div>

  <!-- 3. Regular shadow -->
  <div class="example-box shadow">
    <!-- .shadow: Default regular shadow -->
    <strong>3. Regular Shadow</strong>
  </div>

  <!-- 4. Large shadow -->
  <div class="example-box shadow-lg">
    <!-- .shadow-lg: Large stronger shadow -->
    <strong>4. Large Shadow</strong>
  </div>

  <!-- 5. Custom shadow with text and button -->
  <div class="example-box shadow-lg bg-white border">
    <!-- Combination with border and background -->
    <div>
      <p class="mb-1">5. Shadow Card Example</p>
      <button class="btn btn-primary btn-sm">Click Me</button>
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
