<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Spinners Examples</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      padding: 2rem;
      background: #f8f9fa;
    }
  </style>
</head>
<body>

  <h1 class="text-center mb-5">🌀 Bootstrap Spinner Examples</h1>

  <!-- 1️⃣ Basic border spinner -->
  <p>
    <strong>1️⃣ Border Spinner:</strong>
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </p>

  <!-- 2️⃣ Growing spinner -->
  <p>
    <strong>2️⃣ Growing Spinner:</strong>
    <div class="spinner-grow text-success" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </p>

  <!-- 3️⃣ Colored border spinners -->
  <p>
    <strong>3️⃣ Colored Border Spinners:</strong><br>
    <div class="d-flex gap-2 align-items-center">
      <div class="spinner-border text-primary" role="status"></div>
      <div class="spinner-border text-secondary" role="status"></div>
      <div class="spinner-border text-success" role="status"></div>
      <div class="spinner-border text-danger" role="status"></div>
      <div class="spinner-border text-warning" role="status"></div>
      <div class="spinner-border text-info" role="status"></div>
      <div class="spinner-border text-dark" role="status"></div>
    </div>
  </p>

  <!-- 4️⃣ Spinner inside a button (loading state) -->
  <p>
    <strong>4️⃣ Spinner inside a button:</strong><br>
    <button class="btn btn-primary" type="button" disabled>
      <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
      Loading...
    </button>
  </p>

  <!-- 5️⃣ Growing spinner inside button -->
  <p>
    <strong>5️⃣ Growing spinner in button:</strong><br>
    <button class="btn btn-success" type="button" disabled>
      <span class="spinner-grow spinner-grow-sm" role="status" aria-hidden="true"></span>
      Waiting...
    </button>
  </p>

</body>
</html>
