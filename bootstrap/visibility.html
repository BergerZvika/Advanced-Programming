<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bootstrap Visibility Utilities</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    .box {
      width: 200px;
      height: 100px;
      margin: 1rem auto;
      background-color: #0d6efd;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 0.5rem;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1 class="text-center mb-4">Bootstrap Visibility Utilities</h1>

  <!-- 1. Visible element -->
  <div class="box visible">
    1. Visible (default)
  </div>

  <!-- 2. Invisible element (hidden but takes space) -->
  <div class="box invisible">
    2. Invisible (hidden, but space reserved)
  </div>

  <!-- 3. Hidden element (completely removed, no space) -->
  <div class="d-none box bg-danger">
    3. Hidden (display: none, no space)
  </div>

  <!-- Explanation text -->
  <p class="text-center mt-4 mx-3">
    <strong>Note:</strong><br>
    - <code>visible</code> means the element is visible.<br>
    - <code>invisible</code> hides the element but keeps its space.<br>
    - <code>d-none</code> hides the element completely (no space).
  </p>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
