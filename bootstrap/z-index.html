<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bootstrap z-index Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    /* Simple styling for colored boxes */
    .box {
      width: 150px;
      height: 150px;
      position: absolute;
      color: white;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 0.5rem;
    }
    .box1 { background-color: #0d6efd; top: 40px; left: 40px; }
    .box2 { background-color: #198754; top: 80px; left: 80px; }
    .box3 { background-color: #dc3545; top: 120px; left: 120px; }
  </style>
</head>
<!-- You must have position-relative for z-index to work. -->
<body class="position-relative" style="height: 350px;">

  <h1 class="text-center my-4">Bootstrap z-index Demo</h1>

  <!-- Box with z-index 1 -->
  <div class="box box1 position-absolute z-3">
    z-index: 1
  </div>

  <!-- Box with z-index 3 -->
  <div class="box box2 position-absolute z-1">
    z-index: 3
  </div>

  <!-- Box with z-index 5 -->
  <div class="box box3 position-absolute z-3">
    z-index: 5
  </div>

</body>
</html>
