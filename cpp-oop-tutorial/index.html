/* ==========================================================
   3D background — Three.js wireframes (cyan/blue palette)
   ========================================================== */
(function init3D(){
  const canvas = document.getElementById('bg-3d');
  if(!window.THREE){ return; }
  const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);
  camera.position.z = 7;
  const group = new THREE.Group();
  scene.add(group);
  const palette = [0x3b82f6, 0x60a5fa, 0x22d3ee, 0x67e8f9];
  function addShape(geom, color, scale, position){
    const mat = new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.55 });
    const wire = new THREE.WireframeGeometry(geom);
    const line = new THREE.LineSegments(wire, mat);
    line.scale.setScalar(scale);
    line.position.set(position.x, position.y, position.z);
    line.userData.spinSpeed = { x:(Math.random()-0.5)*0.004, y:(Math.random()-0.5)*0.004, z:(Math.random()-0.5)*0.0025 };
    line.userData.float = { phase: Math.random()*Math.PI*2, amp: 0.3+Math.random()*0.4 };
    group.add(line); return line;
  }
  addShape(new THREE.IcosahedronGeometry(1,0),         palette[0], 1.6, { x:-4.5, y: 1.6, z:-2 });
  addShape(new THREE.TorusKnotGeometry(0.7,0.22,80,12),palette[1], 1.4, { x: 4.5, y:-1.8, z:-1 });
  addShape(new THREE.OctahedronGeometry(1,0),          palette[2], 1.0, { x: 3.0, y: 2.2, z:-3 });
  addShape(new THREE.TetrahedronGeometry(1,0),         palette[3], 0.9, { x:-3.2, y:-2.0, z:-2.5 });
  addShape(new THREE.IcosahedronGeometry(1,0),         palette[1], 0.6, { x: 0.2, y: 0.0, z:-4 });
  addShape(new THREE.DodecahedronGeometry(1,0),        palette[0], 0.7, { x:-1.6, y: 2.6, z:-3.5 });
  addShape(new THREE.OctahedronGeometry(1,0),          palette[3], 0.55,{ x: 1.8, y:-2.6, z:-3.5 });
  const pCount = 220, pGeom = new THREE.BufferGeometry();
  const pPos = new Float32Array(pCount * 3);
  for(let i=0;i<pCount;i++){ pPos[i*3]=(Math.random()-0.5)*18; pPos[i*3+1]=(Math.random()-0.5)*12; pPos[i*3+2]=(Math.random()-0.5)*10-2; }
  pGeom.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  scene.add(new THREE.Points(pGeom, new THREE.PointsMaterial({ color:0xffffff, size:0.025, transparent:true, opacity:0.65 })));
  const target={x:0,y:0}, current={x:0,y:0};
  window.addEventListener('mousemove', e => { target.x=(e.clientX/window.innerWidth-0.5)*0.6; target.y=(e.clientY/window.innerHeight-0.5)*0.4; });
  function resize(){ const w=window.innerWidth,h=window.innerHeight; renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); }
  resize(); window.addEventListener('resize', resize);
  let t=0; (function tick(){ t+=0.01; current.x+=(target.x-current.x)*0.05; current.y+=(target.y-current.y)*0.05;
    group.children.forEach(m => { m.rotation.x+=m.userData.spinSpeed.x; m.rotation.y+=m.userData.spinSpeed.y; m.rotation.z+=m.userData.spinSpeed.z; m.position.y += Math.sin(t+m.userData.float.phase)*0.0025*m.userData.float.amp; });
    group.rotation.y = current.x*0.4; group.rotation.x = -current.y*0.3;
    renderer.render(scene, camera); requestAnimationFrame(tick); })();
})();

const STORAGE_PREFIX = 'cpp-lab:edit:';
function hashShort(s){
  let h = 5381;
  for(let i=0; i<s.length; i++) h = ((h<<5) + h + s.charCodeAt(i)) | 0;
  return (h >>> 0).toString(36);
}
function storageKeyFor(file){
  const orig = state.originals[file] || '';
  return STORAGE_PREFIX + file + ':v' + hashShort(orig);
}
function saveBuffer(file, value){ try{ localStorage.setItem(storageKeyFor(file), value); }catch{} }
function loadBuffer(file){ try{ return localStorage.getItem(storageKeyFor(file)); }catch{ return null; } }
function clearBuffer(file){ try{ localStorage.removeItem(storageKeyFor(file)); }catch{} }

function readSource(file){
  const node = document.querySelector('script[type="text/plain"][data-cppfile="' + CSS.escape(file) + '"]');
  return node ? node.textContent : null;
}
function readOutput(stepId){
  const step = STEPS.find(s => s.id === stepId);
  if(!step) return null;
  const key = step.file.replace(/\.cpp$/, '');
  const node = document.querySelector('script[type="text/plain"][data-outfile="' + CSS.escape(key) + '"]');
  return node ? node.textContent : null;
}
function ensureLoaded(file){
  if(state.loaded[file]) return state.originals[file];
  const text = readSource(file);
  if(text == null){
    const msg = '// missing embedded source for ' + file + '\n';
    state.originals[file] = msg; state.buffers[file] = msg;
  } else {
    state.originals[file] = text;
    const saved = loadBuffer(file);
    state.buffers[file]   = saved != null ? saved : text;
  }
  state.loaded[file] = true;
  return state.originals[file];
}

/* Sidebar */
function stepButtonNode(entry){
  const li = document.createElement('li');
  const btn = document.createElement('button');
  btn.className = 'file-btn';
  btn.dataset.step = entry.id;
  const lineCount = (state.originals[entry.file] || '').split('\n').length;
  btn.innerHTML =
    '<span class="ico">CPP</span>' +
    '<span class="label">' + entry.label + '</span>' +
    '<span class="lines">' + lineCount + 'L</span>';
  btn.addEventListener('click', () => activate(entry.id));
  li.appendChild(btn);
  return li;
}
(function renderSteps(){
  STEPS.forEach(s => ensureLoaded(s.file));
  const groups = []; const seen = new Map();
  STEPS.forEach(s => {
    const g = s.group || 'Other';
    if(!seen.has(g)){ seen.set(g, { name:g, items:[] }); groups.push(seen.get(g)); }
    seen.get(g).items.push(s);
  });
  groups.forEach(g => {
    const head = document.createElement('li');
    head.className = 'file-group-head'; head.textContent = g.name;
    fileListEl.appendChild(head);
    g.items.forEach(p => fileListEl.appendChild(stepButtonNode(p)));
  });
})();
searchEl.addEventListener('input', ()=>{
  const q = searchEl.value.toLowerCase().trim();
  document.querySelectorAll('.file-btn').forEach(b=>{
    const id = b.dataset.step;
    const step = STEPS.find(s=>s.id===id);
    const hit = !q || step.label.toLowerCase().includes(q) || step.file.toLowerCase().includes(q);
    b.style.display = hit ? '' : 'none';
  });
});

function activeStep(){ return STEPS.find(s => s.id === state.active); }

function activate(id){
  const step = STEPS.find(s => s.id === id); if(!step) return;
  state.active = id;
  document.querySelectorAll('.file-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.step === id);
  });
  ensureLoaded(step.file);
  editor.setOption('readOnly', false);
  editor.setValue(state.buffers[step.file] || state.originals[step.file]);
  editor.clearHistory();

  const labelClean = step.label.replace(/^[\d]+[a-z]?\s*·\s*/, '');
  fileNameEl.firstChild.nodeValue = labelClean;
  fileSubEl.textContent = step.path;

  // file tabs (single file per step)
  fileTabsEl.innerHTML = '';
  const tab = document.createElement('button');
  tab.className = 'file-tab active';
  tab.textContent = step.file;
  fileTabsEl.appendChild(tab);

  outBody.innerHTML = '<div class="empty">Press ▶ Run to see expected output for this demo.</div>';
  setStatus('ready', 'Ready', step.path);
  updateDirty();
}

function setStatus(kind, label, info){
  statusLabel.className = 'status ' + (kind==='ready' ? '' : kind);
  statusLabel.textContent = label;
  statusInfo.textContent = info || '';
}

function updateDirty(){
  const step = activeStep(); if(!step) return;
  const cur = editor.getValue();
  const dirty = cur !== state.originals[step.file];
  fileNameEl.classList.toggle('dirty', dirty);
  document.querySelector('.file-btn[data-step="' + step.id + '"]')?.classList.toggle('dirty', dirty);
  document.querySelector('.file-tab')?.classList.toggle('dirty', dirty);
}

editor.on('change', () => {
  const step = activeStep(); if(!step) return;
  const cur = editor.getValue();
  state.buffers[step.file] = cur;
  if(cur === state.originals[step.file]) clearBuffer(step.file);
  else saveBuffer(step.file, cur);
  updateDirty();
});

/* Run — display the precomputed expected output */
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function runStep(){
  const step = activeStep(); if(!step) return;
  const out = readOutput(step.id);
  if(out == null){
    setStatus('err', 'No output', step.path);
    outBody.innerHTML = '<div class="empty">No precomputed output found for this demo.</div>';
    return;
  }
  setStatus('work', 'Running…', '');
  // brief delay for the running animation feel
  setTimeout(() => {
    const cur = editor.getValue();
    const isOriginal = cur === state.originals[step.file];
    const banner = isOriginal
      ? '<div class="ok-banner"><strong>Output</strong> — captured from <code>g++ -std=c++17 -o build/' + step.file.replace(/\.cpp$/,'') + ' ' + escapeHtml(step.path) + ' &amp;&amp; ./build/' + step.file.replace(/\.cpp$/,'') + '</code></div>'
      : '<div class="info-banner"><strong>Note</strong> — you have unsaved edits. The output below is from the original source. Compile locally to see the effect of your changes.</div>';
    outBody.innerHTML = banner + '<h4>stdout</h4><pre>' + escapeHtml(out) + '</pre>';
    setStatus('ok', 'Done', step.path);
  }, 110);
}
document.getElementById('runBtn').addEventListener('click', runStep);

/* Reset — revert active file's buffer to original */
document.getElementById('resetBtn').addEventListener('click', () => {
  const step = activeStep(); if(!step) return;
  state.buffers[step.file] = state.originals[step.file];
  clearBuffer(step.file);
  editor.setValue(state.originals[step.file]);
  showToast('Reverted to original');
});

/* Copy — copy the precomputed output */
document.getElementById('copyOutBtn').addEventListener('click', async () => {
  const step = activeStep(); if(!step) return;
  const out = readOutput(step.id);
  if(out == null){ showToast('No output to copy', true); return; }
  try{ await navigator.clipboard.writeText(out); showToast('Copied output'); }
  catch{ showToast('Copy failed', true); }
});

/* Toast */
let toastTimer = null;
function showToast(msg, isError){
  toastEl.textContent = msg;
  toastEl.classList.toggle('error', !!isError);
  toastEl.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> toastEl.classList.remove('show'), 1700);
}

/* Splitter — drag to resize editor vs preview */
(function splitter(){
  const root = document.querySelector('.editor-pane');
  const handle = document.getElementById('splitter');
  let dragging = false;
  function setCols(p){
    p = Math.max(0.18, Math.min(0.82, p));
    root.style.setProperty('--col-1', p + 'fr');
    root.style.setProperty('--col-2', (1 - p) + 'fr');
  }
  setCols(0.55);
  handle.addEventListener('pointerdown', e => {
    dragging = true; handle.classList.add('active');
    handle.setPointerCapture(e.pointerId);
  });
  handle.addEventListener('pointermove', e => {
    if(!dragging) return;
    const r = root.getBoundingClientRect();
    setCols((e.clientX - r.left - 22) / (r.width - 50));
  });
  function endDrag(){ dragging = false; handle.classList.remove('active'); }
  handle.addEventListener('pointerup', endDrag);
  handle.addEventListener('pointercancel', endDrag);
})();

/* Boot */
activate(STEPS[0].id);
</script>
</body>
</html>
