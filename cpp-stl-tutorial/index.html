<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>C++ STL Lab — Advanced Programming</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/dracula.min.css">

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/clike/clike.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/selection/active-line.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/comment/comment.min.js"></script>

<style>
:root{
  --bg-0:#04070d;
  --surface:rgba(255,255,255,0.04);
  --surface-2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.09);
  --border-strong:rgba(255,255,255,0.18);
  --text:#e8eef9;
  --text-dim:#9aa5bd;
  --text-faint:#5e6a86;
  --cpp-purple:#8b5cf6;
  --cpp-purple-light:#a78bfa;
  --cpp-purple-deep:#6d28d9;
  --cpp-fuchsia:#e879f9;
  --cpp-fuchsia-light:#f0abfc;
  --cpp-glow:rgba(139,92,246,0.45);
  --kw-color:#7dd3fc;
  --type-color:#c4b5fd;
  --string-color:#86efac;
  --comment-color:#7c8cff;
  --num-color:#fbbf24;
  --success:#38d39f;
  --warn:#ffb547;
  --error:#ff5a7a;
  --radius:18px;
  --shadow-lg: 0 30px 80px -30px rgba(139,92,246,0.32), 0 10px 30px -15px rgba(0,0,0,0.6);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg-0);color:var(--text);font-family:'Inter',system-ui,sans-serif;height:100%;overflow:hidden}
code,pre,textarea,.mono,.CodeMirror{font-family:'JetBrains Mono',ui-monospace,monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

#bg-3d{
  position:fixed; inset:0; z-index:-2; display:block;
  background:
    radial-gradient(1200px 700px at 8% -10%, rgba(139,92,246,0.30), transparent 60%),
    radial-gradient(1000px 600px at 110% 0%,  rgba(232,121,249,0.18), transparent 60%),
    radial-gradient(900px 600px at 50% 130%,  rgba(167,139,250,0.16), transparent 60%),
    linear-gradient(180deg, #02060e 0%, #050811 50%, #02050a 100%);
}
body::after{
  content:""; position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.32;
  background-image:
    radial-gradient(1px 1px at 20% 30%, #ffffff 100%, transparent),
    radial-gradient(1px 1px at 70% 60%, #ffffff 100%, transparent),
    radial-gradient(1.5px 1.5px at 40% 80%, #ffffff 100%, transparent),
    radial-gradient(1px 1px at 85% 20%, #ffffff 100%, transparent),
    radial-gradient(1px 1px at 15% 65%, #ffffff 100%, transparent);
  background-size: 1200px 800px;
  mask-image:linear-gradient(180deg,transparent,#000 20%,#000 80%,transparent);
}

.app{ display:grid; grid-template-columns: 320px 1fr; height:100vh }
@media (max-width: 980px){
  .app{ grid-template-columns: 1fr; height:auto; min-height:100vh; overflow:auto }
  html,body{ overflow:auto; height:auto }
}

.sidebar{
  padding:22px 16px; position:relative; z-index:5;
  background:linear-gradient(180deg, rgba(10,15,30,0.85), rgba(6,10,22,0.85));
  backdrop-filter: blur(22px) saturate(140%);
  -webkit-backdrop-filter: blur(22px) saturate(140%);
  border-right:1px solid var(--border);
  overflow-y:auto; scrollbar-width:thin;
}
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:6px}

.brand{ display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:6px 4px;border-radius:14px;user-select:none }
.brand-cube{
  width:46px;height:46px;border-radius:12px;position:relative;
  background:linear-gradient(135deg, var(--cpp-purple-deep), var(--cpp-fuchsia-light));
  box-shadow:
    0 12px 30px -10px var(--cpp-glow),
    inset 0 0 0 1px rgba(255,255,255,0.30),
    inset 0 -10px 20px -8px rgba(0,0,0,0.35);
  transform: rotate(-6deg);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:14px;color:#fff;letter-spacing:0.3px;
  animation: floatY 5s ease-in-out infinite;
  text-shadow: 0 1px 0 rgba(0,0,0,0.18);
}
.brand-cube::after{
  content:""; position:absolute; inset:auto -6px -6px auto;
  width:100%;height:100%; border-radius:12px;
  background:linear-gradient(135deg, rgba(139,92,246,0.5), rgba(232,121,249,0.4));
  filter:blur(14px); z-index:-1;
}
@keyframes floatY{ 0%,100%{ transform: rotate(-6deg) translateY(0) } 50%{ transform: rotate(-2deg) translateY(-4px) } }
.brand h1{margin:0;font-size:17px;font-weight:700;letter-spacing:-0.02em}
.brand .sub{font-size:11px;color:var(--text-faint);letter-spacing:0.14em;text-transform:uppercase}

.search-wrap{ position:relative; margin-bottom:14px }
.search{
  width:100%;padding:10px 14px 10px 34px;border-radius:12px;border:1px solid var(--border);
  background:rgba(255,255,255,0.03);color:var(--text);font-size:13.5px;outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.search:focus{border-color:var(--cpp-purple);box-shadow:0 0 0 3px rgba(139,92,246,0.22)}
.search-wrap::before{
  content:"⌕"; position:absolute; left:11px; top:50%; transform:translateY(-50%);
  color:var(--text-faint); font-size:14px; pointer-events:none;
}

.section-label{ font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-faint); padding:14px 8px 6px }

.file-list{ list-style:none; padding:0; margin:0 }
.file-list li{ margin:2px 0 }
.file-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  background:transparent;color:var(--text-dim);
  padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:500;text-align:left;
  transition: background .15s, color .15s, transform .15s, box-shadow .2s;
  border:1px solid transparent;
}
.file-btn:hover{ background:var(--surface); color:var(--text); transform:translateX(2px) }
.file-btn.active{
  background:linear-gradient(135deg,rgba(139,92,246,0.25),rgba(232,121,249,0.10));
  color:#fff; border-color:rgba(139,92,246,0.32);
  box-shadow: inset 0 0 0 1px rgba(139,92,246,0.18), 0 8px 24px -16px var(--cpp-glow);
}
.file-btn .ico{
  width:24px; height:24px; flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;
  background:linear-gradient(135deg, var(--cpp-purple-deep), var(--cpp-fuchsia-light));
  color:#fff; font-weight:800; font-size:9.5px; letter-spacing:0.5px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2);
  text-shadow:0 1px 0 rgba(0,0,0,0.2);
}
.file-btn .label{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.file-btn .lines{
  font-size:10.5px; color:var(--text-faint); padding:1px 6px; border-radius:20px;
  background:rgba(255,255,255,0.04); flex-shrink:0;
}
.file-btn.active .lines{ background:rgba(139,92,246,0.20); color:#e9dcff }
.file-btn.dirty::before{
  content:""; width:6px; height:6px; border-radius:50%;
  background:var(--cpp-fuchsia-light); flex-shrink:0;
  box-shadow: 0 0 8px var(--cpp-fuchsia-light);
}
.file-group-head{
  list-style:none; padding:14px 12px 4px;
  font-size:10.5px; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--text-faint); font-weight:600;
}
.file-supergroup-head{
  list-style:none;
  margin:18px 4px 4px;
  padding:8px 12px 6px;
  font-size:13px; font-weight:800;
  letter-spacing:0.10em; text-transform:uppercase;
  color:#fff;
  background:linear-gradient(135deg, rgba(139,92,246,0.18), rgba(232,121,249,0.10));
  border-left:3px solid var(--cpp-fuchsia-light);
  border-radius:8px;
  text-shadow:0 1px 0 rgba(0,0,0,0.18);
}
.file-supergroup-head:first-child{ margin-top:6px }
.file-supergroup-head .count{
  float:right;
  font-size:10.5px; font-weight:700;
  color:var(--cpp-fuchsia-light);
  background:rgba(255,255,255,0.06);
  padding:1px 7px; border-radius:20px;
  letter-spacing:0.06em;
}

.back-link{
  display:flex;align-items:center;gap:8px;
  margin-top:18px; padding:10px 12px;border-radius:10px;
  color:var(--text-dim); font-size:13px; text-decoration:none;
  border:1px solid var(--border);
  transition: background .15s, color .15s, border-color .15s;
}
.back-link:hover{ background:var(--surface); color:var(--text); border-color:var(--border-strong) }

.editor-pane{
  position:relative; padding:22px;
  display:grid;
  grid-template-columns: var(--col-1, 1fr) 6px var(--col-2, 1fr);
  grid-template-rows: auto 1fr;
  grid-template-areas:
    "topbar  topbar  topbar"
    "editor  split   preview";
  gap:14px;
  min-width:0; min-height:0; overflow:hidden;
}
.editor-pane > .top-bar     { grid-area: topbar }
.editor-pane > .editor-card { grid-area: editor;  min-width: 0 }
.editor-pane > .preview-card{ grid-area: preview; min-width: 0 }

.splitter{
  grid-area: split; cursor: col-resize; position: relative;
  background: transparent; user-select: none; touch-action: none;
}
.splitter::before{
  content: ""; position: absolute;
  left: 50%; top: 50%; transform: translate(-50%, -50%);
  width: 4px; height: 64px; border-radius: 2px;
  background: var(--border-strong);
  transition: background .18s, height .18s, box-shadow .18s;
}
.splitter:hover::before, .splitter.active::before{
  background: linear-gradient(180deg, var(--cpp-purple-deep), var(--cpp-fuchsia-light));
  height: 110px;
  box-shadow: 0 0 16px -2px var(--cpp-glow);
}

@media (max-width: 980px){
  .editor-pane{
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr 1fr;
    grid-template-areas: "topbar" "editor" "preview";
  }
  .splitter{ display:none }
}

.top-bar{
  display:flex;align-items:center;gap:14px; padding:14px 18px;
  background: linear-gradient(135deg, rgba(15,25,55,0.7), rgba(10,15,40,0.7));
  border:1px solid var(--border); border-radius: var(--radius);
  backdrop-filter: blur(20px) saturate(150%);
  -webkit-backdrop-filter: blur(20px) saturate(150%);
  box-shadow: var(--shadow-lg);
}
.file-meta{ display:flex; align-items:center; gap:12px; min-width:0 }
.file-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg, var(--cpp-purple-deep), var(--cpp-fuchsia-light));
  color:#fff; font-weight:800; font-size:13px; letter-spacing:0.5px;
  display:flex;align-items:center;justify-content:center;
  box-shadow: 0 6px 18px -8px var(--cpp-glow), inset 0 0 0 1px rgba(255,255,255,0.30);
  flex-shrink:0;
  text-shadow: 0 1px 0 rgba(0,0,0,0.18);
}
.file-name{ font-size:15px; font-weight:600; letter-spacing:-0.01em }
.file-name .dirty-mark{ color:var(--cpp-fuchsia-light); margin-left:6px; opacity:0; transition:opacity .15s }
.file-name.dirty .dirty-mark{ opacity:1 }
.file-sub{ font-size:11.5px; color:var(--text-faint); margin-top:1px; font-family:'JetBrains Mono',monospace }
.spacer{ flex:1 }

.action-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:8px 14px; border-radius:10px;
  border:1px solid var(--border); background:rgba(255,255,255,0.03);
  color:var(--text-dim); font-size:13px; font-weight:600;
  transition: background .15s, color .15s, border-color .15s, transform .15s;
  text-decoration: none;
}
.action-btn:hover{ background:var(--surface-2); color:var(--text); border-color:var(--border-strong) }
.action-btn:active{ transform:translateY(1px) }
.action-btn .k{ font-family:'JetBrains Mono',monospace; font-size:10.5px; opacity:.6; padding:1px 5px; border-radius:5px; background:rgba(255,255,255,0.06) }
.run-btn{
  background:linear-gradient(135deg, var(--cpp-purple-deep), var(--cpp-fuchsia-light));
  color:#fff; border-color:transparent; font-weight:700;
  box-shadow: 0 10px 30px -12px var(--cpp-glow);
  text-shadow: 0 1px 0 rgba(0,0,0,0.18);
}
.run-btn:hover{ filter:brightness(1.08); transform:translateY(-1px); border-color:transparent }

.editor-card{
  position:relative; min-height:0;
  background: linear-gradient(180deg, rgba(15,22,45,0.65), rgba(8,12,24,0.65));
  border:1px solid var(--border); border-radius: var(--radius);
  overflow:hidden;
  backdrop-filter: blur(22px) saturate(150%);
  -webkit-backdrop-filter: blur(22px) saturate(150%);
  box-shadow: var(--shadow-lg);
}
.editor-card::before{
  content:""; position:absolute; inset:-1px; border-radius: calc(var(--radius) + 1px); pointer-events:none;
  background: linear-gradient(135deg, rgba(139,92,246,0.45), rgba(232,121,249,0.0) 40%, rgba(167,139,250,0.30));
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  padding:1px; opacity:.55;
}
.editor-chrome{
  display:flex; align-items:center; gap:10px; padding:9px 14px;
  border-bottom:1px solid var(--border);
  background: linear-gradient(180deg, rgba(255,255,255,0.025), transparent);
}
.dot{ width:11px; height:11px; border-radius:50% }
.dot.r{ background:#ff5a7a; box-shadow:0 0 10px rgba(255,90,122,0.55) }
.dot.y{ background:#ffb547; box-shadow:0 0 10px rgba(255,181,71,0.55) }
.dot.g{ background:#38d39f; box-shadow:0 0 10px rgba(56,211,159,0.55) }

.file-tabs{
  display:flex; gap:4px; margin: 0 6px 0 6px;
  flex:1; min-width:200px; overflow-x:auto; overflow-y:hidden;
  scrollbar-width: thin;
  scrollbar-color: rgba(139,92,246,0.35) transparent;
  mask-image: linear-gradient(to right, transparent 0, #000 18px, #000 calc(100% - 18px), transparent 100%);
  -webkit-mask-image: linear-gradient(to right, transparent 0, #000 18px, #000 calc(100% - 18px), transparent 100%);
  padding-bottom: 4px;
}
.file-tabs::-webkit-scrollbar{ height: 4px }
.file-tabs::-webkit-scrollbar-track{ background: transparent }
.file-tabs::-webkit-scrollbar-thumb{ background: rgba(139,92,246,0.35); border-radius: 4px }
.file-tabs::-webkit-scrollbar-thumb:hover{ background: rgba(139,92,246,0.55) }
.file-tab{
  flex-shrink:0;
  padding: 3px 11px; font-size:11.5px; border-radius:7px;
  border:1px solid var(--border); background:rgba(255,255,255,0.025);
  color:var(--text-dim); font-weight:500;
  font-family:'JetBrains Mono', ui-monospace, monospace;
  transition: background .15s, color .15s, border-color .15s;
  white-space:nowrap;
}
.file-tab.active{
  background:linear-gradient(135deg, rgba(139,92,246,0.40), rgba(232,121,249,0.20));
  color:#fff; border-color:rgba(139,92,246,0.45);
  box-shadow: 0 0 0 1px rgba(139,92,246,0.25), 0 6px 14px -8px var(--cpp-glow);
}
.editor-chrome .badge{
  font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase;
  padding:3px 9px; border-radius:20px;
  background:rgba(139,92,246,0.10); border:1px solid rgba(139,92,246,0.32);
  color:#e9dcff;
}
.cm-host{ position:relative; height:calc(100% - 41px) }
.CodeMirror{
  height:100% !important; background:transparent;
  font-size:14px; line-height:1.55; padding: 6px 0;
}
.CodeMirror-gutters{ background:transparent; border-right:1px solid var(--border) }
.CodeMirror-linenumber{ color:rgba(154,165,189,0.4) }
.CodeMirror-cursor{ border-left-color:#fff }
.CodeMirror-activeline-background{ background:rgba(139,92,246,0.05) !important }
.CodeMirror-selected{ background:rgba(139,92,246,0.20) !important }
.CodeMirror-matchingbracket{ color:var(--cpp-fuchsia-light) !important; text-shadow:0 0 8px var(--cpp-glow) }

.preview-card{
  background: linear-gradient(180deg, #060a14, #04060c);
  border:1px solid var(--border); border-radius: var(--radius);
  display:flex; flex-direction:column; min-height:0;
  box-shadow: var(--shadow-lg);
  overflow:hidden; position: relative;
}
.preview-card::before{
  content:""; position: absolute; inset:-1px; border-radius: calc(var(--radius) + 1px); pointer-events:none;
  background: linear-gradient(135deg, rgba(139,92,246,0.45), rgba(232,121,249,0) 40%, rgba(167,139,250,0.4));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; padding: 1px;
  opacity: .55;
}
.out-titlebar{
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  background: linear-gradient(180deg, rgba(8,14,28,0.85), rgba(5,10,22,0.85));
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.out-titlebar .status{
  display: flex; align-items: center; gap: 8px;
  font-size: 11.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dim);
}
.out-titlebar .status::before{
  content:""; width:8px; height:8px; border-radius:50%; background: var(--text-faint);
}
.out-titlebar .status.ok::before{ background: var(--success); box-shadow: 0 0 10px rgba(56,211,159,0.7) }
.out-titlebar .status.err::before{ background: var(--error); box-shadow: 0 0 10px rgba(255,90,122,0.7) }
.out-titlebar .status.work::before{ background: var(--cpp-fuchsia-light); box-shadow: 0 0 10px var(--cpp-glow) }
.out-titlebar .info{
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-faint);
}
.out-titlebar .right{ margin-left: auto; display: flex; gap: 6px; align-items: center }
.out-titlebar .icon-btn{
  padding: 4px 10px; border-radius: 7px;
  border: 1px solid var(--border); background: rgba(255,255,255,0.02);
  color: var(--text-dim); font-size: 11.5px;
  transition: background .15s, color .15s, border-color .15s;
}
.out-titlebar .icon-btn:hover{ background: var(--surface-2); color: var(--text); border-color: var(--border-strong) }

.out-body{
  flex: 1; min-height: 0; overflow: auto;
  padding: 14px 18px;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 13px; line-height: 1.55;
  scrollbar-width: thin;
}
.out-body::-webkit-scrollbar{ width: 6px; height: 6px }
.out-body::-webkit-scrollbar-thumb{ background: rgba(139,92,246,0.18); border-radius: 6px }
.out-body::-webkit-scrollbar-thumb:hover{ background: rgba(139,92,246,0.40) }
.out-body .empty{
  color: var(--text-faint); text-align: center; padding: 40px 12px;
  font-style: italic; font-family: 'Inter', sans-serif;
}
.out-body .ok-banner{
  background: rgba(56,211,159,0.10);
  border: 1px solid rgba(56,211,159,0.30);
  color: #b6f0d2;
  border-radius: 8px;
  padding: 8px 14px; margin-bottom: 12px;
  font-family: 'Inter', sans-serif; font-size: 12.5px;
}
.out-body .info-banner{
  background: rgba(139,92,246,0.10);
  border: 1px solid rgba(139,92,246,0.30);
  color: #e9dcff;
  border-radius: 8px;
  padding: 8px 14px; margin-bottom: 12px;
  font-family: 'Inter', sans-serif; font-size: 12.5px;
}
.out-body h4{
  margin: 14px 0 6px; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--cpp-fuchsia-light); font-weight: 600; font-family: 'Inter', sans-serif;
}
.out-body h4:first-child{ margin-top: 0 }
.out-body pre{
  white-space: pre;
  color: var(--text);
  font-size: 12.5px; line-height: 1.6;
  margin: 0;
}

.ambient{
  position:absolute; border-radius:50%; pointer-events:none; z-index:0;
  filter: blur(60px); opacity:.5;
}
.ambient.a{ width:340px;height:340px; background:rgba(139,92,246,0.30); top:-80px; right:-100px; animation:floatA 14s ease-in-out infinite }

<script type="text/plain" data-cppfile="01a_vector.cpp">// Concept: std::vector — the workhorse dynamic array (contiguous heap storage).
//
// vs C: in C you'd write your own malloc + realloc + size/capacity tracking.
// vector does all of that, frees its memory in its destructor (RAII), and
// supports element types with constructors/destructors.
//
// Big-O:
//   push_back / pop_back  → amortised O(1)
//   index access [i]      → O(1)
//   insert/erase middle   → O(n)
#include <iostream>
#include <vector>

int main() {
    std::vector<int> v{1, 2, 3};
    v.push_back(4);
    v.push_back(5);

    std::cout << "size=" << v.size()
              << "  capacity=" << v.capacity()
              << "  v[0]=" << v[0] << "\n";

    std::cout << "elements:";
    for (int x : v) std::cout << " " << x;
    std::cout << "\n";

    // Reserve avoids reallocations when you know the final size:
    std::vector<int> big;
    big.reserve(1000);

    v.erase(v.begin() + 1);
    std::cout << "after erase v[1]:";
    for (int x : v) std::cout << " " << x;
    std::cout << "\n";

    // .data() yields a raw pointer to use with C APIs:
    int* raw = v.data();
    std::cout << "raw[0] = " << raw[0] << "\n";
}
</script>
<script type="text/plain" data-cppfile="01b_array.cpp">// Concept: std::array<T, N> — fixed-size array with the type's full power.
//
// vs C: a C array (int a[5]) decays to a pointer when passed to a function
// and forgets its size. std::array is a real type that remembers its size,
// supports begin()/end(), is copyable/assignable, and can be returned by value.
#include <array>
#include <iostream>

int main() {
    std::array<int, 5> a{10, 20, 30, 40, 50};

    std::cout << "size       = " << a.size()  << "\n";
    std::cout << "front/back = " << a.front() << " / " << a.back() << "\n";
    std::cout << "a.at(2)    = " << a.at(2)   << "  (bounds-checked, throws on bad index)\n";

    int sum = 0;
    for (int x : a) sum += x;
    std::cout << "sum        = " << sum << "\n";

    std::array<int, 5> b = a;     // copy
    b[0] = 999;
    std::cout << "a[0]=" << a[0] << "  b[0]=" << b[0] << "  (independent copies)\n";
}
</script>
<script type="text/plain" data-cppfile="01c_deque.cpp">// Concept: std::deque — Double-Ended QUEue.
//
// Internally a sequence of fixed-size blocks linked in an index, so it
// supports O(1) push_front AND push_back, plus random access [i].
// Element addresses are NOT contiguous — pointers/references can be invalidated
// by inserts at either end.
//
// Pick deque when you need fast push at BOTH ends; otherwise prefer vector.
#include <deque>
#include <iostream>

int main() {
    std::deque<int> dq{2, 3};
    dq.push_front(1);          // O(1) — vector cannot do this efficiently
    dq.push_back(4);
    dq.push_back(5);

    std::cout << "deque:";
    for (int x : dq) std::cout << " " << x;
    std::cout << "\n";

    std::cout << "front=" << dq.front()
              << "  back=" << dq.back()
              << "  size=" << dq.size() << "\n";

    dq.pop_front();
    dq.pop_back();
    std::cout << "after pop_front+pop_back:";
    for (int x : dq) std::cout << " " << x;
    std::cout << "\n";
}
</script>
<script type="text/plain" data-cppfile="01d_list.cpp">// Concept: std::list — doubly-linked list.
//
// vs C: in C you'd write   struct Node { int v; Node* prev, *next; };  by hand,
// plus insert/erase plumbing. std::list does it for you.
//
// Trade-offs:
//   + O(1) insert/erase given an iterator
//   + iterators NOT invalidated when others are inserted/removed
//   - no random access (no [i])
//   - poor cache locality — usually slower than vector for typical workloads
//
// Modern advice: prefer vector unless you genuinely need stable iterators
// or O(1) splice.
#include <iostream>
#include <list>

int main() {
    std::list<int> l{1, 2, 4, 5};

    auto it = std::next(l.begin(), 2);   // points at 4
    l.insert(it, 3);                      // O(1) — list is now {1,2,3,4,5}

    std::cout << "list after insert:";
    for (int x : l) std::cout << " " << x;
    std::cout << "\n";

    // splice — O(1) move of nodes from another list (no copies, no allocations)
    std::list<int> other{100, 200};
    l.splice(l.end(), other);
    std::cout << "after splice:        ";
    for (int x : l) std::cout << " " << x;
    std::cout << "  (other.size=" << other.size() << ")\n";

    // list also has its own sort() — std::sort needs random access.
    l.sort();
    std::cout << "after l.sort():      ";
    for (int x : l) std::cout << " " << x;
    std::cout << "\n";
}
</script>
<script type="text/plain" data-cppfile="01e_forward_list.cpp">// Concept: std::forward_list — singly-linked list (C++11).
//
// Leaner than std::list: only forward links, no size() member (counting would
// be O(n)), and a special insert_after API since there is no back-pointer.
//
// Use only when memory is very tight; otherwise list or vector is more ergonomic.
#include <forward_list>
#include <iostream>

int main() {
    std::forward_list<int> fl{1, 2, 3, 4, 5};

    fl.push_front(0);                  // only push_front exists

    auto it = fl.begin();              // 0
    ++it;                              // 1
    fl.insert_after(it, 99);           // insert 99 between 1 and 2

    std::cout << "forward_list:";
    for (int x : fl) std::cout << " " << x;
    std::cout << "\n";

    int n = 0;
    for (auto p = fl.begin(); p != fl.end(); ++p) ++n;
    std::cout << "manual size = " << n << "  (no .size() member)\n";
}
</script>
<script type="text/plain" data-cppfile="02a_pair.cpp">// Concept: std::pair — bundle two heterogeneous values.
//
// vs C: a one-off struct for every (a, b) you need. std::pair gives you
// .first / .second, comparison, and structured bindings (C++17) for free.
// It is the building block of std::map (each entry is a pair<const K, V>).
#include <iostream>
#include <string>
#include <utility>     // std::pair, std::make_pair

int main() {
    std::pair<int, std::string> p{42, "answer"};
    std::cout << "p.first=" << p.first << "  p.second=" << p.second << "\n";

    auto q = std::make_pair(3.14, true);   // template argument deduction

    auto [num, ok] = q;                    // C++17 structured bindings
    std::cout << "num=" << num << "  ok=" << ok << "\n";

    // Pairs compare lexicographically (first then second):
    std::pair<int,int> a{1,2}, b{1,3};
    std::cout << "a < b ? " << (a < b ? "yes" : "no") << "\n";
}
</script>
<script type="text/plain" data-cppfile="02b_map.cpp">// Concept: std::map — sorted key→value dictionary (red-black tree).
//
// vs C: no standard map; you'd build a hash table or bsearch a sorted array.
// std::map gives O(log n) insert/find/erase, iteration in KEY ORDER, and
// range queries (lower_bound / upper_bound).
//
// Use std::map when you need ordered traversal or range queries.
// Use std::unordered_map (step 3) when you only need fast lookup.
#include <iostream>
#include <map>
#include <string>

int main() {
    std::map<std::string, int> ages;
    ages["Alice"] = 30;
    ages["Bob"]   = 25;
    ages.insert({"Carol", 35});

    // Lookup
    if (auto it = ages.find("Alice"); it != ages.end())
        std::cout << "Alice -> " << it->second << "\n";

    // operator[] inserts a default-constructed value if missing — beware:
    int eve = ages["Eve"];
    std::cout << "Eve -> " << eve << "  (operator[] inserted a default)\n";

    // Safer existence check:
    if (ages.count("Frank") == 0) std::cout << "Frank is not in the map\n";

    // Iteration is in KEY ORDER:
    std::cout << "all entries (sorted by key):\n";
    for (const auto& [name, age] : ages)
        std::cout << "  " << name << " -> " << age << "\n";

    // Range query: keys in [B, F)
    auto lo = ages.lower_bound("B");
    auto hi = ages.lower_bound("F");
    std::cout << "keys in [B, F):\n";
    for (auto it = lo; it != hi; ++it) std::cout << "  " << it->first << "\n";
}
</script>
<script type="text/plain" data-cppfile="02c_set.cpp">// Concept: std::set — sorted collection of unique values.
//
// vs C: keep an ordered array and binary-search it. std::set gives
// O(log n) insert/find/erase and iterates IN ORDER. Each value appears
// at most once. Implementation is a balanced BST (red-black tree).
#include <iostream>
#include <set>

int main() {
    std::set<int> s{3, 1, 4, 1, 5, 9, 2, 6, 5};   // duplicates dropped on insert

    std::cout << "size  = " << s.size() << "  (duplicates removed)\n";
    std::cout << "values:";
    for (int x : s) std::cout << " " << x;        // sorted
    std::cout << "\n";

    std::cout << "contains 4? " << (s.count(4) ? "yes" : "no") << "\n";
    std::cout << "contains 7? " << (s.count(7) ? "yes" : "no") << "\n";

    // Range query — find every value in [3, 6]:
    std::cout << "values in [3,6]:";
    auto lo = s.lower_bound(3);     // first ≥ 3
    auto hi = s.upper_bound(6);     // first > 6
    for (auto it = lo; it != hi; ++it) std::cout << " " << *it;
    std::cout << "\n";
}
</script>
<script type="text/plain" data-cppfile="02d_multimap_multiset.cpp">// Concept: std::multimap / std::multiset — like map / set but ALLOW DUPLICATES.
//
// equal_range(key) returns the half-open range of all entries with that key.
#include <iostream>
#include <map>
#include <set>
#include <string>

int main() {
    std::multimap<std::string, std::string> phone;
    phone.insert({"alice", "111-1111"});
    phone.insert({"alice", "222-2222"});       // same key — allowed
    phone.insert({"bob",   "333-3333"});

    std::cout << "alice's numbers:\n";
    auto [lo, hi] = phone.equal_range("alice");
    for (auto it = lo; it != hi; ++it)
        std::cout << "  " << it->second << "\n";

    std::multiset<int> bag{1, 2, 2, 3, 3, 3};
    std::cout << "bag: count(2)=" << bag.count(2)
              << "  count(3)=" << bag.count(3) << "\n";
    std::cout << "bag values:";
    for (int x : bag) std::cout << " " << x;
    std::cout << "\n";
}
</script>
<script type="text/plain" data-cppfile="03a_unordered_basics.cpp">// Concept: std::unordered_map / unordered_set — HASH-based associative containers.
//
// vs C: you'd build a hash table by hand. std::unordered_map<K, V> does it for
// you, with average O(1) insert/find/erase.
//
//   std::map               unordered_map
//   ─────────────────      ─────────────────
//   ordered iteration       NO order
//   O(log n)                average O(1), worst O(n)
//   compares with <         hashes with std::hash<K> + ==
//
// Pick unordered when you don't care about order.
#include <iostream>
#include <string>
#include <unordered_map>
#include <unordered_set>

int main() {
    // Word counting — quintessential unordered_map use case
    std::unordered_map<std::string, int> word_count;
    for (const char* w : {"the","quick","the","fox","the","quick"})
        ++word_count[w];

    std::cout << "word counts (unordered iteration):\n";
    for (const auto& [w, n] : word_count)
        std::cout << "  " << w << " : " << n << "\n";

    // Rehashing controls
    std::cout << "buckets = " << word_count.bucket_count()
              << "  load factor = " << word_count.load_factor() << "\n";
    word_count.reserve(1000);    // hint: I expect ~1000 entries
    std::cout << "buckets after reserve(1000) = " << word_count.bucket_count() << "\n";

    std::unordered_set<int> seen{1, 2, 3, 2, 1};
    std::cout << "seen.size = " << seen.size()
              << "  (duplicates removed, no order)\n";
}
</script>
<script type="text/plain" data-cppfile="03b_custom_hash.cpp">// Concept: to use your OWN type as the key of an unordered_map / unordered_set
// you must provide:
//   1) operator==(const T&, const T&)
//   2) a hasher: a callable Hasher with size_t operator()(const T&) const
//
// Two ways to plug in the hasher:
//   - specialise std::hash<T>
//   - pass a hasher type as the third template parameter
#include <functional>
#include <iostream>
#include <string>
#include <unordered_set>

struct Point {
    int x, y;
    bool operator==(const Point& o) const { return x == o.x && y == o.y; }
};

// Option A: specialise std::hash for Point
namespace std {
    template<> struct hash<Point> {
        size_t operator()(const Point& p) const noexcept {
            // Combine the two int hashes — a common pattern (boost::hash_combine).
            return hash<int>{}(p.x) ^ (hash<int>{}(p.y) << 1);
        }
    };
}

int main() {
    std::unordered_set<Point> visited;
    visited.insert({1, 2});
    visited.insert({3, 4});
    visited.insert({1, 2});            // duplicate — dropped
    std::cout << "visited.size = " << visited.size() << "  (1,2 was duplicate)\n";

    // Option B: pass a hasher as the third template parameter
    auto hasher = [](const Point& p) {
        return std::hash<long>{}((long(p.x) << 32) | p.y);
    };
    using PointEq = std::equal_to<Point>;
    std::unordered_set<Point, decltype(hasher), PointEq> alt(8, hasher);
    alt.insert({5, 6});
    std::cout << "alt.size     = " << alt.size() << "  (uses lambda hasher)\n";
}
</script>
<script type="text/plain" data-cppfile="04a_tuple.cpp">// Concept: std::tuple — heterogeneous fixed-size pack (any number of values).
//
// vs C: a struct, or "out" pointers to return multiple values from a function.
// std::tuple lets a function return multiple values directly; C++17 structured
// bindings unpack them at the call site.
#include <iostream>
#include <string>
#include <tuple>

std::tuple<int, double, std::string> stats() {
    return {42, 3.14, "ok"};
}

int main() {
    std::tuple<int, double, std::string> t{1, 2.5, "hello"};

    // Access by index (compile-time)
    std::cout << "get<0>=" << std::get<0>(t)
              << "  get<2>='" << std::get<2>(t) << "'\n";

    // Access by type (only if the type appears exactly once)
    std::cout << "get<double>=" << std::get<double>(t) << "\n";

    // Structured bindings — preferred way to unpack:
    auto [n, pi, status] = stats();
    std::cout << "stats() → n=" << n << "  pi=" << pi
              << "  status=" << status << "\n";

    std::cout << "tuple_size = " << std::tuple_size_v<decltype(t)> << "\n";
}
</script>
<script type="text/plain" data-cppfile="04b_stack.cpp">// Concept: std::stack — LIFO container adapter.
//
// Wraps a sequence container (default std::deque) and exposes a restricted API:
//   push, pop, top, empty, size.
//
// vs C: hand-rolled with a vector + index, or a linked list.
#include <iostream>
#include <stack>
#include <string>

int main() {
    std::stack<int> s;
    for (int x : {1, 2, 3, 4, 5}) s.push(x);

    std::cout << "size=" << s.size() << "  top=" << s.top() << "\n";
    std::cout << "pop order (LIFO):";
    while (!s.empty()) {
        std::cout << " " << s.top();
        s.pop();
    }
    std::cout << "\n";

    // Use case — balanced bracket checker
    auto balanced = [](const std::string& expr){
        std::stack<char> st;
        for (char c : expr) {
            if (c == '(' || c == '[') st.push(c);
            else if (c == ')' || c == ']') {
                if (st.empty()) return false;
                char open = st.top(); st.pop();
                if ((c == ')' && open != '(') || (c == ']' && open != '[')) return false;
            }
        }
        return st.empty();
    };
    std::cout << "(([])) balanced? " << (balanced("(([]))") ? "yes" : "no") << "\n";
    std::cout << "(([)) balanced?  " << (balanced("(([))")  ? "yes" : "no") << "\n";
}
</script>
<script type="text/plain" data-cppfile="04c_queue.cpp">// Concept: std::queue — FIFO container adapter.
// Wraps a sequence container (default std::deque) with: push, pop, front, back.
#include <iostream>
#include <queue>

int main() {
    std::queue<int> q;
    for (int x : {1, 2, 3, 4, 5}) q.push(x);

    std::cout << "front=" << q.front() << "  back=" << q.back()
              << "  size=" << q.size() << "\n";

    std::cout << "pop order (FIFO):";
    while (!q.empty()) {
        std::cout << " " << q.front();
        q.pop();
    }
    std::cout << "\n";
}
</script>
<script type="text/plain" data-cppfile="04d_priority_queue.cpp">// Concept: std::priority_queue — binary heap exposed as an adapter.
// top() is the LARGEST element by default. Pass std::greater<T> for a min-heap.
#include <functional>     // std::greater
#include <iostream>
#include <queue>
#include <vector>

int main() {
    std::priority_queue<int> max_pq;
    for (int x : {5, 3, 8, 1, 9, 4}) max_pq.push(x);
    std::cout << "max-heap pop order:";
    while (!max_pq.empty()) { std::cout << " " << max_pq.top(); max_pq.pop(); }
    std::cout << "\n";

    std::priority_queue<int, std::vector<int>, std::greater<int>> min_pq;
    for (int x : {5, 3, 8, 1, 9, 4}) min_pq.push(x);
    std::cout << "min-heap pop order:";
    while (!min_pq.empty()) { std::cout << " " << min_pq.top(); min_pq.pop(); }
    std::cout << "\n";

    // Custom comparator (lambda) — pop strings by length, shortest first
    auto by_len = [](const std::string& a, const std::string& b){
        return a.size() > b.size();        // greater = MIN heap
    };
    std::priority_queue<std::string, std::vector<std::string>, decltype(by_len)> short_first(by_len);
    for (auto s : {"hippopotamus", "cat", "elephant", "ox"}) short_first.push(s);
    std::cout << "shortest first:";
    while (!short_first.empty()) { std::cout << " " << short_first.top(); short_first.pop(); }
    std::cout << "\n";
}
</script>
<script type="text/plain" data-cppfile="05a_iterator_basics.cpp">// Concept: iterators — STL's generalisation of "pointer into a container".
//
// vs C: in C you traversed an array with a pointer or an index. STL containers
// expose iterators via .begin() and .end(). Together they form a HALF-OPEN
// RANGE [begin, end): begin points at the first element, end one PAST the last.
//
// *it dereferences, ++it advances. Range-for is sugar for an iterator loop.
#include <iostream>
#include <vector>

int main() {
    std::vector<int> v{10, 20, 30, 40};

    std::cout << "manual loop:";
    for (auto it = v.begin(); it != v.end(); ++it) std::cout << " " << *it;
    std::cout << "\n";

    std::cout << "range-for: ";
    for (int x : v) std::cout << " " << x;
    std::cout << "\n";

    auto it = v.begin();
    std::cout << "*it    = " << *it       << "\n";
    std::cout << "*(it+2)= " << *(it + 2) << "\n";
    std::cout << "it[3]  = " << it[3]     << "  (random-access iterator)\n";

    std::cout << "v.end() - v.begin() = "
              << (v.end() - v.begin()) << "  (size as a difference)\n";
}
</script>
<script type="text/plain" data-cppfile="05b_iterator_categories.cpp">// Concept: iterator CATEGORIES.
// Every container's iterator falls in one of these tiers, ordered from
// least to most powerful. Algorithms specify the minimum category they need.
//
//   InputIterator         single-pass read,  ++it,  *it
//   OutputIterator        single-pass write, ++it,  *it = v
//   ForwardIterator       multi-pass, ++ only
//   BidirectionalIterator adds --it     (list, set, map)
//   RandomAccessIterator  adds it+n, it[n], <  (vector, deque, array)
//
// vs C: a C pointer behaves like a RandomAccessIterator into an array.
// STL generalises so the SAME algorithms work on lists, sets, files, …
#include <iostream>
#include <iterator>
#include <list>
#include <vector>

int main() {
    std::vector<int> v{1, 2, 3};
    std::list<int>   l{1, 2, 3};

    using vit = decltype(v.begin());
    using lit = decltype(l.begin());
    using vcat = std::iterator_traits<vit>::iterator_category;
    using lcat = std::iterator_traits<lit>::iterator_category;

    std::cout << "vector::iterator → "
              << (std::is_same_v<vcat, std::random_access_iterator_tag>
                  ? "RandomAccess" : "other") << "\n";
    std::cout << "list::iterator   → "
              << (std::is_same_v<lcat, std::bidirectional_iterator_tag>
                  ? "Bidirectional" : "other") << "\n";

    // The category determines what operations are valid:
    auto vit2 = v.begin();
    vit2 += 2;                   // OK on RandomAccess
    auto lit2 = l.begin();
    // lit2 += 2;                // ← compile error
    std::advance(lit2, 2);       // works for any forward+ iterator
    std::cout << "*vit2=" << *vit2 << "  *lit2=" << *lit2 << "\n";
}
</script>
<script type="text/plain" data-cppfile="05c_reverse_const_iterators.cpp">// Concept: reverse iterators and const iterators.
//
//   .rbegin() / .rend()   iterate from END toward BEGINNING
//   .cbegin() / .cend()   const iterators (you cannot write through them)
//   .crbegin() / .crend() both
//
// Reverse iterators let any algorithm run "backwards" without rewriting it:
// std::find, std::sort, std::copy, etc. all work on rbegin/rend.
#include <iostream>
#include <vector>

int main() {
    std::vector<int> v{1, 2, 3, 4, 5};

    std::cout << "forward: ";
    for (auto it = v.begin(); it != v.end(); ++it) std::cout << *it << " ";
    std::cout << "\n";

    std::cout << "reverse: ";
    for (auto it = v.rbegin(); it != v.rend(); ++it) std::cout << *it << " ";
    std::cout << "\n";

    // const iterators — promise read-only access:
    for (auto it = v.cbegin(); it != v.cend(); ++it) {
        // *it = 99;   // ← compile error
        (void)it;
    }
    std::cout << "(cbegin/cend → read-only view)\n";

    // Modern style: 'const auto&' in a range-for replaces explicit cbegin/cend.
    int sum = 0;
    for (const auto& x : v) sum += x;
    std::cout << "sum = " << sum << "\n";
}
</script>
<script type="text/plain" data-cppfile="05d_advance_distance.cpp">// Concept: iterator helpers from <iterator>.
//
//   std::advance(it, n)    move iterator forward (or back) by n
//   std::distance(a, b)    count steps from a to b
//   std::next(it [, n])    return it advanced (without modifying it)
//   std::prev(it [, n])    return it stepped back
//
// These pick the most efficient implementation for the iterator category:
//   - random-access  → O(1) using +/-
//   - bidirectional  → O(n) walking step by step
//   - forward only   → only positive n
#include <iostream>
#include <iterator>
#include <list>
#include <vector>

int main() {
    std::vector<int> v{10, 20, 30, 40, 50};

    auto it = v.begin();
    std::advance(it, 3);                       // points at 40
    std::cout << "after advance(it, 3): *it=" << *it << "\n";

    std::cout << "distance(begin, end) = "
              << std::distance(v.begin(), v.end()) << "  (== size)\n";

    auto first = v.begin();
    auto third = std::next(first, 2);
    std::cout << "*first=" << *first
              << "  *next(first,2)=" << *third << "\n";

    std::list<int> l{1, 2, 3, 4, 5};
    auto lit = std::next(l.begin(), 2);
    std::cout << "list[2] via std::next = " << *lit << "\n";
}
</script>
<script type="text/plain" data-cppfile="05e_iterator_adapters.cpp">// Concept: iterator ADAPTERS — wrap something else (a container, a stream,
// another iterator) in an iterator-shaped object.
//
//   std::back_inserter(c)   OutputIterator that calls c.push_back
//   std::front_inserter(c)  OutputIterator that calls c.push_front
//   std::inserter(c, it)    OutputIterator that inserts at position 'it'
//   std::ostream_iterator<T>(os, sep)  writes to a stream
//   std::istream_iterator<T>(is)       reads from a stream
//
// They turn any "place that produces or consumes one item at a time" into
// something STL algorithms can target.
#include <algorithm>
#include <iostream>
#include <iterator>
#include <list>
#include <sstream>
#include <vector>

int main() {
    std::vector<int> src{1, 2, 3, 4, 5};

    // back_inserter — append into an empty vector
    std::vector<int> dst;
    std::copy(src.begin(), src.end(), std::back_inserter(dst));
    std::cout << "back_inserter dst:";
    for (int x : dst) std::cout << " " << x;
    std::cout << "\n";

    // front_inserter — push to a list (vector lacks push_front)
    std::list<int> l;
    std::copy(src.begin(), src.end(), std::front_inserter(l));
    std::cout << "front_inserter list:";
    for (int x : l) std::cout << " " << x;     // reversed: 5 4 3 2 1
    std::cout << "\n";

    // ostream_iterator — pipe directly into std::cout
    std::cout << "via ostream_iterator: ";
    std::copy(src.begin(), src.end(), std::ostream_iterator<int>(std::cout, " "));
    std::cout << "\n";

    // istream_iterator — read ints from a stream
    std::istringstream in("10 20 30 40");
    std::vector<int> nums((std::istream_iterator<int>(in)),
                           std::istream_iterator<int>());
    std::cout << "from istream_iterator:";
    for (int x : nums) std::cout << " " << x;
    std::cout << "\n";
}
</script>
<script type="text/plain" data-cppfile="06a_bidi_basics.cpp">// Concept: BIDIRECTIONAL ITERATORS — the next tier above forward.
// You can step forward (++it) AND backward (--it), but you cannot jump (it+n).
//
// Containers whose iterators are exactly bidirectional:
//   std::list, std::set, std::map, std::multiset, std::multimap
// (deque, vector and array offer something stronger — random access — see step 7.)
//
// vs C: a doubly-linked list in C lets you walk in either direction by
// chasing prev/next pointers; that's exactly what bidi iterators give you,
// in a uniform interface.
#include <iostream>
#include <list>

int main() {
    std::list<int> l{10, 20, 30, 40, 50};

    auto it = l.begin();
    std::cout << "*begin     = " << *it << "\n";
    ++it;                                      // walk forward
    ++it;
    std::cout << "after ++,++ = " << *it << "\n";
    --it;                                      // walk backward
    std::cout << "after  --   = " << *it << "\n";

    // The classic "loop until end()" still works exactly as for forward iterators:
    std::cout << "forward :";
    for (auto p = l.begin(); p != l.end(); ++p) std::cout << " " << *p;
    std::cout << "\n";

    // Walking backward — start at the last element, stop BEFORE begin().
    // (You cannot test 'p < l.begin()' because there is no '<' on bidi iterators.)
    std::cout << "backward:";
    auto p = l.end();
    do { --p; std::cout << " " << *p; } while (p != l.begin());
    std::cout << "\n";
}
</script>
<script type="text/plain" data-cppfile="06b_bidi_in_associative.cpp">// Concept: associative containers (map, set, multimap, multiset) expose
// BIDIRECTIONAL iterators, so you can walk them in BOTH directions in
// key-sorted order.
//
// Note: for std::set and std::multiset, dereferencing the iterator yields a
// CONST reference — keys cannot be mutated in place (that would break the
// sort invariant). For std::map, *it is a pair where first is const and
// second is mutable.
#include <iostream>
#include <map>
#include <set>
#include <string>

int main() {
    std::set<int> s{5, 1, 3, 7, 2};
    std::cout << "set ascending :";
    for (auto it = s.begin(); it != s.end(); ++it) std::cout << " " << *it;
    std::cout << "\n";

    std::cout << "set descending:";
    auto p = s.end();
    do { --p; std::cout << " " << *p; } while (p != s.begin());
    std::cout << "\n";

    // map iteration: it->first (const) and it->second (mutable)
    std::map<std::string, int> ages{{"alice",30}, {"bob",25}, {"carol",35}};
    std::cout << "map ascending:\n";
    for (auto it = ages.begin(); it != ages.end(); ++it) {
        std::cout << "  " << it->first << " -> " << it->second << "\n";
        // it->first = "X";    // ← compile error: keys are const
        it->second += 1;       // ← values are mutable
    }
    std::cout << "after walk-and-bump:\n";
    for (const auto& [k, v] : ages)
        std::cout << "  " << k << " -> " << v << "\n";
}
</script>
<script type="text/plain" data-cppfile="06c_algos_needing_bidi.cpp">// Concept: algorithms that REQUIRE at least bidirectional iterators.
// They need to step backward (or both directions), so a forward-only iterator
// would be a compile error.
//
//   std::reverse(b, e)          swap pairs from both ends inward — bidi
//   std::rotate(b, mid, e)      moves [mid, e) to the front — bidi
//   std::next_permutation(b, e) walks the lex order — bidi
//   std::prev_permutation(b, e) reverse direction — bidi
//   std::stable_partition       relative order kept — bidi
#include <algorithm>
#include <iostream>
#include <list>
#include <vector>

int main() {
    // std::reverse on a bidi container (list)
    std::list<int> l{1, 2, 3, 4, 5};
    std::reverse(l.begin(), l.end());
    std::cout << "reversed list:";
    for (int x : l) std::cout << " " << x;
    std::cout << "\n";

    // std::rotate
    std::vector<int> v{1, 2, 3, 4, 5, 6, 7};
    std::rotate(v.begin(), v.begin() + 3, v.end());
    std::cout << "rotate by 3 :";
    for (int x : v) std::cout << " " << x;
    std::cout << "\n";

    // std::next_permutation — needs to scan back from the end
    std::vector<int> p{1, 2, 3};
    do {
        std::cout << "  ";
        for (int x : p) std::cout << x << " ";
        std::cout << "\n";
    } while (std::next_permutation(p.begin(), p.end()));
    // None of the above would compile with a forward_list iterator.
}
</script>
<script type="text/plain" data-cppfile="06d_bidi_limits.cpp">// Concept: what bidirectional iterators CANNOT do.
//
// Bidi only adds  --it  on top of forward. It does NOT add:
//   it + n         (jump by n)
//   it - n         (jump back by n)
//   it[n]          (subscript)
//   it1 - it2      (distance arithmetic)
//   it1 < it2      (ordering)
//
// You can simulate these with std::advance / std::distance — but the cost
// is O(n) hops, NOT O(1). If you need O(1) jumps, you need RANDOM ACCESS
// iterators (see step 7).
#include <iostream>
#include <iterator>
#include <list>

int main() {
    std::list<int> l{10, 20, 30, 40, 50};
    auto it = l.begin();

    // it += 3;            // ← compile error: list iterators are bidi, not random access
    // it[3]               // ← compile error
    // bool b = it < l.end();  // ← compile error: '<' not defined

    // The portable way is std::advance / std::distance — they walk one node
    // at a time on bidi (O(n)) but compile fine.
    std::advance(it, 3);
    std::cout << "after std::advance(it, 3): *it = " << *it << "\n";

    auto end = l.end();
    std::cout << "distance(begin, end) = "
              << std::distance(l.begin(), end) << "  (O(n) for list — must walk)\n";

    // std::next / std::prev work too:
    auto it2 = std::next(l.begin(), 2);
    std::cout << "next(begin, 2) = " << *it2 << "\n";
    auto it3 = std::prev(l.end(), 2);
    std::cout << "prev(end, 2)   = " << *it3 << "\n";
}
</script>
<script type="text/plain" data-cppfile="07a_random_access_basics.cpp">// Concept: RANDOM ACCESS ITERATORS — the most powerful tier.
// Every operation a raw pointer supports works in O(1):
//
//   it + n        jump forward by n          (O(1))
//   it - n        jump backward
//   it[n]         subscript — same as *(it + n)
//   it1 - it2     distance — an integer
//   it1 < it2     ordering: is one before the other?
//
// Containers whose iterators are random-access:
//   std::vector, std::deque, std::array, raw C arrays (via pointers)
#include <iostream>
#include <vector>

int main() {
    std::vector<int> v{10, 20, 30, 40, 50, 60, 70};
    auto it = v.begin();

    // Jumps in O(1)
    std::cout << "*(it + 0) = " << *(it + 0) << "\n";
    std::cout << "*(it + 4) = " << *(it + 4) << "\n";
    std::cout << "it[6]     = " <<   it[6]   << "  (same as *(it + 6))\n";

    // Distance via subtraction — exact opposite of advance:
    auto end = v.end();
    std::cout << "end - begin = " << (end - it) << "\n";

    // Ordering — '<' tells you which is closer to begin
    auto a = it + 2;
    auto b = it + 5;
    std::cout << "a < b ? " << (a < b ? "yes" : "no") << "\n";
}
</script>
<script type="text/plain" data-cppfile="07b_pointer_equivalence.cpp">// Concept: a raw C pointer satisfies the random-access iterator concept.
// Anywhere an STL algorithm wants a random-access iterator pair, you can
// pass two raw pointers (or a pointer and a length) and it will work.
//
// vs C: the operations you naturally do on T* — `*p`, `++p`, `--p`, `p+n`,
// `p-n`, `p[n]`, `p1 - p2`, `p1 < p2` — are EXACTLY the random-access
// iterator interface. STL containers expose iterators that behave the same.
#include <algorithm>
#include <iostream>
#include <numeric>     // accumulate

int main() {
    int arr[] = {5, 2, 8, 1, 4, 9, 3};
    constexpr int N = sizeof(arr) / sizeof(arr[0]);

    int sum = std::accumulate(arr, arr + N, 0);
    std::cout << "sum  = " << sum << "\n";

    auto mx = std::max_element(arr, arr + N);
    std::cout << "max  = " << *mx
              << "  at index " << (mx - arr) << "\n";

    std::sort(arr, arr + N);
    std::cout << "sorted:";
    for (int* p = arr; p != arr + N; ++p) std::cout << " " << *p;
    std::cout << "\n";

    // The same operations on std::begin / std::end (they pick the right form
    // for both raw arrays and standard containers):
    std::cout << "front element = " << *std::begin(arr)
              << "  back element = " << *(std::end(arr) - 1) << "\n";
}
</script>
<script type="text/plain" data-cppfile="07c_algos_needing_random.cpp">// Concept: algorithms that REQUIRE random-access iterators.
//
//   std::sort, std::stable_sort, std::partial_sort, std::nth_element
//   std::shuffle
//   std::push_heap / std::pop_heap / std::make_heap / std::sort_heap
//   std::rotate (works with bidi too, but RA gives O(1) per element)
//
// Trying to sort a std::list with std::sort is a COMPILE ERROR — list's
// iterators are bidirectional. (Use list's own .sort() member instead, which
// is implemented as a merge sort over the linked structure.)
#include <algorithm>
#include <iostream>
#include <random>
#include <vector>

int main() {
    std::vector<int> v{4, 2, 5, 2, 1, 3, 5, 4};

    std::sort(v.begin(), v.end());
    std::cout << "sorted        :";
    for (int x : v) std::cout << " " << x;
    std::cout << "\n";

    // nth_element — quickselect-style, requires random access for O(n) average
    std::vector<int> w{9, 3, 7, 1, 8, 2, 5};
    auto mid = w.begin() + w.size()/2;
    std::nth_element(w.begin(), mid, w.end());
    std::cout << "median (nth)  : " << *mid << "\n";

    // shuffle (deterministic seed for repeatable output)
    std::vector<int> s{1, 2, 3, 4, 5, 6, 7, 8};
    std::mt19937 rng(42);
    std::shuffle(s.begin(), s.end(), rng);
    std::cout << "shuffled      :";
    for (int x : s) std::cout << " " << x;
    std::cout << "\n";

    // std::list<int> ll{3,1,2};
    // std::sort(ll.begin(), ll.end());   // ← compile error: list iterators are bidi
    // ll.sort();                          // ← list provides its own sort
}
</script>
<script type="text/plain" data-cppfile="07d_binary_search_complexity.cpp">// Concept: how the iterator category affects the COST of an algorithm.
//
//   std::binary_search / std::lower_bound / std::upper_bound
//
// These work on ANY forward iterator pair, but the cost differs:
//   - Random access (vector, deque, array) → O(log n) jumps, true O(log n) total
//   - Bidirectional / forward (list, set, map) → still O(log n) COMPARISONS,
//     but O(n) HOPS to advance the iterator → not really faster than linear scan
//
// In practice: only call binary search on random-access containers.
#include <algorithm>
#include <iostream>
#include <list>
#include <vector>

int main() {
    std::vector<int> v{1, 3, 5, 7, 9, 11, 13, 15};   // sorted, random access
    std::list<int>   l(v.begin(), v.end());           // sorted, bidi

    std::cout << "vector binary_search(7) = "
              << std::binary_search(v.begin(), v.end(), 7) << "  (true O(log n))\n";

    std::cout << "list   binary_search(7) = "
              << std::binary_search(l.begin(), l.end(), 7)
              << "  (compiles, O(log n) compares but O(n) hops)\n";

    // lower_bound — same story
    auto vit = std::lower_bound(v.begin(), v.end(), 6);
    std::cout << "vector lower_bound(6) → " << *vit
              << "  at index " << (vit - v.begin()) << "\n";

    // It's the it+n / it-n that random access provides which makes the binary
    // search jump efficiently. Every other category falls back to walking.
}
</script>
<script type="text/plain" data-cppfile="08a_find.cpp">// Concept: searching with std::find / std::find_if / std::find_if_not.
//
// vs C: linear scan you wrote yourself, or 'bsearch' on sorted arrays.
// STL searches accept ANY iterator pair — same code works on vector, list,
// map, even raw arrays.
//
//   std::find(b, e, v)      — first iterator with *it == v, else e
//   std::find_if(b, e, p)   — first iterator with p(*it) true, else e
//   std::find_if_not(b, e, p) — first with p(*it) false
#include <algorithm>
#include <iostream>
#include <vector>

int main() {
    std::vector<int> v{1, 3, 5, 8, 13, 21, 34};

    auto it = std::find(v.begin(), v.end(), 13);
    if (it != v.end())
        std::cout << "13 found at index "
                  << std::distance(v.begin(), it) << "\n";

    auto big = std::find_if(v.begin(), v.end(),
                            [](int x){ return x > 10; });
    std::cout << "first > 10  : " << *big << "\n";

    auto small = std::find_if_not(v.begin(), v.end(),
                                  [](int x){ return x < 10; });
    std::cout << "first not<10: " << *small << "\n";
}
</script>
<script type="text/plain" data-cppfile="08b_count_any_all_none.cpp">// Concept: counting and predicate quantifiers.
//
//   std::count(b, e, v)      — how many == v
//   std::count_if(b, e, p)   — how many satisfy p
//   std::any_of(b, e, p)     — does ANY element satisfy p?
//   std::all_of(b, e, p)     — do ALL elements satisfy p?
//   std::none_of(b, e, p)    — do NONE?
#include <algorithm>
#include <iostream>
#include <vector>

int main() {
    std::vector<int> v{1, 2, 3, 2, 4, 2, 5};

    std::cout << "count(==2)    : " << std::count(v.begin(), v.end(), 2) << "\n";
    std::cout << "count_if(odd) : "
              << std::count_if(v.begin(), v.end(), [](int x){ return x % 2; }) << "\n";

    std::cout << "any  > 4 ? "
              << std::any_of(v.begin(), v.end(), [](int x){ return x > 4; }) << "\n";
    std::cout << "all  > 0 ? "
              << std::all_of(v.begin(), v.end(), [](int x){ return x > 0; }) << "\n";
    std::cout << "none < 0 ? "
              << std::none_of(v.begin(), v.end(), [](int x){ return x < 0; }) << "\n";
}
</script>
<script type="text/plain" data-cppfile="08c_equal_mismatch.cpp">// Concept: comparing two ranges element-wise.
//
//   std::equal(b1, e1, b2)            — true if every element pair matches
//   std::equal(b1, e1, b2, e2)        — same, with both end iterators (C++14)
//   std::mismatch(b1, e1, b2)         — pair of iterators at the first diff
#include <algorithm>
#include <iostream>
#include <vector>

int main() {
    std::vector<int> a{1, 2, 3, 4, 5};
    std::vector<int> b{1, 2, 3, 4, 5};
    std::vector<int> c{1, 2, 9, 4, 5};

    std::cout << "a == b ? " << std::equal(a.begin(), a.end(), b.begin()) << "\n";
    std::cout << "a == c ? " << std::equal(a.begin(), a.end(), c.begin()) << "\n";

    auto [ait, cit] = std::mismatch(a.begin(), a.end(), c.begin());
    if (ait != a.end())
        std::cout << "first mismatch at index "
                  << std::distance(a.begin(), ait)
                  << " : a=" << *ait << "  c=" << *cit << "\n";

    // Custom comparator — case-insensitive equality of strings would go here
    std::vector<int> evens_doubled{2, 4, 6, 8, 10};
    bool b_is_double_a = std::equal(a.begin(), a.end(), evens_doubled.begin(),
        [](int x, int y){ return 2*x == y; });
    std::cout << "evens_doubled is 2*a ? " << b_is_double_a << "\n";
}
</script>
<script type="text/plain" data-cppfile="08d_min_max.cpp">// Concept: min / max and the *_element family.
//
//   std::min(a, b)               smaller of two values
//   std::max(a, b)               larger
//   std::minmax(a, b)            both — returns std::pair
//   std::min_element(b, e)       iterator to smallest in a range
//   std::max_element(b, e)       iterator to largest
//   std::minmax_element(b, e)    pair<min_it, max_it>
#include <algorithm>
#include <iostream>
#include <vector>

int main() {
    std::cout << "min(7, 12) = " << std::min(7, 12) << "\n";
    std::cout << "max(7, 12) = " << std::max(7, 12) << "\n";

    auto [lo, hi] = std::minmax(7, 12);
    std::cout << "minmax(7,12) = (" << lo << ", " << hi << ")\n";

    std::vector<int> v{5, 2, 9, 1, 7, 3, 8};
    auto mn = std::min_element(v.begin(), v.end());
    auto mx = std::max_element(v.begin(), v.end());
    std::cout << "min_element = " << *mn
              << " at index " << std::distance(v.begin(), mn) << "\n";
    std::cout << "max_element = " << *mx
              << " at index " << std::distance(v.begin(), mx) << "\n";

    auto [mnit, mxit] = std::minmax_element(v.begin(), v.end());
    std::cout << "minmax_element = (" << *mnit << ", " << *mxit << ")\n";
}
</script>
<script type="text/plain" data-cppfile="09a_copy_fill_generate_iota.cpp">// Concept: producing values into an output range.
//
//   std::copy(b, e, dst)            copy each element to dst
//   std::fill(b, e, v)              set every element to v
//   std::fill_n(dst, n, v)          same, given a count
//   std::generate(b, e, fn)         set each element to fn()
//   std::iota(b, e, start)          0,1,2,…  in <numeric>
#include <algorithm>
#include <iostream>
#include <iterator>
#include <numeric>     // iota
#include <vector>

int main() {
    std::vector<int> src{10, 20, 30, 40};
    std::vector<int> dst;
    std::copy(src.begin(), src.end(), std::back_inserter(dst));
    std::cout << "copy:";
    for (int x : dst) std::cout << " " << x;
    std::cout << "\n";

    std::vector<int> z(5);
    std::fill(z.begin(), z.end(), 7);
    std::cout << "fill(7):";
    for (int x : z) std::cout << " " << x;
    std::cout << "\n";

    int counter = 0;
    std::vector<int> g(5);
    std::generate(g.begin(), g.end(), [&]{
        int i = counter++;
        return i * i;
    });
    std::cout << "generate (i*i):";
    for (int x : g) std::cout << " " << x;
    std::cout << "\n";

    std::vector<int> seq(8);
    std::iota(seq.begin(), seq.end(), 100);    // 100, 101, 102, …
    std::cout << "iota(100):";
    for (int x : seq) std::cout << " " << x;
    std::cout << "\n";
}
</script>
<script type="text/plain" data-cppfile="09b_transform_for_each.cpp">// Concept: apply a function to every element.
//
//   std::for_each(b, e, fn)            fn called on each element (side effect)
//   std::transform(b, e, dst, fn)      writes fn(*it) to dst
//   std::transform(b1, e1, b2, dst, binop)   element-wise on two ranges
//
// vs C: you'd write the loop. Pulling it into an algorithm + lambda makes
// the INTENT visible.
#include <algorithm>
#include <iostream>
#include <iterator>
#include <vector>

int main() {
    std::vector<int> v{1, 2, 3, 4, 5};

    std::for_each(v.begin(), v.end(),
                  [](int x){ std::cout << x << " "; });
    std::cout << "\n";

    std::vector<int> sq;
    std::transform(v.begin(), v.end(), std::back_inserter(sq),
                   [](int x){ return x * x; });
    std::cout << "squared:";
    for (int x : sq) std::cout << " " << x;
    std::cout << "\n";

    std::vector<int> a{1, 2, 3}, b{10, 20, 30}, sum;
    std::transform(a.begin(), a.end(), b.begin(),
                   std::back_inserter(sum),
                   [](int x, int y){ return x + y; });
    std::cout << "a + b  :";
    for (int x : sum) std::cout << " " << x;
    std::cout << "\n";
}
</script>
<script type="text/plain" data-cppfile="09c_replace.cpp">// Concept: in-place substitution.
//
//   std::replace(b, e, old_v, new_v)         every old_v becomes new_v
//   std::replace_if(b, e, pred, new_v)       every element with pred(*it)→true becomes new_v
//   std::replace_copy / std::replace_copy_if write to a separate output
#include <algorithm>
#include <iostream>
#include <iterator>
#include <vector>

int main() {
    std::vector<int> v{1, 2, 3, 2, 4, 2, 5};
    std::replace(v.begin(), v.end(), 2, 99);
    std::cout << "replace 2 → 99:";
    for (int x : v) std::cout << " " << x;
    std::cout << "\n";

    std::vector<int> w{1, 2, 3, 4, 5, 6};
    std::replace_if(w.begin(), w.end(),
                    [](int x){ return x % 2 == 0; }, -1);
    std::cout << "replace_if even → -1:";
    for (int x : w) std::cout << " " << x;
    std::cout << "\n";

    // replace_copy — keep the original, write to a new container
    std::vector<int> u{1, 2, 3, 2, 4}, out;
    std::replace_copy(u.begin(), u.end(), std::back_inserter(out), 2, 0);
    std::cout << "u=";
    for (int x : u) std::cout << " " << x;
    std::cout << "  out (2→0):";
    for (int x : out) std::cout << " " << x;
    std::cout << "\n";
}
</script>
<script type="text/plain" data-cppfile="09d_reverse_rotate_shuffle.cpp">// Concept: rearranging elements in place.
