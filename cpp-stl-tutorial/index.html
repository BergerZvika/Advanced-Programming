<script type="text/plain" data-cppfile="10a_sort.cpp">// Concept: sorting.
//
// vs C: qsort takes a void-pointer comparator returning int — slow and
// type-unsafe. std::sort takes ANY callable (free function, lambda,
// function object), is type-safe, and often faster.
//
//   std::sort        O(n log n) — order of equals NOT preserved
//   std::stable_sort O(n log n) — preserves original order of equal elements
//   std::is_sorted   bool — is the range non-decreasing?
#include <algorithm>
#include <functional>
#include <iostream>
#include <string>
#include <vector>

int main() {
    std::vector<int> v{4, 2, 5, 2, 1, 3, 5, 4};

    std::sort(v.begin(), v.end());
    std::cout << "asc :";
    for (int x : v) std::cout << " " << x;
    std::cout << "\n";

    std::sort(v.begin(), v.end(), std::greater<int>{});
    std::cout << "desc:";
    for (int x : v) std::cout << " " << x;
    std::cout << "\n";

    // Lambda comparator — sort strings by length, ties alphabetical
    std::vector<std::string> words{"the", "quick", "brown", "fox", "jumps"};
    std::stable_sort(words.begin(), words.end(),
                     [](const std::string& a, const std::string& b){
                         if (a.size() != b.size()) return a.size() < b.size();
                         return a < b;
                     });
    std::cout << "stable by len:";
    for (const auto& w : words) std::cout << " " << w;
    std::cout << "\n";

    std::cout << "is_sorted? " << std::is_sorted(v.begin(), v.end()) << "\n";
}
</script>
<script type="text/plain" data-cppfile="10b_partial_sort_nth_element.cpp">// Concept: when you don't need a FULL sort.
//
//   std::partial_sort(b, mid, e)
//       The first (mid-b) elements are sorted into final order;
//       the rest is unspecified. Cost: O(n log k) for k = mid-b.
//
//   std::nth_element(b, nth, e)
//       After the call, *nth is the element that would be there if the
//       range were fully sorted; everything before is ≤ *nth, after is ≥.
//       Cost: O(n) on average. Useful for medians and "top-k".
#include <algorithm>
#include <iostream>
#include <vector>

int main() {
    std::vector<int> v{9, 3, 7, 1, 8, 2, 5, 4, 6};

    // Find the 3 smallest in sorted order, leave the rest alone
    std::vector<int> a = v;
    std::partial_sort(a.begin(), a.begin() + 3, a.end());
    std::cout << "partial_sort first 3:";
    for (int x : a) std::cout << " " << x;
    std::cout << "  (the 3 smallest are at the front, sorted; tail unspecified)\n";

    // Median of v in O(n)
    std::vector<int> b = v;
    auto mid = b.begin() + b.size()/2;
    std::nth_element(b.begin(), mid, b.end());
    std::cout << "median = " << *mid << "  (after nth_element)\n";

    // Top-3 LARGEST values — partial_sort + greater<>
    std::vector<int> c = v;
    std::partial_sort(c.begin(), c.begin() + 3, c.end(), std::greater<int>{});
    std::cout << "top-3 largest:";
    for (int i = 0; i < 3; ++i) std::cout << " " << c[i];
    std::cout << "\n";
}
</script>
<script type="text/plain" data-cppfile="10c_binary_search.cpp">// Concept: binary search on SORTED ranges.
//
//   std::binary_search(b, e, v)   bool — present?
//   std::lower_bound(b, e, v)     first iterator with *it ≥ v
//   std::upper_bound(b, e, v)     first iterator with *it >  v
//   std::equal_range(b, e, v)     pair (lower, upper)
//
// All four cost O(log n) on random-access iterators, O(n) hops on
// bidirectional iterators (the same call still works).
#include <algorithm>
#include <iostream>
#include <vector>

int main() {
    std::vector<int> v{1, 3, 5, 7, 7, 7, 9, 11};   // must be sorted

    std::cout << "contains 7  ? "
              << std::binary_search(v.begin(), v.end(), 7) << "\n";
    std::cout << "contains 8  ? "
              << std::binary_search(v.begin(), v.end(), 8) << "\n";

    auto lo = std::lower_bound(v.begin(), v.end(), 7);
    auto hi = std::upper_bound(v.begin(), v.end(), 7);
    std::cout << "lower_bound(7) at index "
              << std::distance(v.begin(), lo) << "\n";
    std::cout << "upper_bound(7) at index "
              << std::distance(v.begin(), hi) << "\n";
    std::cout << "count of 7   = " << std::distance(lo, hi) << "\n";

    // equal_range packs the two
    auto [a, b] = std::equal_range(v.begin(), v.end(), 7);
    std::cout << "equal_range(7) range size = " << std::distance(a, b) << "\n";
}
</script>
<script type="text/plain" data-cppfile="11a_remove_erase.cpp">// Concept: the erase-remove idiom.
//
// vs C: in C you'd shift elements down by hand. STL splits the work:
//
//   std::remove(b, e, value)        moves keepers to the front, returns
//                                    new_end. Container size does NOT change.
//   container.erase(new_end, end()) actually drops the tail.
//
// C++20 added std::erase / std::erase_if as one-liners.
#include <algorithm>
#include <iostream>
#include <string>
#include <vector>

int main() {
    std::vector<int> v{1, 2, 3, 2, 4, 2, 5};

    auto new_end = std::remove(v.begin(), v.end(), 2);
    v.erase(new_end, v.end());
    std::cout << "after removing 2s:";
    for (int x : v) std::cout << " " << x;
    std::cout << "\n";

    // remove_if + erase — drop with a predicate
    std::vector<std::string> tags{"keep", "drop_me", "ok", "drop_me"};
    tags.erase(
        std::remove_if(tags.begin(), tags.end(),
                       [](const std::string& s){
                           return s.rfind("drop", 0) == 0;
                       }),
        tags.end());
    std::cout << "tags after drop_*:";
    for (const auto& t : tags) std::cout << " " << t;
    std::cout << "\n";
}
</script>
<script type="text/plain" data-cppfile="11b_unique.cpp">// Concept: removing CONSECUTIVE duplicates.
//
//   std::unique(b, e)        moves consecutive duplicates past new_end,
//                             returns new_end. Container size unchanged
//                             until you call erase(new_end, end()).
//
// IMPORTANT: only consecutive duplicates! To dedup the whole range, sort first.
#include <algorithm>
#include <iostream>
#include <vector>

int main() {
    std::vector<int> v{1, 1, 2, 2, 2, 3, 1, 1, 4};

    auto end1 = std::unique(v.begin(), v.end());
    v.erase(end1, v.end());
    std::cout << "unique (consecutive only):";
    for (int x : v) std::cout << " " << x;
    std::cout << "  (the second '1' run survived)\n";

    // Full dedup: sort first
    std::vector<int> w{4, 2, 5, 2, 1, 3, 5, 4, 1};
    std::sort(w.begin(), w.end());
    w.erase(std::unique(w.begin(), w.end()), w.end());
    std::cout << "sort + unique         :";
    for (int x : w) std::cout << " " << x;
    std::cout << "\n";

    // unique with a custom equivalence — collapse runs of even neighbours
    std::vector<int> z{2, 4, 6, 1, 8, 10, 3};
    auto same_parity = [](int a, int b){ return (a%2) == (b%2); };
    z.erase(std::unique(z.begin(), z.end(), same_parity), z.end());
    std::cout << "collapse same-parity  :";
    for (int x : z) std::cout << " " << x;
    std::cout << "\n";
}
</script>
<script type="text/plain" data-cppfile="11c_partition.cpp">// Concept: partitioning — split a range by a predicate without sorting.
//
//   std::partition(b, e, p)         elements with p(*it)==true go to the
//                                    front, false to the back. Order within
//                                    each side is unspecified. O(n).
//   std::stable_partition(b, e, p)  same, but original relative order kept.
//   std::partition_point(b, e, p)   on a partitioned range, returns the
//                                    boundary in O(log n).
#include <algorithm>
#include <iostream>
#include <vector>

int main() {
    std::vector<int> v{1, 2, 3, 4, 5, 6, 7, 8, 9};
    auto is_even = [](int x){ return x % 2 == 0; };

    // unstable
    auto mid = std::partition(v.begin(), v.end(), is_even);
    std::cout << "partition (evens first):";
    for (int x : v) std::cout << " " << x;
    std::cout << "  (boundary at index "
              << std::distance(v.begin(), mid) << ")\n";

    // stable
    std::vector<int> w{1, 2, 3, 4, 5, 6, 7, 8, 9};
    std::stable_partition(w.begin(), w.end(), is_even);
    std::cout << "stable_partition       :";
    for (int x : w) std::cout << " " << x;
    std::cout << "  (relative order preserved)\n";

    // partition_point — once partitioned, find the boundary in O(log n)
    auto p = std::partition_point(v.begin(), v.end(), is_even);
    std::cout << "partition_point at index "
              << std::distance(v.begin(), p) << "\n";
}
</script>
<script type="text/plain" data-cppfile="12a_set_operations.cpp">// Concept: set operations on SORTED ranges.
//
// All four require both inputs to be sorted (ascending). They write the
// result into an output iterator (back_inserter / ostream_iterator / a
// pre-allocated container).
//
//   std::set_union               in either A or B
//   std::set_intersection        in both A and B
//   std::set_difference          in A but not in B
//   std::set_symmetric_difference   in exactly one of A, B
#include <algorithm>
#include <iostream>
#include <iterator>
#include <vector>

void show(const char* tag, const std::vector<int>& v) {
    std::cout << tag;
    for (int x : v) std::cout << " " << x;
    std::cout << "\n";
}

int main() {
    std::vector<int> a{1, 2, 3, 4, 5};
    std::vector<int> b{3, 4, 5, 6, 7};
    std::vector<int> out;

    out.clear();
    std::set_union(a.begin(), a.end(), b.begin(), b.end(),
                   std::back_inserter(out));
    show("union               :", out);

    out.clear();
    std::set_intersection(a.begin(), a.end(), b.begin(), b.end(),
                          std::back_inserter(out));
    show("intersection        :", out);

    out.clear();
    std::set_difference(a.begin(), a.end(), b.begin(), b.end(),
                        std::back_inserter(out));
    show("difference (a - b)  :", out);

    out.clear();
    std::set_symmetric_difference(a.begin(), a.end(), b.begin(), b.end(),
                                  std::back_inserter(out));
    show("symmetric_difference:", out);
}
</script>
<script type="text/plain" data-cppfile="13a_accumulate_reduce.cpp">// Concept: reductions — fold a range into a single value.
//
// Header: <numeric>
//
//   std::accumulate(b, e, init [, op])
//       Left-fold: ((init op v0) op v1) op v2 …  (sequential)
//
//   std::reduce(b, e, init [, op])             [C++17]
//       Same idea but the op MUST be associative & commutative; that lets
//       implementations parallelise. Use it for sums on big ranges.
#include <iostream>
#include <numeric>
#include <string>
#include <vector>

int main() {
    std::vector<int> v{1, 2, 3, 4, 5};

    int sum     = std::accumulate(v.begin(), v.end(), 0);
    int product = std::accumulate(v.begin(), v.end(), 1,
                                  [](int acc, int x){ return acc * x; });
    std::cout << "sum     = " << sum     << "\n";
    std::cout << "product = " << product << "\n";

    // reduce — order is unspecified; only valid for ass+comm ops
    int rsum = std::reduce(v.begin(), v.end(), 0);
    std::cout << "reduce  = " << rsum << "  (same answer, possibly faster)\n";

    // String concatenation with accumulate (NOT reduce — concat is non-commutative)
    std::vector<std::string> words{"the", "quick", "fox"};
    std::string joined = std::accumulate(
        words.begin(), words.end(), std::string{},
        [](const std::string& acc, const std::string& w){
            return acc.empty() ? w : acc + " " + w;
        });
    std::cout << "joined  = " << joined << "\n";
}
</script>
<script type="text/plain" data-cppfile="13b_inner_product_partial_sum.cpp">// Concept: more numeric algorithms (header <numeric>).
//
//   std::inner_product(b1, e1, b2, init)        Σ a_i * b_i  (dot product)
//   std::partial_sum(b, e, dst)                 prefix sums  s_k = Σ_{i≤k} a_i
//   std::adjacent_difference(b, e, dst)         differences  d_0=a_0, d_k=a_k-a_{k-1}
//
// All three accept a custom binary op as a final argument, so you can build
// running products, ratios, etc.
#include <iostream>
#include <iterator>
#include <numeric>
#include <vector>

int main() {
    std::vector<int> a{1, 2, 3, 4};
    std::vector<int> b{10, 20, 30, 40};

    int dot = std::inner_product(a.begin(), a.end(), b.begin(), 0);
    std::cout << "dot(a, b) = " << dot << "  (1·10 + 2·20 + 3·30 + 4·40)\n";

    std::vector<int> ps;
    std::partial_sum(a.begin(), a.end(), std::back_inserter(ps));
    std::cout << "partial_sum(a):";
    for (int x : ps) std::cout << " " << x;
    std::cout << "\n";

    std::vector<int> ad;
    std::adjacent_difference(ps.begin(), ps.end(), std::back_inserter(ad));
    std::cout << "adjacent_difference(prefix sums):";
    for (int x : ad) std::cout << " " << x;
    std::cout << "  (recovers the original a)\n";
}
</script>
<script type="text/plain" data-cppfile="13c_permutations.cpp">// Concept: enumerate permutations of a range, in lexicographic order.
//
//   std::next_permutation(b, e)   rearrange to the NEXT lex permutation;
//                                  returns false when wrapping around to
//                                  the smallest one. Combined with sort()
//                                  at the start, it iterates ALL n! permutations.
//
//   std::prev_permutation         the reverse direction.
#include <algorithm>
#include <iostream>
#include <string>

int main() {
    std::string s = "abc";
    std::sort(s.begin(), s.end());        // start at lexicographically smallest

    std::cout << "all permutations of \"abc\":\n";
    do {
        std::cout << "  " << s << "\n";
    } while (std::next_permutation(s.begin(), s.end()));

    // is_permutation — different question: are two ranges permutations of each other?
    int a[] = {1, 2, 3, 4};
    int b[] = {3, 1, 4, 2};
    std::cout << "a is permutation of b? "
              << std::is_permutation(std::begin(a), std::end(a), std::begin(b)) << "\n";
}
</script>
<script type="text/plain" data-cppfile="14a_functor_basics.cpp">// Concept: a FUNCTOR is a class with an overloaded operator() — an object
// you can CALL like a function.
//
// vs C: in C the closest tool is a function pointer. A function pointer
// can be passed around but it CANNOT carry per-instance state. A functor
// does both: it is callable AND it can store data members.
//
// "Anywhere a callable is wanted (algorithms, threads, schedulers), a
//  functor instance works."
#include <iostream>

class Greeter {
public:
    Greeter(const char* prefix) : prefix_(prefix) {}
    // operator() — what makes Greeter a "callable" / functor.
    void operator()(const char* who) const {
        std::cout << "  " << prefix_ << ", " << who << "!\n";
    }
private:
    const char* prefix_;
};

int main() {
    Greeter hello("Hello");
    Greeter ola  ("Olá");

    hello("Ada");          // looks like a function call — actually hello.operator()("Ada")
    hello("Linus");
    ola  ("Bjarne");

    // A function pointer cannot hold prefix_ — every function pointer of the
    // same signature is interchangeable. With a functor, EACH INSTANCE carries
    // its own data.
}
</script>
<script type="text/plain" data-cppfile="14b_stateful_functor.cpp">// Concept: a STATEFUL functor — data members persist across calls.
//
// Useful when you need an algorithm to remember something between elements:
// a running sum, a counter, a "have I seen this before?" flag.
//
// vs C: with a function pointer you'd need a global variable or thread-local
// state. A functor instance is the per-call state, cleanly scoped.
#include <algorithm>
#include <iostream>
#include <vector>

class Multiplier {
public:
    explicit Multiplier(int factor) : factor_(factor), calls_(0) {}

    int operator()(int x) {
        ++calls_;
        return x * factor_;
    }

    int calls() const { return calls_; }

private:
    int factor_;
    int calls_;     // mutable state across calls
};

int main() {
    std::vector<int> in{1, 2, 3, 4, 5};
    std::vector<int> out(in.size());

    Multiplier times3(3);
    std::transform(in.begin(), in.end(), out.begin(), std::ref(times3));
    // ↑ std::ref to keep ONE shared instance — by default std::transform
    //   would COPY the functor and we'd lose the call count.

    std::cout << "out:";
    for (int x : out) std::cout << " " << x;
    std::cout << "\n";
    std::cout << "operator() was invoked " << times3.calls() << " times\n";
}
</script>
<script type="text/plain" data-cppfile="14c_predefined_functors.cpp">// Concept: predefined functor templates in <functional>.
//
// You don't have to write your own — the standard library supplies the
// common ones as TEMPLATES.
//
//   std::plus<T>        a + b
//   std::minus<T>       a - b
//   std::multiplies<T>  a * b
//   std::divides<T>     a / b
//   std::negate<T>      -a              (unary)
//   std::less<T>        a <  b
//   std::greater<T>     a >  b
//   std::less_equal<T>      a <= b
//   std::equal_to<T>    a == b
//   std::logical_and<T> a && b
//   std::logical_not<T> !a              (unary)
//
// Pass them to std::sort, std::accumulate, std::transform, priority_queue, …
#include <algorithm>
#include <functional>
#include <iostream>
#include <numeric>
#include <vector>

int main() {
    std::vector<int> v{5, 2, 8, 1, 4};

    // Sort descending using std::greater
    std::sort(v.begin(), v.end(), std::greater<int>{});
    std::cout << "sorted desc:";
    for (int x : v) std::cout << " " << x;
    std::cout << "\n";

    // Product = accumulate with std::multiplies as the binary op
    std::vector<int> nums{1, 2, 3, 4};
    int product = std::accumulate(nums.begin(), nums.end(), 1, std::multiplies<int>{});
    std::cout << "product 1·2·3·4 = " << product << "\n";

    // Element-wise sum of two ranges via std::transform + std::plus
    std::vector<int> a{10, 20, 30}, b{1, 2, 3}, sum(3);
    std::transform(a.begin(), a.end(), b.begin(), sum.begin(), std::plus<int>{});
    std::cout << "a + b      :";
    for (int x : sum) std::cout << " " << x;
    std::cout << "\n";

    // Negate — unary functor
    std::vector<int> neg(a.size());
    std::transform(a.begin(), a.end(), neg.begin(), std::negate<int>{});
    std::cout << "negate(a)  :";
    for (int x : neg) std::cout << " " << x;
    std::cout << "\n";
}
</script>
<script type="text/plain" data-cppfile="14d_lambdas_as_functors.cpp">// Concept: a LAMBDA is just sugar for an anonymous functor class.
//
//   [factor](int x){ return x * factor; }
//   ────────────────────────────────────
//   The compiler generates an unnamed class, roughly:
//     class __lambda {
//         int factor_;
//     public:
//         __lambda(int f) : factor_(f) {}
//         auto operator()(int x) const { return x * factor_; }
//     };
//
// Capture clauses control the data members:
//   []        capture nothing
//   [=]       capture every used variable BY VALUE
//   [&]       capture every used variable BY REFERENCE
//   [x]       capture x by value
//   [&x]      capture x by reference
//   [=, &x]   default by value, but x by reference
//   [x = expr]  init capture (C++14) — name a fresh member with a value
//
// Add 'mutable' to allow modifying the by-value captures inside the lambda.
#include <algorithm>
#include <iostream>
#include <vector>

int main() {
    std::vector<int> v{1, 2, 3, 4, 5};

    // [factor] → a member named factor stored by value
    int factor = 10;
    std::vector<int> scaled(v.size());
    std::transform(v.begin(), v.end(), scaled.begin(),
                   [factor](int x){ return x * factor; });
    std::cout << "factor*v:";
    for (int x : scaled) std::cout << " " << x;
    std::cout << "\n";

    // [&] capture by reference — let the lambda mutate caller-side state
    int sum = 0;
    std::for_each(v.begin(), v.end(), [&sum](int x){ sum += x; });
    std::cout << "sum via &capture: " << sum << "\n";

    // mutable + by-value capture — counter lives inside each call invocation
    int call = 0;
    auto numbered = [call](int x) mutable {
        ++call;
        return std::pair{call, x};
    };
    auto [c1, x1] = numbered(7);
    auto [c2, x2] = numbered(8);
    std::cout << "numbered(7)=(" << c1 << "," << x1 << ")  "
              << "numbered(8)=(" << c2 << "," << x2 << ")\n";
    // Note: each lambda VALUE has its own call counter — copies don't share state.
}
</script>
<script type="text/plain" data-cppfile="14e_std_function.cpp">// Concept: std::function<R(Args...)> — a TYPE-ERASED callable holder.
//
// Stores any callable that matches the signature: a free function, a
// functor instance, a member-function binding, a lambda. You can then
// pass it around or store it in a container, regardless of its actual type.
//
//   pros: uniform type for "anything callable with this signature"
//   cons: small heap allocation + indirection — slower than a template
//         that is parameterised on the callable type directly
#include <functional>
#include <iostream>
#include <vector>

int free_add(int a, int b) { return a + b; }

struct Mul { int operator()(int a, int b) const { return a * b; } };

int main() {
    using BinOp = std::function<int(int, int)>;

    std::vector<BinOp> ops;
    ops.push_back(&free_add);                        // free function
    ops.push_back(Mul{});                            // functor object
    ops.push_back([](int a, int b){ return a - b; }); // lambda
    ops.push_back([factor=10](int a, int b){
        return (a + b) * factor;                     // capturing lambda
    });

    for (const auto& op : ops) {
        std::cout << "  op(3, 4) = " << op(3, 4) << "\n";
    }

    // Empty std::function is callable-checked — operator bool tells you if it's set:
    std::function<int(int,int)> empty;
    std::cout << "empty has target? " << static_cast<bool>(empty) << "\n";
    // empty(1,2);   // ← throws std::bad_function_call at runtime
}
</script>

/* ==========================================================
   3D background — Three.js wireframes (purple/fuchsia palette)
   ========================================================== */
(function init3D(){
  const canvas = document.getElementById('bg-3d');
  if(!window.THREE){ return; }
  const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);
  camera.position.z = 7;
  const group = new THREE.Group();
  scene.add(group);
  const palette = [0x8b5cf6, 0xa78bfa, 0xe879f9, 0xf0abfc];
  function addShape(geom, color, scale, position){
    const mat = new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.55 });
    const wire = new THREE.WireframeGeometry(geom);
    const line = new THREE.LineSegments(wire, mat);
    line.scale.setScalar(scale);
    line.position.set(position.x, position.y, position.z);
    line.userData.spinSpeed = { x:(Math.random()-0.5)*0.004, y:(Math.random()-0.5)*0.004, z:(Math.random()-0.5)*0.0025 };
    line.userData.float = { phase: Math.random()*Math.PI*2, amp: 0.3+Math.random()*0.4 };
    group.add(line); return line;
  }
  addShape(new THREE.IcosahedronGeometry(1,0),         palette[0], 1.6, { x:-4.5, y: 1.6, z:-2 });
  addShape(new THREE.TorusKnotGeometry(0.7,0.22,80,12),palette[1], 1.4, { x: 4.5, y:-1.8, z:-1 });
  addShape(new THREE.OctahedronGeometry(1,0),          palette[2], 1.0, { x: 3.0, y: 2.2, z:-3 });
  addShape(new THREE.TetrahedronGeometry(1,0),         palette[3], 0.9, { x:-3.2, y:-2.0, z:-2.5 });
  addShape(new THREE.IcosahedronGeometry(1,0),         palette[1], 0.6, { x: 0.2, y: 0.0, z:-4 });
  addShape(new THREE.DodecahedronGeometry(1,0),        palette[0], 0.7, { x:-1.6, y: 2.6, z:-3.5 });
  addShape(new THREE.OctahedronGeometry(1,0),          palette[3], 0.55,{ x: 1.8, y:-2.6, z:-3.5 });
  const pCount = 220, pGeom = new THREE.BufferGeometry();
  const pPos = new Float32Array(pCount * 3);
  for(let i=0;i<pCount;i++){ pPos[i*3]=(Math.random()-0.5)*18; pPos[i*3+1]=(Math.random()-0.5)*12; pPos[i*3+2]=(Math.random()-0.5)*10-2; }
  pGeom.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  scene.add(new THREE.Points(pGeom, new THREE.PointsMaterial({ color:0xffffff, size:0.025, transparent:true, opacity:0.65 })));
  const target={x:0,y:0}, current={x:0,y:0};
  window.addEventListener('mousemove', e => { target.x=(e.clientX/window.innerWidth-0.5)*0.6; target.y=(e.clientY/window.innerHeight-0.5)*0.4; });
  function resize(){ const w=window.innerWidth,h=window.innerHeight; renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); }
  resize(); window.addEventListener('resize', resize);
  let t=0; (function tick(){ t+=0.01; current.x+=(target.x-current.x)*0.05; current.y+=(target.y-current.y)*0.05;
    group.children.forEach(m => { m.rotation.x+=m.userData.spinSpeed.x; m.rotation.y+=m.userData.spinSpeed.y; m.rotation.z+=m.userData.spinSpeed.z; m.position.y += Math.sin(t+m.userData.float.phase)*0.0025*m.userData.float.amp; });
    group.rotation.y = current.x*0.4; group.rotation.x = -current.y*0.3;
    renderer.render(scene, camera); requestAnimationFrame(tick); })();
})();

/* ==========================================================
   Embedded source loader + state
   ========================================================== */
const fileListEl  = document.getElementById('fileList');
const fileNameEl  = document.getElementById('fileName');
const fileSubEl   = document.getElementById('fileSub');
const fileTabsEl  = document.getElementById('fileTabs');
const searchEl    = document.getElementById('search');
const statusLabel = document.getElementById('statusLabel');
const statusInfo  = document.getElementById('statusInfo');
const outBody     = document.getElementById('outBody');
const toastEl     = document.getElementById('toast');

const state = {
  active: null,
  originals: {},
  buffers: {},
  outputs: {},
  loaded: {},
};

const STORAGE_PREFIX = 'cpp-lab:edit:';
function hashShort(s){
  let h = 5381;
  for(let i=0; i<s.length; i++) h = ((h<<5) + h + s.charCodeAt(i)) | 0;
  return (h >>> 0).toString(36);
}
function storageKeyFor(file){
  const orig = state.originals[file] || '';
  return STORAGE_PREFIX + file + ':v' + hashShort(orig);
}
function saveBuffer(file, value){ try{ localStorage.setItem(storageKeyFor(file), value); }catch{} }
function loadBuffer(file){ try{ return localStorage.getItem(storageKeyFor(file)); }catch{ return null; } }
function clearBuffer(file){ try{ localStorage.removeItem(storageKeyFor(file)); }catch{} }

function readSource(file){
  const node = document.querySelector('script[type="text/plain"][data-cppfile="' + CSS.escape(file) + '"]');
  return node ? node.textContent : null;
}
function readOutput(stepId){
  const step = STEPS.find(s => s.id === stepId);
  if(!step) return null;
  const key = step.file.replace(/\.cpp$/, '');
  const node = document.querySelector('script[type="text/plain"][data-outfile="' + CSS.escape(key) + '"]');
  return node ? node.textContent : null;
}
function ensureLoaded(file){
  if(state.loaded[file]) return state.originals[file];
  const text = readSource(file);
  if(text == null){
    const msg = '// missing embedded source for ' + file + '\n';
    state.originals[file] = msg; state.buffers[file] = msg;
  } else {
    state.originals[file] = text;
    const saved = loadBuffer(file);
    state.buffers[file]   = saved != null ? saved : text;
  }
  state.loaded[file] = true;
  return state.originals[file];
}

/* Sidebar */
function stepButtonNode(entry){
  const li = document.createElement('li');
  const btn = document.createElement('button');
  btn.className = 'file-btn';
  btn.dataset.step = entry.id;
  const lineCount = (state.originals[entry.file] || '').split('\n').length;
  btn.innerHTML =
    '<span class="ico">CPP</span>' +
    '<span class="label">' + entry.label + '</span>' +
    '<span class="lines">' + lineCount + 'L</span>';
  btn.addEventListener('click', () => activate(entry.id));
  li.appendChild(btn);
  return li;
}
(function renderSteps(){
  STEPS.forEach(s => ensureLoaded(s.file));
  // Build a 2-level hierarchy: super-group → group → items.
  const supers = []; const seenSup = new Map();
  STEPS.forEach(s => {
    const sup = s.super || '';
    if(!seenSup.has(sup)){
      const node = { name: sup, count: 0, groups: [], seenG: new Map() };
      seenSup.set(sup, node);
      supers.push(node);
    }
    const sn = seenSup.get(sup);
    sn.count++;
    const g = s.group || 'Other';
    if(!sn.seenG.has(g)){
      const gn = { name: g, items: [] };
      sn.seenG.set(g, gn);
      sn.groups.push(gn);
    }
    sn.seenG.get(g).items.push(s);
  });
  supers.forEach(sup => {
    if(sup.name){
      const sh = document.createElement('li');
      sh.className = 'file-supergroup-head';
      sh.innerHTML = sup.name +
        '<span class="count">' + sup.count + '</span>';
      fileListEl.appendChild(sh);
    }
    sup.groups.forEach(g => {
      const head = document.createElement('li');
      head.className = 'file-group-head';
      head.textContent = g.name;
      fileListEl.appendChild(head);
      g.items.forEach(p => fileListEl.appendChild(stepButtonNode(p)));
    });
  });
})();
searchEl.addEventListener('input', ()=>{
  const q = searchEl.value.toLowerCase().trim();
  document.querySelectorAll('.file-btn').forEach(b=>{
    const id = b.dataset.step;
    const step = STEPS.find(s=>s.id===id);
    const hit = !q || step.label.toLowerCase().includes(q) || step.file.toLowerCase().includes(q);
    b.style.display = hit ? '' : 'none';
  });
});

function activeStep(){ return STEPS.find(s => s.id === state.active); }

function activate(id){
  const step = STEPS.find(s => s.id === id); if(!step) return;
  state.active = id;
  document.querySelectorAll('.file-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.step === id);
  });
  ensureLoaded(step.file);
  editor.setOption('readOnly', false);
  editor.setValue(state.buffers[step.file] || state.originals[step.file]);
  editor.clearHistory();

  const labelClean = step.label.replace(/^[\d]+[a-z]?\s*·\s*/, '');
  fileNameEl.firstChild.nodeValue = labelClean;
  fileSubEl.textContent = step.path;

  // file tabs (single file per step)
  fileTabsEl.innerHTML = '';
  const tab = document.createElement('button');
  tab.className = 'file-tab active';
  tab.textContent = step.file;
  fileTabsEl.appendChild(tab);

  outBody.innerHTML = '<div class="empty">Press ▶ Run to see expected output for this demo.</div>';
  setStatus('ready', 'Ready', step.path);
  updateDirty();
}

function setStatus(kind, label, info){
  statusLabel.className = 'status ' + (kind==='ready' ? '' : kind);
  statusLabel.textContent = label;
  statusInfo.textContent = info || '';
}

function updateDirty(){
  const step = activeStep(); if(!step) return;
  const cur = editor.getValue();
  const dirty = cur !== state.originals[step.file];
  fileNameEl.classList.toggle('dirty', dirty);
  document.querySelector('.file-btn[data-step="' + step.id + '"]')?.classList.toggle('dirty', dirty);
  document.querySelector('.file-tab')?.classList.toggle('dirty', dirty);
}

editor.on('change', () => {
  const step = activeStep(); if(!step) return;
  const cur = editor.getValue();
  state.buffers[step.file] = cur;
  if(cur === state.originals[step.file]) clearBuffer(step.file);
  else saveBuffer(step.file, cur);
  updateDirty();
});

/* Run — display the precomputed expected output */
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function runStep(){
  const step = activeStep(); if(!step) return;
  const out = readOutput(step.id);
  if(out == null){
    setStatus('err', 'No output', step.path);
    outBody.innerHTML = '<div class="empty">No precomputed output found for this demo.</div>';
    return;
  }
  setStatus('work', 'Running…', '');
  // brief delay for the running animation feel
  setTimeout(() => {
    const cur = editor.getValue();
    const isOriginal = cur === state.originals[step.file];
    const banner = isOriginal
      ? '<div class="ok-banner"><strong>Output</strong> — captured from <code>g++ -std=c++17 -o build/' + step.file.replace(/\.cpp$/,'') + ' ' + escapeHtml(step.path) + ' &amp;&amp; ./build/' + step.file.replace(/\.cpp$/,'') + '</code></div>'
      : '<div class="info-banner"><strong>Note</strong> — you have unsaved edits. The output below is from the original source. Compile locally to see the effect of your changes.</div>';
    outBody.innerHTML = banner + '<h4>stdout</h4><pre>' + escapeHtml(out) + '</pre>';
    setStatus('ok', 'Done', step.path);
  }, 110);
}
document.getElementById('runBtn').addEventListener('click', runStep);

/* Reset — revert active file's buffer to original */
document.getElementById('resetBtn').addEventListener('click', () => {
  const step = activeStep(); if(!step) return;
  state.buffers[step.file] = state.originals[step.file];
  clearBuffer(step.file);
  editor.setValue(state.originals[step.file]);
  showToast('Reverted to original');
});

/* Copy — copy the precomputed output */
document.getElementById('copyOutBtn').addEventListener('click', async () => {
  const step = activeStep(); if(!step) return;
  const out = readOutput(step.id);
  if(out == null){ showToast('No output to copy', true); return; }
  try{ await navigator.clipboard.writeText(out); showToast('Copied output'); }
  catch{ showToast('Copy failed', true); }
});

/* Toast */
let toastTimer = null;
function showToast(msg, isError){
  toastEl.textContent = msg;
  toastEl.classList.toggle('error', !!isError);
  toastEl.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> toastEl.classList.remove('show'), 1700);
}

/* Splitter — drag to resize editor vs preview */
(function splitter(){
  const root = document.querySelector('.editor-pane');
  const handle = document.getElementById('splitter');
  let dragging = false;
  function setCols(p){
    p = Math.max(0.18, Math.min(0.82, p));
    root.style.setProperty('--col-1', p + 'fr');
    root.style.setProperty('--col-2', (1 - p) + 'fr');
  }
  setCols(0.55);
  handle.addEventListener('pointerdown', e => {
    dragging = true; handle.classList.add('active');
    handle.setPointerCapture(e.pointerId);
  });
  handle.addEventListener('pointermove', e => {
    if(!dragging) return;
    const r = root.getBoundingClientRect();
    setCols((e.clientX - r.left - 22) / (r.width - 50));
  });
  function endDrag(){ dragging = false; handle.classList.remove('active'); }
  handle.addEventListener('pointerup', endDrag);
  handle.addEventListener('pointercancel', endDrag);
})();

/* Boot */
activate(STEPS[0].id);
