<!DOCTYPE html>
<html>
<head>
  <style>
    .btn-3d {
      background: #2196f3;
      color: white;
      padding: 1em 2em;
      font-size: 1.2em;
      border: none;
      border-radius: 8px;
      box-shadow: 0 5px #0b7dda;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-3d:active {
      box-shadow: 0 2px #0b7dda;
      transform: translateY(3px);
    }
  </style>
</head>
<body>
  <button class="btn-3d">Click Me!</button>

<script src="../../../home.js" defer></script>
</body>
</html>
