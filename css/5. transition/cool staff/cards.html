<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pricing Cards</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .pricing {
      display: flex;
      gap: 1rem;
    }

    .card {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.3s;
      width: 200px;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .price {
      font-size: 2rem;
      color: #3498db;
    }

    .card button {
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .card button:hover {
      background: #2980b9;
    }
  </style>
</head>
<body>
  <div class="pricing">
    <div class="card">
      <h2>Basic</h2>
      <p class="price">$9/mo</p>
      <p>1 User</p>
      <button>Choose</button>
    </div>
    <div class="card">
      <h2>Pro</h2>
      <p class="price">$29/mo</p>
      <p>10 Users</p>
      <button>Choose</button>
    </div>
    <div class="card">
      <h2>Enterprise</h2>
      <p class="price">$99/mo</p>
      <p>Unlimited Users</p>
      <button>Choose</button>
    </div>
  </div>

<script src="../../../home.js" defer></script>
</body>
</html>
