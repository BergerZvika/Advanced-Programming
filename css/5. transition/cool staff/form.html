<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Form</title>
  <style>
    body {
      margin: 0;
      background: #eef;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    form {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 300px;
    }

    input, textarea {
      width: 100%;
      margin-bottom: 1rem;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }

    input:focus, textarea:focus {
      border-color: #3498db;
      outline: none;
    }

    button {
      padding: 0.5rem 1rem;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
    }

    @media (max-width: 400px) {
      form {
        width: 90%;
      }
    }
  </style>
</head>
<body>
  <form>
    <h2>Contact Us</h2>
    <input type="text" placeholder="Name" required />
    <input type="email" placeholder="Email" required />
    <textarea rows="5" placeholder="Your message"></textarea>
    <button type="submit">Send</button>
  </form>

<script src="../../../home.js" defer></script>
</body>
</html>
