<!DOCTYPE html>
<html>
<head>
  <style>
    .hamburger {
      width: 35px;
      height: 25px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      margin: 100px auto;
    }

    .bar {
      height: 4px;
      background: #333;
      border-radius: 2px;
      transition: 0.4s;
    }

    .hamburger:hover .bar:nth-child(1) {
      transform: translateY(10px) rotate(45deg);
    }

    .hamburger:hover .bar:nth-child(2) {
      opacity: 0;
    }

    .hamburger:hover .bar:nth-child(3) {
      transform: translateY(-10px) rotate(-45deg);
    }
  </style>
</head>
<body>
  <div class="hamburger">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
</body>
</html>
