<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minimal Dark Mode</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      background-color: #f0f0f0;
      color: #222;
      transition: background-color 2s, color 2s;
    }

    body.dark-mode {
      background-color: #121212;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
    }

    p {
      font-size: 1.1rem;
      max-width: 600px;
    }

    button {
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      font-size: 1rem;
      background-color: #444;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #222;
    }
  </style>
</head>
<body>

  <h1>Hello, World!</h1>
  <p>This is a minimal page with a dark mode toggle. Click the button to switch themes.</p>
  <button onclick="toggleDark()">Toggle Dark Mode</button>

  <script>
    function toggleDark() {
      document.body.classList.toggle('dark-mode');
    }
  </script>

</body>
</html>
