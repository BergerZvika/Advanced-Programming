<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Even More CSS Transitions</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f5f5f5;
      padding: 2rem;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
    }

    .section {
      margin-bottom: 2rem;
    }

    .label {
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .demo {
      display: inline-block;
      padding: 1rem;
      margin: 0.5rem;
      background: #2196f3;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.4s ease;
    }

    /* 1. Text Color and Letter Spacing */
    .text-effect:hover {
      color: #ff4081;
      letter-spacing: 3px;
    }

    /* 2. Button Background and Scale */
    .button-scale:hover {
      background: #4caf50;
      transform: scale(1.1);
    }

    /* 3. Image Zoom on Hover */
    .image-container {
      overflow: hidden;
      display: inline-block;
      border-radius: 8px;
    }

    .image-container img {
      width: 200px;
      height: auto;
      transition: transform 0.5s ease;
    }

    .image-container:hover img {
      transform: scale(1.2);
    }

    /* 4. Box Shadow Transition */
    .shadow-box {
      background: #673ab7;
      box-shadow: 0 0 0 transparent;
      transition: box-shadow 0.5s ease;
    }

    .shadow-box:hover {
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    /* 5. Skew & Rotate */
    .skew-rotate:hover {
      transform: skew(10deg, 10deg) rotate(5deg);
    }

    /* 6. Custom Timing */
    .custom-timing {
      transition: background-color 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }

    .custom-timing:hover {
      background-color: #00bcd4;
    }

    /* 7. Input Focus Transition */
    input[type="text"] {
      padding: 0.5rem;
      border: 2px solid #ccc;
      border-radius: 5px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      width: 250px;
    }

    input[type="text"]:focus {
      border-color: #3f51b5;
      box-shadow: 0 0 5px rgba(63, 81, 181, 0.5);
      outline: none;
    }
  </style>
</head>
<body>

  <h1>Even More CSS Transitions</h1>

  <div class="section">
    <div class="label">1. Text Hover Effect (Color + Spacing)</div>
    <div class="demo text-effect">Hover Me</div>
  </div>

  <div class="section">
    <div class="label">2. Button Scale and Color</div>
    <div class="demo button-scale">Click Me</div>
  </div>

  <div class="section">
    <div class="label">3. Image Zoom</div>
    <div class="image-container">
      <img src="./generic-image.jpg" alt="Zoom Image">
    </div>
  </div>

  <div class="section">
    <div class="label">4. Box Shadow on Hover</div>
    <div class="demo shadow-box">Shadow Me</div>
  </div>

  <div class="section">
    <div class="label">5. Skew and Rotate</div>
    <div class="demo skew-rotate">Skew Me</div>
  </div>

  <div class="section">
    <div class="label">6. Custom Timing Function</div>
    <div class="demo custom-timing">Bounce Color</div>
  </div>

  <div class="section">
    <div class="label">7. Input Focus Transition</div>
    <input type="text" placeholder="Focus me to see effect" />
  </div>

</body>
</html>
