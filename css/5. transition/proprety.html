<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS @property Examples</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      padding: 2rem;
      color: #333;
      max-width: 800px;
      margin: auto;
    }

    h2 {
      margin-top: 3rem;
    }

    .box {
      width: 150px;
      height: 150px;
      margin: 1rem 0;
      border-radius: 10px;
      transition: all 0.5s ease;
    }

    /* ========== 1. Simple Example ========== */

    /* Define a custom property --rotate using @property */
    @property --rotate {
      syntax: "<angle>";
      inherits: false;
      initial-value: 0deg;
    }

    .simple {
      background: lightcoral;
      transform: rotate(var(--rotate));
      transition: --rotate 0.5s;
    }

    .simple:hover {
      --rotate: 15deg; /* When hovered, rotate the box slightly */
    }

    /* ========== 2. Extended Example ========== */

    /* Define another property --bg using @property */
    @property --bg {
      syntax: "<color>";
      inherits: false;
      initial-value: lightblue;
    }

    /* Define a third property --scale */
    @property --scale {
      syntax: "<number>";
      inherits: false;
      initial-value: 1;
    }

    .extended {
      background: var(--bg);
      transform: scale(var(--scale)) rotate(var(--rotate));
      transition:
        --bg 0.6s,
        --scale 0.6s,
        --rotate 0.6s;
    }

    .extended:hover {
      --bg: lightgreen;
      --scale: 1.3;
      --rotate: 30deg;
    }
  </style>
</head>
<body>

  <h1>CSS <code>@property</code> Tutorial</h1>

  <!-- 1. Simple Example -->
  <h2>1. Simple Example: Rotate on Hover</h2>
  <p>This red box rotates slightly when hovered using a custom <code>--rotate</code> property.</p>
  <div class="box simple"></div>

  <!-- 2. Extended Example -->
  <h2>2. Extended Example: Rotate + Scale + Color Change</h2>
  <p>This blue box changes its color, scale, and rotation using three <code>@property</code>-defined custom properties.</p>
  <div class="box extended"></div>


<script src="../../home.js" defer></script>
</body>
</html>
