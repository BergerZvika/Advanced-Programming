import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

const PALETTE = {
  void:    0x05060d,
  ink:     0xe6ecff,

/* ─── small DOM helpers ─── */
const $  = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for (const k in attrs){
    if (k === 'class') n.className = attrs[k];
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), attrs[k]);
    else n.setAttribute(k, attrs[k]);
  }
  for (const c of kids){
    if (c == null) continue;
    n.appendChild(c.nodeType ? c : document.createTextNode(c));
  }
  return n;
};

/* ─── three.js scene wrapper ─── */
function createScene({mount, camera = {pos:[0,4,18], lookAt:[0,0,0]}}){
  const w = mount.clientWidth, h = mount.clientHeight;
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x04050b, 26, 90);

  const cam = new THREE.PerspectiveCamera(45, w/h, 0.1, 200);
  cam.position.set(...camera.pos);
  cam.lookAt(new THREE.Vector3(...camera.lookAt));

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, h, false);
  renderer.setClearColor(0x000000, 0);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  mount.appendChild(renderer.domElement);

  // lighting
  const amb = new THREE.AmbientLight(0xb8c4ff, 0.55);
  scene.add(amb);
  const key = new THREE.DirectionalLight(0xffffff, 1.05);
  key.position.set(5, 10, 8);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0x35d0ff, 0.45);
  rim.position.set(-8, 4, -6);
  scene.add(rim);
  const mag = new THREE.PointLight(0xff5cab, 0.65, 40);
  mag.position.set(-6, 2, 6);
  scene.add(mag);

  // starfield (very subtle)
  {
    const g = new THREE.BufferGeometry();
    const N = 320, arr = new Float32Array(N*3);
    for (let i=0;i<N;i++){
      arr[i*3]   = (Math.random()-0.5)*120;
      arr[i*3+1] = (Math.random()-0.5)*80 + 8;
      arr[i*3+2] = (Math.random()-0.5)*120 - 20;
    }
    g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
    const m = new THREE.PointsMaterial({color:0x9aa6d6, size:0.05, transparent:true, opacity:0.45});
    scene.add(new THREE.Points(g, m));
  }

  // floor: large faint disc + radial grid
  {
    const disc = new THREE.Mesh(
      new THREE.CircleGeometry(60, 64),
      new THREE.MeshBasicMaterial({color:0x0a0e1c, transparent:true, opacity:0.65, side:THREE.DoubleSide})
    );
    disc.rotation.x = -Math.PI/2;
    disc.position.y = -3.5;
    scene.add(disc);
    const grid = new THREE.GridHelper(80, 40, 0x35d0ff, 0x1a2240);
    grid.material.opacity = 0.18; grid.material.transparent = true;
    grid.position.y = -3.49;
    scene.add(grid);
  }

  // orbit / pan / zoom controls
  const controls = new OrbitControls(cam, renderer.domElement);
  controls.enableDamping  = true;
  controls.dampingFactor  = 0.08;
  controls.target.set(...camera.lookAt);
  controls.minDistance    = 4;
  controls.maxDistance    = 90;
  controls.maxPolarAngle  = Math.PI * 0.92;  // don't let user look from underneath the grid
  controls.zoomSpeed      = 0.9;
  controls.rotateSpeed    = 0.75;
  controls.panSpeed       = 0.75;
  controls.screenSpacePanning = true;
  controls.update();

  // render loop
  function tick(){
    controls.update();
    renderer.render(scene, cam);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // resize
  const onResize = () => {
    const W = mount.clientWidth, H = mount.clientHeight;
    cam.aspect = W/H; cam.updateProjectionMatrix();
    renderer.setSize(W, H, false);
  };
  window.addEventListener('resize', onResize);

  return {scene, cam, renderer, controls};
}

/* ─── stepper · pause/play/fast-forward ─── */
const stepper = {
  paused: false,
  resume: null,    // resolver for in-flight pause
  speed: 1,        // 1 = normal, >1 = faster
  fastForward: false,  // if true, next sleep returns immediately
  checkpoints: [], // {label, undo: async () => void}
  onState: null,   // callback(state) for UI updates
};
function stepperKick(){
  if (stepper.resume){ const r = stepper.resume; stepper.resume = null; r(); }
}
function stepperPlay(){ stepper.paused = false; stepperKick(); stepper.onState && stepper.onState('playing'); }
function stepperPause(){ stepper.paused = true; stepper.onState && stepper.onState('paused'); }
function stepperToggle(){ stepper.paused ? stepperPlay() : stepperPause(); }
function stepperFastForward(){ stepper.fastForward = true; stepperKick(); }
export async function stepperCheckpoint(label, undoFn){
  if (undoFn) stepper.checkpoints.push({label: label || '', undo:undoFn});
  // only clobber the status text if a label was given; otherwise leave whatever
  // cx.set / the current op already put there
  if (label != null && stepper.onState) stepper.onState(label);
  if (stepper.paused){
    await new Promise(r => stepper.resume = r);
  }
}
export async function stepperUndo(){
  const cp = stepper.checkpoints.pop();
  if (!cp) return false;
  if (stepper.onState) stepper.onState('undo · '+cp.label);
  await cp.undo();
  return true;
}
function stepperClear(){ stepper.checkpoints.length = 0; }

/* ─── small tween util · pause-aware ─── */
function tween(obj, prop, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = obj[prop];
    let t0 = performance.now(), pausedAt = 0, totalPause = 0;
    function step(now){
      if (stepper.paused){
        if (!pausedAt) pausedAt = now;
        requestAnimationFrame(step); return;
      }
      if (pausedAt){ totalPause += now - pausedAt; pausedAt = 0; }
      const elapsed = (now - t0 - totalPause) * stepper.speed;
      const k = stepper.fastForward ? 1 : Math.min(1, elapsed/ms);
      obj[prop] = from + (to - from)*ease(k);
      if (k<1) requestAnimationFrame(step); else { stepper.fastForward = false; res(); }
    }
    requestAnimationFrame(step);
  });
}
function tweenVec(vec, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = vec.clone();
    let t0 = performance.now(), pausedAt = 0, totalPause = 0;
    function step(now){
      if (stepper.paused){
        if (!pausedAt) pausedAt = now;
        requestAnimationFrame(step); return;
      }
      if (pausedAt){ totalPause += now - pausedAt; pausedAt = 0; }
      const elapsed = (now - t0 - totalPause) * stepper.speed;
      const k = stepper.fastForward ? 1 : Math.min(1, elapsed/ms);
      vec.lerpVectors(from, to, ease(k));
      if (k<1) requestAnimationFrame(step); else { stepper.fastForward = false; res(); }
    }
    requestAnimationFrame(step);
  });
}
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const easeInOutCubic = t => t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
export async function sleep(ms){
  let remaining = ms;
  while (remaining > 0){
    if (stepper.paused){ await new Promise(r => stepper.resume = r); }
    if (stepper.fastForward){ stepper.fastForward = false; return; }
    const chunk = Math.min(remaining, 32);
    await new Promise(r => setTimeout(r, chunk / Math.max(0.1, stepper.speed)));
    remaining -= chunk;
  }
}

/* ─── undo stack ─── */
function createHistory(){
  const stack = [];
  return {
    push(snapshot){ stack.push(snapshot); },
    pop(){ return stack.pop(); },
    size(){ return stack.length; },
    clear(){ stack.length = 0; },
  };
}

/* ─── 3D arrow indicator (shaft + cone + halo + optional text label) ─── */
// default arrow points in -Y (down). Rotate the returned group to re-aim:
//   up:    rotation.x = Math.PI  (or rotation.z = Math.PI)
//   left:  rotation.z =  Math.PI/2
//   right: rotation.z = -Math.PI/2
function makeArrow3D({color = 0x5cffb4, label = '', length = 1.5, labelSide = 'top'} = {}){
  const grp = new THREE.Group();

  const mat = new THREE.MeshPhysicalMaterial({
    color, emissive:color, emissiveIntensity:0.45,
    metalness:0.5, roughness:0.25, clearcoat:0.5
  });

  const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.085, 0.085, length, 18), mat);
  shaft.position.y = -length/2;
  grp.add(shaft);

  const tip = new THREE.Mesh(new THREE.ConeGeometry(0.24, 0.5, 22), mat);
  tip.rotation.x = Math.PI;            // apex toward -Y
  tip.position.y = -length - 0.25;
  grp.add(tip);

  if (label){
    const c = document.createElement('canvas'); c.width = 512; c.height = 160;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
    ctx.font = '800 78px IBM Plex Mono, monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.85)'; ctx.shadowBlur = 14;
    ctx.fillText(label, 256, 80);
    const tex = new THREE.CanvasTexture(c); tex.minFilter = THREE.LinearFilter;
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false}));
    spr.renderOrder = 12;
    spr.scale.set(1.9, 0.6, 1);
    if (labelSide === 'top')    spr.position.set(0,  0.45, 0);
    if (labelSide === 'bottom') spr.position.set(0, -length - 0.75, 0);
    grp.add(spr);
  }

  return {group: grp, shaft, tip,
          setColor(c){ mat.color.setHex(c); mat.emissive.setHex(c); }};
}

/* ─── player UI · play/pause/back/forward ─── */
function mountPlayer({mount, onBack}){
  const root = typeof mount === 'string' ? $(mount) : mount;
  if (!root) return null;
  const playBtn  = el('button', {class:'pl-btn pl-play',  title:'play / pause (Space)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'});
  const pauseBtn = el('button', {class:'pl-btn pl-pause hidden', title:'pause (Space)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>'});
  const backBtn  = el('button', {class:'pl-btn',  title:'step backward (←)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M6 6h2v12H6zM20 6 9 12l11 6z"/></svg>'});
  const fwdBtn   = el('button', {class:'pl-btn',  title:'skip to end of step (→)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M16 6h2v12h-2zM4 6l11 6L4 18z"/></svg>'});
  const speedBtn = el('button', {class:'pl-btn pl-speed', title:'cycle speed'}, '1×');
  const bar = el('div', {class:'pl-bar'}, backBtn, playBtn, pauseBtn, fwdBtn, speedBtn);
  root.appendChild(bar);

  function setMode(playing){
    if (playing){ playBtn.classList.add('hidden'); pauseBtn.classList.remove('hidden'); }
    else        { playBtn.classList.remove('hidden'); pauseBtn.classList.add('hidden'); }
  }
  setMode(false);  // start as "play" icon visible (i.e., paused/idle look)

  // wire
  playBtn .addEventListener('click', () => { stepperPlay();  setMode(true); });
  pauseBtn.addEventListener('click', () => { stepperPause(); setMode(false); });
  fwdBtn  .addEventListener('click', () => { stepperFastForward(); });
  backBtn .addEventListener('click', async () => {
    const ok = await stepperUndo();
    if (!ok && onBack) onBack();   // fall back to lab's op-undo if checkpoints empty
  });
  const SPEEDS = [1, 1.5, 2, 0.5];
  let si = 0;
  speedBtn.addEventListener('click', () => {
    si = (si + 1) % SPEEDS.length; stepper.speed = SPEEDS[si]; speedBtn.textContent = SPEEDS[si] + '×';
  });

  // No status text in the bar — cx.set still updates the side-panel readout
  // via createComplexityPanel; the bar stays a fixed-size button row.
  stepper.onState = null;

  // keyboard
  window.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space'){ e.preventDefault(); stepperToggle(); setMode(!stepper.paused); }
    else if (e.code === 'ArrowRight'){ stepperFastForward(); }
    else if (e.code === 'ArrowLeft'){ backBtn.click(); }
  });

  return {setMode, status};
}

/* ─── AVL ─── */

let root = null;
let size = 0;

function newNode(value){
  return {value, left:null, right:null, h:1, mesh:null, edgeUp:null};
}
function H(n){ return n ? n.h : 0; }
function BF(n){ return n ? H(n.left) - H(n.right) : 0; }
function upd(n){ n.h = 1 + Math.max(H(n.left), H(n.right)); }

function rotR(y){
  const x = y.left, T2 = x.right;
  x.right = y; y.left = T2;
  upd(y); upd(x);
  return x;
}
function rotL(x){
  const y = x.right, T2 = y.left;
  y.left = x; x.right = T2;
  upd(x); upd(y);
  return y;
}

function insert(n, v, trail){
  if (!n){ size++; const fresh = newNode(v); trail.push({type:'visit', node:fresh, fresh:true}); return fresh; }
  trail.push({type:'visit', node:n});
  if (v < n.value)      n.left  = insert(n.left, v, trail);
  else if (v > n.value) n.right = insert(n.right, v, trail);
  else { trail.push({type:'dup', node:n}); return n; }
  upd(n);
  const bf = BF(n);
  if (bf > 1 && v < n.left.value)  { trail.push({type:'rot', kind:'LL', at:n.value}); return rotR(n); }
  if (bf < -1 && v > n.right.value){ trail.push({type:'rot', kind:'RR', at:n.value}); return rotL(n); }
  if (bf > 1 && v > n.left.value)  { trail.push({type:'rot', kind:'LR', at:n.value}); n.left = rotL(n.left); return rotR(n); }
  if (bf < -1 && v < n.right.value){ trail.push({type:'rot', kind:'RL', at:n.value}); n.right = rotR(n.right); return rotL(n); }
  return n;
}

function minNode(n){ while (n.left) n = n.left; return n; }

function del(n, v, trail){
  if (!n) return null;
  trail.push({type:'visit', node:n});
  if (v < n.value) n.left = del(n.left, v, trail);
  else if (v > n.value) n.right = del(n.right, v, trail);
  else {
    if (!n.left || !n.right){
      const child = n.left || n.right;
      trail.push({type:'remove', node:n});
      n = child;
      size--;
    } else {
      const succ = minNode(n.right);
      trail.push({type:'replace', node:n, withValue:succ.value});
      n.value = succ.value;
      n.right = del(n.right, succ.value, trail);
    }
  }
  if (!n) return null;
  upd(n);
  const bf = BF(n);
  if (bf > 1 && BF(n.left) >= 0)  { trail.push({type:'rot', kind:'LL', at:n.value}); return rotR(n); }
  if (bf > 1 && BF(n.left) < 0)   { trail.push({type:'rot', kind:'LR', at:n.value}); n.left = rotL(n.left); return rotR(n); }
  if (bf < -1 && BF(n.right) <= 0){ trail.push({type:'rot', kind:'RR', at:n.value}); return rotL(n); }
  if (bf < -1 && BF(n.right) > 0) { trail.push({type:'rot', kind:'RL', at:n.value}); n.right = rotR(n.right); return rotL(n); }
  return n;
}

function depth(n){ return n ? 1 + Math.max(depth(n.left), depth(n.right)) : 0; }

/* ─── layout ─── */
// Use in-order index for x, depth for y
function layoutInOrder(n, acc){ if (!n) return; layoutInOrder(n.left, acc); acc.idx[n.value] = acc.k++; layoutInOrder(n.right, acc); }
function computeLayout(){
  const acc = {k:0, idx:{}};
  layoutInOrder(root, acc);
  const n = acc.k;
  if (n === 0) return new Map();
  const map = new Map();
  function walk(node, d){
    if (!node) return;
    const x = (acc.idx[node.value] - (n-1)/2) * Math.max(1.7, 5 - 0.3*d);
    const y = -d * 2.4 + 2.6;
    map.set(node, {x, y});
    walk(node.left, d+1); walk(node.right, d+1);
  }
  walk(root, 0);
  // fit to the visible viewport at z = 0 (stage canvas)
  const H = depth(root);
  const maxX = Math.max(0.001, ...[...map.values()].map(p => Math.abs(p.x)));
  const minY = Math.min(...[...map.values()].map(p => p.y));
  // visible half-width / half-height at z=0 given camera at (0, 5.5, 18) looking near origin
  const FOV = 45 * Math.PI/180;
  const viewH = 2 * 18 * Math.tan(FOV/2);
  const aspect = stage.clientWidth / stage.clientHeight;
  const viewW = viewH * aspect;
  const targetW = viewW * 0.42;   // ~84% of width usable, halved for ±x
  const targetH = viewH * 0.38;   // leave headroom for labels
  const usedH = (2.6 - minY);     // distance from top of tree (y≈2.6) to lowest node
  const s = Math.min(1, targetW / maxX, targetH / usedH);
  if (s < 1){
    for (const p of map.values()){ p.x *= s; p.y = 2.6 + (p.y - 2.6) * s; }
  }
  return map;
}

/* ─── visuals ─── */

function makeNodeMesh(value){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.65, 32, 24),
    new THREE.MeshPhysicalMaterial({color:0x1a2440, metalness:0.55, roughness:0.18, emissive:0x0c1e3a, emissiveIntensity:0.7, clearcoat:0.6})
  );
  grp.add(body);
  const wire = new THREE.Mesh(
    new THREE.SphereGeometry(0.66, 16, 12),
    new THREE.MeshBasicMaterial({color:0x7c5cff, wireframe:true, transparent:true, opacity:0.45})
  );
  grp.add(wire);

  const c = document.createElement('canvas'); c.width=320; c.height=160;
  const ctx = c.getContext('2d');
  function paint(v, bf){
    ctx.clearRect(0,0,320,160);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#ffffff';
    ctx.font = '800 60px IBM Plex Mono, monospace';
    ctx.fillText(String(v), 160, 58);
    if (bf !== undefined){
      const c2 = bf>1||bf<-1 ? '#ff5c70' : (bf===0?'#5cffb4':'#ffb454');
      ctx.fillStyle = c2;
      ctx.font = '800 40px IBM Plex Mono, monospace';
      ctx.shadowBlur = 16;
      ctx.fillText('bf '+(bf>=0?'+':'')+bf, 160, 122);
    }
  }
  paint(value, 0);
  const tex = new THREE.CanvasTexture(c); tex.minFilter = THREE.LinearFilter;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false}));
  spr.renderOrder = 10;
  spr.position.set(0, 1.5, 0); spr.scale.set(2.6, 1.3, 1);
  grp.add(spr);

  return {grp, body, wire, label:{paint, tex}};
}

function makeEdge(){
  const m = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.04, 1, 12),
    new THREE.MeshBasicMaterial({color:0x35d0ff, transparent:true, opacity:0.5})
  );
  return m;
}

function placeEdge(edge, ax, ay, bx, by){
  const dx = bx - ax, dy = by - ay;
  const len = Math.sqrt(dx*dx + dy*dy);
  edge.position.set((ax+bx)/2, (ay+by)/2, 0);
  edge.scale.y = len;
  edge.rotation.z = Math.atan2(dx, -dy);  // align to vector
}

function ensureMeshes(n){
  if (!n) return;
  if (!n.mesh){
    const m = makeNodeMesh(n.value);
    n.mesh = m;
    n.edgeUp = makeEdge();
    n.edgeUp.visible = false;
    n.mesh.grp.scale.setScalar(0.001);
    scene.add(n.mesh.grp);
    scene.add(n.edgeUp);
  }
  ensureMeshes(n.left); ensureMeshes(n.right);
}

async function relayout(animate=true){
  ensureMeshes(root);
  const map = computeLayout();
  // hide edges of nodes not in map
  const seen = new Set();
  const tasks = [];
  function walk(n, parent){
    if (!n) return;
    seen.add(n);
    const p = map.get(n);
    if (p){
      tasks.push(tweenVec(n.mesh.grp.position, new THREE.Vector3(p.x, p.y, 0), animate?420:0));
      tasks.push(tweenVec(n.mesh.grp.scale, new THREE.Vector3(1,1,1), animate?320:0));
      // BF label
      n.mesh.label.paint(n.value, BF(n));
      n.mesh.label.tex.needsUpdate = true;
      if (parent){
        const pp = map.get(parent);
        n.edgeUp.visible = true;
        placeEdge(n.edgeUp, pp.x, pp.y, p.x, p.y);
      } else {
        n.edgeUp.visible = false;
      }
    }
    walk(n.left, n); walk(n.right, n);
  }
  walk(root, null);
  await Promise.all(tasks);
  refreshHUD();
}

function refreshHUD(){
  $('#t-root').textContent = root ? root.value : '∅';
  $('#t-size').textContent = size;
  $('#t-height').textContent = depth(root);
  $('#undo-depth').textContent = history.size();
  $('#hist-pill').textContent = history.size();
}

async function pulse(node, color=0xb9ff5c, ms=240){
  if (!node || !node.mesh) return;
  const m = node.mesh.body.material;
  const eOld = m.emissive.clone(), iOld = m.emissiveIntensity;
  m.emissive.setHex(color); m.emissiveIntensity = 1.3;
  await sleep(ms);
  m.emissive.copy(eOld); m.emissiveIntensity = iOld;
}

async function animateTrail(trail){
  for (const e of trail){
    if (e.type === 'visit' && e.node && e.node.mesh){
      await pulse(e.node, 0xffb454, 160);
    } else if (e.type === 'rot'){
      log.say(`<span class="km">rot</span> ${e.kind} @ ${e.at}`);
    } else if (e.type === 'dup'){
      log.say(`<span class="kx">dup</span> ${e.node.value} skipped`);
    } else if (e.type === 'remove'){
      // deletion already handled in tree; just visual flash
    } else if (e.type === 'replace'){
      log.say(`<span class="km">replace</span> ${e.node.value} ← successor ${e.withValue}`);
    }
  }
}

/* ─── ops ─── */
let busy = false;
function lock(fn){ return async (...a) => { if (busy) return; busy=true; try{ await fn(...a); } finally{ busy=false; refreshHUD(); } }; }

function readVals(){
  const list = parseList($('#in-val').value);
  if (list.length === 0){
    const v = randomInt(1, 99); $('#in-val').value = v; return [v];
  }
  return list;
}
function readVal(){
  const v = parseNum($('#in-val').value, null);
  if (v === null){ log.say(`<span class="kx">err</span> number required`); return null; }
  return v;
}

function snapshotValues(){
  const out = [];
  (function walk(n){ if (!n) return; walk(n.left); out.push(n.value); walk(n.right); })(root);
  return out;
}

async function rebuildFrom(values){
  // clear current scene state then re-insert
  function purge(n){ if (!n) return; if (n.mesh){ scene.remove(n.mesh.grp); scene.remove(n.edgeUp); } purge(n.left); purge(n.right); }
  purge(root); root = null; size = 0;
  for (const v of values){
    const t = []; root = insert(root, v, t);
  }
  await relayout(false);
}

/* ─── step-by-step insert · descend then re-balance up the path ─── */
async function insertStep(v){
  const beforeSnap = snapshotValues();
  if (!root){
    root = newNode(v); size++;
    await relayout(true);
    cx.set(`new root ${v}`, 'O(log n)');
    log.say(`<span class="k">insert</span> ${v} · root`);
    await stepperCheckpoint(`new root ${v}`,
      async () => { await rebuildFrom(beforeSnap); });
    return;
  }
  const path = [];   // sequence of {node, dir} from root to insertion's parent
  let n = root;
  while (n){
    await pulse(n, 0xffb454, 220);
    cx.set(`visit ${n.value} · compare ${v}`, 'descend');
    await stepperCheckpoint(`visit ${n.value}`,
      async () => { await rebuildFrom(beforeSnap); });
    if (v < n.value){
      if (!n.left){
        const fresh = newNode(v);
        n.left = fresh; size++;
        path.push({node:n, dir:'left'});
        await relayout(true);
        cx.set(`attach ${v} → left of ${n.value}`, 'place');
        await pulse(fresh, 0x5cffb4, 420);
        log.say(`<span class="k">place</span> ${v} as left child of ${n.value}`);
        await stepperCheckpoint(`place ${v}`,
          async () => { await rebuildFrom(beforeSnap); });
        break;
      }
      path.push({node:n, dir:'left'});
      n = n.left;
    } else if (v > n.value){
      if (!n.right){
        const fresh = newNode(v);
        n.right = fresh; size++;
        path.push({node:n, dir:'right'});
        await relayout(true);
        cx.set(`attach ${v} → right of ${n.value}`, 'place');
        await pulse(fresh, 0x5cffb4, 420);
        log.say(`<span class="k">place</span> ${v} as right child of ${n.value}`);
        await stepperCheckpoint(`place ${v}`,
          async () => { await rebuildFrom(beforeSnap); });
        break;
      }
      path.push({node:n, dir:'right'});
      n = n.right;
    } else {
      log.say(`<span class="kx">dup</span> ${v} · already in tree`);
      return;
    }
  }
  // walk back up, re-balancing
  for (let i = path.length - 1; i >= 0; i--){
    const node = path[i].node;
    upd(node);
    const bf = BF(node);
    await pulse(node, 0xffb454, 200);
    cx.set(`check @ ${node.value} · bf=${bf>=0?'+':''}${bf}`, 'balance');
    if (Math.abs(bf) > 1){
      const parent = i > 0 ? path[i-1].node : null;
      const dir = parent ? (parent.left === node ? 'left' : 'right') : null;
      const oldVal = node.value;
      let newRoot, kind;
      if (bf > 1 && v < node.left.value){ kind='LL'; newRoot = rotR(node); }
      else if (bf < -1 && v > node.right.value){ kind='RR'; newRoot = rotL(node); }
      else if (bf > 1 && v > node.left.value){ kind='LR'; node.left = rotL(node.left); newRoot = rotR(node); }
      else if (bf < -1 && v < node.right.value){ kind='RL'; node.right = rotR(node.right); newRoot = rotL(node); }
      if (parent) parent[dir] = newRoot; else root = newRoot;
      path[i] = {node: newRoot, dir: path[i].dir};
      cx.set(`rotate ${kind} @ ${oldVal}`, 'O(1)');
      log.say(`<span class="km">rotate</span> ${kind} @ ${oldVal}`);
      await relayout(true);
      await pulse(newRoot, 0x7c5cff, 460);
      await stepperCheckpoint(`rotate ${kind} @ ${oldVal}`,
        async () => { await rebuildFrom(beforeSnap); });
    } else {
      await stepperCheckpoint(`balanced @ ${node.value}`,
        async () => { await rebuildFrom(beforeSnap); });
    }
  }
}

/* ─── step-by-step delete · walk down, then mutate + relayout ─── */
async function deleteStep(v){
  const beforeSnap = snapshotValues();
  // visualize descent
  let n = root, found = null;
  while (n){
    await pulse(n, 0xffb454, 220);
    cx.set(`visit ${n.value} · seek ${v}`, 'descend');
    await stepperCheckpoint(`visit ${n.value}`,
      async () => { await rebuildFrom(beforeSnap); });
    if (v === n.value){ found = n; break; }
    n = v < n.value ? n.left : n.right;
  }
  if (!found){
    log.say(`<span class="kx">delete</span> ${v} · not present`);
    cx.set('miss', '—'); return;
  }
  await pulse(found, 0xff5c70, 480);
  cx.set(`remove ${v} · then re-balance`, 'mutate');
  await stepperCheckpoint(`mark ${v} for removal`,
    async () => { await rebuildFrom(beforeSnap); });
  const trail = [];
  root = del(root, v, trail);
  await relayout(true);
  log.say(`<span class="ko">delete</span> ${v} · ${trail.filter(e=>e.type==='rot').length||0} rot`);
  // animate any rotations that happened (post-hoc pulse)
  for (const e of trail){
    if (e.type === 'rot'){
      log.say(`<span class="km">rebalance</span> ${e.kind} @ ${e.at}`);
      await stepperCheckpoint(`rebalance ${e.kind} @ ${e.at}`,
        async () => { await rebuildFrom(beforeSnap); });
    }
  }
}

const opHandlers = {
  insert: lock(async () => {
    const vals = readVals();
    history.push({type:'snapshot', values: snapshotValues()});
    cx.set('insert', 'O(log n)');
    for (const v of vals){
      await insertStep(v);
    }
    log.say(`<span class="k">insert</span> ${vals.length} value(s)`);
  }),
  delete: lock(async () => {
    const v = readVal(); if (v === null) return;
    history.push({type:'snapshot', values: snapshotValues()});
    cx.set('delete', 'O(log n)');
    await deleteStep(v);
  }),
  find: lock(async () => {
    const v = readVal(); if (v === null) return;
    cx.set('find — descending', 'O(log n)');
    let n = root, found = null;
    while (n){
      await pulse(n, 0xffb454, 200);
      cx.set(`visit ${n.value} · seek ${v}`, 'descend');
      await stepperCheckpoint(`visit ${n.value}`);
      if (v === n.value){ found = n; break; }
      n = v < n.value ? n.left : n.right;
    }
    if (found){ await pulse(found, 0x5cffb4, 700); log.say(`<span class="k">find</span>(${v}) → hit`); }
    else log.say(`<span class="kx">find</span>(${v}) → miss`);
    cx.set('find', 'O(log n)');
  }),
  min: lock(async () => {
    if (!root){ log.say(`<span class="kx">err</span> empty`); return; }
    cx.set('min', 'O(log n)');
    let n = root;
    while (n){ await pulse(n, 0x7c5cff, 200); await stepperCheckpoint(`at ${n.value}`); if (!n.left) break; n = n.left; }
    log.say(`<span class="k">min</span> → ${n.value}`);
  }),
  max: lock(async () => {
    if (!root){ log.say(`<span class="kx">err</span> empty`); return; }
    cx.set('max', 'O(log n)');
    let n = root;
    while (n){ await pulse(n, 0x7c5cff, 200); await stepperCheckpoint(`at ${n.value}`); if (!n.right) break; n = n.right; }
    log.say(`<span class="k">max</span> → ${n.value}`);
  }),
  inorder: lock(async () => {
    cx.set('in-order walk', 'O(n)');
    const out = [];
    async function walk(n){
      if (!n) return;
      await walk(n.left);
      await pulse(n, 0x35d0ff, 160);
      await stepperCheckpoint(`visit ${n.value}`);
      out.push(n.value);
      await walk(n.right);
    }
    await walk(root);
    log.say(`<span class="k">in-order</span> [ ${out.join(', ')} ]`);
  }),
  undo: lock(async () => {
    const op = history.pop();
    if (!op){ log.say(`<span class="kx">undo</span> empty`); return; }
    cx.set('undo · snapshot', '—');
    await rebuildFrom(op.values);
    log.say(`<span class="ko">undo</span> · restored ${op.values.length} keys`);
  }),
  clear: lock(async () => {
    history.push({type:'snapshot', values: snapshotValues()});
    await rebuildFrom([]);
    cx.set('clear', 'O(n)');
    log.say(`<span class="ko">clear</span>`);
  }),
};
for (const k in opHandlers) $('#op-'+k).addEventListener('click', opHandlers[k]);
$('#b-rand').addEventListener('click', () => $('#in-val').value = randomInt(1,99));

/* ─── preset toolbar ─── */
mountPresets({mount: $('#presets-mount'), label: 'defaults', presets:[
  {name:'empty',     desc:'no keys',                                          apply: () => rebuildFrom([])},
  {name:'LL trigger',desc:'[30, 20, 10] — single right rotation at root',     apply: () => rebuildFrom([30,20,10])},
  {name:'LR trigger',desc:'[30, 10, 20] — left-then-right rotation',          apply: () => rebuildFrom([30,10,20])},
  {name:'cascade',   desc:'[10..50, 25] — rotations cascade up the path',     apply: () => rebuildFrom([10,20,30,40,50,25])},
  {name:'big',       desc:'15 keys, fully balanced — height 4',               apply: () => rebuildFrom([50,25,75,10,40,60,90,5,15,35,45,55,65,85,95])},
]});

/* seed */
(async () => {
  for (const v of [40, 20, 60, 10, 30, 50, 70, 5, 15]){
    const t=[]; root = insert(root, v, t);
  }
  await relayout(false);
  history.clear(); refreshHUD();
  log.say(`<span class="k">init</span> ${size} keys`);
  cx.set('idle', '—');
})();
</script>
