<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>B-Tree — Data Structures Lab</title>
<link rel="stylesheet" href="lab.css" />
</head>
<body>
  <div class="frame">
    <header id="topbar" class="topbar"></header>

    <div class="lab-shell">
      <div class="stage" id="stage">
        <div class="stage-corner tl"></div><div class="stage-corner tr"></div>
        <div class="stage-corner bl"></div><div class="stage-corner br"></div>
        <div class="stage-overlay">
          <div class="row">
            <div class="stage-tag"><b>order t</b>&nbsp; <span id="t-order">3</span></div>
            <div class="stage-tag"><b>keys</b>&nbsp; <span id="t-size">0</span></div>
            <div class="stage-tag"><b>height</b>&nbsp; <span id="t-height">0</span></div>
          </div>
          <div class="row">
            <div class="stage-tag">multi-key nodes · 2t-1 = 5 max · splits propagate up</div>
          </div>
        </div>
      </div>

      <aside class="panel">
        <h2>Controls</h2>
        <div class="section-rule"></div>

        <div class="label">Value(s)</div>
        <div class="input-row">
          <input id="in-val" placeholder="e.g. 10  or  10,20,30" autocomplete="off" />
          <button class="ghost" id="b-rand">RND</button>
        </div>

        <div class="label mt-12">Operations</div>
        <div class="op-grid">
          <button class="op" data-color="cyan"    id="op-insert"><span class="name"><span class="dot"></span> insert</span><span class="cx">O(log n)</span></button>
          <button class="op" data-color="magenta" id="op-delete"><span class="name"><span class="dot"></span> delete</span><span class="cx">O(log n)</span></button>
          <button class="op" data-color="amber"   id="op-find"><span class="name"><span class="dot"></span> find</span><span class="cx">O(log n)</span></button>
          <button class="op" data-color="cyan"    id="op-inorder"><span class="name"><span class="dot"></span> in-order</span><span class="cx">O(n)</span></button>
          <button class="op full" data-color="lime"  id="op-undo"><span class="name"><span class="dot"></span> undo · last op</span><span class="cx" id="undo-depth">0</span></button>
          <button class="op full" data-color="amber" id="op-clear"><span class="name"><span class="dot"></span> clear</span><span class="cx">reset</span></button>
        </div>

        <div class="label mt-12">Complexity</div>
        <div id="cx-mount"></div>
      </aside>

      <div class="log" id="log"></div>
    </div>

    <footer class="statusbar">
      <span class="pill"><b>lab</b>&nbsp; 03 · b-tree (t=3)</span>
      <span class="pill"><b>renderer</b>&nbsp; three.js · WebGL</span>
      <span class="pill"><b>history</b>&nbsp; <span id="hist-pill">0</span></span>
    </footer>
  </div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import {$, createScene, createLog, createComplexityPanel, mountTopbar, createHistory,
        tween, tweenVec, sleep, parseNum, parseList, randomInt} from './lab.js';

mountTopbar({title:'B-Tree', sub:'lab 03 · multi-key tree'});
const log = createLog('#log');
const cx  = createComplexityPanel($('#cx-mount'), [
  {key:'min degree t', val:'3'},
  {key:'max keys / node', val:'2t-1 = 5'},
  {key:'min keys / node', val:'t-1 = 2 (non-root)'},
  {key:'insert / delete / find', val:'O(log n)'},
  {key:'space', val:'O(n)'},
]);
const history = createHistory();

const stage = $('#stage');
const {scene} = createScene({mount:stage, camera:{pos:[0, 5.5, 21], lookAt:[0, 1, 0]}});

const T = 3;
const MAX_K = 2*T - 1;  // 5
const MIN_K = T - 1;    // 2

let nextId = 0;
function newNode(leaf){ return {id:++nextId, keys:[], children:[], leaf, mesh:null, edgeUp:null}; }
let root = newNode(true);
let size = 0;

/* ─── B-tree ops (CLRS-style) ─── */
function search(n, k){
  let i = 0; while (i < n.keys.length && k > n.keys[i]) i++;
  if (i < n.keys.length && k === n.keys[i]) return {node:n, idx:i};
  if (n.leaf) return null;
  return search(n.children[i], k);
}
function splitChild(x, i){
  const y = x.children[i];
  const z = newNode(y.leaf);
  z.keys = y.keys.splice(T, T-1);
  if (!y.leaf) z.children = y.children.splice(T, T);
  x.children.splice(i+1, 0, z);
  const upKey = y.keys.pop();
  x.keys.splice(i, 0, upKey);
}
function insertNonFull(x, k){
  let i = x.keys.length - 1;
  if (x.leaf){
    while (i >= 0 && k < x.keys[i]) i--;
    x.keys.splice(i+1, 0, k);
  } else {
    while (i >= 0 && k < x.keys[i]) i--;
    i++;
    if (x.children[i].keys.length === MAX_K){
      splitChild(x, i);
      if (k > x.keys[i]) i++;
    }
    insertNonFull(x.children[i], k);
  }
}
function insertKey(k){
  if (search(root, k)) return false;
  if (root.keys.length === MAX_K){
    const s = newNode(false);
    s.children.push(root);
    root = s;
    splitChild(s, 0);
    insertNonFull(s, k);
  } else insertNonFull(root, k);
  size++;
  return true;
}

function predecessor(x, i){ let n = x.children[i]; while (!n.leaf) n = n.children[n.children.length-1]; return n.keys[n.keys.length-1]; }
function successor(x, i){ let n = x.children[i+1]; while (!n.leaf) n = n.children[0]; return n.keys[0]; }
function mergeChildren(x, i){
  const y = x.children[i], z = x.children[i+1];
  y.keys.push(x.keys[i]);
  y.keys.push(...z.keys);
  if (!y.leaf) y.children.push(...z.children);
  x.keys.splice(i, 1);
  x.children.splice(i+1, 1);
  return y;
}
function fill(x, i){
  const y = x.children[i];
  if (i !== 0 && x.children[i-1].keys.length >= T){
    const l = x.children[i-1];
    y.keys.unshift(x.keys[i-1]);
    if (!y.leaf) y.children.unshift(l.children.pop());
    x.keys[i-1] = l.keys.pop();
  } else if (i !== x.children.length-1 && x.children[i+1].keys.length >= T){
    const r = x.children[i+1];
    y.keys.push(x.keys[i]);
    if (!y.leaf) y.children.push(r.children.shift());
    x.keys[i] = r.keys.shift();
  } else {
    if (i !== x.children.length-1) mergeChildren(x, i);
    else mergeChildren(x, i-1);
  }
}
function deleteFromLeaf(x, i){ x.keys.splice(i, 1); }
function deleteFromInternal(x, i){
  const k = x.keys[i];
  if (x.children[i].keys.length >= T){
    const p = predecessor(x, i); x.keys[i] = p; deleteFromNode(x.children[i], p);
  } else if (x.children[i+1].keys.length >= T){
    const s = successor(x, i); x.keys[i] = s; deleteFromNode(x.children[i+1], s);
  } else { mergeChildren(x, i); deleteFromNode(x.children[i], k); }
}
function deleteFromNode(x, k){
  let i = 0; while (i < x.keys.length && x.keys[i] < k) i++;
  if (i < x.keys.length && x.keys[i] === k){
    if (x.leaf) deleteFromLeaf(x, i); else deleteFromInternal(x, i);
  } else {
    if (x.leaf) return false;
    const flag = (i === x.keys.length);
    if (x.children[i].keys.length < T) fill(x, i);
    if (flag && i > x.keys.length) deleteFromNode(x.children[i-1], k);
    else deleteFromNode(x.children[i], k);
  }
  return true;
}
function deleteKey(k){
  if (!search(root, k)) return false;
  deleteFromNode(root, k);
  if (root.keys.length === 0 && !root.leaf) root = root.children[0];
  size--;
  return true;
}

/* ─── visuals ─── */

const NODE_KEY_W = 1.05, NODE_H = 1.05;

function makeNodeMesh(node){
  const grp = new THREE.Group();
  return rebuildNodeMesh(node, grp);
}
function rebuildNodeMesh(node, grp){
  // clear existing children
  while (grp.children.length) grp.remove(grp.children[0]);
  const k = Math.max(1, node.keys.length);
  const width = k * NODE_KEY_W + 0.15;
  // backplate
  const bg = new THREE.Mesh(
    new THREE.BoxGeometry(width, NODE_H, 0.5),
    new THREE.MeshPhysicalMaterial({color: node.leaf ? 0x141c34 : 0x1a2548, metalness:0.55, roughness:0.25, emissive:0x0c1330, emissiveIntensity:0.6})
  );
  grp.add(bg);
  // outline
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(bg.geometry),
    new THREE.LineBasicMaterial({color: node.leaf ? 0xffb454 : 0xff5cab, transparent:true, opacity:0.7})
  );
  grp.add(edges);
  // key labels via sprite per key
  for (let i=0;i<node.keys.length;i++){
    const c = document.createElement('canvas'); c.width = 128; c.height = 128;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#ffffff'; ctx.font = '700 64px IBM Plex Mono, monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(String(node.keys[i]), 64, 64);
    const tex = new THREE.CanvasTexture(c); tex.minFilter = THREE.LinearFilter;
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true}));
    const x = (i - (node.keys.length - 1)/2) * NODE_KEY_W;
    spr.position.set(x, 0, 0.3); spr.scale.set(NODE_KEY_W*0.9, NODE_H*0.9, 1);
    grp.add(spr);
    // dividing tick
    if (i > 0){
      const tick = new THREE.Mesh(new THREE.BoxGeometry(0.02, NODE_H*0.7, 0.55), new THREE.MeshBasicMaterial({color:0x35d0ff, transparent:true, opacity:0.55}));
      tick.position.set(x - NODE_KEY_W/2, 0, 0.1); grp.add(tick);
    }
  }
  grp.userData = {width};
  return grp;
}

function makeEdge(){
  return new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1, 12), new THREE.MeshBasicMaterial({color:0xff5cab, transparent:true, opacity:0.55}));
}

function placeEdge(edge, ax, ay, bx, by){
  const dx = bx-ax, dy = by-ay;
  const len = Math.sqrt(dx*dx+dy*dy);
  edge.position.set((ax+bx)/2, (ay+by)/2, 0);
  edge.scale.y = len;
  edge.rotation.z = Math.atan2(dx, -dy);
}

function gather(n, depth, depthMap){
  if (!n) return;
  if (!depthMap[depth]) depthMap[depth] = [];
  depthMap[depth].push(n);
  for (const c of n.children) gather(c, depth+1, depthMap);
}

function ensureMeshes(){
  function walk(n){
    if (!n) return;
    if (!n.mesh){
      const grp = new THREE.Group();
      rebuildNodeMesh(n, grp);
      n.mesh = {grp};
      n.edgeUp = makeEdge(); n.edgeUp.visible = false;
      n.mesh.grp.scale.setScalar(0.001);
      scene.add(n.mesh.grp);
      scene.add(n.edgeUp);
    } else {
      rebuildNodeMesh(n, n.mesh.grp);
    }
    for (const c of n.children) walk(c);
  }
  walk(root);
}

function depth(n){ if (!n) return 0; return 1 + (n.children.length ? Math.max(...n.children.map(depth)) : 0); }

async function relayout(animate=true){
  ensureMeshes();
  const depthMap = {};
  gather(root, 0, depthMap);
  const tasks = [];
  const positions = new Map();
  for (const d in depthMap){
    const layer = depthMap[d];
    const total = layer.reduce((a,n) => a + n.mesh.grp.userData.width + 0.6, 0);
    let cursor = -total/2;
    for (const n of layer){
      const w = n.mesh.grp.userData.width;
      const x = cursor + w/2;
      cursor += w + 0.6;
      const y = -d * 2.4 + 3.0;
      positions.set(n, {x, y});
      tasks.push(tweenVec(n.mesh.grp.position, new THREE.Vector3(x, y, 0), animate?420:0));
      tasks.push(tweenVec(n.mesh.grp.scale, new THREE.Vector3(1,1,1), animate?320:0));
    }
  }
  // edges
  function walk(n, parent){
    if (!n) return;
    if (n.edgeUp){
      if (parent){
        const pp = positions.get(parent), pn = positions.get(n);
        n.edgeUp.visible = true; placeEdge(n.edgeUp, pp.x, pp.y, pn.x, pn.y);
      } else n.edgeUp.visible = false;
    }
    for (const c of n.children) walk(c, n);
  }
  walk(root, null);
  await Promise.all(tasks);
  refreshHUD();
}

function refreshHUD(){
  $('#t-size').textContent = size;
  $('#t-height').textContent = depth(root);
  $('#undo-depth').textContent = history.size();
  $('#hist-pill').textContent = history.size();
}

async function pulse(node, color=0x5cffb4, ms=260){
  if (!node || !node.mesh) return;
  const m = node.mesh.grp.children[0].material;
  const eOld = m.emissive.clone(), iOld = m.emissiveIntensity;
  m.emissive.setHex(color); m.emissiveIntensity = 1.3;
  await sleep(ms);
  m.emissive.copy(eOld); m.emissiveIntensity = iOld;
}

/* ─── ops ─── */
let busy = false;
function lock(fn){ return async (...a) => { if (busy) return; busy=true; try{ await fn(...a); } finally{ busy=false; refreshHUD(); } }; }

function readVals(){
  const list = parseList($('#in-val').value);
  if (!list.length){ const v=randomInt(1,99); $('#in-val').value=v; return [v]; }
  return list;
}
function readVal(){ const v = parseNum($('#in-val').value, null); if (v===null){ log.say(`<span class="kx">err</span> number required`); return null; } return v; }

function snapshotValues(){
  const out = [];
  (function walk(n){ if (!n) return; for (let i=0;i<n.keys.length;i++){ if (n.children[i]) walk(n.children[i]); out.push(n.keys[i]); } if (n.children.length) walk(n.children[n.children.length-1]); })(root);
  return out;
}
async function rebuildFrom(values){
  function purge(n){ if (!n) return; if (n.mesh){ scene.remove(n.mesh.grp); scene.remove(n.edgeUp); } for (const c of n.children) purge(c); }
  purge(root);
  root = newNode(true); size = 0;
  for (const v of values) insertKey(v);
  await relayout(false);
}

const opHandlers = {
  insert: lock(async () => {
    const vals = readVals();
    history.push({type:'snapshot', values:snapshotValues()});
    cx.set('insert', 'O(log n)');
    for (const v of vals){
      const ok = insertKey(v);
      await relayout(true);
      // pulse path
      let n = root;
      while (n){
        let i = 0; while (i<n.keys.length && v > n.keys[i]) i++;
        await pulse(n, 0xffb454, 120);
        if (i<n.keys.length && n.keys[i]===v){ await pulse(n, 0x5cffb4, 320); break; }
        if (n.leaf) break;
        n = n.children[i];
      }
      log.say(ok ? `<span class="k">insert</span> ${v}` : `<span class="kx">dup</span> ${v}`);
    }
  }),
  delete: lock(async () => {
    const v = readVal(); if (v===null) return;
    history.push({type:'snapshot', values:snapshotValues()});
    cx.set('delete', 'O(log n)');
    const ok = deleteKey(v);
    await relayout(true);
    log.say(ok ? `<span class="ko">delete</span> ${v}` : `<span class="kx">delete</span> ${v} · not present`);
  }),
  find: lock(async () => {
    const v = readVal(); if (v===null) return;
    cx.set('find — descend', 'O(log n)');
    let n = root;
    while (n){
      let i = 0; while (i<n.keys.length && v > n.keys[i]) i++;
      await pulse(n, 0xffb454, 200);
      if (i<n.keys.length && n.keys[i]===v){ await pulse(n, 0x5cffb4, 700); log.say(`<span class="k">find</span>(${v}) → hit`); return; }
      if (n.leaf) break;
      n = n.children[i];
    }
    log.say(`<span class="kx">find</span>(${v}) → miss`);
  }),
  inorder: lock(async () => {
    cx.set('in-order', 'O(n)');
    const out = [];
    async function walk(n){
      if (!n) return;
      for (let i=0;i<n.keys.length;i++){
        if (n.children[i]) await walk(n.children[i]);
        out.push(n.keys[i]);
      }
      if (n.children.length > n.keys.length) await walk(n.children[n.children.length-1]);
      await pulse(n, 0x35d0ff, 120);
    }
    await walk(root);
    log.say(`<span class="k">in-order</span> [ ${out.join(', ')} ]`);
  }),
  undo: lock(async () => {
    const op = history.pop(); if (!op){ log.say(`<span class="kx">undo</span> empty`); return; }
    await rebuildFrom(op.values);
    cx.set('undo · snapshot', '—');
    log.say(`<span class="ko">undo</span> · ${op.values.length} keys`);
  }),
  clear: lock(async () => {
    history.push({type:'snapshot', values:snapshotValues()});
    await rebuildFrom([]);
    log.say(`<span class="ko">clear</span>`);
  }),
};
for (const k in opHandlers) $('#op-'+k).addEventListener('click', opHandlers[k]);
$('#b-rand').addEventListener('click', () => $('#in-val').value = randomInt(1,99));

/* seed */
(async () => {
  for (const v of [10,20,5,6,12,30,7,17,3,25,35,40,45,50,8]) insertKey(v);
  await relayout(false);
  history.clear(); refreshHUD();
  log.say(`<span class="k">init</span> ${size} keys`);
  cx.set('idle', '—');
})();
</script>
</body>
</html>
