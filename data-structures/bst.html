<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Binary Search Tree — Data Structures Lab</title>
<link rel="stylesheet" href="lab.css" />
</head>
<body>
  <div class="frame">
    <header id="topbar" class="topbar"><a class="btn-back" href="index.html" style="text-decoration:none"><span class="arrow">&#8592;</span> labs</a></header>

    <div class="lab-shell">
      <div class="stage" id="stage">
        <div class="stage-corner tl"></div><div class="stage-corner tr"></div>
        <div class="stage-corner bl"></div><div class="stage-corner br"></div>
        <div class="stage-overlay">
          <div class="row">
            <div class="stage-tag"><b>root</b>&nbsp; <span id="t-root">∅</span></div>
            <div class="stage-tag"><b>size</b>&nbsp; <span id="t-size">0</span></div>
            <div class="stage-tag"><b>height</b>&nbsp; <span id="t-height">0</span></div>
          </div>
          <div class="row">
            <div class="stage-tag">plain BST · degenerates on sorted input</div>
          </div>
        </div>
      </div>

      <aside class="panel">
        <h2>Controls</h2>
        <div class="section-rule"></div>

        <div class="label">Value(s)</div>
        <div class="input-row">
          <input id="in-val" placeholder="e.g. 10  or  1,2,3,4 (try sorted)" autocomplete="off" />
          <button class="ghost" id="b-rand">RND</button>
        </div>

        <div class="label mt-12">Operations</div>
        <div class="op-grid">
          <button class="op" data-color="cyan"    id="op-insert"><span class="name"><span class="dot"></span> insert</span><span class="cx">avg O(log n)</span></button>
          <button class="op" data-color="magenta" id="op-delete"><span class="name"><span class="dot"></span> delete</span><span class="cx">avg O(log n)</span></button>
          <button class="op" data-color="amber"   id="op-find"><span class="name"><span class="dot"></span> find</span><span class="cx">avg O(log n)</span></button>
          <button class="op" data-color="cyan"    id="op-inorder"><span class="name"><span class="dot"></span> in-order</span><span class="cx">O(n)</span></button>
          <button class="op full" data-color="lime"  id="op-undo"><span class="name"><span class="dot"></span> undo · last op</span><span class="cx" id="undo-depth">0</span></button>
          <button class="op full" data-color="amber" id="op-clear"><span class="name"><span class="dot"></span> clear</span><span class="cx">reset</span></button>
        </div>

        <div class="label mt-12">Complexity</div>
        <div id="cx-mount"></div>
      </aside>

      <div class="log" id="log"></div>
    </div>

    <footer class="statusbar">
      <span class="pill"><b>lab</b>&nbsp; 09 · BST (unbalanced)</span>
      <span class="pill"><b>renderer</b>&nbsp; three.js · WebGL</span>
      <span class="pill"><b>history</b>&nbsp; <span id="hist-pill">0</span></span>
    </footer>
  </div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

/* ─── inlined lab runtime ─── */
/* ─────────────────────────────────────────────────────────────
   shared lab runtime
   ───────────────────────────────────────────────────────────── */

const PALETTE = {
  void:    0x05060d,
  ink:     0xe6ecff,
  inkDim:  0x8b93b8,
  cyan:    0x35d0ff,
  amber:   0xffb454,
  magenta: 0xff5cab,
  violet:  0x7c5cff,
  lime:    0xb9ff5c,
  err:     0xff5c70,
  ok:      0x5cffb4,
};

/* ─── small DOM helpers ─── */
const $  = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for (const k in attrs){
    if (k === 'class') n.className = attrs[k];
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), attrs[k]);
    else n.setAttribute(k, attrs[k]);
  }
  for (const c of kids){
    if (c == null) continue;
    n.appendChild(c.nodeType ? c : document.createTextNode(c));
  }
  return n;
};

/* ─── three.js scene wrapper ─── */
function createScene({mount, camera = {pos:[0,4,18], lookAt:[0,0,0]}}){
  const w = mount.clientWidth, h = mount.clientHeight;
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x04050b, 26, 90);

  const cam = new THREE.PerspectiveCamera(45, w/h, 0.1, 200);
  cam.position.set(...camera.pos);
  cam.lookAt(new THREE.Vector3(...camera.lookAt));

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, h, false);
  renderer.setClearColor(0x000000, 0);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  mount.appendChild(renderer.domElement);

  // lighting
  const amb = new THREE.AmbientLight(0xb8c4ff, 0.55);
  scene.add(amb);
  const key = new THREE.DirectionalLight(0xffffff, 1.05);
  key.position.set(5, 10, 8);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0x35d0ff, 0.45);
  rim.position.set(-8, 4, -6);
  scene.add(rim);
  const mag = new THREE.PointLight(0xff5cab, 0.65, 40);
  mag.position.set(-6, 2, 6);
  scene.add(mag);

  // starfield (very subtle)
  {
    const g = new THREE.BufferGeometry();
    const N = 320, arr = new Float32Array(N*3);
    for (let i=0;i<N;i++){
      arr[i*3]   = (Math.random()-0.5)*120;
      arr[i*3+1] = (Math.random()-0.5)*80 + 8;
      arr[i*3+2] = (Math.random()-0.5)*120 - 20;
    }
    g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
    const m = new THREE.PointsMaterial({color:0x9aa6d6, size:0.05, transparent:true, opacity:0.45});
    scene.add(new THREE.Points(g, m));
  }

  // floor: large faint disc + radial grid
  {
    const disc = new THREE.Mesh(
      new THREE.CircleGeometry(60, 64),
      new THREE.MeshBasicMaterial({color:0x0a0e1c, transparent:true, opacity:0.65, side:THREE.DoubleSide})
    );
    disc.rotation.x = -Math.PI/2;
    disc.position.y = -3.5;
    scene.add(disc);
    const grid = new THREE.GridHelper(80, 40, 0x35d0ff, 0x1a2240);
    grid.material.opacity = 0.18; grid.material.transparent = true;
    grid.position.y = -3.49;
    scene.add(grid);
  }

  // camera drift
  const drift = {t:0, base: cam.position.clone(), enabled:true};
  function tick(){
    drift.t += 0.0035;
    if (drift.enabled){
      cam.position.x = drift.base.x + Math.sin(drift.t*0.7)*0.55;
      cam.position.y = drift.base.y + Math.cos(drift.t*0.5)*0.25;
      cam.lookAt(0, camera.lookAt[1], camera.lookAt[2]);
    }
    renderer.render(scene, cam);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // resize
  const onResize = () => {
    const W = mount.clientWidth, H = mount.clientHeight;
    cam.aspect = W/H; cam.updateProjectionMatrix();
    renderer.setSize(W, H, false);
  };
  window.addEventListener('resize', onResize);

  return {scene, cam, renderer, drift};
}

/* ─── small tween util ─── */
function tween(obj, prop, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = obj[prop];
    const t0 = performance.now();
    function step(now){
      const k = Math.min(1, (now-t0)/ms);
      obj[prop] = from + (to - from)*ease(k);
      if (k<1) requestAnimationFrame(step); else res();
    }
    requestAnimationFrame(step);
  });
}
function tweenVec(vec, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = vec.clone();
    const t0 = performance.now();
    function step(now){
      const k = Math.min(1, (now-t0)/ms);
      vec.lerpVectors(from, to, ease(k));
      if (k<1) requestAnimationFrame(step); else res();
    }
    requestAnimationFrame(step);
  });
}
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const easeInOutCubic = t => t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ─── undo stack ─── */
function createHistory(){
  const stack = [];
  return {
    push(snapshot){ stack.push(snapshot); },
    pop(){ return stack.pop(); },
    size(){ return stack.length; },
    clear(){ stack.length = 0; },
  };
}

/* ─── on-screen log ─── */
function createLog(mountSel='#log'){
  const root = typeof mountSel === 'string' ? $(mountSel) : mountSel;
  const list = el('div', {class:'log-list'});
  root.appendChild(el('h3', {}, 'Trace'));
  root.appendChild(list);
  function fmtTime(){
    const d = new Date();
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
  }
  return {
    say(html){
      const row = el('div', {class:'entry'},
        el('span', {class:'t'}, fmtTime()),
        el('span', {class:'e', html})
      );
      list.prepend(row);
      while (list.childElementCount > 80) list.lastElementChild.remove();
    },
    clear(){ list.innerHTML = ''; },
  };
}

/* ─── complexity readout ─── */
function createComplexityPanel(mount, rows){
  const wrap = el('div', {class:'cx-panel'});
  for (const r of rows){
    wrap.appendChild(el('div', {class:'cx-row'},
      el('span', {class:'key'}, r.key),
      el('span', {class:'val'}, r.val)
    ));
  }
  const now = el('div', {class:'cx-now'},
    el('span', {html:'<span class="badge"></span><span class="now-text">idle</span>'}),
    el('span', {class:'now-cx', html:'&nbsp;'})
  );
  wrap.appendChild(now);
  mount.appendChild(wrap);
  return {
    set(opLabel, cx){
      now.querySelector('.now-text').textContent = opLabel;
      now.querySelector('.now-cx').innerHTML = cx;
    },
  };
}

/* ─── wire back button + clock ─── */
function mountTopbar({title, sub, back='index.html'}){
  const root = $('#topbar');
  if (!root) return;
  root.innerHTML = '';
  root.appendChild(el('a', {class:'btn-back', href:back, 'aria-label':'Back to labs'},
    el('span', {class:'arrow', html:'&#8592;'}), 'labs'));
  root.appendChild(el('div', {class:'brand'},
    el('div', {class:'brand-mark'}),
    el('div', {},
      el('div', {class:'brand-title'}, title),
      el('div', {class:'brand-sub'}, sub),
    )
  ));
  root.appendChild(el('div', {class:'spacer'}));
  const clock = el('div', {class:'stage-tag'}, '');
  root.appendChild(clock);
  const tick = () => {
    const d = new Date();
    clock.innerHTML = `<b>T</b>&nbsp; ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  };
  tick(); setInterval(tick, 1000);
}

/* ─── input parsing util ─── */
function parseNum(str, fallback=null){
  if (str == null || str === '') return fallback;
  const n = Number(str);
  if (Number.isFinite(n)) return n;
  return fallback;
}
function parseList(str){
  if (!str) return [];
  return String(str).split(/[,\s]+/).filter(Boolean).map(Number).filter(Number.isFinite);
}
function randomInt(a, b){ return a + Math.floor(Math.random()*(b-a+1)); }

/* ─── end runtime ─── */


mountTopbar({title:'Binary Search Tree', sub:'lab 09 · unbalanced'});
const log = createLog('#log');
const cx  = createComplexityPanel($('#cx-mount'), [
  {key:'insert / find / delete (avg)', val:'O(log n)'},
  {key:'insert / find / delete (worst)', val:'O(n)'},
  {key:'in-order traversal', val:'O(n)'},
  {key:'space', val:'O(n)'},
  {key:'compare to', val:'AVL · self-balancing'},
]);
const history = createHistory();

const stage = $('#stage');
const {scene} = createScene({mount:stage, camera:{pos:[0, 5, 18], lookAt:[0, 1, 0]}});

let root = null; let size = 0;
function newNode(v){ return {value:v, left:null, right:null, mesh:null, edgeUp:null}; }
function insertK(v){
  function go(n){ if (!n){ size++; return newNode(v); }
    if (v < n.value) n.left = go(n.left);
    else if (v > n.value) n.right = go(n.right);
    return n;
  }
  root = go(root);
}
function deleteK(v){
  function minNode(n){ while (n.left) n = n.left; return n; }
  function go(n){ if (!n) return null;
    if (v < n.value) n.left = go(n.left);
    else if (v > n.value) n.right = go(n.right);
    else {
      size--;
      if (!n.left) return n.right;
      if (!n.right) return n.left;
      const m = minNode(n.right);
      n.value = m.value; size++; n.right = go(n.right);
    }
    return n;
  }
  root = go(root);
}
function findK(v){ let n = root; while (n){ if (v === n.value) return n; n = v < n.value ? n.left : n.right; } return null; }
function depth(n){ return n ? 1 + Math.max(depth(n.left), depth(n.right)) : 0; }
function inorderArr(){ const out=[]; (function w(n){ if(!n) return; w(n.left); out.push(n.value); w(n.right); })(root); return out; }

function makeMesh(v){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.6, 24, 18),
    new THREE.MeshPhysicalMaterial({color:0x1a2440, metalness:0.55, roughness:0.18, emissive:0x0c1428, emissiveIntensity:0.7, clearcoat:0.6})
  );
  grp.add(body);
  const wire = new THREE.Mesh(
    new THREE.SphereGeometry(0.61, 12, 8),
    new THREE.MeshBasicMaterial({color:0xb9ff5c, wireframe:true, transparent:true, opacity:0.45})
  );
  grp.add(wire);
  const c = document.createElement('canvas'); c.width=128; c.height=128;
  const ctx = c.getContext('2d');
  ctx.fillStyle='#fff'; ctx.font='700 56px IBM Plex Mono, monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(String(v), 64, 64);
  const tex = new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true}));
  spr.position.set(0, 1.3, 0); spr.scale.set(1.1, 1.1, 1);
  grp.add(spr);
  grp.scale.setScalar(0.001);
  scene.add(grp);
  return {grp, body};
}
function makeEdge(){
  const e = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1, 12), new THREE.MeshBasicMaterial({color:0x35d0ff, transparent:true, opacity:0.55}));
  e.visible=false; scene.add(e); return e;
}
function placeEdge(edge, ax,ay,bx,by){
  const dx=bx-ax, dy=by-ay; const len=Math.sqrt(dx*dx+dy*dy);
  edge.position.set((ax+bx)/2, (ay+by)/2, 0); edge.scale.y=len; edge.rotation.z = Math.atan2(dx, -dy);
}

function ensureMeshes(n){
  if (!n) return;
  if (!n.mesh){ n.mesh = makeMesh(n.value); n.edgeUp = makeEdge(); }
  ensureMeshes(n.left); ensureMeshes(n.right);
}

function computeLayout(){
  const idx = {}, st = {k:0};
  (function inO(n){ if(!n) return; inO(n.left); idx[n.value]=st.k++; inO(n.right); })(root);
  const n = st.k;
  const map = new Map();
  (function walk(node, d){ if(!node) return; const x = (idx[node.value] - (n-1)/2) * Math.max(1.7, 5 - 0.3*d); const y = -d*2.2 + 2.8; map.set(node, {x,y}); walk(node.left, d+1); walk(node.right, d+1); })(root, 0);
  return map;
}

async function relayout(animate=true){
  ensureMeshes(root);
  const map = computeLayout();
  const tasks = [];
  (function walk(n, parent){
    if (!n) return;
    const p = map.get(n);
    if (p){
      tasks.push(tweenVec(n.mesh.grp.position, new THREE.Vector3(p.x, p.y, 0), animate?420:0));
      tasks.push(tweenVec(n.mesh.grp.scale, new THREE.Vector3(1,1,1), animate?320:0));
      if (parent){ const pp = map.get(parent); n.edgeUp.visible = true; placeEdge(n.edgeUp, pp.x, pp.y, p.x, p.y); }
      else n.edgeUp.visible = false;
    }
    walk(n.left, n); walk(n.right, n);
  })(root, null);
  await Promise.all(tasks);
  refreshHUD();
}

function refreshHUD(){
  $('#t-root').textContent = root ? root.value : '∅';
  $('#t-size').textContent = size;
  $('#t-height').textContent = depth(root);
  $('#undo-depth').textContent = history.size();
  $('#hist-pill').textContent = history.size();
}

async function pulse(n, color=0xb9ff5c, ms=240){
  if (!n || !n.mesh) return;
  const m = n.mesh.body.material;
  const eOld = m.emissive.clone(), iOld = m.emissiveIntensity;
  m.emissive.setHex(color); m.emissiveIntensity = 1.3;
  await sleep(ms);
  m.emissive.copy(eOld); m.emissiveIntensity = iOld;
}

let busy = false;
function lock(fn){ return async (...a) => { if (busy) return; busy=true; try{ await fn(...a); } finally{ busy=false; refreshHUD(); } }; }
function readVals(){ const list = parseList($('#in-val').value); if (!list.length){ const v=randomInt(1,99); $('#in-val').value=v; return [v]; } return list; }
function readVal(){ const v = parseNum($('#in-val').value, null); if (v===null){ log.say(`<span class="kx">err</span> number required`); return null; } return v; }
function snapshotValues(){ return inorderArr(); }
async function rebuildFrom(values){
  (function purge(n){ if (!n) return; if (n.mesh) scene.remove(n.mesh.grp); if (n.edgeUp) scene.remove(n.edgeUp); purge(n.left); purge(n.right); })(root);
  root = null; size = 0; for (const v of values) insertK(v);
  await relayout(false);
}

const opHandlers = {
  insert: lock(async () => {
    const vals = readVals();
    history.push({type:'snapshot', values: snapshotValues()});
    for (const v of vals){ insertK(v); await relayout(true); log.say(`<span class="k">insert</span> ${v}`); }
    cx.set('insert', `avg O(log n) · h=${depth(root)}`);
  }),
  delete: lock(async () => {
    const v = readVal(); if (v===null) return;
    history.push({type:'snapshot', values: snapshotValues()});
    deleteK(v); await relayout(true);
    cx.set('delete', 'avg O(log n)');
    log.say(`<span class="ko">delete</span> ${v}`);
  }),
  find: lock(async () => {
    const v = readVal(); if (v===null) return;
    cx.set('find — descend', `worst O(h=${depth(root)})`);
    let n = root, found = null;
    while (n){ await pulse(n, 0xffb454, 200); if (v===n.value){ found = n; break; } n = v < n.value ? n.left : n.right; }
    if (found){ await pulse(found, 0x5cffb4, 700); log.say(`<span class="k">find</span>(${v}) → hit`); }
    else log.say(`<span class="kx">find</span>(${v}) → miss`);
  }),
  inorder: lock(async () => {
    cx.set('in-order', 'O(n)');
    const out = [];
    async function walk(n){ if (!n) return; await walk(n.left); await pulse(n, 0x35d0ff, 130); out.push(n.value); await walk(n.right); }
    await walk(root);
    log.say(`<span class="k">in-order</span> [ ${out.join(', ')} ]`);
  }),
  undo: lock(async () => {
    const op = history.pop(); if (!op){ log.say(`<span class="kx">undo</span> empty`); return; }
    await rebuildFrom(op.values);
    cx.set('undo · snapshot', '—');
    log.say(`<span class="ko">undo</span>`);
  }),
  clear: lock(async () => {
    history.push({type:'snapshot', values: snapshotValues()});
    await rebuildFrom([]);
    log.say(`<span class="ko">clear</span>`);
  }),
};
for (const k in opHandlers) $('#op-'+k).addEventListener('click', opHandlers[k]);
$('#b-rand').addEventListener('click', () => $('#in-val').value = randomInt(1,99));

/* seed */
(async () => {
  for (const v of [40, 20, 60, 10, 30, 50, 70, 5, 15]) insertK(v);
  await relayout(false);
  history.clear(); refreshHUD();
  log.say(`<span class="k">init</span> ${size} keys · h=${depth(root)}`);
  cx.set('idle', '—');
})();
</script>
</body>
</html>
