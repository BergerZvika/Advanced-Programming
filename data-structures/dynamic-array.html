import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

/* ─── inlined lab runtime ─── */
/* ─────────────────────────────────────────────────────────────
   shared lab runtime
   ───────────────────────────────────────────────────────────── */

const PALETTE = {
  void:    0x05060d,
  ink:     0xe6ecff,
  inkDim:  0x8b93b8,
  cyan:    0x35d0ff,
  amber:   0xffb454,
  magenta: 0xff5cab,
  violet:  0x7c5cff,
  lime:    0xb9ff5c,
  err:     0xff5c70,
  ok:      0x5cffb4,
};

/* ─── small DOM helpers ─── */
const $  = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for (const k in attrs){
    if (k === 'class') n.className = attrs[k];
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), attrs[k]);
    else n.setAttribute(k, attrs[k]);
  }
  for (const c of kids){
    if (c == null) continue;
    n.appendChild(c.nodeType ? c : document.createTextNode(c));
  }
  return n;
};

/* ─── three.js scene wrapper ─── */
function createScene({mount, camera = {pos:[0,4,18], lookAt:[0,0,0]}}){
  const w = mount.clientWidth, h = mount.clientHeight;
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x04050b, 26, 90);

  const cam = new THREE.PerspectiveCamera(45, w/h, 0.1, 200);
  cam.position.set(...camera.pos);
  cam.lookAt(new THREE.Vector3(...camera.lookAt));

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, h, false);
  renderer.setClearColor(0x000000, 0);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  mount.appendChild(renderer.domElement);

  // lighting
  const amb = new THREE.AmbientLight(0xb8c4ff, 0.55);
  scene.add(amb);
  const key = new THREE.DirectionalLight(0xffffff, 1.05);
  key.position.set(5, 10, 8);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0x35d0ff, 0.45);
  rim.position.set(-8, 4, -6);
  scene.add(rim);
  const mag = new THREE.PointLight(0xff5cab, 0.65, 40);
  mag.position.set(-6, 2, 6);
  scene.add(mag);

  // starfield (very subtle)
  {
    const g = new THREE.BufferGeometry();
    const N = 320, arr = new Float32Array(N*3);
    for (let i=0;i<N;i++){
      arr[i*3]   = (Math.random()-0.5)*120;
      arr[i*3+1] = (Math.random()-0.5)*80 + 8;
      arr[i*3+2] = (Math.random()-0.5)*120 - 20;
    }
    g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
    const m = new THREE.PointsMaterial({color:0x9aa6d6, size:0.05, transparent:true, opacity:0.45});
    scene.add(new THREE.Points(g, m));
  }

  // floor: large faint disc + radial grid
  {
    const disc = new THREE.Mesh(
      new THREE.CircleGeometry(60, 64),
      new THREE.MeshBasicMaterial({color:0x0a0e1c, transparent:true, opacity:0.65, side:THREE.DoubleSide})
    );
    disc.rotation.x = -Math.PI/2;
    disc.position.y = -3.5;
    scene.add(disc);
    const grid = new THREE.GridHelper(80, 40, 0x35d0ff, 0x1a2240);
    grid.material.opacity = 0.18; grid.material.transparent = true;
    grid.position.y = -3.49;
    scene.add(grid);
  }

  // camera drift
  const drift = {t:0, base: cam.position.clone(), enabled:true};
  function tick(){
    drift.t += 0.0035;
    if (drift.enabled){
      cam.position.x = drift.base.x + Math.sin(drift.t*0.7)*0.55;
      cam.position.y = drift.base.y + Math.cos(drift.t*0.5)*0.25;
      cam.lookAt(0, camera.lookAt[1], camera.lookAt[2]);
    }
    renderer.render(scene, cam);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // resize
  const onResize = () => {
    const W = mount.clientWidth, H = mount.clientHeight;
    cam.aspect = W/H; cam.updateProjectionMatrix();
    renderer.setSize(W, H, false);
  };
  window.addEventListener('resize', onResize);

  return {scene, cam, renderer, drift};
}

/* ─── stepper · pause/play/fast-forward ─── */
const stepper = {
  paused: false,
  resume: null,    // resolver for in-flight pause
  speed: 1,        // 1 = normal, >1 = faster
  fastForward: false,  // if true, next sleep returns immediately
  checkpoints: [], // {label, undo: async () => void}
  onState: null,   // callback(state) for UI updates
};
function stepperKick(){
  if (stepper.resume){ const r = stepper.resume; stepper.resume = null; r(); }
}
function stepperPlay(){ stepper.paused = false; stepperKick(); stepper.onState && stepper.onState('playing'); }
function stepperPause(){ stepper.paused = true; stepper.onState && stepper.onState('paused'); }
function stepperToggle(){ stepper.paused ? stepperPlay() : stepperPause(); }
function stepperFastForward(){ stepper.fastForward = true; stepperKick(); }
export async function stepperCheckpoint(label, undoFn){
  if (undoFn) stepper.checkpoints.push({label, undo:undoFn});
  if (stepper.onState) stepper.onState(label);
  if (stepper.paused){
    await new Promise(r => stepper.resume = r);
  }
}
export async function stepperUndo(){
  const cp = stepper.checkpoints.pop();
  if (!cp) return false;
  if (stepper.onState) stepper.onState('undo · '+cp.label);
  await cp.undo();
  return true;
}
function stepperClear(){ stepper.checkpoints.length = 0; }

/* ─── small tween util · pause-aware ─── */
function tween(obj, prop, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = obj[prop];
    let t0 = performance.now(), pausedAt = 0, totalPause = 0;
    function step(now){
      if (stepper.paused){
        if (!pausedAt) pausedAt = now;
        requestAnimationFrame(step); return;
      }
      if (pausedAt){ totalPause += now - pausedAt; pausedAt = 0; }
      const elapsed = (now - t0 - totalPause) * stepper.speed;
      const k = stepper.fastForward ? 1 : Math.min(1, elapsed/ms);
      obj[prop] = from + (to - from)*ease(k);
      if (k<1) requestAnimationFrame(step); else { stepper.fastForward = false; res(); }
    }
    requestAnimationFrame(step);
  });
}
function tweenVec(vec, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = vec.clone();
    let t0 = performance.now(), pausedAt = 0, totalPause = 0;
    function step(now){
      if (stepper.paused){
        if (!pausedAt) pausedAt = now;
        requestAnimationFrame(step); return;
      }
      if (pausedAt){ totalPause += now - pausedAt; pausedAt = 0; }
      const elapsed = (now - t0 - totalPause) * stepper.speed;
      const k = stepper.fastForward ? 1 : Math.min(1, elapsed/ms);
      vec.lerpVectors(from, to, ease(k));
      if (k<1) requestAnimationFrame(step); else { stepper.fastForward = false; res(); }
    }
    requestAnimationFrame(step);
  });
}
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const easeInOutCubic = t => t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
export async function sleep(ms){
  let remaining = ms;
  while (remaining > 0){
    if (stepper.paused){ await new Promise(r => stepper.resume = r); }
    if (stepper.fastForward){ stepper.fastForward = false; return; }
    const chunk = Math.min(remaining, 32);
    await new Promise(r => setTimeout(r, chunk / Math.max(0.1, stepper.speed)));
    remaining -= chunk;
  }
}

/* ─── undo stack ─── */
function createHistory(){
  const stack = [];
  return {
    push(snapshot){ stack.push(snapshot); },
    pop(){ return stack.pop(); },
    size(){ return stack.length; },
    clear(){ stack.length = 0; },
  };
}

/* ─── on-screen log ─── */
function createLog(mountSel='#log'){
  const root = typeof mountSel === 'string' ? $(mountSel) : mountSel;
  const list = el('div', {class:'log-list'});
  root.appendChild(el('h3', {}, 'Trace'));
  root.appendChild(list);
  function fmtTime(){
    const d = new Date();
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
  }
  return {
    say(html){
      const row = el('div', {class:'entry'},
        el('span', {class:'t'}, fmtTime()),
        el('span', {class:'e', html})
      );
      list.prepend(row);
      while (list.childElementCount > 80) list.lastElementChild.remove();
    },
    clear(){ list.innerHTML = ''; },
  };
}

      el('span', {class:'key'}, r.key),

    el('span', {class:'now-cx', html:'&nbsp;'})
  );
  wrap.appendChild(now);
  mount.appendChild(wrap);
  return {
    set(opLabel, cx){
      now.querySelector('.now-text').textContent = opLabel;

/* ─── player UI · play/pause/back/forward ─── */
function mountPlayer({mount, onBack}){
  const root = typeof mount === 'string' ? $(mount) : mount;
  if (!root) return null;
  const playBtn  = el('button', {class:'pl-btn pl-play',  title:'play / pause (Space)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'});
  const pauseBtn = el('button', {class:'pl-btn pl-pause hidden', title:'pause (Space)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>'});
  const backBtn  = el('button', {class:'pl-btn',  title:'step backward (←)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M6 6h2v12H6zM20 6 9 12l11 6z"/></svg>'});
  const fwdBtn   = el('button', {class:'pl-btn',  title:'skip to end of step (→)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M16 6h2v12h-2zM4 6l11 6L4 18z"/></svg>'});
  const speedBtn = el('button', {class:'pl-btn pl-speed', title:'cycle speed'}, '1×');
  const status   = el('div', {class:'pl-status'}, 'idle');
  const bar = el('div', {class:'pl-bar'}, backBtn, playBtn, pauseBtn, fwdBtn, speedBtn, status);
  root.appendChild(bar);

  function setMode(playing){
    if (playing){ playBtn.classList.add('hidden'); pauseBtn.classList.remove('hidden'); }
    else        { playBtn.classList.remove('hidden'); pauseBtn.classList.add('hidden'); }
  }
  setMode(false);  // start as "play" icon visible (i.e., paused/idle look)

  // wire
  playBtn .addEventListener('click', () => { stepperPlay();  setMode(true); });
  pauseBtn.addEventListener('click', () => { stepperPause(); setMode(false); });
  fwdBtn  .addEventListener('click', () => { stepperFastForward(); });
  backBtn .addEventListener('click', async () => {
    const ok = await stepperUndo();
    if (!ok && onBack) onBack();   // fall back to lab's op-undo if checkpoints empty
  });
  const SPEEDS = [1, 1.5, 2, 0.5];
  let si = 0;
  speedBtn.addEventListener('click', () => {
    si = (si + 1) % SPEEDS.length; stepper.speed = SPEEDS[si]; speedBtn.textContent = SPEEDS[si] + '×';
  });

  // status updates
  stepper.onState = (label) => { status.textContent = String(label || 'idle').slice(0, 38); };

  // keyboard
  window.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space'){ e.preventDefault(); stepperToggle(); setMode(!stepper.paused); }
    else if (e.code === 'ArrowRight'){ stepperFastForward(); }
    else if (e.code === 'ArrowLeft'){ backBtn.click(); }
  });

  return {setMode, status};
}

/* ─── input parsing util ─── */
function parseNum(str, fallback=null){
  if (str == null || str === '') return fallback;
  const n = Number(str);
  if (Number.isFinite(n)) return n;
  return fallback;
}
function parseList(str){
  if (!str) return [];
  return String(str).split(/[,\s]+/).filter(Boolean).map(Number).filter(Number.isFinite);
}
function randomInt(a, b){ return a + Math.floor(Math.random()*(b-a+1)); }
/* ─── end runtime ─── */


mountTopbar({title:'Dynamic Array', sub:'lab 01 · amortized growth'});
const log = createLog('#log');
const cx  = createComplexityPanel($('#cx-mount'), [
  {key:'random access', val:'O(1)'},
  {key:'push (amortized)', val:'O(1)'},
  {key:'push (worst)', val:'O(n) on resize'},
  {key:'insert @ index', val:'O(n)'},
  {key:'remove @ index', val:'O(n)'},
  {key:'space', val:'O(n)'},
]);
const history = createHistory();

const stage = $('#stage');
const {scene} = createScene({mount:stage, camera:{pos:[0, 5, 16], lookAt:[0, 0, 0]}});

const CELL_W = 1.55, CELL_H = 1.55, CELL_D = 1.55, GAP = 0.15, Y = 0;
let capacity = 0;
const cells = [];  // {value|null, mesh, label}
const slots = [];  // visualisation: empty cells when capacity > size

function targetX(i, n){
  return (i - (n-1)/2) * (CELL_W + GAP);
}

function makeCell(value, filled){
  const grp = new THREE.Group();
  const mat = new THREE.MeshPhysicalMaterial({
    color: filled ? 0x1e2540 : 0x0d1226,
    metalness: 0.55, roughness: 0.25,
    emissive: filled ? 0x0c1830 : 0x080a14, emissiveIntensity: filled ? 0.7 : 0.2,
  });
  const body = new THREE.Mesh(new THREE.BoxGeometry(CELL_W, CELL_H, CELL_D, 1,1,1), mat);
  grp.add(body);

  // outline
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(body.geometry),
    new THREE.LineBasicMaterial({color: filled ? 0x35d0ff : 0x2a3a60, transparent:true, opacity: filled ? 0.85 : 0.55})
  );
  grp.add(edges);

  // sprite
  const c = document.createElement('canvas'); c.width=256; c.height=128;
  const ctx = c.getContext('2d');
  function paint(v, idx){
    ctx.clearRect(0,0,256,128);
    if (v != null){
      ctx.fillStyle = '#ffffff';
      ctx.font = '700 56px IBM Plex Mono, monospace';
      ctx.textAlign = 'center'; ctx.textBaseline='middle';
      ctx.fillText(String(v), 128, 56);
    }
    ctx.fillStyle = '#8b93b8';
    ctx.font = '500 22px IBM Plex Mono, monospace';
    ctx.textAlign='center';
    ctx.fillText('['+idx+']', 128, 104);
  }
  paint(value, 0);
  const tex = new THREE.CanvasTexture(c); tex.minFilter = THREE.LinearFilter;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true}));
  spr.position.set(0, CELL_H/2 + 0.9, 0); spr.scale.set(2.4, 1.2, 1);
  grp.add(spr);

  return {grp, body, mat, edges, label:{paint, tex, c, ctx}};
}

function setCellValue(cell, value, idx){
  cell.value = value;
  const filled = value != null;
  cell.label.paint(value, idx);
  cell.label.tex.needsUpdate = true;
  cell.mat.color.setHex(filled ? 0x1e2540 : 0x0d1226);
  cell.mat.emissive.setHex(filled ? 0x0c1830 : 0x080a14);
  cell.mat.emissiveIntensity = filled ? 0.7 : 0.2;
  cell.edges.material.color.setHex(filled ? 0x35d0ff : 0x2a3a60);
  cell.edges.material.opacity = filled ? 0.85 : 0.55;
}

function refreshHUD(){
  const sz = cells.length;
  $('#t-size').textContent = sz;
  $('#t-cap').textContent = capacity;
  $('#t-load').textContent = capacity ? Math.round(100*sz/capacity)+'%' : '0%';
  $('#undo-depth').textContent = history.size();
  $('#hist-pill').textContent = history.size();
  // relabel indices in case
  for (let i=0;i<cells.length;i++){ cells[i].label.paint(cells[i].value, i); cells[i].label.tex.needsUpdate=true; }
  for (let i=0;i<slots.length;i++){ slots[i].label.paint(null, cells.length + i); slots[i].label.tex.needsUpdate=true; }
}

async function relayout(animate=true){
  const total = capacity;
  const all = cells.concat(slots);
  await Promise.all(all.map((c, i) => {
    return tweenVec(c.grp.position, new THREE.Vector3(targetX(i, total), Y, 0), animate?420:0);
  }));
  refreshHUD();
}

async function ensureCapacity(min){
  if (capacity >= min) return false;
  // capacity doubling
  const newCap = Math.max(4, capacity*2 || 4, min);
  cx.set('resize · copy', `O(n) · cap ${capacity}→${newCap}`);
  log.say(`<span class="km">resize</span> capacity ${capacity} → ${newCap}`);

  // add empty slots to current array, then re-center
  const added = newCap - capacity;
  for (let i=0;i<added;i++){
    const c = makeCell(null, false);
    c.value = null;
    c.grp.position.set(targetX(capacity + slots.length, newCap), Y + 4, -3);
    c.grp.scale.setScalar(0.01);
    scene.add(c.grp);
    slots.push(c);
  }
  capacity = newCap;
  // grow new slots in
  await Promise.all(slots.slice(-added).map(s => tweenVec(s.grp.scale, new THREE.Vector3(1,1,1), 380)));
  await relayout(true);
  return true;
}

let busy = false;
function lock(fn){ return async (...a) => { if (busy) return; busy=true; try{ await fn(...a); } finally{ busy=false; refreshHUD(); } }; }

async function pulse(cell, color=0xb9ff5c){
  cell.mat.emissive.setHex(color); cell.mat.emissiveIntensity = 1.3;
  await sleep(220);
  cell.mat.emissiveIntensity = cell.value != null ? 0.7 : 0.2;
  cell.mat.emissive.setHex(cell.value != null ? 0x0c1830 : 0x080a14);
}

async function pushBack(value){
  if (cells.length >= capacity){
    await ensureCapacity(cells.length + 1);
  }
  // promote first slot into cells
  const slot = slots.shift();
  setCellValue(slot, value, cells.length);
  cells.push(slot);
  await relayout(true);
  await pulse(slot, 0x35d0ff);
}

async function popBack(){
  if (!cells.length) return null;
  const cell = cells.pop();
  const value = cell.value;
  // animate up & fade then convert to empty slot
  await pulse(cell, 0xff5c70);
  setCellValue(cell, null, cells.length);
  // append to slot list at the appropriate position (capacity unchanged)
  slots.unshift(cell);
  await relayout(true);
  return value;
}

async function insertAt(idx, value){
  if (cells.length >= capacity){ await ensureCapacity(cells.length + 1); }
  // shift right: animate values rightward by 1 (re-label) while sliding cells visually
  for (let i = cells.length; i > idx; i--){
    // we'll move cell[i-1] to position i, then make a new "empty" cell at idx
  }
  // simpler: introduce a fresh cell from above into pos idx; the old cell at idx moves to idx+1 by re-layout
  const slot = slots.shift();
  setCellValue(slot, value, idx);
  cells.splice(idx, 0, slot);
  // visually slot starts above; drop in
  slot.grp.position.set(targetX(idx, capacity), Y + 4, -3);
  slot.grp.scale.setScalar(0.01);
  await tweenVec(slot.grp.scale, new THREE.Vector3(1,1,1), 320);
  await relayout(true);
  await pulse(slot, 0xffb454);
}

async function removeAt(idx){
  if (idx < 0 || idx >= cells.length) return null;
  const cell = cells[idx];
  const v = cell.value;
  await pulse(cell, 0xff5c70);
  cells.splice(idx, 1);
  setCellValue(cell, null, cells.length);
  slots.unshift(cell);
  await relayout(true);
  return v;
}

async function reserveCap(target){
  if (target <= capacity){ log.say(`<span class="kx">reserve</span> already ≥ ${target}`); return; }
  await ensureCapacity(target);
}

async function shrinkFit(){
  if (slots.length === 0) return;
  log.say(`<span class="km">shrink-fit</span> cap ${capacity} → ${cells.length}`);
  // animate slots up and out
  await Promise.all(slots.map(s => tweenVec(s.grp.scale, new THREE.Vector3(0.01,0.01,0.01), 380)));
  for (const s of slots) scene.remove(s.grp);
  slots.length = 0;
  capacity = cells.length;
  await relayout(true);
}

const opHandlers = {
  push: lock(async () => {
    const v = readNum(true); if (v === null) return;
    const before = {cap: capacity, size: cells.length};
    history.push({type:'pop', preCap: before.cap});
    cx.set('push', 'O(1) amortized');
    await pushBack(v);
    log.say(`<span class="k">push</span> ${v}`);
  }),
  pop: lock(async () => {
    if (!cells.length){ log.say(`<span class="kx">err</span> empty`); return; }
    history.push({type:'push', value: cells[cells.length-1].value});
    const v = await popBack();
    cx.set('pop', 'O(1)');
    log.say(`<span class="ko">pop</span> → ${v}`);
  }),
  insertAt: lock(async () => {
    const v = readNum(true); if (v === null) return;
    const i = parseNum($('#in-idx').value, null);
    if (i === null || i < 0 || i > cells.length){ log.say(`<span class="kx">err</span> index out of range`); return; }
    history.push({type:'removeAt', idx:i});
    cx.set('insert @ index', 'O(n) shift');
    await insertAt(i, v);
    log.say(`<span class="k">insertAt</span>(<span class="km">${i}</span>, ${v})`);
  }),
  removeAt: lock(async () => {
    const i = parseNum($('#in-idx').value, null);
    if (i === null || i < 0 || i >= cells.length){ log.say(`<span class="kx">err</span> index out of range`); return; }
    history.push({type:'insertAt', idx:i, value: cells[i].value});
    cx.set('remove @ index', 'O(n) shift');
    const v = await removeAt(i);
    log.say(`<span class="ko">removeAt</span>(<span class="km">${i}</span>) → ${v}`);
  }),
  get: lock(async () => {
    const i = parseNum($('#in-idx').value, null);
    if (i === null || i < 0 || i >= cells.length){ log.say(`<span class="kx">err</span> index out of range`); return; }
    cx.set('get @ index', 'O(1)');
    await pulse(cells[i], 0x5cffb4);
    log.say(`<span class="k">get</span>(${i}) → <span class="km">${cells[i].value}</span>`);
  }),
  set: lock(async () => {
    const v = readNum(true); if (v === null) return;
    const i = parseNum($('#in-idx').value, null);
    if (i === null || i < 0 || i >= cells.length){ log.say(`<span class="kx">err</span> index out of range`); return; }
    history.push({type:'set', idx:i, value: cells[i].value});
    cx.set('set @ index', 'O(1)');
    setCellValue(cells[i], v, i);
    await pulse(cells[i], 0x35d0ff);
    log.say(`<span class="k">set</span>(${i}, ${v})`);
  }),
  reserve: lock(async () => {
    const v = parseNum($('#in-val').value, null);
    if (v === null || v < 0){ log.say(`<span class="kx">err</span> reserve needs a positive number in the Value field`); return; }
    history.push({type:'reserve', preCap: capacity});
    cx.set('reserve', 'O(n)');
    await reserveCap(v);
    log.say(`<span class="k">reserve</span>(${v})`);
  }),
  shrink: lock(async () => {
    history.push({type:'shrink', preCap: capacity});
    cx.set('shrink-fit', 'O(n)');
    await shrinkFit();
  }),
  undo: lock(async () => {
    const op = history.pop();
    if (!op){ log.say(`<span class="kx">undo</span> history empty`); return; }
    cx.set(`undo · ${op.type}`, '—');
    if (op.type === 'pop'){ await popBack(); }
    else if (op.type === 'push'){ await pushBack(op.value); }
    else if (op.type === 'removeAt'){ await removeAt(op.idx); }
    else if (op.type === 'insertAt'){ await insertAt(op.idx, op.value); }
    else if (op.type === 'set'){ setCellValue(cells[op.idx], op.value, op.idx); refreshHUD(); }
    else if (op.type === 'reserve'){ /* cannot truly shrink mid-resize; leave cap */ log.say(`<span class="ko">undo</span> reserve · cap kept`); }
    else if (op.type === 'shrink'){ /* cannot un-shrink without history */ }
    else if (op.type === 'clear'){ for (const v of op.values) await pushBack(v); }
    log.say(`<span class="ko">undo</span> ${op.type}`);
  }),
  clear: lock(async () => {
    if (!cells.length) return;
    history.push({type:'clear', values: cells.map(c=>c.value)});
    while (cells.length) await popBack();
    cx.set('clear', 'O(n)');
    log.say(`<span class="ko">clear</span>`);
  }),
};
for (const k in opHandlers) $('#op-'+k).addEventListener('click', opHandlers[k]);
$('#b-rand').addEventListener('click', () => $('#in-val').value = randomInt(1,99));

function readNum(allowAuto){
  const raw = $('#in-val').value.trim();
  if (raw === ''){ if (!allowAuto) return null; const v = randomInt(1,99); $('#in-val').value = v; return v; }
  const n = Number(raw); return Number.isFinite(n) ? n : null;
}

/* seed */
(async () => {
  await ensureCapacity(4);
  for (const v of [3, 7, 9]) await pushBack(v);
  history.clear();
  refreshHUD();
  log.say(`<span class="k">init</span> cap=4 size=3`);
  cx.set('idle', '—');
})();
</script>
