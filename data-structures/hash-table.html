/* ─── small DOM helpers ─── */
const $  = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for (const k in attrs){
    if (k === 'class') n.className = attrs[k];
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), attrs[k]);
    else n.setAttribute(k, attrs[k]);
  }
  for (const c of kids){
    if (c == null) continue;
    n.appendChild(c.nodeType ? c : document.createTextNode(c));
  }
  return n;
};

/* ─── three.js scene wrapper ─── */
function createScene({mount, camera = {pos:[0,4,18], lookAt:[0,0,0]}}){
  const w = mount.clientWidth, h = mount.clientHeight;
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x04050b, 26, 90);

  const cam = new THREE.PerspectiveCamera(45, w/h, 0.1, 200);
  cam.position.set(...camera.pos);
  cam.lookAt(new THREE.Vector3(...camera.lookAt));

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, h, false);
  renderer.setClearColor(0x000000, 0);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  mount.appendChild(renderer.domElement);

  // lighting
  const amb = new THREE.AmbientLight(0xb8c4ff, 0.55);
  scene.add(amb);
  const key = new THREE.DirectionalLight(0xffffff, 1.05);
  key.position.set(5, 10, 8);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0x35d0ff, 0.45);
  rim.position.set(-8, 4, -6);
  scene.add(rim);
  const mag = new THREE.PointLight(0xff5cab, 0.65, 40);
  mag.position.set(-6, 2, 6);
  scene.add(mag);

  // starfield (very subtle)
  {
    const g = new THREE.BufferGeometry();
    const N = 320, arr = new Float32Array(N*3);
    for (let i=0;i<N;i++){
      arr[i*3]   = (Math.random()-0.5)*120;
      arr[i*3+1] = (Math.random()-0.5)*80 + 8;
      arr[i*3+2] = (Math.random()-0.5)*120 - 20;
    }
    g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
    const m = new THREE.PointsMaterial({color:0x9aa6d6, size:0.05, transparent:true, opacity:0.45});
    scene.add(new THREE.Points(g, m));
  }

  // floor: large faint disc + radial grid
  {
    const disc = new THREE.Mesh(
      new THREE.CircleGeometry(60, 64),
      new THREE.MeshBasicMaterial({color:0x0a0e1c, transparent:true, opacity:0.65, side:THREE.DoubleSide})
    );
    disc.rotation.x = -Math.PI/2;
    disc.position.y = -3.5;
    scene.add(disc);
    const grid = new THREE.GridHelper(80, 40, 0x35d0ff, 0x1a2240);
    grid.material.opacity = 0.18; grid.material.transparent = true;
    grid.position.y = -3.49;
    scene.add(grid);
  }

  // camera drift
  const drift = {t:0, base: cam.position.clone(), enabled:true};
  function tick(){
    drift.t += 0.0035;
    if (drift.enabled){
      cam.position.x = drift.base.x + Math.sin(drift.t*0.7)*0.55;
      cam.position.y = drift.base.y + Math.cos(drift.t*0.5)*0.25;
      cam.lookAt(0, camera.lookAt[1], camera.lookAt[2]);
    }
    renderer.render(scene, cam);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // resize
  const onResize = () => {
    const W = mount.clientWidth, H = mount.clientHeight;
    cam.aspect = W/H; cam.updateProjectionMatrix();
    renderer.setSize(W, H, false);
  };
  window.addEventListener('resize', onResize);

  return {scene, cam, renderer, drift};
}

/* ─── stepper · pause/play/fast-forward ─── */
const stepper = {
  paused: false,
  resume: null,    // resolver for in-flight pause
  speed: 1,        // 1 = normal, >1 = faster
  fastForward: false,  // if true, next sleep returns immediately
  checkpoints: [], // {label, undo: async () => void}
  onState: null,   // callback(state) for UI updates
};
function stepperKick(){
  if (stepper.resume){ const r = stepper.resume; stepper.resume = null; r(); }
}
function stepperPlay(){ stepper.paused = false; stepperKick(); stepper.onState && stepper.onState('playing'); }
function stepperPause(){ stepper.paused = true; stepper.onState && stepper.onState('paused'); }
function stepperToggle(){ stepper.paused ? stepperPlay() : stepperPause(); }
function stepperFastForward(){ stepper.fastForward = true; stepperKick(); }
export async function stepperCheckpoint(label, undoFn){
  if (undoFn) stepper.checkpoints.push({label: label || '', undo:undoFn});
  // only clobber the status text if a label was given; otherwise leave whatever
  // cx.set / the current op already put there
  if (label != null && stepper.onState) stepper.onState(label);
  if (stepper.paused){
    await new Promise(r => stepper.resume = r);
  }
}
export async function stepperUndo(){
  const cp = stepper.checkpoints.pop();
  if (!cp) return false;
  if (stepper.onState) stepper.onState('undo · '+cp.label);
  await cp.undo();
  return true;
}
function stepperClear(){ stepper.checkpoints.length = 0; }

/* ─── small tween util · pause-aware ─── */
function tween(obj, prop, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = obj[prop];
    let t0 = performance.now(), pausedAt = 0, totalPause = 0;
    function step(now){
      if (stepper.paused){
        if (!pausedAt) pausedAt = now;
        requestAnimationFrame(step); return;
      }
      if (pausedAt){ totalPause += now - pausedAt; pausedAt = 0; }
      const elapsed = (now - t0 - totalPause) * stepper.speed;
      const k = stepper.fastForward ? 1 : Math.min(1, elapsed/ms);
      obj[prop] = from + (to - from)*ease(k);
      if (k<1) requestAnimationFrame(step); else { stepper.fastForward = false; res(); }
    }
    requestAnimationFrame(step);
  });
}
function tweenVec(vec, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = vec.clone();
    let t0 = performance.now(), pausedAt = 0, totalPause = 0;
    function step(now){
      if (stepper.paused){
        if (!pausedAt) pausedAt = now;
        requestAnimationFrame(step); return;
      }
      if (pausedAt){ totalPause += now - pausedAt; pausedAt = 0; }
      const elapsed = (now - t0 - totalPause) * stepper.speed;
      const k = stepper.fastForward ? 1 : Math.min(1, elapsed/ms);
      vec.lerpVectors(from, to, ease(k));
      if (k<1) requestAnimationFrame(step); else { stepper.fastForward = false; res(); }
    }
    requestAnimationFrame(step);
  });
}
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const easeInOutCubic = t => t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
export async function sleep(ms){
  let remaining = ms;
  while (remaining > 0){
    if (stepper.paused){ await new Promise(r => stepper.resume = r); }
    if (stepper.fastForward){ stepper.fastForward = false; return; }
    const chunk = Math.min(remaining, 32);
    await new Promise(r => setTimeout(r, chunk / Math.max(0.1, stepper.speed)));
    remaining -= chunk;
  }
}

/* ─── undo stack ─── */
function createHistory(){
  const stack = [];
  return {
    push(snapshot){ stack.push(snapshot); },
    pop(){ return stack.pop(); },
    size(){ return stack.length; },
    clear(){ stack.length = 0; },
  };
}

/* ─── on-screen log ─── */
function createLog(mountSel='#log'){
  const root = typeof mountSel === 'string' ? $(mountSel) : mountSel;
  const list = el('div', {class:'log-list'});
  root.appendChild(el('h3', {}, 'Trace'));
  root.appendChild(list);
  function fmtTime(){
    const d = new Date();
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
  }
  return {
    say(html){
      const row = el('div', {class:'entry'},
        el('span', {class:'t'}, fmtTime()),
        el('span', {class:'e', html})
      );
      list.prepend(row);
      while (list.childElementCount > 80) list.lastElementChild.remove();
    },
    clear(){ list.innerHTML = ''; },
  };
}

/* ─── player UI · play/pause/back/forward ─── */
function mountPlayer({mount, onBack}){
  const root = typeof mount === 'string' ? $(mount) : mount;
  if (!root) return null;
  const playBtn  = el('button', {class:'pl-btn pl-play',  title:'play / pause (Space)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'});
  const pauseBtn = el('button', {class:'pl-btn pl-pause hidden', title:'pause (Space)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>'});
  const backBtn  = el('button', {class:'pl-btn',  title:'step backward (←)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M6 6h2v12H6zM20 6 9 12l11 6z"/></svg>'});
  const fwdBtn   = el('button', {class:'pl-btn',  title:'skip to end of step (→)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M16 6h2v12h-2zM4 6l11 6L4 18z"/></svg>'});
  const speedBtn = el('button', {class:'pl-btn pl-speed', title:'cycle speed'}, '1×');
  const status   = el('div', {class:'pl-status'}, 'idle');
  const bar = el('div', {class:'pl-bar'}, backBtn, playBtn, pauseBtn, fwdBtn, speedBtn, status);
  root.appendChild(bar);

  function setMode(playing){
    if (playing){ playBtn.classList.add('hidden'); pauseBtn.classList.remove('hidden'); }
    else        { playBtn.classList.remove('hidden'); pauseBtn.classList.add('hidden'); }
  }
  setMode(false);  // start as "play" icon visible (i.e., paused/idle look)

  // wire
  playBtn .addEventListener('click', () => { stepperPlay();  setMode(true); });
  pauseBtn.addEventListener('click', () => { stepperPause(); setMode(false); });
  fwdBtn  .addEventListener('click', () => { stepperFastForward(); });
  backBtn .addEventListener('click', async () => {
    const ok = await stepperUndo();
    if (!ok && onBack) onBack();   // fall back to lab's op-undo if checkpoints empty
  });
  const SPEEDS = [1, 1.5, 2, 0.5];
  let si = 0;
  speedBtn.addEventListener('click', () => {
    si = (si + 1) % SPEEDS.length; stepper.speed = SPEEDS[si]; speedBtn.textContent = SPEEDS[si] + '×';
  });

  // status updates
  stepper.onState = (label) => { status.textContent = String(label || 'idle').slice(0, 38); };

  // keyboard
  window.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space'){ e.preventDefault(); stepperToggle(); setMode(!stepper.paused); }
    else if (e.code === 'ArrowRight'){ stepperFastForward(); }
    else if (e.code === 'ArrowLeft'){ backBtn.click(); }
  });

  return {setMode, status};
}

/* ─── input parsing util ─── */
function parseNum(str, fallback=null){
  if (str == null || str === '') return fallback;
  const n = Number(str);
  if (Number.isFinite(n)) return n;
  return fallback;
}
function parseList(str){
  if (!str) return [];
  return String(str).split(/[,\s]+/).filter(Boolean).map(Number).filter(Number.isFinite);
}
function randomInt(a, b){ return a + Math.floor(Math.random()*(b-a+1)); }
/* ─── end runtime ─── */


mountTopbar({title:'Hash Table', sub:'lab 05 · chained'});
const log = createLog('#log');
mountPlayer({mount: $('#player-mount'), onBack: () => $('#op-undo')?.click()});
const cx  = createComplexityPanel($('#cx-mount'), [
  {key:'insert / find / delete (avg)', val:'O(1)'},
  {key:'insert / find / delete (worst)', val:'O(n)'},
  {key:'resize · rehash', val:'O(n)'},
  {key:'space', val:'O(n + m)'},
]);
const history = createHistory();

const stage = $('#stage');
const {scene} = createScene({mount:stage, camera:{pos:[2, 4, 18], lookAt:[2, 0, 0]}});

let M = 8;
let table = Array.from({length:M}, () => []);
let size = 0;

const bucketMeshes = [];
const nodeMeshes = new Map();  // key -> {grp, body, label}
const linkMeshes = [];

const BUCKET_W = 1.6, BUCKET_H = 0.9, BUCKET_Z = 0.5;
const BUCKET_GAP_Y = 1.05;
const CHAIN_GAP_X  = 1.6;

function bucketPos(i){
  return {x: -7, y: -(i * BUCKET_GAP_Y) + (M-1)*BUCKET_GAP_Y/2};
}
function nodePos(b, k){
  const p = bucketPos(b);
  return {x: p.x + 1.8 + k * CHAIN_GAP_X, y: p.y};
}

function makeBucketMesh(i){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(BUCKET_W, BUCKET_H, BUCKET_Z),
    new THREE.MeshPhysicalMaterial({color:0x10182c, metalness:0.6, roughness:0.25, emissive:0x0c1230, emissiveIntensity:0.55})
  );
  grp.add(body);
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(body.geometry),
    new THREE.LineBasicMaterial({color:0x35d0ff, transparent:true, opacity:0.65})
  );
  grp.add(edges);
  // label
  const c = document.createElement('canvas'); c.width=256; c.height=128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#35d0ff'; ctx.font='600 30px IBM Plex Mono, monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(`bucket ${i}`, 128, 64);
  const tex = new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true}));
  spr.position.set(0, 0, 0.3); spr.scale.set(BUCKET_W*0.92, BUCKET_H*0.92, 1);
  grp.add(spr);
  const p = bucketPos(i);
  grp.position.set(p.x, p.y, 0);
  scene.add(grp);
  return {grp, body};
}

function makeNodeMesh(key){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.46, 24, 18),
    new THREE.MeshPhysicalMaterial({color:0x182240, metalness:0.55, roughness:0.18, emissive:0x081428, emissiveIntensity:0.7, clearcoat:0.6})
  );
  grp.add(body);
  const wire = new THREE.Mesh(
    new THREE.SphereGeometry(0.47, 12, 8),
    new THREE.MeshBasicMaterial({color:0xff5cab, wireframe:true, transparent:true, opacity:0.45})
  );
  grp.add(wire);
  // label
  const c = document.createElement('canvas'); c.width=128; c.height=128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.font='700 56px IBM Plex Mono, monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(String(key), 64, 64);
  const tex = new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true}));
  spr.position.set(0, 0, 0.5); spr.scale.set(0.9, 0.9, 1);
  grp.add(spr);

  grp.scale.setScalar(0.001);
  scene.add(grp);
  return {grp, body};
}

function makeLink(){
  const m = new THREE.Mesh(
    new THREE.CylinderGeometry(0.03, 0.03, 1, 12),
    new THREE.MeshBasicMaterial({color:0xff5cab, transparent:true, opacity:0.55})
  );
  m.visible = false; scene.add(m);
  return m;
}
function placeLink(link, ax, ay, bx, by){
  const dx=bx-ax, dy=by-ay; const len=Math.sqrt(dx*dx+dy*dy);
  link.position.set((ax+bx)/2, (ay+by)/2, 0);
  link.scale.y = len; link.rotation.z = Math.atan2(dx, -dy);
}

function rebuildBuckets(){
  for (const b of bucketMeshes) scene.remove(b.grp);
  bucketMeshes.length = 0;
  for (let i=0;i<M;i++) bucketMeshes.push(makeBucketMesh(i));
}

async function relayout(animate=true){
  // ensure node meshes for keys present
  const tasks = [];
  // remove orphan node meshes
  const liveKeys = new Set();
  for (const chain of table) for (const k of chain) liveKeys.add(k);
  for (const [k, m] of nodeMeshes){
    if (!liveKeys.has(k)){ scene.remove(m.grp); nodeMeshes.delete(k); }
  }
  // ensure existing
  for (const chain of table) for (const k of chain){
    if (!nodeMeshes.has(k)) nodeMeshes.set(k, makeNodeMesh(k));
  }
  // pool links
  while (linkMeshes.length < 64) linkMeshes.push(makeLink());
  for (const l of linkMeshes) l.visible = false;

  let linkI = 0;
  for (let i=0;i<M;i++){
    const chain = table[i];
    for (let k=0;k<chain.length;k++){
      const mesh = nodeMeshes.get(chain[k]);
      const p = nodePos(i, k);
      tasks.push(tweenVec(mesh.grp.position, new THREE.Vector3(p.x, p.y, 0), animate?420:0));
      tasks.push(tweenVec(mesh.grp.scale, new THREE.Vector3(1,1,1), animate?320:0));
      // link
      const bp = bucketPos(i);
      const prevX = k === 0 ? bp.x + BUCKET_W/2 : nodePos(i, k-1).x + 0.46;
      const ay = bp.y;
      const link = linkMeshes[linkI++]; link.visible = true;
      placeLink(link, prevX + 0.1, ay, p.x - 0.46, ay);
    }
  }
  await Promise.all(tasks);
  refreshHUD();
}

function refreshHUD(){
  $('#t-cap').textContent = M;
  $('#t-size').textContent = size;
  $('#t-load').textContent = (size/M).toFixed(2);
  $('#undo-depth').textContent = history.size();
  $('#hist-pill').textContent = history.size();
}

function hash(k){ return ((Number(k) % M) + M) % M; }

async function pulseBucket(i, color=0x35d0ff){
  const m = bucketMeshes[i].body.material;
  const eOld = m.emissive.clone(), iOld = m.emissiveIntensity;
  m.emissive.setHex(color); m.emissiveIntensity = 1.2;
  await sleep(220);
  m.emissive.copy(eOld); m.emissiveIntensity = iOld;
}
async function pulseNode(k, color=0xffb454){
  const m = nodeMeshes.get(k); if (!m) return;
  const mat = m.body.material;
  const eOld = mat.emissive.clone(), iOld = mat.emissiveIntensity;
  mat.emissive.setHex(color); mat.emissiveIntensity = 1.3;
  await sleep(240);
  mat.emissive.copy(eOld); mat.emissiveIntensity = iOld;
}

async function probe(k, action){
  const b = hash(k);
  cx.set(`${action} ${k} · hash → bucket ${b}`, 'avg O(1)');
  await pulseBucket(b, 0x35d0ff);
  await stepperCheckpoint();
  const chain = table[b];
  for (let i=0;i<chain.length;i++){
    cx.set(`walk chain @ [${i}] · key ${chain[i]}`, 'O(chain)');
    await pulseNode(chain[i], 0xffb454);
    await stepperCheckpoint();
    if (chain[i] === k){
      cx.set(`hit ${k} · bucket ${b}, idx ${i}`, 'O(1)');
      await pulseNode(chain[i], 0x5cffb4);
      await stepperCheckpoint();
      return {bucket:b, idx:i};
    }
  }
  cx.set(`miss ${k} · scanned ${chain.length}`, 'O(chain)');
  return {bucket:b, idx:-1};
}

async function insertKey(k){
  const b = hash(k);
  await pulseBucket(b, 0x35d0ff);
  await stepperCheckpoint();
  const chain = table[b];
  if (chain.includes(k)){ log.say(`<span class="kx">dup</span> ${k}`); return false; }
  chain.push(k); size++;
  if (!nodeMeshes.has(k)) nodeMeshes.set(k, makeNodeMesh(k));
  await relayout(true);
  await pulseNode(k, 0x5cffb4);
  await stepperCheckpoint();
  return true;
}

async function deleteKey(k){
  const p = await probe(k, 'delete');
  if (p.idx < 0) return false;
  table[p.bucket].splice(p.idx, 1); size--;
  const m = nodeMeshes.get(k);
  if (m){
    await tweenVec(m.grp.scale, new THREE.Vector3(0.001,0.001,0.001), 280);
    scene.remove(m.grp); nodeMeshes.delete(k);
  }
  await relayout(true);
  return true;
}

async function rehash(newM){
  cx.set('rehash · 2×', 'O(n)');
  const oldVals = table.flat();
  M = newM;
  table = Array.from({length:M}, () => []);
  rebuildBuckets();
  for (const k of oldVals){ table[hash(k)].push(k); }
  await relayout(false);
  log.say(`<span class="km">rehash</span> m → ${M}`);
}

let busy = false;
function lock(fn){ return async (...a) => { if (busy) return; busy=true; try{ await fn(...a); } finally{ busy=false; refreshHUD(); } }; }

function readVals(){
  const list = parseList($('#in-val').value);
  if (!list.length){ const v=randomInt(1,99); $('#in-val').value=v; return [v]; }
  return list;
}

const opHandlers = {
  insert: lock(async () => {
    const vals = readVals();
    history.push({type:'snapshot', M, table: table.map(c=>c.slice())});
    for (const v of vals){
      const ok = await insertKey(v);
      log.say(ok ? `<span class="k">insert</span> ${v} · h=${hash(v)}` : `<span class="kx">dup</span> ${v}`);
      if (size/M >= 0.75){
        log.say(`<span class="km">load α=${(size/M).toFixed(2)} ≥ 0.75</span> · auto-rehash`);
        await rehash(M*2);
      }
    }
    cx.set('insert', 'avg O(1)');
  }),
  find: lock(async () => {
    const vals = readVals();
    for (const v of vals){
      const p = await probe(v, 'find');
      log.say(p.idx >= 0 ? `<span class="k">find</span>(${v}) → bucket ${p.bucket}, idx ${p.idx}` : `<span class="kx">find</span>(${v}) → miss (bucket ${p.bucket})`);
    }
  }),
  delete: lock(async () => {
    const vals = readVals();
    history.push({type:'snapshot', M, table: table.map(c=>c.slice())});
    for (const v of vals){
      const ok = await deleteKey(v);
      log.say(ok ? `<span class="ko">delete</span> ${v}` : `<span class="kx">delete</span> ${v} · miss`);
    }
    cx.set('delete', 'avg O(1)');
  }),
  rehash: lock(async () => {
    history.push({type:'snapshot', M, table: table.map(c=>c.slice())});
    await rehash(M*2);
  }),
  undo: lock(async () => {
    const op = history.pop(); if (!op){ log.say(`<span class="kx">undo</span> empty`); return; }
    M = op.M; table = op.table.map(c=>c.slice()); size = table.reduce((a,c)=>a+c.length, 0);
    rebuildBuckets();
    await relayout(false);
    cx.set('undo', '—');
    log.say(`<span class="ko">undo</span>`);
  }),
  clear: lock(async () => {
    history.push({type:'snapshot', M, table: table.map(c=>c.slice())});
    table = Array.from({length:M}, () => []); size = 0;
    for (const [k,m] of nodeMeshes){ scene.remove(m.grp); }
    nodeMeshes.clear();
    await relayout(false);
    log.say(`<span class="ko">clear</span>`);
  }),
};
for (const k in opHandlers) $('#op-'+k).addEventListener('click', opHandlers[k]);
$('#b-rand').addEventListener('click', () => $('#in-val').value = randomInt(1,99));

/* seed */
(async () => {
  rebuildBuckets();
  for (const v of [7, 15, 23, 4, 12, 31]){ table[hash(v)].push(v); size++; }
  await relayout(false);
  history.clear(); refreshHUD();
  log.say(`<span class="k">init</span> m=${M} n=${size}`);
  cx.set('idle', '—');
})();
</script>
