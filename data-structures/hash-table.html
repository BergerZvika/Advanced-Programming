import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
/* ─── inlined lab runtime ─── */
/* ─────────────────────────────────────────────────────────────
   shared lab runtime
   ───────────────────────────────────────────────────────────── */

const PALETTE = {
  void:    0x05060d,
  ink:     0xe6ecff,
  inkDim:  0x8b93b8,
  cyan:    0x35d0ff,
  amber:   0xffb454,
  magenta: 0xff5cab,

  err:     0xff5c70,

/* ─── small DOM helpers ─── */
const $  = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for (const k in attrs){
    if (k === 'class') n.className = attrs[k];
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), attrs[k]);
    else n.setAttribute(k, attrs[k]);
  }
  for (const c of kids){
    if (c == null) continue;
    n.appendChild(c.nodeType ? c : document.createTextNode(c));
  }
  return n;
};

/* ─── three.js scene wrapper ─── */
function createScene({mount, camera = {pos:[0,4,18], lookAt:[0,0,0]}}){
  const w = mount.clientWidth, h = mount.clientHeight;
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x04050b, 26, 90);

  const cam = new THREE.PerspectiveCamera(45, w/h, 0.1, 200);
  cam.position.set(...camera.pos);
  cam.lookAt(new THREE.Vector3(...camera.lookAt));

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, h, false);
  renderer.setClearColor(0x000000, 0);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  mount.appendChild(renderer.domElement);

  // lighting
  const amb = new THREE.AmbientLight(0xb8c4ff, 0.55);
  scene.add(amb);
  const key = new THREE.DirectionalLight(0xffffff, 1.05);
  key.position.set(5, 10, 8);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0x35d0ff, 0.45);
  rim.position.set(-8, 4, -6);
  scene.add(rim);
  const mag = new THREE.PointLight(0xff5cab, 0.65, 40);
  mag.position.set(-6, 2, 6);
  scene.add(mag);

  // starfield (very subtle)
  {
    const g = new THREE.BufferGeometry();
    const N = 320, arr = new Float32Array(N*3);
    for (let i=0;i<N;i++){
      arr[i*3]   = (Math.random()-0.5)*120;
      arr[i*3+1] = (Math.random()-0.5)*80 + 8;
      arr[i*3+2] = (Math.random()-0.5)*120 - 20;
    }
    g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
    const m = new THREE.PointsMaterial({color:0x9aa6d6, size:0.05, transparent:true, opacity:0.45});
    scene.add(new THREE.Points(g, m));
  }

  // floor: large faint disc + radial grid
  {
    const disc = new THREE.Mesh(
      new THREE.CircleGeometry(60, 64),
      new THREE.MeshBasicMaterial({color:0x0a0e1c, transparent:true, opacity:0.65, side:THREE.DoubleSide})
    );
    disc.rotation.x = -Math.PI/2;
    disc.position.y = -3.5;
    scene.add(disc);
    const grid = new THREE.GridHelper(80, 40, 0x35d0ff, 0x1a2240);
    grid.material.opacity = 0.18; grid.material.transparent = true;
    grid.position.y = -3.49;
    scene.add(grid);
  }

  // orbit / pan / zoom controls
  const controls = new OrbitControls(cam, renderer.domElement);
  controls.enableDamping  = true;
  controls.dampingFactor  = 0.08;
  controls.target.set(...camera.lookAt);
  controls.minDistance    = 4;
  controls.maxDistance    = 90;
  controls.maxPolarAngle  = Math.PI * 0.92;  // don't let user look from underneath the grid
  controls.zoomSpeed      = 0.9;
  controls.rotateSpeed    = 0.75;
  controls.panSpeed       = 0.75;
  controls.screenSpacePanning = true;
  controls.update();

  // render loop
  function tick(){
    controls.update();
    renderer.render(scene, cam);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // resize
  const onResize = () => {
    const W = mount.clientWidth, H = mount.clientHeight;
    cam.aspect = W/H; cam.updateProjectionMatrix();
    renderer.setSize(W, H, false);
  };
  window.addEventListener('resize', onResize);

  return {scene, cam, renderer, controls};
}

/* ─── stepper · pause/play/single-step ─── */
const stepper = {
  paused: false,
  resume: null,    // resolver for in-flight pause
  speed: 1,        // 1 = normal, >1 = faster
  stepOnce: false, // run forward without pausing until next checkpoint (animations still play)
  checkpoints: [], // {label, undo: async () => void}
  onState: null,   // callback(state) for UI updates
};
function stepperKick(){
  if (stepper.resume){ const r = stepper.resume; stepper.resume = null; r(); }
}
function stepperPlay(){ stepper.paused = false; stepperKick(); stepper.onState && stepper.onState('playing'); }
function stepperPause(){ stepper.paused = true; stepper.onState && stepper.onState('paused'); }
function stepperToggle(){ stepper.paused ? stepperPlay() : stepperPause(); }
// "fast forward" button now means "single step with animation": advance to the
// next checkpoint at normal speed instead of jumping over the animations.
function stepperFastForward(){ stepper.stepOnce = true; stepperKick(); }
export async function stepperCheckpoint(label, undoFn){
  if (undoFn) stepper.checkpoints.push({label: label || '', undo:undoFn});
  if (label != null && stepper.onState) stepper.onState(label);
  // Arrival at the next checkpoint ends the single-step pass so the next
  // sleep/tween honors `paused` again.
  stepper.stepOnce = false;
  if (stepper.paused){
    await new Promise(r => stepper.resume = r);
  }
}
export async function stepperUndo(){
  const cp = stepper.checkpoints.pop();
  if (!cp) return false;
  if (stepper.onState) stepper.onState('undo · '+cp.label);
  await cp.undo();
  return true;
}
function stepperClear(){ stepper.checkpoints.length = 0; }

/* ─── small tween util · pause-aware ─── */
// sleep / tween / tweenVec all honor stepper.paused — but if stepper.stepOnce
// is set they treat the scene as if it's playing (animation runs at normal
// speed). That way a single-step click shows the animation between two
// checkpoints instead of jumping past it instantly.
function tween(obj, prop, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = obj[prop];
    let t0 = performance.now(), pausedAt = 0, totalPause = 0;
    function step(now){
      if (stepper.paused && !stepper.stepOnce){
        if (!pausedAt) pausedAt = now;
        requestAnimationFrame(step); return;
      }
      if (pausedAt){ totalPause += now - pausedAt; pausedAt = 0; }
      const elapsed = (now - t0 - totalPause) * stepper.speed;
      const k = Math.min(1, elapsed/ms);
      obj[prop] = from + (to - from)*ease(k);
      if (k<1) requestAnimationFrame(step); else res();
    }
    requestAnimationFrame(step);
  });
}
function tweenVec(vec, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = vec.clone();
    let t0 = performance.now(), pausedAt = 0, totalPause = 0;
    function step(now){
      if (stepper.paused && !stepper.stepOnce){
        if (!pausedAt) pausedAt = now;
        requestAnimationFrame(step); return;
      }
      if (pausedAt){ totalPause += now - pausedAt; pausedAt = 0; }
      const elapsed = (now - t0 - totalPause) * stepper.speed;
      const k = Math.min(1, elapsed/ms);
      vec.lerpVectors(from, to, ease(k));
      if (k<1) requestAnimationFrame(step); else res();
    }
    requestAnimationFrame(step);
  });
}
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const easeInOutCubic = t => t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
export async function sleep(ms){
  let remaining = ms;
  while (remaining > 0){
    if (stepper.paused && !stepper.stepOnce){
      await new Promise(r => stepper.resume = r);
    }
    const chunk = Math.min(remaining, 32);
    await new Promise(r => setTimeout(r, chunk / Math.max(0.1, stepper.speed)));
    remaining -= chunk;
  }
}

/* ─── undo stack ─── */
function createHistory(){
  const stack = [];
  return {
    push(snapshot){ stack.push(snapshot); },
    pop(){ return stack.pop(); },
    size(){ return stack.length; },
    clear(){ stack.length = 0; },
  };
}

/* ─── on-screen log ─── */
function createLog(mountSel='#log'){
  const root = typeof mountSel === 'string' ? $(mountSel) : mountSel;
  const list = el('div', {class:'log-list'});
  root.appendChild(el('h3', {}, 'Trace'));
  root.appendChild(list);
  function fmtTime(){
    const d = new Date();
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
  }
  return {
    say(html){
      const row = el('div', {class:'entry'},
        el('span', {class:'t'}, fmtTime()),
        el('span', {class:'e', html})
      );
      list.prepend(row);
      while (list.childElementCount > 80) list.lastElementChild.remove();
    },
    clear(){ list.innerHTML = ''; },
  };
}

/* ─── complexity readout ─── */
function createComplexityPanel(mount, rows){
  const wrap = el('div', {class:'cx-panel'});
  for (const r of rows){
    wrap.appendChild(el('div', {class:'cx-row'},
      el('span', {class:'key'}, r.key),
      el('span', {class:'val'}, r.val)
    ));
  }
  const now = el('div', {class:'cx-now'},
    el('span', {html:'<span class="badge"></span><span class="now-text">idle</span>'}),
    el('span', {class:'now-cx', html:'&nbsp;'})
  );
  wrap.appendChild(now);
  mount.appendChild(wrap);
  return {
    set(opLabel, cxLabel){
      now.querySelector('.now-text').textContent = opLabel;
      now.querySelector('.now-cx').innerHTML = cxLabel;
      // mirror into the player transport status bar so the user sees what's
      // happening without having to look at two places at once
      if (stepper.onState) stepper.onState(opLabel);
    },
  };
}

/* ─── 3D arrow indicator (shaft + cone + halo + optional text label) ─── */
// default arrow points in -Y (down). Rotate the returned group to re-aim:
//   up:    rotation.x = Math.PI  (or rotation.z = Math.PI)
//   left:  rotation.z =  Math.PI/2
//   right: rotation.z = -Math.PI/2
function makeArrow3D({color = 0x5cffb4, label = '', length = 1.5, labelSide = 'top'} = {}){
  const grp = new THREE.Group();

  const mat = new THREE.MeshPhysicalMaterial({
    color, emissive:color, emissiveIntensity:0.45,
    metalness:0.5, roughness:0.25, clearcoat:0.5
  });

  const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.085, 0.085, length, 18), mat);
  shaft.position.y = -length/2;
  grp.add(shaft);

  const tip = new THREE.Mesh(new THREE.ConeGeometry(0.24, 0.5, 22), mat);
  tip.rotation.x = Math.PI;            // apex toward -Y
  tip.position.y = -length - 0.25;
  grp.add(tip);

  if (label){
    const c = document.createElement('canvas'); c.width = 512; c.height = 160;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
    ctx.font = '800 78px IBM Plex Mono, monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.85)'; ctx.shadowBlur = 14;
    ctx.fillText(label, 256, 80);
    const tex = new THREE.CanvasTexture(c); tex.minFilter = THREE.LinearFilter;
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false}));
    spr.renderOrder = 12;
    spr.scale.set(1.9, 0.6, 1);
    if (labelSide === 'top')    spr.position.set(0,  0.45, 0);
    if (labelSide === 'bottom') spr.position.set(0, -length - 0.75, 0);
    grp.add(spr);
  }

  return {group: grp, shaft, tip,
          setColor(c){ mat.color.setHex(c); mat.emissive.setHex(c); }};
}

/* ─── player UI · play/pause/back/forward ─── */
function mountPlayer({mount, onBack}){
  const root = typeof mount === 'string' ? $(mount) : mount;
  if (!root) return null;
  const playBtn  = el('button', {class:'pl-btn pl-play',  title:'play / pause (Space)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'});
  const pauseBtn = el('button', {class:'pl-btn pl-pause hidden', title:'pause (Space)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>'});
  const backBtn  = el('button', {class:'pl-btn',  title:'step backward (←)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M6 6h2v12H6zM20 6 9 12l11 6z"/></svg>'});
  const fwdBtn   = el('button', {class:'pl-btn',  title:'skip to end of step (→)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M16 6h2v12h-2zM4 6l11 6L4 18z"/></svg>'});
  // continuous speed slider: 0.1× ··· 5× with smooth steps
  const speedSlider = el('input', {type:'range', class:'pl-speed-slider', min:'0.1', max:'5', step:'0.05', value:'1', title:'speed'});
  const speedVal    = el('span', {class:'pl-speed-val'}, '1.00×');
  const speedWrap   = el('div', {class:'pl-speed-wrap', title:'animation speed'}, speedSlider, speedVal);
  const bar = el('div', {class:'pl-bar'}, backBtn, playBtn, pauseBtn, fwdBtn, speedWrap);
  root.appendChild(bar);

  function setMode(playing){
    if (playing){ playBtn.classList.add('hidden'); pauseBtn.classList.remove('hidden'); }
    else        { playBtn.classList.remove('hidden'); pauseBtn.classList.add('hidden'); }
  }
  setMode(false);  // start as "play" icon visible (i.e., paused/idle look)

  // wire
  playBtn .addEventListener('click', () => { stepperPlay();  setMode(true); });
  pauseBtn.addEventListener('click', () => { stepperPause(); setMode(false); });
  fwdBtn  .addEventListener('click', () => { stepperFastForward(); });
  backBtn .addEventListener('click', async () => {
    const ok = await stepperUndo();
    if (!ok && onBack) onBack();   // fall back to lab's op-undo if checkpoints empty
  });
  // continuous speed: 0.10× ··· 5.00×
  function applySpeed(){
    const v = parseFloat(speedSlider.value) || 1;
    stepper.speed = v;
    speedVal.textContent = (v < 10 ? v.toFixed(2) : v.toFixed(1)) + '×';
  }
  speedSlider.addEventListener('input', applySpeed);
  speedSlider.addEventListener('change', applySpeed);
  applySpeed();

  // No status text in the bar — cx.set still updates the side-panel readout
  // via createComplexityPanel; the bar stays a fixed-size button row.
  stepper.onState = null;

  // keyboard
  window.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space'){ e.preventDefault(); stepperToggle(); setMode(!stepper.paused); }
    else if (e.code === 'ArrowRight'){ stepperFastForward(); }
    else if (e.code === 'ArrowLeft'){ backBtn.click(); }
  });

  return {setMode, status};
}

// presets: array of {name, desc, apply: async ()=>void}
function mountPresets({mount, label = 'presets', presets = []}){
  const root = typeof mount === 'string' ? $(mount) : mount;
  if (!root) return;
  root.innerHTML = '';
  root.appendChild(el('div', {class:'presets-label'}, label));
  for (const p of presets){
    const btn = el('button', {class:'preset-btn', type:'button', title: p.desc || ''},
      el('span', {class:'preset-name'}, p.name),
      el('span', {class:'preset-desc'}, p.desc || '')
    );
    btn.addEventListener('click', async () => {
      try { await p.apply(); }
      catch (e) { console.error('preset failed', e); }
    });
    root.appendChild(btn);
  }
}

/* ─── input parsing util ─── */
function parseNum(str, fallback=null){
  if (str == null || str === '') return fallback;
  const n = Number(str);
  if (Number.isFinite(n)) return n;
  return fallback;
}
function parseList(str){
  if (!str) return [];
  return String(str).split(/[,\s]+/).filter(Boolean).map(Number).filter(Number.isFinite);
}
function randomInt(a, b){ return a + Math.floor(Math.random()*(b-a+1)); }

  {key:'insert / find / delete (avg)', val:'O(1)'},
  {key:'insert / find / delete (worst)', val:'O(n)'},
  {key:'resize · rehash', val:'O(n)'},
  {key:'space', val:'O(n + m)'},
]);
const history = createHistory();

const stage = $('#stage');
// framed on the structure's centroid (buckets on the left at x≈-7, chains/
// sub-tables growing right) and pulled back so the full M-bucket column is
// visible without orbiting
const {scene} = createScene({mount:stage, camera:{pos:[-1, 1.5, 21], lookAt:[-1, 0, 0]}});

let mode = 'chaining';         // 'chaining' | 'linear' | 'double' | 'fks'
let M = 8;
let order = [];                // insertion-ordered live keys (source of truth)
let table = Array.from({length:M}, () => []);  // chaining(list): M chains
let trees = new Array(M).fill(null);           // chaining(tree): M BST roots
let slots = new Array(M).fill(null);           // linear/double: one key per slot
let fks   = null;              // fks: {buckets:[{keys,a,m2,slots}]}
let size = 0;

const bucketMeshes = [];
const nodeMeshes = new Map();  // key -> {grp, body, label}
const subMeshes  = [];         // fks secondary cells (pooled)
const linkMeshes = [];

const BUCKET_W = 1.6, BUCKET_H = 0.9, BUCKET_Z = 0.5;
const CHAIN_GAP_X  = 1.6;
// trees need a lot more vertical room per bucket than a flat chain
function bucketGapY(){ return mode === 'tree' ? 3.6 : 1.05; }
function bucketPos(i){
  const g = bucketGapY();
  return {x: -7, y: -(i * g) + (M-1)*g/2};
}

/* per-bucket BST (chaining-tree mode) */
function bstInsert(root, k){
  if (!root) return {value:k, left:null, right:null};
  if (k < root.value)      root.left  = bstInsert(root.left, k);
  else if (k > root.value) root.right = bstInsert(root.right, k);
  return root;
}
function bstKeys(root, out){ if (!root) return; bstKeys(root.left, out); out.push(root.value); bstKeys(root.right, out); }
function nodePos(b, k){
  const p = bucketPos(b);
  return {x: p.x + 1.8 + k * CHAIN_GAP_X, y: p.y};
}
// open-addressing: the key sphere sits just right of its slot cell
function slotKeyPos(i){ const p = bucketPos(i); return {x: p.x + 1.5, y: p.y}; }
// fks secondary slot
const SUB_GAP_X = 1.25;
function subPos(b, s){ const p = bucketPos(b); return {x: p.x + 1.9 + s * SUB_GAP_X, y: p.y}; }
function makeSubCell(){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.05, 0.78, 0.4),
    new THREE.MeshPhysicalMaterial({color:0x0e1626, metalness:0.5, roughness:0.35, emissive:0x0c1c14, emissiveIntensity:0.45})
  );
  grp.add(body);
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(body.geometry),
    new THREE.LineBasicMaterial({color:0xb9ff5c, transparent:true, opacity:0.55})
  );
  grp.add(edges);
  const c = document.createElement('canvas'); c.width=128; c.height=96;
  const ctx = c.getContext('2d');
  const tex = new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false}));
  spr.renderOrder = 10; spr.position.set(0,0,0.3); spr.scale.set(0.95, 0.7, 1);
  grp.add(spr);
  function paint(idx){
    ctx.clearRect(0,0,128,96);
    ctx.fillStyle='#5b6385'; ctx.font='700 38px IBM Plex Mono, monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,0.85)'; ctx.shadowBlur=8;
    ctx.fillText('['+idx+']', 64, 52);
    tex.needsUpdate = true;
  }
  grp.visible = false;
  scene.add(grp);
  return {grp, body, paint};
}

function makeBucketMesh(i){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(BUCKET_W, BUCKET_H, BUCKET_Z),
    new THREE.MeshPhysicalMaterial({color:0x10182c, metalness:0.6, roughness:0.25, emissive:0x0c1230, emissiveIntensity:0.55})
  );
  grp.add(body);
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(body.geometry),
    new THREE.LineBasicMaterial({color:0x35d0ff, transparent:true, opacity:0.65})
  );
  grp.add(edges);
  // label
  const c = document.createElement('canvas'); c.width=384; c.height=128;
  const ctx = c.getContext('2d');
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 14;
  ctx.fillStyle = '#cbd2ff'; ctx.font='700 28px IBM Plex Mono, monospace';
  ctx.fillText('bucket', 192, 44);
  ctx.fillStyle = '#35d0ff'; ctx.font='800 64px IBM Plex Mono, monospace';
  ctx.fillText(String(i), 192, 92);
  const tex = new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false}));
  spr.renderOrder = 10;
  spr.position.set(0, 0, 0.3); spr.scale.set(BUCKET_W*1.0, BUCKET_H*1.0, 1);
  grp.add(spr);
  const p = bucketPos(i);
  grp.position.set(p.x, p.y, 0);
  scene.add(grp);
  return {grp, body};
}

function makeNodeMesh(key){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.46, 24, 18),
    new THREE.MeshPhysicalMaterial({color:0x182240, metalness:0.55, roughness:0.18, emissive:0x081428, emissiveIntensity:0.7, clearcoat:0.6})
  );
  grp.add(body);
  const wire = new THREE.Mesh(
    new THREE.SphereGeometry(0.47, 12, 8),
    new THREE.MeshBasicMaterial({color:0xff5cab, wireframe:true, transparent:true, opacity:0.45})
  );
  grp.add(wire);
  // label
  const c = document.createElement('canvas'); c.width=128; c.height=128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.font='700 56px IBM Plex Mono, monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(String(key), 64, 64);
  const tex = new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true}));
  spr.position.set(0, 0, 0.5); spr.scale.set(0.9, 0.9, 1);
  grp.add(spr);

  grp.scale.setScalar(0.001);
  scene.add(grp);
  return {grp, body};
}

function makeLink(){
  const m = new THREE.Mesh(
    new THREE.CylinderGeometry(0.03, 0.03, 1, 12),
    new THREE.MeshBasicMaterial({color:0xff5cab, transparent:true, opacity:0.55})
  );
  m.visible = false; scene.add(m);
  return m;
}
function placeLink(link, ax, ay, bx, by){
  const dx=bx-ax, dy=by-ay; const len=Math.sqrt(dx*dx+dy*dy);
  link.position.set((ax+bx)/2, (ay+by)/2, 0);
  link.scale.y = len; link.rotation.z = Math.atan2(dx, -dy);
}

function rebuildBuckets(){
  for (const b of bucketMeshes) scene.remove(b.grp);
  bucketMeshes.length = 0;
  for (let i=0;i<M;i++) bucketMeshes.push(makeBucketMesh(i));
}

function liveKeySet(){
  const s = new Set();
  if (mode === 'chaining'){ for (const c of table) for (const k of c) s.add(k); }
  else if (mode === 'tree'){ for (const r of trees){ const a=[]; bstKeys(r,a); for (const k of a) s.add(k); } }
  else if (mode === 'fks'){ if (fks) for (const b of fks.buckets) for (const k of b.keys) s.add(k); }
  else { for (const v of slots) if (v != null) s.add(v); }
  return s;
}
async function relayout(animate=true){
  const tasks = [];
  // sync node meshes
  const live = liveKeySet();
  for (const [k, m] of nodeMeshes){ if (!live.has(k)){ scene.remove(m.grp); nodeMeshes.delete(k); } }
  for (const k of live){ if (!nodeMeshes.has(k)) nodeMeshes.set(k, makeNodeMesh(k)); }
  while (linkMeshes.length < 80) linkMeshes.push(makeLink());
  for (const l of linkMeshes) l.visible = false;
  for (const s of subMeshes) s.grp.visible = false;
  let linkI = 0, subI = 0;

  if (mode === 'chaining'){
    for (let i=0;i<M;i++){
      const chain = table[i];
      for (let k=0;k<chain.length;k++){
        const mesh = nodeMeshes.get(chain[k]);
        const p = nodePos(i, k);
        tasks.push(tweenVec(mesh.grp.position, new THREE.Vector3(p.x, p.y, 0), animate?420:0));
        tasks.push(tweenVec(mesh.grp.scale, new THREE.Vector3(1,1,1), animate?320:0));
        const bp = bucketPos(i);
        const prevX = k === 0 ? bp.x + BUCKET_W/2 : nodePos(i, k-1).x + 0.46;
        const link = linkMeshes[linkI++]; link.visible = true;
        placeLink(link, prevX + 0.1, bp.y, p.x - 0.46, bp.y);
      }
    }
  } else if (mode === 'tree'){
    for (let i=0;i<M;i++){
      const root = trees[i];
      if (!root) continue;
      const bp = bucketPos(i);
      // in-order index → x, depth → small y offset within the bucket band
      const idx = new Map(); let kk = 0;
      (function ino(n){ if(!n) return; ino(n.left); idx.set(n, kk++); ino(n.right); })(root);
      const pos = new Map();
      (function place(n, d){
        if (!n) return;
        pos.set(n, {x: bp.x + 2.0 + idx.get(n) * 1.15, y: bp.y - d * 0.95 + 0.6});
        place(n.left, d+1); place(n.right, d+1);
      })(root, 0);
      (function draw(n, parent){
        if (!n) return;
        const p = pos.get(n);
        const mesh = nodeMeshes.get(n.value);
        tasks.push(tweenVec(mesh.grp.position, new THREE.Vector3(p.x, p.y, 0), animate?420:0));
        tasks.push(tweenVec(mesh.grp.scale, new THREE.Vector3(0.78,0.78,0.78), animate?320:0));
        if (parent){
          const pp = pos.get(parent);
          const link = linkMeshes[linkI++]; link.visible = true;
          placeLink(link, pp.x, pp.y, p.x, p.y);
        } else {
          // root link from the bucket cell
          const link = linkMeshes[linkI++]; link.visible = true;
          placeLink(link, bp.x + BUCKET_W/2 + 0.1, bp.y, p.x - 0.4, p.y);
        }
        draw(n.left, n); draw(n.right, n);
      })(root, null);
    }
  } else if (mode === 'linear' || mode === 'double'){
    for (let i=0;i<M;i++){
      const v = slots[i];
      if (v == null) continue;
      const mesh = nodeMeshes.get(v);
      const p = slotKeyPos(i);
      tasks.push(tweenVec(mesh.grp.position, new THREE.Vector3(p.x, p.y, 0), animate?420:0));
      tasks.push(tweenVec(mesh.grp.scale, new THREE.Vector3(1,1,1), animate?320:0));
    }
  } else if (mode === 'fks' && fks){
    for (let i=0;i<M;i++){
      const bk = fks.buckets[i];
      for (let s=0;s<bk.m2;s++){
        while (subI >= subMeshes.length) subMeshes.push(makeSubCell());
        const cell = subMeshes[subI++];
        const sp = subPos(i, s);
        cell.grp.visible = true;
        cell.grp.position.set(sp.x, sp.y, 0);
        cell.paint(s);
        const key = bk.slots[s];
        if (key != null){
          const mesh = nodeMeshes.get(key);
          tasks.push(tweenVec(mesh.grp.position, new THREE.Vector3(sp.x, sp.y, 0.35), animate?420:0));
          tasks.push(tweenVec(mesh.grp.scale, new THREE.Vector3(0.7,0.7,0.7), animate?320:0));
        }
      }
    }
  }
  await Promise.all(tasks);
  refreshHUD();
}

const MODE_EXPLAIN = {
  chaining:
    `<b style="color:var(--magenta)">Separate chaining (list).</b> Every bucket is the head of a linked list. ` +
    `A collision (two keys with the same h₁) just appends the new key to that bucket's chain — ` +
    `nothing else moves. <b>find/delete</b> walk the chain. Load factor α = n/m may exceed 1; ` +
    `cost is O(1 + α) on average, O(chain) worst.`,
  tree:
    `<b style="color:var(--magenta)">Chaining with trees.</b> Same h₁ buckets, but each bucket is a ` +
    `<b>binary search tree</b> instead of a flat list (this is what Java 8's HashMap does once a ` +
    `bucket gets long). A collision inserts the key into that bucket's BST, so a heavy bucket costs ` +
    `<b>O(log nⱼ)</b> to search instead of O(nⱼ) — adversarial / colliding keys can't degrade it to a long scan.`,
  linear:
    `<b style="color:var(--cyan)">Linear probing</b> (open addressing). One key per slot. ` +
    `On a collision, scan forward — slot (h₁+1) mod m, then (h₁+2) mod m … — until an empty slot is found. ` +
    `Long runs of full slots merge into <i>primary clusters</i> that slow every later probe. Requires α &lt; 1.`,
  double:
    `<b style="color:var(--violet)">Double hashing</b> (open addressing). On a collision the step size ` +
    `comes from a <i>second</i> hash: slot = (h₁ + i·h₂) mod m with h₂ = 1 + k mod (m−1). ` +
    `Different keys get different probe sequences, so clustering is largely avoided. Requires α &lt; 1.`,
  fks:
    `<b style="color:var(--lime)">FKS perfect hashing</b> — a chaining variant where a bucket's ` +
    `collision list is replaced by a <b>collision-free secondary table</b>. h₁ sends a key to one of ` +
    `m buckets; a bucket holding nⱼ keys gets its OWN table of nⱼ² slots with a universal hash ` +
    `re-picked until those nⱼ keys collide nowhere. Lookup is <b>O(1) worst-case</b> (one L1 hop + ` +
    `one L2 hop, no scanning); total space O(n). Static — insert/delete rebuild.`,
};
function updateModeExplain(){
  const el = $('#mode-explain');
  if (el) el.innerHTML = MODE_EXPLAIN[mode] || '';
}

function refreshHUD(){
  updateModeExplain();
  $('#t-cap').textContent = M;
  $('#t-size').textContent = size;
  $('#t-load').textContent = (size/M).toFixed(2);
  $('#t-hfn').textContent  = hfnLabel();
  const desc = {
    chaining: 'chaining (list) · resize when α ≥ 0.75',
    tree:     'chaining (BST/bucket) · O(log nⱼ) per bucket',
    linear:   'open addressing · linear probing · α < 1',
    double:   'open addressing · double hashing · h₁+i·h₂',
    fks:      'FKS perfect hashing · 2-level · O(1) worst-case lookup',
  };
  $('#t-mode').textContent = desc[mode];
  const ins = {chaining:'avg O(1)', tree:'O(log nⱼ)', linear:'avg O(1)', double:'avg O(1)', fks:'O(n) rebuild'};
  const fnd = {chaining:'avg O(1)', tree:'O(log nⱼ)', linear:'avg O(1)', double:'avg O(1)', fks:'O(1) worst'};
  $('#cx-ins').textContent = ins[mode];
  $('#cx-fnd').textContent = fnd[mode];
  $('#undo-depth').textContent = history.size();
  $('#hist-pill').textContent = history.size();
}

function hash(k){ return ((Number(k) % M) + M) % M; }     // h1
function h2(k){ const m = Math.max(1, M-1); return 1 + (((Number(k) % m) + m) % m); }
function probeIdx(k, i){
  if (mode === 'double') return (((hash(k) + i*h2(k)) % M) + M) % M;
  return (hash(k) + i) % M;                                // linear
}
function hfnLabel(){
  if (mode === 'double') return 'h₁+i·h₂';
  if (mode === 'linear') return 'h₁+i';
  if (mode === 'fks')    return '2-level';
  return 'k mod m';
}

/* FKS universal sub-hash: ((a·k) mod P) mod m² */
const FKS_P = 2147483647;   // 2^31 − 1, prime
function subHash(k, a, m2){
  if (m2 <= 0) return 0;
  return Number(((BigInt(a) * BigInt(Number(k))) % BigInt(FKS_P)) % BigInt(m2));
}
function buildFKS(){
  const buckets = [];
  for (let i=0;i<M;i++) buckets.push({keys:[], a:1, m2:0, slots:[]});
  for (const k of order) buckets[hash(k)].keys.push(k);
  for (const bk of buckets){
    const n = bk.keys.length;
    bk.m2 = (n <= 1) ? n : n*n;
    bk.slots = new Array(bk.m2).fill(null);
    if (n === 0) continue;
    if (n === 1){ bk.slots[0] = bk.keys[0]; continue; }
    // pick a so the n keys land collision-free in m² sub-slots
    let done = false, t = 0;
    while (!done && t++ < 400){
      const a = randomInt(1, FKS_P - 1);
      const s = new Array(bk.m2).fill(null);
      let ok = true;
      for (const k of bk.keys){ const j = subHash(k, a, bk.m2); if (s[j] != null){ ok = false; break; } s[j] = k; }
      if (ok){ bk.a = a; bk.slots = s; done = true; }
    }
  }
  fks = {buckets};
}

/* rebuild the active structure from `order` */
function rebuildStructure(){
  if (mode === 'chaining'){
    table = Array.from({length:M}, () => []);
    for (const k of order) table[hash(k)].push(k);
  } else if (mode === 'tree'){
    trees = new Array(M).fill(null);
    for (const k of order){ const b = hash(k); trees[b] = bstInsert(trees[b], k); }
  } else if (mode === 'linear' || mode === 'double'){
    slots = new Array(M).fill(null);
    for (const k of order){
      for (let i=0;i<M;i++){ const idx = probeIdx(k,i); if (slots[idx] == null){ slots[idx] = k; break; } }
    }
  } else {
    buildFKS();
  }
}

async function pulseBucket(i, color=0x35d0ff){
  const m = bucketMeshes[i].body.material;
  const eOld = m.emissive.clone(), iOld = m.emissiveIntensity;
  m.emissive.setHex(color); m.emissiveIntensity = 1.2;
  await sleep(220);
  m.emissive.copy(eOld); m.emissiveIntensity = iOld;
}
async function pulseNode(k, color=0xffb454){
  const m = nodeMeshes.get(k); if (!m) return;
  const mat = m.body.material;
  const eOld = mat.emissive.clone(), iOld = mat.emissiveIntensity;
  mat.emissive.setHex(color); mat.emissiveIntensity = 1.3;
  await sleep(240);
  mat.emissive.copy(eOld); mat.emissiveIntensity = iOld;
}

/* mode-aware find — returns true if k is present (with animated probe) */
async function findKey(k){
  if (mode === 'chaining'){
    const b = hash(k);
    cx.set(`find ${k} · h₁ → bucket ${b}`, 'avg O(1)');
    await pulseBucket(b, 0x35d0ff);
    await stepperCheckpoint();
    const chain = table[b];
    for (let i=0;i<chain.length;i++){
      cx.set(`walk chain @ [${i}] · key ${chain[i]}`, 'O(chain)');
      await pulseNode(chain[i], 0xffb454);
      await stepperCheckpoint();
      if (chain[i] === k){ await pulseNode(k, 0x5cffb4); await stepperCheckpoint(); return true; }
    }
    cx.set(`miss ${k}`, 'O(chain)');
    return false;
  }
  if (mode === 'tree'){
    const b = hash(k);
    cx.set(`find ${k} · h₁ → bucket ${b}`, 'O(log nⱼ)');
    await pulseBucket(b, 0x35d0ff);
    await stepperCheckpoint();
    let n = trees[b];
    while (n){
      cx.set(`BST descend · ${k} vs ${n.value}`, 'O(log nⱼ)');
      await pulseNode(n.value, 0xffb454);
      await stepperCheckpoint();
      if (k === n.value){ await pulseNode(k, 0x5cffb4); await stepperCheckpoint(); return true; }
      n = k < n.value ? n.left : n.right;
    }
    cx.set(`miss ${k} · fell off the BST`, 'O(log nⱼ)');
    return false;
  }
  if (mode === 'linear' || mode === 'double'){
    for (let i=0;i<M;i++){
      const idx = probeIdx(k, i);
      cx.set(`probe #${i} · slot ${idx}`, 'open addr');
      await pulseBucket(idx, 0x35d0ff);
      await stepperCheckpoint();
      const v = slots[idx];
      if (v == null){ cx.set(`empty slot ${idx} · miss`, 'O(1)~'); return false; }
      if (v === k){ await pulseNode(k, 0x5cffb4); await stepperCheckpoint(); cx.set(`hit · slot ${idx}`, 'O(1)~'); return true; }
      await pulseNode(v, 0xffb454);
      await stepperCheckpoint();
    }
    cx.set(`table full · miss`, 'O(M)');
    return false;
  }
  // fks
  if (!fks) return false;
  const b = hash(k);
  cx.set(`find ${k} · L1 h₁ → bucket ${b}`, '2-level');
  await pulseBucket(b, 0x35d0ff);
  await stepperCheckpoint();
  const bk = fks.buckets[b];
  if (bk.m2 === 0){ cx.set(`bucket ${b} empty · miss`, 'O(1)'); return false; }
  const s = subHash(k, bk.a, bk.m2);
  cx.set(`L2 sub-hash → slot [${s}] of ${bk.m2}`, 'O(1) worst');
  if (bk.slots[s] === k){ await pulseNode(k, 0x5cffb4); await stepperCheckpoint(); return true; }
  cx.set(`slot [${s}] ≠ ${k} · miss`, 'O(1)');
  return false;
}

async function insertKey(k){
  if (order.includes(k)){ log.say(`<span class="kx">dup</span> ${k}`); return false; }
  if (mode === 'chaining'){
    const b = hash(k);
    cx.set(`insert ${k} · h₁ → bucket ${b}`, 'avg O(1)');
    await pulseBucket(b, 0x35d0ff);
    await stepperCheckpoint();
    table[b].push(k); order.push(k); size++;
    if (!nodeMeshes.has(k)) nodeMeshes.set(k, makeNodeMesh(k));
    await relayout(true);
    await pulseNode(k, 0x5cffb4);
    await stepperCheckpoint();
    return true;
  }
  if (mode === 'tree'){
    const b = hash(k);
    cx.set(`insert ${k} · h₁ → bucket ${b} · BST insert`, 'O(log nⱼ)');
    await pulseBucket(b, 0x35d0ff);
    await stepperCheckpoint();
    trees[b] = bstInsert(trees[b], k); order.push(k); size++;
    if (!nodeMeshes.has(k)) nodeMeshes.set(k, makeNodeMesh(k));
    await relayout(true);
    await pulseNode(k, 0x5cffb4);
    await stepperCheckpoint();
    return true;
  }
  if (mode === 'linear' || mode === 'double'){
    for (let i=0;i<M;i++){
      const idx = probeIdx(k, i);
      cx.set(`probe #${i} · slot ${idx}`, 'open addr');
      await pulseBucket(idx, 0x35d0ff);
      await stepperCheckpoint();
      if (slots[idx] == null){
        slots[idx] = k; order.push(k); size++;
        if (!nodeMeshes.has(k)) nodeMeshes.set(k, makeNodeMesh(k));
        cx.set(`placed ${k} @ slot ${idx} · ${i} collision(s)`, 'O(1)~');
        await relayout(true);
        await pulseNode(k, 0x5cffb4);
        await stepperCheckpoint();
        return true;
      }
      await pulseNode(slots[idx], 0xffb454);
      await stepperCheckpoint();
    }
    log.say(`<span class="kx">full</span> ${k} · table is full`);
    return false;
  }
  // fks — static: append + full rebuild
  order.push(k); size++;
  cx.set(`insert ${k} · rebuild FKS (2-level)`, 'O(n) expected');
  buildFKS();
  await relayout(true);
  if (nodeMeshes.has(k)){ await pulseNode(k, 0x5cffb4); await stepperCheckpoint(); }
  return true;
}

async function deleteKey(k){
  if (!order.includes(k)) return false;
  // visualize the lookup first
  await findKey(k);
  order = order.filter(x => x !== k); size--;
  rebuildStructure();
  const m = nodeMeshes.get(k);
  if (m){
    await tweenVec(m.grp.scale, new THREE.Vector3(0.001,0.001,0.001), 280);
    scene.remove(m.grp); nodeMeshes.delete(k);
  }
  await relayout(true);
  return true;
}

async function rehash(newM){
  cx.set('rehash · 2×', 'O(n)');
  M = newM;
  rebuildBuckets();
  rebuildStructure();
  await relayout(false);
  log.say(`<span class="km">rehash</span> m → ${M}`);
}

let busy = false;
function lock(fn){ return async (...a) => { if (busy) return; busy=true; try{ await fn(...a); } finally{ busy=false; refreshHUD(); } }; }

function readVals(){
  const list = parseList($('#in-val').value);
  if (!list.length){ const v=randomInt(1,99); $('#in-val').value=v; return [v]; }
  return list;
}

function snapshot(){ return {mode, M, order: order.slice()}; }
async function restore(s){
  mode = s.mode; M = s.M; order = s.order.slice(); size = order.length;
  $$('[id^="op-m-"]').forEach(b => b.classList.toggle('active', b.id === 'op-m-'+mode));
  for (const [k,m] of nodeMeshes) scene.remove(m.grp);
  nodeMeshes.clear();
  rebuildBuckets();
  rebuildStructure();
  await relayout(false);
}

const opHandlers = {
  insert: lock(async () => {
    const vals = readVals();
    history.push({type:'snapshot', snap: snapshot()});
    for (const v of vals){
      const ok = await insertKey(v);
      if (ok) log.say(`<span class="k">insert</span> ${v} · bucket ${hash(v)}`);
      // chaining + open addressing auto-grow; FKS rebuilds itself
      if (mode !== 'fks' && size/M >= 0.75){
        log.say(`<span class="km">load α=${(size/M).toFixed(2)} ≥ 0.75</span> · auto-rehash`);
        await rehash(M*2);
      }
    }
  }),
  find: lock(async () => {
    const vals = readVals();
    for (const v of vals){
      const hit = await findKey(v);
      log.say(hit ? `<span class="k">find</span>(${v}) → hit` : `<span class="kx">find</span>(${v}) → miss`);
    }
  }),
  delete: lock(async () => {
    const vals = readVals();
    history.push({type:'snapshot', snap: snapshot()});
    for (const v of vals){
      const ok = await deleteKey(v);
      log.say(ok ? `<span class="ko">delete</span> ${v}` : `<span class="kx">delete</span> ${v} · miss`);
    }
  }),
  rehash: lock(async () => {
    history.push({type:'snapshot', snap: snapshot()});
    await rehash(M*2);
  }),
  undo: lock(async () => {
    const op = history.pop(); if (!op){ log.say(`<span class="kx">undo</span> empty`); return; }
    if (op.snap) await restore(op.snap);
    cx.set('undo', '—');
    log.say(`<span class="ko">undo</span>`);
  }),
  clear: lock(async () => {
    history.push({type:'snapshot', snap: snapshot()});
    order = []; size = 0;
    for (const [k,m] of nodeMeshes){ scene.remove(m.grp); }
    nodeMeshes.clear();
    rebuildStructure();
    await relayout(false);
    log.say(`<span class="ko">clear</span>`);
  }),
};
for (const k in opHandlers) $('#op-'+k).addEventListener('click', opHandlers[k]);
$('#b-rand').addEventListener('click', () => $('#in-val').value = randomInt(1,99));

/* ─── collision-mode toggle ─── */
async function setMode(next){
  if (next === mode) return;
  history.push({type:'snapshot', snap: snapshot()});
  mode = next;
  $$('[id^="op-m-"]').forEach(b => b.classList.toggle('active', b.id === 'op-m-'+mode));
  log.say(`<span class="km">mode</span> → ${mode}`);
  // re-place every key under the new collision strategy
  for (const [k,m] of nodeMeshes) scene.remove(m.grp);
  nodeMeshes.clear();
  rebuildStructure();
  await relayout(true);
  cx.set(`${mode} · ${size} keys`, '—');
}
$('#op-m-chaining').addEventListener('click', () => setMode('chaining'));
$('#op-m-tree')    .addEventListener('click', () => setMode('tree'));
$('#op-m-linear')  .addEventListener('click', () => setMode('linear'));
$('#op-m-double')  .addEventListener('click', () => setMode('double'));
$('#op-m-fks')     .addEventListener('click', () => setMode('fks'));

/* ─── preset toolbar ─── */
async function loadHash(newM, keys, modeNext){
  for (const [k, m] of nodeMeshes) scene.remove(m.grp);
  nodeMeshes.clear();
  if (modeNext){ mode = modeNext; $$('[id^="op-m-"]').forEach(b => b.classList.toggle('active', b.id === 'op-m-'+mode)); }
  M = newM;
  order = keys.slice(); size = order.length;
  rebuildBuckets();
  rebuildStructure();
  await relayout(false);
  history.clear();
}
mountPresets({mount: $('#presets-mount'), label: 'defaults', presets:[
  {name:'empty',     desc:'m=8 · no keys',                                       apply: () => loadHash(8, [], 'chaining')},
  {name:'chaining',  desc:'m=8 · 6 keys · separate chaining (list)',             apply: () => loadHash(8, [7,15,23,4,12,31], 'chaining')},
  {name:'tree',      desc:'m=4 · 9 keys · heavy buckets become BSTs',            apply: () => loadHash(4, [4,8,12,16,20,24,28,2,6], 'tree')},
  {name:'linear',    desc:'m=11 · 7 keys · linear probing clusters',             apply: () => loadHash(11, [10,21,32,5,16,27,38], 'linear')},
  {name:'double',    desc:'m=11 · 7 keys · double hashing spreads probes',       apply: () => loadHash(11, [10,21,32,5,16,27,38], 'double')},
  {name:'FKS',       desc:'m=8 · 9 keys · 2-level perfect hashing',              apply: () => loadHash(8, [3,7,11,15,19,23,27,31,35], 'fks')},
]});

/* seed */
(async () => {
  rebuildBuckets();
  order = [7, 15, 23, 4, 12, 31]; size = order.length;
  rebuildStructure();
  await relayout(false);
  history.clear(); refreshHUD();
  log.say(`<span class="k">init</span> ${mode} · m=${M} n=${size}`);
  cx.set('idle', '—');
})();
</script>
