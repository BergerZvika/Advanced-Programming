<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Heap — Data Structures Lab</title>
<link rel="stylesheet" href="lab.css" />
<style>
  .pill-toggle{display:inline-flex; gap:0; padding:3px; border-radius:999px; background:rgba(8,10,18,0.65); border:1px solid var(--panel-edge)}
  .pill-toggle button{
    font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    padding:7px 14px; border-radius:999px; color:var(--ink-dim);
    transition:background .2s, color .2s;
  }
  .pill-toggle button.active{background:linear-gradient(135deg, rgba(124,92,255,0.30), rgba(53,208,255,0.30)); color:#fff}
</style>
</head>
<body>
  <div class="frame">
    <header id="topbar" class="topbar"></header>

    <div class="lab-shell">
      <div class="stage" id="stage">
        <div class="stage-corner tl"></div><div class="stage-corner tr"></div>
        <div class="stage-corner bl"></div><div class="stage-corner br"></div>
        <div class="stage-overlay">
          <div class="row">
            <div class="stage-tag"><b>mode</b>&nbsp; <span id="t-mode">MAX</span></div>
            <div class="stage-tag"><b>size</b>&nbsp; <span id="t-size">0</span></div>
            <div class="stage-tag"><b>root</b>&nbsp; <span id="t-root">∅</span></div>
          </div>
          <div class="row">
            <div class="stage-tag">complete binary tree · sift-up · sift-down</div>
          </div>
        </div>
      </div>

      <aside class="panel">
        <h2>Controls</h2>
        <div class="section-rule"></div>

        <div class="label">Mode</div>
        <div class="pill-toggle" id="mode-toggle">
          <button data-mode="max" class="active">max-heap</button>
          <button data-mode="min">min-heap</button>
        </div>

        <div class="label mt-12">Value(s)</div>
        <div class="input-row">
          <input id="in-val" placeholder="e.g. 50  or  5,2,9" autocomplete="off" />
          <button class="ghost" id="b-rand">RND</button>
        </div>

        <div class="label mt-12">Operations</div>
        <div class="op-grid">
          <button class="op" data-color="cyan"    id="op-insert"><span class="name"><span class="dot"></span> insert</span><span class="cx">O(log n)</span></button>
          <button class="op" data-color="magenta" id="op-extract"><span class="name"><span class="dot"></span> extract</span><span class="cx">O(log n)</span></button>
          <button class="op" data-color="amber"   id="op-peek"><span class="name"><span class="dot"></span> peek</span><span class="cx">O(1)</span></button>
          <button class="op" data-color="violet"  id="op-heapify"><span class="name"><span class="dot"></span> heapify list</span><span class="cx">O(n)</span></button>
          <button class="op full" data-color="lime"  id="op-undo"><span class="name"><span class="dot"></span> undo · last op</span><span class="cx" id="undo-depth">0</span></button>
          <button class="op full" data-color="amber" id="op-clear"><span class="name"><span class="dot"></span> clear</span><span class="cx">reset</span></button>
        </div>

        <div class="label mt-12">Complexity</div>
        <div id="cx-mount"></div>
      </aside>

      <div class="log" id="log"></div>
    </div>

    <footer class="statusbar">
      <span class="pill"><b>lab</b>&nbsp; 04 · heap</span>
      <span class="pill"><b>renderer</b>&nbsp; three.js · WebGL</span>
      <span class="pill"><b>history</b>&nbsp; <span id="hist-pill">0</span></span>
    </footer>
  </div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import {$, $$, createScene, createLog, createComplexityPanel, mountTopbar, createHistory,
        tween, tweenVec, sleep, parseNum, parseList, randomInt} from './lab.js';

mountTopbar({title:'Binary Heap', sub:'lab 04 · pyramid layout'});
const log = createLog('#log');
const cx  = createComplexityPanel($('#cx-mount'), [
  {key:'insert / extract', val:'O(log n)'},
  {key:'peek', val:'O(1)'},
  {key:'heapify (build)', val:'O(n)'},
  {key:'space', val:'O(n)'},
  {key:'invariant', val:'parent ≥/≤ child'},
]);
const history = createHistory();

const stage = $('#stage');
const {scene} = createScene({mount:stage, camera:{pos:[0, 5.5, 19], lookAt:[0, 1, 0]}});

let mode = 'max';     // or 'min'
const arr = [];       // values
const meshes = [];    // {grp, body, label}

function cmp(a, b){ return mode === 'max' ? a > b : a < b; }
function parent(i){ return (i-1) >> 1; }
function lc(i){ return 2*i + 1; }
function rc(i){ return 2*i + 2; }

function makeMesh(value){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.7, 0),
    new THREE.MeshPhysicalMaterial({color:0x162540, metalness:0.55, roughness:0.18, emissive:0x0e2438, emissiveIntensity:0.7, clearcoat:0.7})
  );
  grp.add(body);
  const wire = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.72, 0),
    new THREE.MeshBasicMaterial({color:0xb9ff5c, wireframe:true, transparent:true, opacity:0.5})
  );
  grp.add(wire);

  const c = document.createElement('canvas'); c.width=256; c.height=128;
  const ctx = c.getContext('2d');
  function paint(v, idx){
    ctx.clearRect(0,0,256,128);
    ctx.fillStyle = '#fff'; ctx.font='700 56px IBM Plex Mono, monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(String(v), 128, 50);
    ctx.fillStyle='#8b93b8'; ctx.font='500 22px IBM Plex Mono, monospace';
    ctx.fillText('['+idx+']', 128, 100);
  }
  paint(value, 0);
  const tex = new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true}));
  spr.position.set(0, 1.4, 0); spr.scale.set(2.2, 1.1, 1);
  grp.add(spr);

  grp.scale.setScalar(0.001);
  scene.add(grp);
  return {grp, body, wire, label:{paint, tex}};
}

const edges = [];

function makeEdge(){
  const e = new THREE.Mesh(
    new THREE.CylinderGeometry(0.03, 0.03, 1, 12),
    new THREE.MeshBasicMaterial({color:0xb9ff5c, transparent:true, opacity:0.45})
  );
  e.visible = false; scene.add(e);
  return e;
}
function placeEdge(edge, ax, ay, bx, by){
  const dx = bx-ax, dy = by-ay; const len = Math.sqrt(dx*dx+dy*dy);
  edge.position.set((ax+bx)/2, (ay+by)/2, 0);
  edge.scale.y = len; edge.rotation.z = Math.atan2(dx, -dy);
}

function position(i){
  // depth d = floor(log2(i+1))
  const d = Math.floor(Math.log2(i+1));
  const rowStart = (1<<d) - 1;
  const k = i - rowStart;
  const rowCount = 1 << d;
  const spacing = Math.max(1.4, 7.5 / rowCount);
  return {x: (k - (rowCount-1)/2) * spacing, y: -d * 2.2 + 3.2};
}

async function relayout(animate=true){
  // ensure meshes/edges exist
  while (meshes.length < arr.length) meshes.push(makeMesh(arr[meshes.length]));
  while (edges.length < arr.length) edges.push(makeEdge());
  // remove extras
  while (meshes.length > arr.length){ const m = meshes.pop(); scene.remove(m.grp); }
  while (edges.length > arr.length){ const e = edges.pop(); scene.remove(e); }

  const tasks = [];
  for (let i=0;i<arr.length;i++){
    const {x, y} = position(i);
    tasks.push(tweenVec(meshes[i].grp.position, new THREE.Vector3(x, y, 0), animate?420:0));
    tasks.push(tweenVec(meshes[i].grp.scale, new THREE.Vector3(1,1,1), animate?320:0));
    meshes[i].label.paint(arr[i], i); meshes[i].label.tex.needsUpdate=true;
    // edge from parent
    if (i === 0){ edges[i].visible = false; }
    else {
      const p = position(parent(i));
      edges[i].visible = true;
      placeEdge(edges[i], p.x, p.y, x, y);
    }
  }
  await Promise.all(tasks);
  refreshHUD();
}

function refreshHUD(){
  $('#t-mode').textContent = mode.toUpperCase();
  $('#t-size').textContent = arr.length;
  $('#t-root').textContent = arr.length ? arr[0] : '∅';
  $('#undo-depth').textContent = history.size();
  $('#hist-pill').textContent = history.size();
}

async function pulse(i, color=0xb9ff5c, ms=220){
  if (!meshes[i]) return;
  const m = meshes[i].body.material;
  const eOld = m.emissive.clone(), iOld = m.emissiveIntensity;
  m.emissive.setHex(color); m.emissiveIntensity = 1.3;
  await sleep(ms);
  m.emissive.copy(eOld); m.emissiveIntensity = iOld;
}

async function swap(i, j){
  if (i === j) return;
  // visual swap: move both to each other's position
  const pi = position(i), pj = position(j);
  await Promise.all([
    tweenVec(meshes[i].grp.position, new THREE.Vector3(pj.x, pj.y, 0), 380),
    tweenVec(meshes[j].grp.position, new THREE.Vector3(pi.x, pi.y, 0), 380),
  ]);
  [arr[i], arr[j]] = [arr[j], arr[i]];
  [meshes[i], meshes[j]] = [meshes[j], meshes[i]];
  meshes[i].label.paint(arr[i], i); meshes[i].label.tex.needsUpdate=true;
  meshes[j].label.paint(arr[j], j); meshes[j].label.tex.needsUpdate=true;
}

async function siftUp(i){
  while (i > 0 && cmp(arr[i], arr[parent(i)])){
    await pulse(i, 0xffb454, 140); await pulse(parent(i), 0xffb454, 140);
    await swap(i, parent(i));
    i = parent(i);
  }
}
async function siftDown(i){
  const n = arr.length;
  while (true){
    const l = lc(i), r = rc(i);
    let target = i;
    if (l < n && cmp(arr[l], arr[target])) target = l;
    if (r < n && cmp(arr[r], arr[target])) target = r;
    if (target === i) break;
    await pulse(i, 0xffb454, 140); await pulse(target, 0xffb454, 140);
    await swap(i, target);
    i = target;
  }
}

async function insertVal(v){
  arr.push(v);
  meshes.push(makeMesh(v));
  edges.push(makeEdge());
  await relayout(true);
  await siftUp(arr.length-1);
}
async function extract(){
  if (!arr.length) return null;
  const top = arr[0];
  await pulse(0, 0xff5c70, 220);
  if (arr.length === 1){
    arr.pop(); const m = meshes.pop(); scene.remove(m.grp); const e = edges.pop(); scene.remove(e);
    await relayout(true); return top;
  }
  await swap(0, arr.length-1);
  // remove last
  arr.pop(); const m = meshes.pop(); scene.remove(m.grp);
  const e = edges.pop(); scene.remove(e);
  await relayout(true);
  await siftDown(0);
  return top;
}

let busy = false;
function lock(fn){ return async (...a) => { if (busy) return; busy=true; try{ await fn(...a); } finally{ busy=false; refreshHUD(); } }; }

function readVals(){
  const list = parseList($('#in-val').value);
  if (!list.length){ const v=randomInt(1,99); $('#in-val').value=v; return [v]; }
  return list;
}

const opHandlers = {
  insert: lock(async () => {
    const vals = readVals();
    history.push({type:'snapshot', arr: arr.slice()});
    cx.set('insert', 'O(log n)');
    for (const v of vals){
      await insertVal(v); log.say(`<span class="k">insert</span> ${v}`);
    }
  }),
  extract: lock(async () => {
    if (!arr.length){ log.say(`<span class="kx">err</span> empty`); return; }
    history.push({type:'snapshot', arr: arr.slice()});
    cx.set('extract', 'O(log n)');
    const top = await extract();
    log.say(`<span class="ko">extract</span> → ${top}`);
  }),
  peek: lock(async () => {
    if (!arr.length){ log.say(`<span class="kx">err</span> empty`); return; }
    await pulse(0, 0x5cffb4, 600);
    cx.set('peek', 'O(1)');
    log.say(`<span class="k">peek</span> → ${arr[0]}`);
  }),
  heapify: lock(async () => {
    const list = parseList($('#in-val').value);
    if (!list.length){ log.say(`<span class="kx">err</span> need a list of values`); return; }
    history.push({type:'snapshot', arr: arr.slice()});
    cx.set('heapify (build)', 'O(n)');
    // replace
    while (arr.length){ arr.pop(); const m = meshes.pop(); scene.remove(m.grp); const e = edges.pop(); scene.remove(e); }
    for (const v of list){ arr.push(v); meshes.push(makeMesh(v)); edges.push(makeEdge()); }
    await relayout(true);
    for (let i = Math.floor(arr.length/2)-1; i >= 0; i--){
      await siftDown(i);
    }
    log.say(`<span class="k">heapify</span> [${list.join(', ')}]`);
  }),
  undo: lock(async () => {
    const op = history.pop(); if (!op){ log.say(`<span class="kx">undo</span> empty`); return; }
    // rebuild
    while (arr.length){ arr.pop(); const m = meshes.pop(); scene.remove(m.grp); const e = edges.pop(); scene.remove(e); }
    for (const v of op.arr){ arr.push(v); meshes.push(makeMesh(v)); edges.push(makeEdge()); }
    await relayout(false);
    cx.set('undo', '—');
    log.say(`<span class="ko">undo</span>`);
  }),
  clear: lock(async () => {
    history.push({type:'snapshot', arr: arr.slice()});
    while (arr.length){ arr.pop(); const m = meshes.pop(); scene.remove(m.grp); const e = edges.pop(); scene.remove(e); }
    await relayout(false);
    cx.set('clear', '—');
    log.say(`<span class="ko">clear</span>`);
  }),
};
for (const k in opHandlers) $('#op-'+k).addEventListener('click', opHandlers[k]);
$('#b-rand').addEventListener('click', () => $('#in-val').value = randomInt(1,99));

// mode toggle
$$('#mode-toggle button').forEach(b => b.addEventListener('click', async () => {
  $$('#mode-toggle button').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  const next = b.dataset.mode;
  if (next === mode) return;
  mode = next;
  log.say(`<span class="km">mode</span> → ${mode.toUpperCase()}-HEAP · re-heapifying`);
  history.push({type:'snapshot', arr: arr.slice()});
  for (let i = Math.floor(arr.length/2)-1; i >= 0; i--) await siftDown(i);
  refreshHUD();
}));

/* seed */
(async () => {
  for (const v of [35, 18, 42, 9, 26, 73, 11]){
    arr.push(v); meshes.push(makeMesh(v)); edges.push(makeEdge());
  }
  await relayout(false);
  for (let i = Math.floor(arr.length/2)-1; i >= 0; i--) await siftDown(i);
  history.clear(); refreshHUD();
  log.say(`<span class="k">init</span> ${arr.length} keys · MAX`);
  cx.set('idle', '—');
})();
</script>
</body>
</html>
