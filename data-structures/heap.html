<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

/* ─── inlined lab runtime ─── */
/* ─────────────────────────────────────────────────────────────
   shared lab runtime
   ───────────────────────────────────────────────────────────── */

const PALETTE = {
  void:    0x05060d,
  ink:     0xe6ecff,
  inkDim:  0x8b93b8,
  cyan:    0x35d0ff,
  amber:   0xffb454,
  magenta: 0xff5cab,
  violet:  0x7c5cff,
  lime:    0xb9ff5c,
  err:     0xff5c70,
  ok:      0x5cffb4,
};

/* ─── small DOM helpers ─── */
const $  = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for (const k in attrs){
    if (k === 'class') n.className = attrs[k];
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), attrs[k]);
    else n.setAttribute(k, attrs[k]);
  }
  for (const c of kids){
    if (c == null) continue;
    n.appendChild(c.nodeType ? c : document.createTextNode(c));
  }
  return n;
};

/* ─── three.js scene wrapper ─── */
function createScene({mount, camera = {pos:[0,4,18], lookAt:[0,0,0]}}){
  const w = mount.clientWidth, h = mount.clientHeight;
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x04050b, 26, 90);

  const cam = new THREE.PerspectiveCamera(45, w/h, 0.1, 200);
  cam.position.set(...camera.pos);
  cam.lookAt(new THREE.Vector3(...camera.lookAt));

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, h, false);
  renderer.setClearColor(0x000000, 0);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  mount.appendChild(renderer.domElement);

  // lighting
  const amb = new THREE.AmbientLight(0xb8c4ff, 0.55);
  scene.add(amb);
  const key = new THREE.DirectionalLight(0xffffff, 1.05);
  key.position.set(5, 10, 8);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0x35d0ff, 0.45);
  rim.position.set(-8, 4, -6);
  scene.add(rim);
  const mag = new THREE.PointLight(0xff5cab, 0.65, 40);
  mag.position.set(-6, 2, 6);
  scene.add(mag);

  // starfield (very subtle)
  {
    const g = new THREE.BufferGeometry();
    const N = 320, arr = new Float32Array(N*3);
    for (let i=0;i<N;i++){
      arr[i*3]   = (Math.random()-0.5)*120;
      arr[i*3+1] = (Math.random()-0.5)*80 + 8;
      arr[i*3+2] = (Math.random()-0.5)*120 - 20;
    }
    g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
    const m = new THREE.PointsMaterial({color:0x9aa6d6, size:0.05, transparent:true, opacity:0.45});
    scene.add(new THREE.Points(g, m));
  }

  // floor: large faint disc + radial grid
  {
    const disc = new THREE.Mesh(
      new THREE.CircleGeometry(60, 64),
      new THREE.MeshBasicMaterial({color:0x0a0e1c, transparent:true, opacity:0.65, side:THREE.DoubleSide})
    );
    disc.rotation.x = -Math.PI/2;
    disc.position.y = -3.5;
    scene.add(disc);
    const grid = new THREE.GridHelper(80, 40, 0x35d0ff, 0x1a2240);
    grid.material.opacity = 0.18; grid.material.transparent = true;
    grid.position.y = -3.49;
    scene.add(grid);
  }

  // camera drift
  const drift = {t:0, base: cam.position.clone(), enabled:true};
  function tick(){
    drift.t += 0.0035;
    if (drift.enabled){
      cam.position.x = drift.base.x + Math.sin(drift.t*0.7)*0.55;
      cam.position.y = drift.base.y + Math.cos(drift.t*0.5)*0.25;
      cam.lookAt(0, camera.lookAt[1], camera.lookAt[2]);
    }
    renderer.render(scene, cam);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // resize
  const onResize = () => {
    const W = mount.clientWidth, H = mount.clientHeight;
    cam.aspect = W/H; cam.updateProjectionMatrix();
    renderer.setSize(W, H, false);
  };
  window.addEventListener('resize', onResize);

  return {scene, cam, renderer, drift};
}

/* ─── small tween util ─── */
function tween(obj, prop, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = obj[prop];
    const t0 = performance.now();
    function step(now){
      const k = Math.min(1, (now-t0)/ms);
      obj[prop] = from + (to - from)*ease(k);
      if (k<1) requestAnimationFrame(step); else res();
    }
    requestAnimationFrame(step);
  });
}
function tweenVec(vec, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = vec.clone();
    const t0 = performance.now();
    function step(now){
      const k = Math.min(1, (now-t0)/ms);
      vec.lerpVectors(from, to, ease(k));
      if (k<1) requestAnimationFrame(step); else res();
    }
    requestAnimationFrame(step);
  });
}
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const easeInOutCubic = t => t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ─── undo stack ─── */
function createHistory(){
  const stack = [];
  return {
    push(snapshot){ stack.push(snapshot); },
    pop(){ return stack.pop(); },
    size(){ return stack.length; },
    clear(){ stack.length = 0; },
  };
}

/* ─── on-screen log ─── */
function createLog(mountSel='#log'){
  const root = typeof mountSel === 'string' ? $(mountSel) : mountSel;
  const list = el('div', {class:'log-list'});
  root.appendChild(el('h3', {}, 'Trace'));
  root.appendChild(list);
  function fmtTime(){
    const d = new Date();
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
  }
  return {
    say(html){
      const row = el('div', {class:'entry'},
        el('span', {class:'t'}, fmtTime()),
        el('span', {class:'e', html})
      );
      list.prepend(row);
      while (list.childElementCount > 80) list.lastElementChild.remove();
    },
    clear(){ list.innerHTML = ''; },
  };
}

/* ─── complexity readout ─── */
function createComplexityPanel(mount, rows){
  const wrap = el('div', {class:'cx-panel'});
  for (const r of rows){
    wrap.appendChild(el('div', {class:'cx-row'},
      el('span', {class:'key'}, r.key),
      el('span', {class:'val'}, r.val)
    ));
  }
  const now = el('div', {class:'cx-now'},
    el('span', {html:'<span class="badge"></span><span class="now-text">idle</span>'}),
    el('span', {class:'now-cx', html:'&nbsp;'})
  );
  wrap.appendChild(now);
  mount.appendChild(wrap);
  return {
    set(opLabel, cx){
      now.querySelector('.now-text').textContent = opLabel;
      now.querySelector('.now-cx').innerHTML = cx;
    },
  };
}

/* ─── wire back button + clock ─── */
function mountTopbar({title, sub, back='index.html'}){
  const root = $('#topbar');
  if (!root) return;
  root.innerHTML = '';
  root.appendChild(el('a', {class:'btn-back', href:back, 'aria-label':'Back to labs'},
    el('span', {class:'arrow', html:'&#8592;'}), 'labs'));
  root.appendChild(el('div', {class:'brand'},
    el('div', {class:'brand-mark'}),
    el('div', {},
      el('div', {class:'brand-title'}, title),
      el('div', {class:'brand-sub'}, sub),
    )
  ));
  root.appendChild(el('div', {class:'spacer'}));
  const clock = el('div', {class:'stage-tag'}, '');
  root.appendChild(clock);
  const tick = () => {
    const d = new Date();
    clock.innerHTML = `<b>T</b>&nbsp; ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  };
  tick(); setInterval(tick, 1000);
}

/* ─── input parsing util ─── */
function parseNum(str, fallback=null){
  if (str == null || str === '') return fallback;
  const n = Number(str);
  if (Number.isFinite(n)) return n;
  return fallback;
}
function parseList(str){
  if (!str) return [];
  return String(str).split(/[,\s]+/).filter(Boolean).map(Number).filter(Number.isFinite);
}
function randomInt(a, b){ return a + Math.floor(Math.random()*(b-a+1)); }

/* ─── end runtime ─── */


mountTopbar({title:'Binary Heap', sub:'lab 04 · pyramid layout'});
const log = createLog('#log');
const cx  = createComplexityPanel($('#cx-mount'), [
  {key:'insert / extract', val:'O(log n)'},
  {key:'peek', val:'O(1)'},
  {key:'heapify (build)', val:'O(n)'},
  {key:'space', val:'O(n)'},
  {key:'invariant', val:'parent ≥/≤ child'},
]);
const history = createHistory();

const stage = $('#stage');
const {scene} = createScene({mount:stage, camera:{pos:[0, 5.5, 19], lookAt:[0, 1, 0]}});

let mode = 'max';     // or 'min'
const arr = [];       // values
const meshes = [];    // {grp, body, label}

function cmp(a, b){ return mode === 'max' ? a > b : a < b; }
function parent(i){ return (i-1) >> 1; }
function lc(i){ return 2*i + 1; }
function rc(i){ return 2*i + 2; }

function makeMesh(value){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.7, 0),
    new THREE.MeshPhysicalMaterial({color:0x162540, metalness:0.55, roughness:0.18, emissive:0x0e2438, emissiveIntensity:0.7, clearcoat:0.7})
  );
  grp.add(body);
  const wire = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.72, 0),
    new THREE.MeshBasicMaterial({color:0xb9ff5c, wireframe:true, transparent:true, opacity:0.5})
  );
  grp.add(wire);

  const c = document.createElement('canvas'); c.width=256; c.height=128;
  const ctx = c.getContext('2d');
  function paint(v, idx){
    ctx.clearRect(0,0,256,128);
    ctx.fillStyle = '#fff'; ctx.font='700 56px IBM Plex Mono, monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(String(v), 128, 50);
    ctx.fillStyle='#8b93b8'; ctx.font='500 22px IBM Plex Mono, monospace';
    ctx.fillText('['+idx+']', 128, 100);
  }
  paint(value, 0);
  const tex = new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true}));
  spr.position.set(0, 1.4, 0); spr.scale.set(2.2, 1.1, 1);
  grp.add(spr);

  grp.scale.setScalar(0.001);
  scene.add(grp);
  return {grp, body, wire, label:{paint, tex}};
}

const edges = [];

function makeEdge(){
  const e = new THREE.Mesh(
    new THREE.CylinderGeometry(0.03, 0.03, 1, 12),
    new THREE.MeshBasicMaterial({color:0xb9ff5c, transparent:true, opacity:0.45})
  );
  e.visible = false; scene.add(e);
  return e;
}
function placeEdge(edge, ax, ay, bx, by){
  const dx = bx-ax, dy = by-ay; const len = Math.sqrt(dx*dx+dy*dy);
  edge.position.set((ax+bx)/2, (ay+by)/2, 0);
  edge.scale.y = len; edge.rotation.z = Math.atan2(dx, -dy);
}

function position(i){
  // depth d = floor(log2(i+1))
  const d = Math.floor(Math.log2(i+1));
  const rowStart = (1<<d) - 1;
  const k = i - rowStart;
  const rowCount = 1 << d;
  const spacing = Math.max(1.4, 7.5 / rowCount);
  return {x: (k - (rowCount-1)/2) * spacing, y: -d * 2.2 + 3.2};
}

async function relayout(animate=true){
  // ensure meshes/edges exist
  while (meshes.length < arr.length) meshes.push(makeMesh(arr[meshes.length]));
  while (edges.length < arr.length) edges.push(makeEdge());
  // remove extras
  while (meshes.length > arr.length){ const m = meshes.pop(); scene.remove(m.grp); }
  while (edges.length > arr.length){ const e = edges.pop(); scene.remove(e); }

  const tasks = [];
  for (let i=0;i<arr.length;i++){
    const {x, y} = position(i);
    tasks.push(tweenVec(meshes[i].grp.position, new THREE.Vector3(x, y, 0), animate?420:0));
    tasks.push(tweenVec(meshes[i].grp.scale, new THREE.Vector3(1,1,1), animate?320:0));
    meshes[i].label.paint(arr[i], i); meshes[i].label.tex.needsUpdate=true;
    // edge from parent
    if (i === 0){ edges[i].visible = false; }
    else {
      const p = position(parent(i));
      edges[i].visible = true;
      placeEdge(edges[i], p.x, p.y, x, y);
    }
  }
  await Promise.all(tasks);
  refreshHUD();
}

function refreshHUD(){
  $('#t-mode').textContent = mode.toUpperCase();
  $('#t-size').textContent = arr.length;
  $('#t-root').textContent = arr.length ? arr[0] : '∅';
  $('#undo-depth').textContent = history.size();
  $('#hist-pill').textContent = history.size();
}

async function pulse(i, color=0xb9ff5c, ms=220){
  if (!meshes[i]) return;
  const m = meshes[i].body.material;
  const eOld = m.emissive.clone(), iOld = m.emissiveIntensity;
  m.emissive.setHex(color); m.emissiveIntensity = 1.3;
  await sleep(ms);
  m.emissive.copy(eOld); m.emissiveIntensity = iOld;
}

async function swap(i, j){
  if (i === j) return;
  // visual swap: move both to each other's position
  const pi = position(i), pj = position(j);
  await Promise.all([
    tweenVec(meshes[i].grp.position, new THREE.Vector3(pj.x, pj.y, 0), 380),
    tweenVec(meshes[j].grp.position, new THREE.Vector3(pi.x, pi.y, 0), 380),
  ]);
  [arr[i], arr[j]] = [arr[j], arr[i]];
  [meshes[i], meshes[j]] = [meshes[j], meshes[i]];
  meshes[i].label.paint(arr[i], i); meshes[i].label.tex.needsUpdate=true;
  meshes[j].label.paint(arr[j], j); meshes[j].label.tex.needsUpdate=true;
}

async function siftUp(i){
  while (i > 0 && cmp(arr[i], arr[parent(i)])){
    await pulse(i, 0xffb454, 140); await pulse(parent(i), 0xffb454, 140);
    await swap(i, parent(i));
    i = parent(i);
  }
}
async function siftDown(i){
  const n = arr.length;
  while (true){
    const l = lc(i), r = rc(i);
    let target = i;
    if (l < n && cmp(arr[l], arr[target])) target = l;
    if (r < n && cmp(arr[r], arr[target])) target = r;
    if (target === i) break;
    await pulse(i, 0xffb454, 140); await pulse(target, 0xffb454, 140);
    await swap(i, target);
    i = target;
  }
}

async function insertVal(v){
  arr.push(v);
  meshes.push(makeMesh(v));
  edges.push(makeEdge());
  await relayout(true);
  await siftUp(arr.length-1);
}
async function extract(){
  if (!arr.length) return null;
  const top = arr[0];
  await pulse(0, 0xff5c70, 220);
  if (arr.length === 1){
    arr.pop(); const m = meshes.pop(); scene.remove(m.grp); const e = edges.pop(); scene.remove(e);
    await relayout(true); return top;
  }
  await swap(0, arr.length-1);
  // remove last
  arr.pop(); const m = meshes.pop(); scene.remove(m.grp);
  const e = edges.pop(); scene.remove(e);
  await relayout(true);
  await siftDown(0);
  return top;
}

let busy = false;
function lock(fn){ return async (...a) => { if (busy) return; busy=true; try{ await fn(...a); } finally{ busy=false; refreshHUD(); } }; }

function readVals(){
  const list = parseList($('#in-val').value);
  if (!list.length){ const v=randomInt(1,99); $('#in-val').value=v; return [v]; }
  return list;
}

const opHandlers = {
  insert: lock(async () => {
    const vals = readVals();
    history.push({type:'snapshot', arr: arr.slice()});
    cx.set('insert', 'O(log n)');
    for (const v of vals){
      await insertVal(v); log.say(`<span class="k">insert</span> ${v}`);
    }
  }),
  extract: lock(async () => {
    if (!arr.length){ log.say(`<span class="kx">err</span> empty`); return; }
    history.push({type:'snapshot', arr: arr.slice()});
    cx.set('extract', 'O(log n)');
    const top = await extract();
    log.say(`<span class="ko">extract</span> → ${top}`);
  }),
  peek: lock(async () => {
    if (!arr.length){ log.say(`<span class="kx">err</span> empty`); return; }
    await pulse(0, 0x5cffb4, 600);
    cx.set('peek', 'O(1)');
    log.say(`<span class="k">peek</span> → ${arr[0]}`);
  }),
  heapify: lock(async () => {
    const list = parseList($('#in-val').value);
    if (!list.length){ log.say(`<span class="kx">err</span> need a list of values`); return; }
    history.push({type:'snapshot', arr: arr.slice()});
    cx.set('heapify (build)', 'O(n)');
    // replace
    while (arr.length){ arr.pop(); const m = meshes.pop(); scene.remove(m.grp); const e = edges.pop(); scene.remove(e); }
    for (const v of list){ arr.push(v); meshes.push(makeMesh(v)); edges.push(makeEdge()); }
    await relayout(true);
    for (let i = Math.floor(arr.length/2)-1; i >= 0; i--){
      await siftDown(i);
    }
    log.say(`<span class="k">heapify</span> [${list.join(', ')}]`);
  }),
  undo: lock(async () => {
    const op = history.pop(); if (!op){ log.say(`<span class="kx">undo</span> empty`); return; }
    // rebuild
    while (arr.length){ arr.pop(); const m = meshes.pop(); scene.remove(m.grp); const e = edges.pop(); scene.remove(e); }
    for (const v of op.arr){ arr.push(v); meshes.push(makeMesh(v)); edges.push(makeEdge()); }
    await relayout(false);
    cx.set('undo', '—');
    log.say(`<span class="ko">undo</span>`);
  }),
  clear: lock(async () => {
    history.push({type:'snapshot', arr: arr.slice()});
    while (arr.length){ arr.pop(); const m = meshes.pop(); scene.remove(m.grp); const e = edges.pop(); scene.remove(e); }
    await relayout(false);
    cx.set('clear', '—');
    log.say(`<span class="ko">clear</span>`);
  }),
};
for (const k in opHandlers) $('#op-'+k).addEventListener('click', opHandlers[k]);
$('#b-rand').addEventListener('click', () => $('#in-val').value = randomInt(1,99));

// mode toggle
$$('#mode-toggle button').forEach(b => b.addEventListener('click', async () => {
  $$('#mode-toggle button').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  const next = b.dataset.mode;
  if (next === mode) return;
  mode = next;
  log.say(`<span class="km">mode</span> → ${mode.toUpperCase()}-HEAP · re-heapifying`);
  history.push({type:'snapshot', arr: arr.slice()});
  for (let i = Math.floor(arr.length/2)-1; i >= 0; i--) await siftDown(i);
  refreshHUD();
}));

/* seed */
(async () => {
  for (const v of [35, 18, 42, 9, 26, 73, 11]){
    arr.push(v); meshes.push(makeMesh(v)); edges.push(makeEdge());
  }
  await relayout(false);
  for (let i = Math.floor(arr.length/2)-1; i >= 0; i--) await siftDown(i);
  history.clear(); refreshHUD();
  log.say(`<span class="k">init</span> ${arr.length} keys · MAX`);
  cx.set('idle', '—');
})();
</script>
