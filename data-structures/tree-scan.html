/* ─── small DOM helpers ─── */
const $  = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for (const k in attrs){
    if (k === 'class') n.className = attrs[k];
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), attrs[k]);
    else n.setAttribute(k, attrs[k]);
  }
  for (const c of kids){
    if (c == null) continue;
    n.appendChild(c.nodeType ? c : document.createTextNode(c));
  }
  return n;
};

/* ─── three.js scene wrapper ─── */
function createScene({mount, camera = {pos:[0,4,18], lookAt:[0,0,0]}}){
  const w = mount.clientWidth, h = mount.clientHeight;
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x04050b, 26, 90);

  const cam = new THREE.PerspectiveCamera(45, w/h, 0.1, 200);
  cam.position.set(...camera.pos);
  cam.lookAt(new THREE.Vector3(...camera.lookAt));

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, h, false);
  renderer.setClearColor(0x000000, 0);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  mount.appendChild(renderer.domElement);

  // lighting
  const amb = new THREE.AmbientLight(0xb8c4ff, 0.55);
  scene.add(amb);
  const key = new THREE.DirectionalLight(0xffffff, 1.05);
  key.position.set(5, 10, 8);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0x35d0ff, 0.45);
  rim.position.set(-8, 4, -6);
  scene.add(rim);
  const mag = new THREE.PointLight(0xff5cab, 0.65, 40);
  mag.position.set(-6, 2, 6);
  scene.add(mag);

  // starfield (very subtle)
  {
    const g = new THREE.BufferGeometry();
    const N = 320, arr = new Float32Array(N*3);
    for (let i=0;i<N;i++){
      arr[i*3]   = (Math.random()-0.5)*120;
      arr[i*3+1] = (Math.random()-0.5)*80 + 8;
      arr[i*3+2] = (Math.random()-0.5)*120 - 20;
    }
    g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
    const m = new THREE.PointsMaterial({color:0x9aa6d6, size:0.05, transparent:true, opacity:0.45});
    scene.add(new THREE.Points(g, m));
  }

  // floor: large faint disc + radial grid
  {
    const disc = new THREE.Mesh(
      new THREE.CircleGeometry(60, 64),
      new THREE.MeshBasicMaterial({color:0x0a0e1c, transparent:true, opacity:0.65, side:THREE.DoubleSide})
    );
    disc.rotation.x = -Math.PI/2;
    disc.position.y = -3.5;
    scene.add(disc);
    const grid = new THREE.GridHelper(80, 40, 0x35d0ff, 0x1a2240);
    grid.material.opacity = 0.18; grid.material.transparent = true;
    grid.position.y = -3.49;
    scene.add(grid);
  }

  // orbit / pan / zoom controls
  const controls = new OrbitControls(cam, renderer.domElement);
  controls.enableDamping  = true;
  controls.dampingFactor  = 0.08;
  controls.target.set(...camera.lookAt);
  controls.minDistance    = 4;
  controls.maxDistance    = 90;
  controls.maxPolarAngle  = Math.PI * 0.92;  // don't let user look from underneath the grid
  controls.zoomSpeed      = 0.9;
  controls.rotateSpeed    = 0.75;
  controls.panSpeed       = 0.75;
  controls.screenSpacePanning = true;
  controls.update();

  // render loop
  function tick(){
    controls.update();
    renderer.render(scene, cam);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // resize
  const onResize = () => {
    const W = mount.clientWidth, H = mount.clientHeight;
    cam.aspect = W/H; cam.updateProjectionMatrix();
    renderer.setSize(W, H, false);
  };
  window.addEventListener('resize', onResize);

  return {scene, cam, renderer, controls};
}

/* ─── stepper · pause/play/single-step ─── */
const stepper = {
  paused: false,
  resume: null,    // resolver for in-flight pause
  speed: 1,        // 1 = normal, >1 = faster
  stepOnce: false, // run forward without pausing until next checkpoint (animations still play)
  checkpoints: [], // {label, undo: async () => void}
  onState: null,   // callback(state) for UI updates
};
function stepperKick(){
  if (stepper.resume){ const r = stepper.resume; stepper.resume = null; r(); }
}
function stepperPlay(){ stepper.paused = false; stepperKick(); stepper.onState && stepper.onState('playing'); }
function stepperPause(){ stepper.paused = true; stepper.onState && stepper.onState('paused'); }
function stepperToggle(){ stepper.paused ? stepperPlay() : stepperPause(); }
// "fast forward" button now means "single step with animation": advance to the
// next checkpoint at normal speed instead of jumping over the animations.
function stepperFastForward(){ stepper.stepOnce = true; stepperKick(); }
export async function stepperCheckpoint(label, undoFn){
  if (undoFn) stepper.checkpoints.push({label: label || '', undo:undoFn});
  if (label != null && stepper.onState) stepper.onState(label);
  // Arrival at the next checkpoint ends the single-step pass so the next
  // sleep/tween honors `paused` again.
  stepper.stepOnce = false;
  if (stepper.paused){
    await new Promise(r => stepper.resume = r);
  }
}
export async function stepperUndo(){
  const cp = stepper.checkpoints.pop();
  if (!cp) return false;
  if (stepper.onState) stepper.onState('undo · '+cp.label);
  await cp.undo();
  return true;
}
function stepperClear(){ stepper.checkpoints.length = 0; }

/* ─── small tween util · pause-aware ─── */
// sleep / tween / tweenVec all honor stepper.paused — but if stepper.stepOnce
// is set they treat the scene as if it's playing (animation runs at normal
// speed). That way a single-step click shows the animation between two
// checkpoints instead of jumping past it instantly.
function tween(obj, prop, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = obj[prop];
    let t0 = performance.now(), pausedAt = 0, totalPause = 0;
    function step(now){
      if (stepper.paused && !stepper.stepOnce){
        if (!pausedAt) pausedAt = now;
        requestAnimationFrame(step); return;
      }
      if (pausedAt){ totalPause += now - pausedAt; pausedAt = 0; }
      const elapsed = (now - t0 - totalPause) * stepper.speed;
      const k = Math.min(1, elapsed/ms);
      obj[prop] = from + (to - from)*ease(k);
      if (k<1) requestAnimationFrame(step); else res();
    }
    requestAnimationFrame(step);
  });
}
function tweenVec(vec, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = vec.clone();
    let t0 = performance.now(), pausedAt = 0, totalPause = 0;
    function step(now){
      if (stepper.paused && !stepper.stepOnce){
        if (!pausedAt) pausedAt = now;
        requestAnimationFrame(step); return;
      }
      if (pausedAt){ totalPause += now - pausedAt; pausedAt = 0; }
      const elapsed = (now - t0 - totalPause) * stepper.speed;
      const k = Math.min(1, elapsed/ms);
      vec.lerpVectors(from, to, ease(k));
      if (k<1) requestAnimationFrame(step); else res();
    }
    requestAnimationFrame(step);
  });
}
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const easeInOutCubic = t => t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
export async function sleep(ms){
  let remaining = ms;
  while (remaining > 0){
    if (stepper.paused && !stepper.stepOnce){
      await new Promise(r => stepper.resume = r);
    }
    const chunk = Math.min(remaining, 32);
    await new Promise(r => setTimeout(r, chunk / Math.max(0.1, stepper.speed)));
    remaining -= chunk;
  }
}

/* ─── undo stack ─── */
function createHistory(){
  const stack = [];
  return {
    push(snapshot){ stack.push(snapshot); },
    pop(){ return stack.pop(); },
    size(){ return stack.length; },
    clear(){ stack.length = 0; },
  };
}

/* ─── on-screen log ─── */
function createLog(mountSel='#log'){
  const root = typeof mountSel === 'string' ? $(mountSel) : mountSel;
  const list = el('div', {class:'log-list'});
  root.appendChild(el('h3', {}, 'Trace'));
  root.appendChild(list);
  function fmtTime(){
    const d = new Date();
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
  }
  return {
    say(html){
      const row = el('div', {class:'entry'},
        el('span', {class:'t'}, fmtTime()),
        el('span', {class:'e', html})
      );
      list.prepend(row);
      while (list.childElementCount > 80) list.lastElementChild.remove();
    },
    clear(){ list.innerHTML = ''; },
  };
}

/* ─── complexity readout ─── */
function createComplexityPanel(mount, rows){
  const wrap = el('div', {class:'cx-panel'});
  for (const r of rows){
    wrap.appendChild(el('div', {class:'cx-row'},
      el('span', {class:'key'}, r.key),
      el('span', {class:'val'}, r.val)
    ));
  }
  const now = el('div', {class:'cx-now'},
    el('span', {html:'<span class="badge"></span><span class="now-text">idle</span>'}),
    el('span', {class:'now-cx', html:'&nbsp;'})
  );
  wrap.appendChild(now);
  mount.appendChild(wrap);
  return {
    set(opLabel, cxLabel){
      now.querySelector('.now-text').textContent = opLabel;
      now.querySelector('.now-cx').innerHTML = cxLabel;
      // mirror into the player transport status bar so the user sees what's
      // happening without having to look at two places at once
      if (stepper.onState) stepper.onState(opLabel);
    },
  };
}

/* ─── 3D arrow indicator (shaft + cone + halo + optional text label) ─── */
// default arrow points in -Y (down). Rotate the returned group to re-aim:
//   up:    rotation.x = Math.PI  (or rotation.z = Math.PI)
//   left:  rotation.z =  Math.PI/2
//   right: rotation.z = -Math.PI/2
function makeArrow3D({color = 0x5cffb4, label = '', length = 1.5, labelSide = 'top'} = {}){
  const grp = new THREE.Group();

  const mat = new THREE.MeshPhysicalMaterial({
    color, emissive:color, emissiveIntensity:0.45,
    metalness:0.5, roughness:0.25, clearcoat:0.5
  });

  const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.085, 0.085, length, 18), mat);
  shaft.position.y = -length/2;
  grp.add(shaft);

  const tip = new THREE.Mesh(new THREE.ConeGeometry(0.24, 0.5, 22), mat);
  tip.rotation.x = Math.PI;            // apex toward -Y
  tip.position.y = -length - 0.25;
  grp.add(tip);

  if (label){
    const c = document.createElement('canvas'); c.width = 512; c.height = 160;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
    ctx.font = '800 78px IBM Plex Mono, monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.85)'; ctx.shadowBlur = 14;
    ctx.fillText(label, 256, 80);
    const tex = new THREE.CanvasTexture(c); tex.minFilter = THREE.LinearFilter;
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false}));
    spr.renderOrder = 12;
    spr.scale.set(1.9, 0.6, 1);
    if (labelSide === 'top')    spr.position.set(0,  0.45, 0);
    if (labelSide === 'bottom') spr.position.set(0, -length - 0.75, 0);
    grp.add(spr);
  }

  return {group: grp, shaft, tip,
          setColor(c){ mat.color.setHex(c); mat.emissive.setHex(c); }};
}

/* ─── player UI · play/pause/back/forward ─── */
function mountPlayer({mount, onBack}){
  const root = typeof mount === 'string' ? $(mount) : mount;
  if (!root) return null;
  const playBtn  = el('button', {class:'pl-btn pl-play',  title:'play / pause (Space)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'});
  const pauseBtn = el('button', {class:'pl-btn pl-pause hidden', title:'pause (Space)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>'});
  const backBtn  = el('button', {class:'pl-btn',  title:'step backward (←)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M6 6h2v12H6zM20 6 9 12l11 6z"/></svg>'});
  const fwdBtn   = el('button', {class:'pl-btn',  title:'skip to end of step (→)', html:'<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M16 6h2v12h-2zM4 6l11 6L4 18z"/></svg>'});
  // continuous speed slider: 0.1× ··· 5× with smooth steps
  const speedSlider = el('input', {type:'range', class:'pl-speed-slider', min:'0.1', max:'5', step:'0.05', value:'1', title:'speed'});
  const speedVal    = el('span', {class:'pl-speed-val'}, '1.00×');
  const speedWrap   = el('div', {class:'pl-speed-wrap', title:'animation speed'}, speedSlider, speedVal);
  const bar = el('div', {class:'pl-bar'}, backBtn, playBtn, pauseBtn, fwdBtn, speedWrap);
  root.appendChild(bar);

  function setMode(playing){
    if (playing){ playBtn.classList.add('hidden'); pauseBtn.classList.remove('hidden'); }
    else        { playBtn.classList.remove('hidden'); pauseBtn.classList.add('hidden'); }
  }
  setMode(false);  // start as "play" icon visible (i.e., paused/idle look)

  // wire
  playBtn .addEventListener('click', () => { stepperPlay();  setMode(true); });
  pauseBtn.addEventListener('click', () => { stepperPause(); setMode(false); });
  fwdBtn  .addEventListener('click', () => { stepperFastForward(); });
  backBtn .addEventListener('click', async () => {
    const ok = await stepperUndo();
    if (!ok && onBack) onBack();   // fall back to lab's op-undo if checkpoints empty
  });
  // continuous speed: 0.10× ··· 5.00×
  function applySpeed(){
    const v = parseFloat(speedSlider.value) || 1;
    stepper.speed = v;
    speedVal.textContent = (v < 10 ? v.toFixed(2) : v.toFixed(1)) + '×';
  }
  speedSlider.addEventListener('input', applySpeed);
  speedSlider.addEventListener('change', applySpeed);
  applySpeed();

  // No status text in the bar — cx.set still updates the side-panel readout
  // via createComplexityPanel; the bar stays a fixed-size button row.
  stepper.onState = null;

  // keyboard
  window.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space'){ e.preventDefault(); stepperToggle(); setMode(!stepper.paused); }
    else if (e.code === 'ArrowRight'){ stepperFastForward(); }
    else if (e.code === 'ArrowLeft'){ backBtn.click(); }
  });

  return {setMode, status};
}

  root.appendChild(el('div', {class:'presets-label'}, label));
  for (const p of presets){

/* ─── input parsing util ─── */
function parseNum(str, fallback=null){
  if (str == null || str === '') return fallback;
  const n = Number(str);
  if (Number.isFinite(n)) return n;
  return fallback;
}
function parseList(str){
  if (!str) return [];
  return String(str).split(/[,\s]+/).filter(Boolean).map(Number).filter(Number.isFinite);
}
function randomInt(a, b){ return a + Math.floor(Math.random()*(b-a+1)); }

/* ─── BST core ─── */
let root = null;
let size = 0;
function newNode(v){ return {value:v, left:null, right:null, mesh:null, edgeUp:null, idxSprite:null}; }
function insertK(v){
  function go(n){ if (!n){ size++; return newNode(v); }
    if (v < n.value) n.left = go(n.left);
    else if (v > n.value) n.right = go(n.right);
    return n;
  }
  root = go(root);
}

const ghosts = new Map();   // node -> {left, right}
function ghostKey(parent, side){ return parent.value + '·' + side; }
function getGhost(parent, side){
  let g = ghosts.get(parent);
  if (!g){ g = {left:null, right:null}; ghosts.set(parent, g); }
  if (!g[side]) g[side] = makeGhost();
  return g[side];
}
function clearOrphanGhosts(){
  // remove ghost entries whose parent isn't in the tree anymore or whose side is now filled
  for (const [parent, g] of [...ghosts.entries()]){
    // is this parent still in the live tree?
    let alive = false;
    (function find(n){ if (!n || alive) return; if (n === parent) alive = true; else { find(n.left); find(n.right); } })(root);
    if (!alive){
      if (g.left)  { scene.remove(g.left.grp);  scene.remove(g.left.edge); }
      if (g.right) { scene.remove(g.right.grp); scene.remove(g.right.edge); }
      ghosts.delete(parent);
      continue;
    }
    if (parent.left  && g.left)  { scene.remove(g.left.grp);  scene.remove(g.left.edge);  g.left  = null; }
    if (parent.right && g.right) { scene.remove(g.right.grp); scene.remove(g.right.edge); g.right = null; }
  }
}

function computeLayout(){
  const idx = {}, st = {k:0};
  (function inO(n){ if(!n) return; inO(n.left); idx[n.value] = st.k++; inO(n.right); })(root);
  const n = st.k;
  const map = new Map();
  (function walk(node, d){
    if (!node) return;
    const x = (idx[node.value] - (n-1)/2) * Math.max(1.8, 5 - 0.3*d);
    const y = -d*2.4 + 3.0;
    map.set(node, {x, y});
    walk(node.left, d+1); walk(node.right, d+1);
  })(root, 0);
  if (map.size === 0) return map;
  // fit to viewport
  const FOV = 45 * Math.PI/180;
  const viewH = 2 * 18 * Math.tan(FOV/2);
  const aspect = stage.clientWidth / Math.max(1, stage.clientHeight);
  const viewW = viewH * aspect;
  const targetW = viewW * 0.42, targetH = viewH * 0.38;
  let maxX = 0.001, minY = 3.0;
  for (const p of map.values()){ maxX = Math.max(maxX, Math.abs(p.x)); minY = Math.min(minY, p.y); }
  const usedH = 3.0 - minY;
  const s = Math.min(1, targetW / maxX, usedH > 0 ? targetH / usedH : 1);
  if (s < 1) for (const p of map.values()){ p.x *= s; p.y = 3.0 + (p.y - 3.0) * s; }
  return map;
}

async function relayout(animate=true){
  ensureMeshes(root);
  const map = computeLayout();
  const tasks = [];
  // child offset for ghost positioning (extrapolate from parent → child gap)
  const GHOST_DX = 1.2, GHOST_DY = 1.8;
  (function walk(n, parent){
    if (!n) return;
    const p = map.get(n);
    if (p){
      tasks.push(tweenVec(n.mesh.grp.position, new THREE.Vector3(p.x, p.y, 0), animate?420:0));
      tasks.push(tweenVec(n.mesh.grp.scale, new THREE.Vector3(1,1,1), animate?320:0));
      if (parent){ const pp = map.get(parent); n.edgeUp.visible = true; placeEdge(n.edgeUp, pp.x, pp.y, p.x, p.y); }
      else n.edgeUp.visible = false;
      // ghosts for null children
      for (const side of ['left','right']){
        if (!n[side]){
          const g = getGhost(n, side);
          const gx = p.x + (side === 'left' ? -GHOST_DX : GHOST_DX);
          const gy = p.y - GHOST_DY;
          tasks.push(tweenVec(g.grp.position, new THREE.Vector3(gx, gy, 0), animate?420:0));
          g.edge.visible = true;
          placeEdge(g.edge, p.x, p.y, gx, gy);
          g.edge.material.opacity = 0.22;
        }
      }
    }
    walk(n.left, n); walk(n.right, n);
  })(root, null);
  clearOrphanGhosts();
  await Promise.all(tasks);
  // keep the cursor ring tracking its node when the tree is rearranged
  if (typeof currentNode !== 'undefined' && currentNode && currentNode.mesh){
    cursorRing.position.copy(currentNode.mesh.grp.position);
    cursorRingOuter.position.copy(currentNode.mesh.grp.position);
  }
  refreshHUD();
}

  g.edge.material.opacity = 0.7;
  await sleep(ms);
  m.emissive.copy(eOld); m.emissiveIntensity = iOld; m.opacity = oOld;

/* ─── scans · step-list player ─── */
let scanSteps     = null;   // [{kind:'visit'|'null', node?, parent?, side?}]
let scanIdx       = 0;      // number of applied steps so far
let scanName      = '';
let scanColor     = 0x35d0ff;
let scanCancelled = false;  // set by reset button so the run loop exits cleanly

const SCAN_BTN_IDS = ['op-inorder','op-preorder','op-postorder','op-bfs'];
function clearActiveScan(){ for (const id of SCAN_BTN_IDS){ const b = $('#'+id); if (b) b.classList.remove('active'); } }
function setActiveScan(id){ clearActiveScan(); const b = $('#'+id); if (b) b.classList.add('active'); }

function buildInOrder(out){
  (function walk(n, parent, side){
    if (!n){ if (parent) out.push({kind:'null', parent, side}); return; }
    walk(n.left,  n, 'left');
    out.push({kind:'visit', node:n});
    walk(n.right, n, 'right');
  })(root, null, null);
}
function buildPreOrder(out){
  (function walk(n, parent, side){
    if (!n){ if (parent) out.push({kind:'null', parent, side}); return; }
    out.push({kind:'visit', node:n});
    walk(n.left,  n, 'left');
    walk(n.right, n, 'right');
  })(root, null, null);
}
function buildPostOrder(out){
  (function walk(n, parent, side){
    if (!n){ if (parent) out.push({kind:'null', parent, side}); return; }
    walk(n.left,  n, 'left');
    walk(n.right, n, 'right');
    out.push({kind:'visit', node:n});
  })(root, null, null);
}
function buildBFS(out){
  if (!root) return;
  const q = [root];
  while (q.length){
    const n = q.shift();
    // record queue state right after the dequeue, then again after each enqueue
    out.push({kind:'visit', node:n, queueAfter:q.map(x=>x.value)});
    for (const side of ['left','right']){
      if (n[side]){
        q.push(n[side]);
        out.push({kind:'enqueue', parent:n, child:n[side], side, queueAfter:q.map(x=>x.value)});
      } else {
        out.push({kind:'null', parent:n, side, queueAfter:q.map(x=>x.value)});
      }
    }
  }
}

function countVisitsUpTo(idx){
  let c = 0;
  for (let i = 0; i < idx; i++) if (scanSteps[i].kind === 'visit') c++;
  return c;
}

async function applyStep(){
  if (scanIdx >= scanSteps.length) return false;
  const s = scanSteps[scanIdx];
  scanIdx++;
  if (s.kind === 'visit'){
    const n = countVisitsUpTo(scanIdx);
    setVisitNumber(s.node, n);
    cx.set(`#${n} visit ${s.node.value} · ${scanName}`, 'O(n)');
    log.say(`<span class="k">${scanName}</span> #${n} ${s.node.value}`);
    await pulse(s.node, scanColor, 240);
    setCurrent(s.node);
    if (s.queueAfter) setQueueState(s.queueAfter);
  } else if (s.kind === 'enqueue'){
    // BFS-only: a child was just pushed onto the queue
    cx.set(`enqueue ${s.child.value} · ${s.parent.value}.${s.side}`, 'O(1)');
    log.say(`<span class="km">enq</span> ${s.child.value} from ${s.parent.value}.${s.side}`);
    setQueueState(s.queueAfter);
    // flash the new tail of the queue
    await pulseQueueItem(queueItems.length - 1, 0x5cffb4, 220);
    setCurrent(s.parent);
  } else {
    const g = ghosts.get(s.parent)?.[s.side];
    cx.set(`${scanName} · null child of ${s.parent.value} (${s.side})`, 'return');
    log.say(`<span class="kx">∅</span> ${scanName} · ${s.parent.value}.${s.side} is null`);
    await pulseGhost(g, 0xff5c70, 220);
    setCurrent(s.parent);
    if (s.queueAfter) setQueueState(s.queueAfter);
  }
  return true;
}

async function undoStepImmediate(){
  if (scanIdx === 0) return false;
  scanIdx--;
  const s = scanSteps[scanIdx];
  // brief animation so the user actually sees the rewind. Temporarily bypass
  // the pause flag so pulse's sleep doesn't block while the scan is paused.
  const wasPaused = stepper.paused;
  stepper.paused = false;
  if (s.kind === 'visit'){
    await pulse(s.node, 0xff5c70, 220);
    s.node.mesh.label.paint(s.node.value);
    s.node.mesh.label.tex.needsUpdate = true;
  } else if (s.kind === 'enqueue'){
    // flash the queue tail that's about to disappear
    await pulseQueueItem(queueItems.length - 1, 0xff5c70, 180);
  } else {
    const g = ghosts.get(s.parent)?.[s.side];
    if (g) await pulseGhost(g, 0xff5c70, 180);
  }
  stepper.paused = wasPaused;
  // move cursor and queue back to the previous step's state
  if (scanIdx > 0){
    const prev = scanSteps[scanIdx - 1];
    if (prev.kind === 'visit')         setCurrent(prev.node);
    else                                setCurrent(prev.parent);
    if (prev.queueAfter)                setQueueState(prev.queueAfter);
  } else {
    setCurrent(null);
    setQueueState([]);
  }
  const n = countVisitsUpTo(scanIdx);
  cx.set(`rewind · #${n} ${scanName}`, scanName);
  log.say(`<span class="ko">undo step</span> · now at #${n}`);
  return true;
}

async function runScan(name, color, builder, btnId){
  $('#t-scan').textContent = name;
  clearVisitNumbers();
  stepperClear();   // drop checkpoints from any previous scan
  scanCancelled = false;
  scanSteps = [];
  scanIdx = 0;
  scanName = name;
  scanColor = color;
  setActiveScan(btnId);
  builder(scanSteps);
  cx.set(`${name} · 0/${scanSteps.length}`, `O(n)`);
  while (scanIdx < scanSteps.length){
    if (scanCancelled) break;
    await applyStep();
    if (scanCancelled) break;
    // checkpoint registers an undo so the player's ← button rewinds this step
    await stepperCheckpoint(`${name} · step ${scanIdx}`, async () => { await undoStepImmediate(); });
  }
  if (scanCancelled){
    clearVisitNumbers();
    clearActiveScan();
    $('#t-scan').textContent = '—';
    scanSteps = null; scanIdx = 0;
    log.say(`<span class="ko">reset</span> · ${name} cancelled`);
    cx.set('idle', '—');
    return;
  }
  const visits = countVisitsUpTo(scanSteps.length);
  log.say(`<span class="k">${name}</span> done · ${visits} visit(s) · ${scanSteps.length - visits} null(s)`);
  cx.set(`${name} done · ${visits} visits`, '—');
}

async function resetScan(){
  // if a scan is in-flight (paused or running), tell it to abort and wake any pending pause
  if (busy){
    scanCancelled = true;
    stepper.paused = false;
    stepperKick();
    return;
  }
  // not running — just clear visuals
  clearVisitNumbers();
  clearActiveScan();
  stepperClear();
  scanSteps = null; scanIdx = 0; scanName = '';
  $('#t-scan').textContent = '—';
  log.say(`<span class="ko">reset</span> scan`);
  cx.set('idle', '—');
}

/* ─── ops ─── */
const opHandlers = {
  inorder:   lock(() => runScan('in-order',   0x35d0ff, buildInOrder,   'op-inorder')),
  preorder:  lock(() => runScan('pre-order',  0x7c5cff, buildPreOrder,  'op-preorder')),
  postorder: lock(() => runScan('post-order', 0xff5cab, buildPostOrder, 'op-postorder')),
  bfs:       lock(() => runScan('BFS',        0xffb454, buildBFS,       'op-bfs')),
  insert: lock(async () => {
    const vals = readVals();
    history.push({type:'snapshot', values: snapshotValues()});
    for (const v of vals){ insertK(v); await relayout(true); log.say(`<span class="k">insert</span> ${v}`); }
    cx.set(`insert · h=${depth(root)}`, 'O(log n)');
  }),
  find: lock(async () => {
    const v = readVal(); if (v===null) return;
    cx.set(`find ${v}`, 'O(h)');
    clearVisitNumbers();
    let n = root, found = null, steps = 0;
    while (n){
      steps++;
      setVisitNumber(n, steps);
      cx.set(`step ${steps} · at ${n.value}`, 'O(h)');
      await pulse(n, 0xffb454, 220);
      await stepperCheckpoint();
      if (v === n.value){ found = n; break; }
      n = v < n.value ? n.left : n.right;
    }
    if (found){ await pulse(found, 0x5cffb4, 700); log.say(`<span class="k">find</span>(${v}) → hit · ${steps} step(s)`); }
    else log.say(`<span class="kx">find</span>(${v}) → miss · ${steps} step(s)`);
  }),
  undo: lock(async () => {
    const op = history.pop(); if (!op){ log.say(`<span class="kx">undo</span> empty`); return; }
    await rebuildFrom(op.values);
    log.say(`<span class="ko">undo</span>`);
  }),
  clear: lock(async () => {
    history.push({type:'snapshot', values: snapshotValues()});
    await rebuildFrom([]);
    $('#t-scan').textContent = '—';
    log.say(`<span class="ko">clear</span>`);
  }),
};
for (const k in opHandlers) $('#op-'+k).addEventListener('click', opHandlers[k]);
// reset button is intentionally NOT wrapped with `lock` — it has to be able to
// interrupt a paused or in-flight scan
$('#op-reset').addEventListener('click', resetScan);
$('#b-rand').addEventListener('click', () => $('#in-val').value = randomInt(1,99));

/* ─── presets ─── */
mountPresets({mount: $('#presets-mount'), label: 'defaults', presets:[
  {name:'balanced',  desc:'classic BST · 7 nodes, h=3',                 apply: () => rebuildFrom([50, 25, 75, 12, 37, 62, 87])},
  {name:'complete',  desc:'15 nodes, perfectly full to depth 4',        apply: () => rebuildFrom([8,4,12,2,6,10,14,1,3,5,7,9,11,13,15])},
  {name:'sorted',    desc:'[1..7] · degenerates to right spine',        apply: () => rebuildFrom([1,2,3,4,5,6,7])},
  {name:'reverse',   desc:'[7..1] · all-left spine',                    apply: () => rebuildFrom([7,6,5,4,3,2,1])},
  {name:'zigzag',    desc:'4,1,7,2,6,3,5 — different BFS vs DFS order', apply: () => rebuildFrom([4,1,7,2,6,3,5])},
]});

/* seed */
(async () => {
  for (const v of [50, 25, 75, 12, 37, 62, 87]) insertK(v);
  await relayout(false);
  history.clear(); refreshHUD();
  log.say(`<span class="k">init</span> 7 keys · run a scan from the panel`);
  cx.set('idle', '—');
})();
</script>
