<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

/* ─── inlined lab runtime ─── */
/* ─────────────────────────────────────────────────────────────
   shared lab runtime
   ───────────────────────────────────────────────────────────── */

const PALETTE = {
  void:    0x05060d,
  ink:     0xe6ecff,
  inkDim:  0x8b93b8,
  cyan:    0x35d0ff,
  amber:   0xffb454,
  magenta: 0xff5cab,
  violet:  0x7c5cff,
  lime:    0xb9ff5c,
  err:     0xff5c70,
  ok:      0x5cffb4,
};

/* ─── small DOM helpers ─── */
const $  = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for (const k in attrs){
    if (k === 'class') n.className = attrs[k];
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), attrs[k]);
    else n.setAttribute(k, attrs[k]);
  }
  for (const c of kids){
    if (c == null) continue;
    n.appendChild(c.nodeType ? c : document.createTextNode(c));
  }
  return n;
};

/* ─── three.js scene wrapper ─── */
function createScene({mount, camera = {pos:[0,4,18], lookAt:[0,0,0]}}){
  const w = mount.clientWidth, h = mount.clientHeight;
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x04050b, 26, 90);

  const cam = new THREE.PerspectiveCamera(45, w/h, 0.1, 200);
  cam.position.set(...camera.pos);
  cam.lookAt(new THREE.Vector3(...camera.lookAt));

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, h, false);
  renderer.setClearColor(0x000000, 0);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  mount.appendChild(renderer.domElement);

  // lighting
  const amb = new THREE.AmbientLight(0xb8c4ff, 0.55);
  scene.add(amb);
  const key = new THREE.DirectionalLight(0xffffff, 1.05);
  key.position.set(5, 10, 8);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0x35d0ff, 0.45);
  rim.position.set(-8, 4, -6);
  scene.add(rim);
  const mag = new THREE.PointLight(0xff5cab, 0.65, 40);
  mag.position.set(-6, 2, 6);
  scene.add(mag);

  // starfield (very subtle)
  {
    const g = new THREE.BufferGeometry();
    const N = 320, arr = new Float32Array(N*3);
    for (let i=0;i<N;i++){
      arr[i*3]   = (Math.random()-0.5)*120;
      arr[i*3+1] = (Math.random()-0.5)*80 + 8;
      arr[i*3+2] = (Math.random()-0.5)*120 - 20;
    }
    g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
    const m = new THREE.PointsMaterial({color:0x9aa6d6, size:0.05, transparent:true, opacity:0.45});
    scene.add(new THREE.Points(g, m));
  }

  // floor: large faint disc + radial grid
  {
    const disc = new THREE.Mesh(
      new THREE.CircleGeometry(60, 64),
      new THREE.MeshBasicMaterial({color:0x0a0e1c, transparent:true, opacity:0.65, side:THREE.DoubleSide})
    );
    disc.rotation.x = -Math.PI/2;
    disc.position.y = -3.5;
    scene.add(disc);
    const grid = new THREE.GridHelper(80, 40, 0x35d0ff, 0x1a2240);
    grid.material.opacity = 0.18; grid.material.transparent = true;
    grid.position.y = -3.49;
    scene.add(grid);
  }

  // camera drift
  const drift = {t:0, base: cam.position.clone(), enabled:true};
  function tick(){
    drift.t += 0.0035;
    if (drift.enabled){
      cam.position.x = drift.base.x + Math.sin(drift.t*0.7)*0.55;
      cam.position.y = drift.base.y + Math.cos(drift.t*0.5)*0.25;
      cam.lookAt(0, camera.lookAt[1], camera.lookAt[2]);
    }
    renderer.render(scene, cam);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // resize
  const onResize = () => {
    const W = mount.clientWidth, H = mount.clientHeight;
    cam.aspect = W/H; cam.updateProjectionMatrix();
    renderer.setSize(W, H, false);
  };
  window.addEventListener('resize', onResize);

  return {scene, cam, renderer, drift};
}

/* ─── small tween util ─── */
function tween(obj, prop, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = obj[prop];
    const t0 = performance.now();
    function step(now){
      const k = Math.min(1, (now-t0)/ms);
      obj[prop] = from + (to - from)*ease(k);
      if (k<1) requestAnimationFrame(step); else res();
    }
    requestAnimationFrame(step);
  });
}
function tweenVec(vec, to, ms=420, ease=easeOutCubic){
  return new Promise(res => {
    const from = vec.clone();
    const t0 = performance.now();
    function step(now){
      const k = Math.min(1, (now-t0)/ms);
      vec.lerpVectors(from, to, ease(k));
      if (k<1) requestAnimationFrame(step); else res();
    }
    requestAnimationFrame(step);
  });
}
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const easeInOutCubic = t => t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ─── undo stack ─── */
function createHistory(){
  const stack = [];
  return {
    push(snapshot){ stack.push(snapshot); },
    pop(){ return stack.pop(); },
    size(){ return stack.length; },
    clear(){ stack.length = 0; },
  };
}

/* ─── on-screen log ─── */
function createLog(mountSel='#log'){
  const root = typeof mountSel === 'string' ? $(mountSel) : mountSel;
  const list = el('div', {class:'log-list'});
  root.appendChild(el('h3', {}, 'Trace'));
  root.appendChild(list);
  function fmtTime(){
    const d = new Date();
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
  }
  return {
    say(html){
      const row = el('div', {class:'entry'},
        el('span', {class:'t'}, fmtTime()),
        el('span', {class:'e', html})
      );
      list.prepend(row);
      while (list.childElementCount > 80) list.lastElementChild.remove();
    },
    clear(){ list.innerHTML = ''; },
  };
}

/* ─── complexity readout ─── */
function createComplexityPanel(mount, rows){
  const wrap = el('div', {class:'cx-panel'});
  for (const r of rows){
    wrap.appendChild(el('div', {class:'cx-row'},
      el('span', {class:'key'}, r.key),
      el('span', {class:'val'}, r.val)
    ));
  }
  const now = el('div', {class:'cx-now'},
    el('span', {html:'<span class="badge"></span><span class="now-text">idle</span>'}),
    el('span', {class:'now-cx', html:'&nbsp;'})
  );
  wrap.appendChild(now);
  mount.appendChild(wrap);
  return {
    set(opLabel, cx){
      now.querySelector('.now-text').textContent = opLabel;
      now.querySelector('.now-cx').innerHTML = cx;
    },
  };
}

/* ─── wire back button + clock ─── */
function mountTopbar({title, sub, back='index.html'}){

  if (!root) return;
  root.innerHTML = '';
  root.appendChild(el('a', {class:'btn-back', href:back, 'aria-label':'Back to labs'},

  root.appendChild(el('div', {class:'brand'},

  const tick = () => {

    clock.innerHTML = `<b>T</b>&nbsp; ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  };

/* ─── input parsing util ─── */
function parseNum(str, fallback=null){
  if (str == null || str === '') return fallback;
  const n = Number(str);
  if (Number.isFinite(n)) return n;
  return fallback;
}
function parseList(str){
  if (!str) return [];
  return String(str).split(/[,\s]+/).filter(Boolean).map(Number).filter(Number.isFinite);
}
function randomInt(a, b){ return a + Math.floor(Math.random()*(b-a+1)); }

/* ─── end runtime ─── */


mountTopbar({title:'Union-Find', sub:'lab 06 · disjoint forest'});
const log = createLog('#log');
const cx  = createComplexityPanel($('#cx-mount'), [
  {key:'makeSet', val:'O(1)'},
  {key:'find · with compression', val:'O(α(n))'},
  {key:'union · by rank', val:'O(α(n))'},
  {key:'sequence of m ops', val:'O(m α(n))'},
  {key:'space', val:'O(n)'},
]);
const history = createHistory();

const stage = $('#stage');
const {scene} = createScene({mount:stage, camera:{pos:[0, 5.5, 20], lookAt:[0, 1, 0]}});

const parent = new Map(); // key -> parent key (self for root)
const rank   = new Map();
const meshes = new Map(); // key -> {grp, body, label}
const edges  = new Map(); // key -> edge mesh (from key → parent), root has hidden edge

function makeNodeMesh(key){
  const grp = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(0.6, 24, 18),
    new THREE.MeshPhysicalMaterial({color:0x18223e, metalness:0.55, roughness:0.18, emissive:0x081428, emissiveIntensity:0.7, clearcoat:0.6})
  );
  grp.add(body);
  const wire = new THREE.Mesh(
    new THREE.SphereGeometry(0.61, 12, 8),
    new THREE.MeshBasicMaterial({color:0xffb454, wireframe:true, transparent:true, opacity:0.45})
  );
  grp.add(wire);
  const c = document.createElement('canvas'); c.width=256; c.height=128;
  const ctx = c.getContext('2d');
  function paint(v, isRoot, rk){
    ctx.clearRect(0,0,256,128);
    ctx.fillStyle = '#fff'; ctx.font='700 48px IBM Plex Mono, monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(String(v), 128, 50);
    ctx.fillStyle = isRoot ? '#5cffb4' : '#8b93b8';
    ctx.font='500 22px IBM Plex Mono, monospace';
    ctx.fillText(isRoot ? `root · rk ${rk}` : 'child', 128, 100);
  }
  paint(key, true, 0);
  const tex = new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true}));
  spr.position.set(0, 1.4, 0); spr.scale.set(2.4, 1.2, 1);
  grp.add(spr);
  grp.scale.setScalar(0.001);
  scene.add(grp);
  return {grp, body, wire, label:{paint, tex}};
}

function makeEdge(){
  const e = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.04, 1, 12),
    new THREE.MeshBasicMaterial({color:0xffb454, transparent:true, opacity:0.6})
  );
  e.visible = false; scene.add(e);
  return e;
}
function placeEdge(edge, ax, ay, bx, by){
  const dx = bx-ax, dy = by-ay; const len = Math.sqrt(dx*dx+dy*dy);
  edge.position.set((ax+bx)/2, (ay+by)/2, 0);
  edge.scale.y = len; edge.rotation.z = Math.atan2(dx, -dy);
}

function findRoot(x){ while (parent.get(x) !== x) x = parent.get(x); return x; }
function findCompressed(x, trail){
  trail.push(x);
  while (parent.get(x) !== x){
    x = parent.get(x); trail.push(x);
  }
  // compress
  for (const t of trail){ parent.set(t, x); }
  return x;
}

function ensureMesh(k){
  if (!meshes.has(k)){
    const m = makeNodeMesh(k); meshes.set(k, m);
    edges.set(k, makeEdge());
  }
}

function computeForestLayout(){
  // group keys by root
  const groups = new Map();
  for (const k of parent.keys()){
    const r = findRoot(k);
    if (!groups.has(r)) groups.set(r, []);
    groups.get(r).push(k);
  }
  // for each tree compute depth + horizontal slot
  const positions = new Map();
  // sort groups by size desc
  const order = [...groups.entries()].sort((a,b)=>b[1].length - a[1].length);
  // arrange groups in a row, each with width proportional to leaves
  const widths = order.map(([_, ks]) => Math.max(3, Math.ceil(Math.sqrt(ks.length)) * 2.2));
  const totalW = widths.reduce((a,b)=>a+b+1, 0);
  let cursorX = -totalW/2;
  order.forEach(([r, ks], gi) => {
    // assign depth: from each node, walk to root counting steps
    const depth = new Map();
    for (const k of ks){
      let d = 0, n = k;
      while (parent.get(n) !== n){ n = parent.get(n); d++; }
      depth.set(k, d);
    }
    // assign x within group by sibling order (use insertion order)
    const byDepth = new Map();
    for (const k of ks){
      const d = depth.get(k); if (!byDepth.has(d)) byDepth.set(d, []); byDepth.get(d).push(k);
    }
    const w = widths[gi];
    const baseX = cursorX + w/2;
    cursorX += w + 1.2;
    for (const [d, list] of byDepth){
      list.forEach((k, i) => {
        const x = baseX + (i - (list.length-1)/2) * Math.max(1.4, w/Math.max(1,list.length));
        const y = -d * 2.0 + 2.6;
        positions.set(k, {x, y});
      });
    }
  });
  return positions;
}

async function relayout(animate=true){
  for (const k of parent.keys()) ensureMesh(k);
  const positions = computeForestLayout();
  const tasks = [];
  for (const [k, mesh] of meshes){
    const p = positions.get(k); if (!p) continue;
    tasks.push(tweenVec(mesh.grp.position, new THREE.Vector3(p.x, p.y, 0), animate?420:0));
    tasks.push(tweenVec(mesh.grp.scale, new THREE.Vector3(1,1,1), animate?320:0));
    const isRoot = parent.get(k) === k;
    mesh.label.paint(k, isRoot, rank.get(k) || 0);
    mesh.label.tex.needsUpdate = true;
    const e = edges.get(k);
    if (isRoot){ e.visible = false; }
    else {
      const pp = positions.get(parent.get(k));
      if (pp){ e.visible = true; placeEdge(e, pp.x, pp.y, p.x, p.y); }
    }
  }
  await Promise.all(tasks);
  refreshHUD();
}

function refreshHUD(){
  $('#t-size').textContent = parent.size;
  // count roots
  let roots = 0; for (const k of parent.keys()) if (parent.get(k) === k) roots++;
  $('#t-sets').textContent = roots;
  $('#undo-depth').textContent = history.size();
  $('#hist-pill').textContent = history.size();
}

async function pulse(k, color=0x5cffb4, ms=240){
  const m = meshes.get(k); if (!m) return;
  const mat = m.body.material;
  const eOld = mat.emissive.clone(), iOld = mat.emissiveIntensity;
  mat.emissive.setHex(color); mat.emissiveIntensity = 1.3;
  await sleep(ms);
  mat.emissive.copy(eOld); mat.emissiveIntensity = iOld;
}

async function makeSetK(k){
  if (parent.has(k)){ log.say(`<span class="kx">err</span> ${k} already exists`); return false; }
  parent.set(k, k); rank.set(k, 0);
  ensureMesh(k);
  await relayout(true);
  await pulse(k, 0x35d0ff);
  return true;
}

async function unionK(a, b){
  if (!parent.has(a)) await makeSetK(a);
  if (!parent.has(b)) await makeSetK(b);
  const ra = await findAnim(a), rb = await findAnim(b);
  if (ra === rb){ log.say(`<span class="kx">union</span> ${a},${b} · same set`); return false; }
  // union by rank
  const ka = rank.get(ra), kb = rank.get(rb);
  if (ka < kb){ parent.set(ra, rb); }
  else if (ka > kb){ parent.set(rb, ra); }
  else { parent.set(rb, ra); rank.set(ra, ka + 1); }
  await relayout(true);
  return true;
}

async function findAnim(k){
  const trail = [k];
  let cur = k;
  while (parent.get(cur) !== cur){ await pulse(cur, 0xffb454, 180); cur = parent.get(cur); trail.push(cur); }
  await pulse(cur, 0xb9ff5c, 220);
  // path compression: rewire each trail[i] (except root) to root
  let didCompress = false;
  for (let i=0;i<trail.length-1;i++){
    if (parent.get(trail[i]) !== cur){ parent.set(trail[i], cur); didCompress = true; }
  }
  if (didCompress){ await relayout(true); log.say(`<span class="km">compress</span> path → root ${cur}`); }
  return cur;
}

let busy = false;
function lock(fn){ return async (...a) => { if (busy) return; busy=true; try{ await fn(...a); } finally{ busy=false; refreshHUD(); } }; }

const opHandlers = {
  make: lock(async () => {
    const a = parseNum($('#in-a').value, null);
    if (a === null){ log.say(`<span class="kx">err</span> a required`); return; }
    history.push({type:'snapshot', parent: new Map(parent), rank: new Map(rank)});
    const ok = await makeSetK(a);
    cx.set('makeSet', 'O(1)');
    if (ok) log.say(`<span class="k">makeSet</span>(${a})`);
  }),
  union: lock(async () => {
    const a = parseNum($('#in-a').value, null), b = parseNum($('#in-b').value, null);
    if (a === null || b === null){ log.say(`<span class="kx">err</span> a,b required`); return; }
    history.push({type:'snapshot', parent: new Map(parent), rank: new Map(rank)});
    cx.set('union — find roots, link', 'O(α(n))');
    await unionK(a, b);
    log.say(`<span class="k">union</span>(${a}, ${b})`);
  }),
  find: lock(async () => {
    const a = parseNum($('#in-a').value, null);
    if (a === null || !parent.has(a)){ log.say(`<span class="kx">err</span> ${a} not in forest`); return; }
    history.push({type:'snapshot', parent: new Map(parent), rank: new Map(rank)});
    cx.set('find — walk, compress', 'O(α(n))');
    const r = await findAnim(a);
    log.say(`<span class="k">find</span>(${a}) → root ${r}`);
  }),
  conn: lock(async () => {
    const a = parseNum($('#in-a').value, null), b = parseNum($('#in-b').value, null);
    if (a === null || b === null){ log.say(`<span class="kx">err</span> a,b required`); return; }
    if (!parent.has(a) || !parent.has(b)){ log.say(`<span class="kx">connected</span> element missing`); return; }
    cx.set('connected? · find both', 'O(α(n))');
    const ra = await findAnim(a), rb = await findAnim(b);
    log.say(ra === rb ? `<span class="k">connected</span>(${a},${b}) → yes (root ${ra})` : `<span class="kx">connected</span>(${a},${b}) → no`);
  }),
  undo: lock(async () => {
    const op = history.pop(); if (!op){ log.say(`<span class="kx">undo</span> empty`); return; }
    // restore
    parent.clear(); rank.clear();
    for (const [k,v] of op.parent) parent.set(k, v);
    for (const [k,v] of op.rank) rank.set(k, v);
    // remove meshes for keys no longer in forest
    for (const [k, m] of meshes){
      if (!parent.has(k)){ scene.remove(m.grp); scene.remove(edges.get(k)); meshes.delete(k); edges.delete(k); }
    }
    await relayout(false);
    cx.set('undo', '—');
    log.say(`<span class="ko">undo</span>`);
  }),
  clear: lock(async () => {
    history.push({type:'snapshot', parent: new Map(parent), rank: new Map(rank)});
    for (const [k, m] of meshes){ scene.remove(m.grp); scene.remove(edges.get(k)); }
    meshes.clear(); edges.clear(); parent.clear(); rank.clear();
    await relayout(false);
    log.say(`<span class="ko">clear</span>`);
  }),
};
for (const k in opHandlers) $('#op-'+k).addEventListener('click', opHandlers[k]);

/* seed */
(async () => {
  for (const v of [1,2,3,4,5,6,7,8]){ parent.set(v, v); rank.set(v, 0); ensureMesh(v); }
  parent.set(2, 1); parent.set(3, 1); rank.set(1, 1);
  parent.set(5, 4); rank.set(4, 1);
  parent.set(7, 6); rank.set(6, 1);
  await relayout(false);
  history.clear(); refreshHUD();
  log.say(`<span class="k">init</span> 8 elements · 4 sets`);
  cx.set('idle', '—');
})();
</script>
