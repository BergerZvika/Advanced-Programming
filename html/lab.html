<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HTML Lab — Interactive Tutorial</title>

<!-- CodeMirror 5 for syntax-highlighted editing (IDE feel) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/material-darker.min.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/css/css.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/edit/closetag.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/edit/matchtags.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/selection/active-line.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/fold/foldgutter.min.css">
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/fold/foldcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/fold/foldgutter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/fold/xml-fold.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/fold/brace-fold.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/fold/comment-fold.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/addon/fold/indent-fold.min.js"></script>
<style>
  :root {
    --bg: #0b1020;
    --panel: #0f172a;
    --panel-2: #111a33;
    --line: #1f2a44;
    --muted: #8aa0c8;
    --text: #e6edf8;
    --ink: #0b1020;
    --paper: #f6f8fc;
    --paper-line: #e3e8f0;
    --accent: #7c8cff;
    --accent-2: #b58bff;
    --accent-3: #44d7b6;
    --warn: #ffb86b;
    --bad: #ff6e8a;
    --radius: 14px;
    --shadow: 0 10px 30px rgba(5, 10, 30, .35);
    --code-font: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, Consolas, monospace;
    --ui-font: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--ui-font);
    color: var(--text);
    background:
      radial-gradient(900px 600px at 85% -10%, #26306a 0%, transparent 60%),
      radial-gradient(800px 500px at -10% 110%, #3b1f6b 0%, transparent 55%),
      var(--bg);
    overflow: hidden;
  }

  /* ── Header ───────────────────────────────────────── */
  header.top {
    height: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    border-bottom: 1px solid var(--line);
    background: rgba(10, 14, 30, .65);
    backdrop-filter: blur(10px);
    position: relative;
    z-index: 5;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; letter-spacing: .2px;
  }
  .brand .logo {
    width: 28px; height: 28px; border-radius: 8px;
    background: conic-gradient(from 210deg, var(--accent), var(--accent-2), var(--accent-3), var(--accent));
    box-shadow: 0 0 0 1px rgba(255,255,255,.08) inset, 0 8px 20px rgba(124,140,255,.35);
    display: grid; place-items: center;
    color: #0b1020; font-weight: 900; font-size: 14px;
  }
  .brand small { color: var(--muted); font-weight: 500; margin-left: 2px; }
  .spacer { flex: 1; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 999px;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--line);
    color: var(--muted);
    font-size: 12px;
  }
  .pill b { color: var(--text); }
  .btn {
    background: linear-gradient(180deg, #1a2547, #121a33);
    color: var(--text);
    border: 1px solid var(--line);
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    transition: transform .08s ease, border-color .15s ease, background .15s ease;
  }
  .btn:hover { border-color: #2d3d6d; }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    background: linear-gradient(180deg, #7c8cff, #5865e8);
    border-color: transparent;
    color: white;
    box-shadow: 0 6px 20px rgba(124,140,255,.35);
  }

  /* ── Shell layout ─────────────────────────────────── */
  .shell {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: calc(100vh - 56px);
  }

  /* ── Sidebar ─────────────────────────────────────── */
  aside.side {
    border-right: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(18, 25, 52, .9), rgba(11, 16, 32, .9));
    padding: 14px 10px;
    overflow-y: auto;
  }
  .side h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--muted); margin: 10px 10px 6px;
  }
  .topic-btn {
    width: 100%;
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    text-align: left;
    border-radius: 10px;
    cursor: pointer;
    font: inherit;
    font-size: 13.5px;
    margin: 2px 0;
    transition: background .15s, border-color .15s, transform .05s;
  }
  .topic-btn:hover { background: rgba(255,255,255,.04); }
  .topic-btn.active {
    background: linear-gradient(180deg, rgba(124,140,255,.18), rgba(181,139,255,.12));
    border-color: rgba(124,140,255,.45);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
  }
  .topic-btn .num {
    width: 26px; height: 26px; border-radius: 7px;
    display: grid; place-items: center;
    background: rgba(255,255,255,.05);
    color: var(--muted);
    font-weight: 700; font-size: 12px;
    flex: 0 0 auto;
  }
  .topic-btn.active .num {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0b1020;
  }
  .topic-btn .meta { display: flex; flex-direction: column; line-height: 1.15; }
  .topic-btn .meta small { color: var(--muted); font-size: 11px; }

  /* ── Main ───────────────────────────────────────── */
  main.main { display: flex; flex-direction: column; min-width: 0; }

  .crumb {
    padding: 14px 20px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 14px;
    flex-wrap: wrap;
  }
  .crumb h1 {
    font-size: 18px; margin: 0; font-weight: 700;
    background: linear-gradient(90deg, #fff, #c9d2ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .crumb .sep { color: var(--muted); }
  .crumb .hint { color: var(--muted); font-size: 12.5px; }

  .steps-row {
    display: flex; gap: 8px; padding: 10px 20px 4px;
    overflow-x: auto; scrollbar-width: thin;
    border-bottom: 1px solid var(--line);
  }
  .step-chip {
    flex: 0 0 auto;
    padding: 7px 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,.03);
    color: var(--muted);
    cursor: pointer;
    font: inherit; font-size: 12.5px;
    white-space: nowrap;
    transition: background .15s, color .15s, border-color .15s;
  }
  .step-chip:hover { color: var(--text); }
  .step-chip.active {
    background: linear-gradient(180deg, var(--accent), #5865e8);
    color: white;
    border-color: transparent;
  }

  .stage {
    flex: 1;
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 0;
  }

  .step-head {
    padding: 14px 20px 8px;
  }
  .step-head h2 {
    margin: 0 0 4px;
    font-size: 20px;
    letter-spacing: .1px;
  }
  .step-head p {
    margin: 0;
    color: var(--muted);
    font-size: 13.5px;
    line-height: 1.55;
    max-width: 900px;
  }
  .step-head code {
    background: rgba(255,255,255,.06);
    border: 1px solid var(--line);
    padding: 1px 6px;
    border-radius: 5px;
    font-family: var(--code-font);
    font-size: 12px;
    color: #e7e0ff;
  }
  .step-head .step-note {
    margin-top: 8px;
    padding: 10px 14px;
    background: rgba(124,140,255,.07);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    color: var(--text);
    font-size: 13px;
    line-height: 1.6;
    max-width: 900px;
  }
  .step-head .step-note:empty { display: none; }
  .step-head .step-note::before {
    content: "Note — ";
    font-family: var(--code-font);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-right: 4px;
    font-weight: 600;
  }
  .step-head .step-note b,
  .step-head .step-note strong {
    color: var(--accent-3);
    font-weight: 600;
  }

  /* ── Workbench ─────────────────────────────────── */
  .workbench {
    padding: 10px 20px 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    min-height: 0;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    display: flex; flex-direction: column;
    min-height: 0;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .panel-head {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #121a33, #0e1530);
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot.r { background: #ff6e8a; } .dot.y { background: #ffb86b; } .dot.g { background: #44d7b6; }
  .panel-title {
    font-size: 12.5px; color: var(--muted);
    margin-left: 6px; letter-spacing: .3px;
  }
  .panel-actions { margin-left: auto; display: flex; gap: 8px; }
  .icon-btn {
    background: rgba(255,255,255,.04);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 5px 9px; border-radius: 8px; cursor: pointer;
    font: inherit; font-size: 11.5px;
    transition: background .15s, border-color .15s;
  }
  .icon-btn:hover { background: rgba(255,255,255,.08); }

  .editor {
    flex: 1; min-height: 0;
    width: 100%;
    background: #0b1024;
    color: #e6edf8;
    border: none; outline: none; resize: none;
    padding: 14px 16px;
    font-family: var(--code-font);
    font-size: 13px; line-height: 1.6;
    tab-size: 2;
  }
  .editor::selection { background: rgba(124,140,255,.35); }

  /* ── CodeMirror — IDE-style editor ─────────────── */
  .CodeMirror {
    flex: 1 1 0;
    min-height: 0;
    height: 100%;
    font-family: var(--code-font);
    font-size: 13px;
    line-height: 1.6;
    background: #0b1024 !important;
  }
  .CodeMirror-scroll {
    background: #0b1024;
    min-height: 0;
    overflow: auto !important;
  }
  /* Styled scrollbars inside the editor */
  .CodeMirror-scroll::-webkit-scrollbar,
  .CodeMirror-hscrollbar::-webkit-scrollbar,
  .CodeMirror-vscrollbar::-webkit-scrollbar {
    width: 10px;
    height: 10px;
    background: transparent;
  }
  .CodeMirror-scroll::-webkit-scrollbar-thumb,
  .CodeMirror-hscrollbar::-webkit-scrollbar-thumb,
  .CodeMirror-vscrollbar::-webkit-scrollbar-thumb {
    background: rgba(124,140,255,.25);
    border-radius: 6px;
    border: 2px solid #0b1024;
  }
  .CodeMirror-scroll::-webkit-scrollbar-thumb:hover,
  .CodeMirror-hscrollbar::-webkit-scrollbar-thumb:hover,
  .CodeMirror-vscrollbar::-webkit-scrollbar-thumb:hover {
    background: rgba(124,140,255,.45);
  }
  .CodeMirror-gutters {
    background: #0b1024 !important;
    border-right: 1px solid var(--line) !important;
  }
  .CodeMirror-linenumber { color: #3f4a66 !important; padding: 0 8px 0 6px; }

  /* ── Fold gutter (tree-hierarchy triangles) ────── */
  .CodeMirror-foldgutter { width: 14px; }
  .CodeMirror-foldgutter-open,
  .CodeMirror-foldgutter-folded {
    color: var(--muted);
    cursor: pointer;
    font-size: 10px;
    line-height: 1.6;
    text-align: center;
  }
  .CodeMirror-foldgutter-open:hover,
  .CodeMirror-foldgutter-folded:hover { color: var(--accent); }
  .CodeMirror-foldgutter-open::after  { content: "▾"; }
  .CodeMirror-foldgutter-folded::after { content: "▸"; color: var(--accent); }
  .CodeMirror-foldmarker {
    color: var(--accent-3);
    background: rgba(68,215,182,.12);
    border: 1px solid rgba(68,215,182,.35);
    border-radius: 4px;
    padding: 0 6px;
    margin: 0 2px;
    font-family: var(--code-font);
    font-size: 11px;
    cursor: pointer;
  }
  .CodeMirror-foldmarker:hover { background: rgba(68,215,182,.22); }
  .CodeMirror-cursor { border-left: 1.5px solid var(--accent) !important; }
  .CodeMirror-activeline-background { background: rgba(124,140,255,.06) !important; }
  .CodeMirror-matchingbracket {
    color: var(--accent-3) !important;
    text-decoration: none;
    font-weight: 600;
    background: rgba(68,215,182,.1);
    border-radius: 2px;
  }
  .CodeMirror-selected { background: rgba(124,140,255,.28) !important; }
  .CodeMirror-focused .CodeMirror-selected { background: rgba(124,140,255,.32) !important; }
  /* Richer syntax colours layered on top of material-darker */
  .cm-s-material-darker.CodeMirror { background: #0b1024 !important; color: #e6edf8 !important; }
  .cm-s-material-darker .cm-tag      { color: #ff6e8a; }
  .cm-s-material-darker .cm-bracket  { color: #6b7a96; }
  .cm-s-material-darker .cm-attribute { color: #b58bff; }
  .cm-s-material-darker .cm-string   { color: #44d7b6; }
  .cm-s-material-darker .cm-string-2 { color: #44d7b6; }
  .cm-s-material-darker .cm-keyword  { color: #ff6e8a; font-style: italic; }
  .cm-s-material-darker .cm-def      { color: #7c8cff; }
  .cm-s-material-darker .cm-variable { color: #e6edf8; }
  .cm-s-material-darker .cm-variable-2 { color: #c5cde6; }
  .cm-s-material-darker .cm-variable-3 { color: #ffb86b; }
  .cm-s-material-darker .cm-number   { color: #ffb86b; }
  .cm-s-material-darker .cm-property { color: #7c8cff; }
  .cm-s-material-darker .cm-operator { color: #b58bff; }
  .cm-s-material-darker .cm-comment  { color: #5b6682; font-style: italic; }
  .cm-s-material-darker .cm-atom     { color: #ffb86b; }
  .cm-s-material-darker .cm-builtin  { color: #44d7b6; }
  .cm-s-material-darker .cm-meta     { color: #6b7a96; }

  .tab-bar {
    display: flex;
    gap: 2px;
    padding: 6px 10px 0;
    background: #0b1024;
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .tab-bar:empty { display: none; }
  .tab {
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    color: var(--muted);
    padding: 6px 12px;
    font-family: var(--code-font);
    font-size: 11.5px;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    transition: background .15s, color .15s, border-color .15s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); background: rgba(255,255,255,.04); }
  .tab.active {
    color: var(--accent);
    background: var(--panel-2);
    border-color: var(--line);
    border-bottom-color: var(--panel-2);
    margin-bottom: -1px;
  }

  .preview-wrap { flex: 1; min-height: 0; display: flex; background: white; }
  .preview {
    flex: 1; border: none; width: 100%; height: 100%;
    background: white;
  }

  /* ── Footer nav ────────────────────────────────── */
  .navbar {
    padding: 12px 20px;
    border-top: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
    background: rgba(10, 14, 30, .5);
  }
  .navbar .progress {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,.05);
    border-radius: 999px;
    overflow: hidden;
    margin: 0 12px;
  }
  .navbar .bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3));
    transition: width .25s ease;
  }

  /* ── Scrollbars ─────────────────────────────────── */
  aside.side::-webkit-scrollbar,
  .steps-row::-webkit-scrollbar { width: 8px; height: 8px; }
  aside.side::-webkit-scrollbar-thumb,
  .steps-row::-webkit-scrollbar-thumb {
    background: #2a3559; border-radius: 10px;
  }

  /* ── Responsive ─────────────────────────────────── */
  @media (max-width: 960px) {
    .shell { grid-template-columns: 1fr; }
    aside.side {
      max-height: 180px;
      display: flex; flex-direction: row; gap: 6px;
      overflow-x: auto; padding: 10px;
      border-right: none; border-bottom: 1px solid var(--line);
    }
    aside.side h3 { display: none; }
    .topic-btn { flex: 0 0 auto; padding: 8px 10px; }
    .topic-btn .meta small { display: none; }
    .workbench { grid-template-columns: 1fr; }
    .panel { min-height: 220px; }
  }

  /* tiny entrance anim on step change */
  .fade-in { animation: fade .25s ease both; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <div class="logo">&lt;/&gt;</div>
    <div>HTML Lab <small>interactive tutorial</small></div>
  </div>
  <div class="spacer"></div>
  <span class="pill">Topic <b id="pillTopic">1 / 14</b></span>
  <span class="pill">Step <b id="pillStep">1 / 1</b></span>
  <button class="btn" id="resetBtn" title="Reset this step">Reset step</button>
</header>

<div class="shell">
  <aside class="side" id="sideNav">
    <h3>Tutorial</h3>
  </aside>

  <main class="main">
    <div class="crumb">
      <h1 id="topicTitle">…</h1>
      <span class="sep">›</span>
      <span class="hint" id="topicHint">…</span>
    </div>

    <div class="steps-row" id="stepsRow"></div>

    <div class="stage">
      <div class="step-head">
        <h2 id="stepTitle">…</h2>
        <p id="stepDesc">…</p>
        <p id="stepNote" class="step-note"></p>
      </div>

      <div class="workbench">
        <section class="panel">
          <div class="panel-head">
            <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
            <span class="panel-title">editor.html</span>
            <div class="panel-actions">
              <button class="icon-btn" id="copyBtn">Copy</button>
              <button class="icon-btn" id="formatBtn">Format</button>
            </div>
          </div>
          <div class="tab-bar" id="tabBar"></div>
          <textarea class="editor" id="editor" spellcheck="false" autocomplete="off"></textarea>
        </section>

        <section class="panel">
          <div class="panel-head">
            <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
            <span class="panel-title">live preview</span>
            <div class="panel-actions">
              <button class="icon-btn" id="openTabBtn">Open in tab ↗</button>
            </div>
          </div>
          <div class="preview-wrap">
            <iframe class="preview" id="preview" title="preview" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
          </div>
        </section>
      </div>

      <div class="navbar">
        <button class="btn" id="prevBtn">← Prev</button>
        <div class="progress"><div class="bar" id="progressBar"></div></div>
        <button class="btn primary" id="nextBtn">Next →</button>
      </div>
    </div>
  </main>
</div>

<script>
/* ──────────────────────────────────────────────────────
   Curriculum data — 14 topics mirroring the tutorial
   Each step: { title, desc, code }
   ────────────────────────────────────────────────────── */
const TOPICS = [
  {
    id: 'basics', name: 'Hello HTML', sub: 'Document anatomy',
    steps: [
      {
        title: 'Hello HTML — a minimal page',
        note: 'HTML is a nested tree rooted at <code>&lt;html&gt;</code>. <b>Head</b> holds information <em>about</em> the page; <b>body</b> holds what the user sees.',
        desc: 'The simplest possible complete page — a <code>&lt;!DOCTYPE&gt;</code>, a title, a heading, a paragraph. Nothing else needed.',
        code:
`<!DOCTYPE html>
<html>
<head>
    <title>Hello HTML</title>
</head>
<body>
    <h1>Hello HTML!</h1>
    <p>Welcome to your first HTML page.</p>

        code:
`<!DOCTYPE html>
<html lang="en">
<head>

<body>
<canvas id="c" width="420" height="220" style="background:#0b1020;border-radius:10px"></canvas>
<script>
  const ctx = document.getElementById('c').getContext('2d');
  let t = 0;
  function loop() {
    ctx.fillStyle = 'rgba(11,16,32,.25)';       // trailing fade
    ctx.fillRect(0, 0, 420, 220);

    for (let i = 0; i < 5; i++) {
      const x = 60 + i * 70;
      const y = 110 + Math.sin(t / 20 + i) * 60;
      ctx.beginPath();
      ctx.arc(x, y, 14, 0, Math.PI * 2);
      ctx.fillStyle = \`hsl(\${(t + i * 40) % 360} 80% 65%)\`;
      ctx.fill();
    }
    t++;
    requestAnimationFrame(loop);
  }
  loop();

  class CountDown extends HTMLElement {
    static get observedAttributes() { return ['seconds']; }
    connectedCallback() {

        title: 'Web Storage — localStorage',
        desc: '<code>localStorage</code> persists across sessions; <code>sessionStorage</code> clears on tab close. Both store strings — use <code>JSON.stringify</code> / <code>JSON.parse</code> for objects. Scoped per origin, capped around 5–10 MB.',

`<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Web Storage — localStorage</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 500px; }
    input, button {
      padding: 8px 12px; font-size: 14px; margin: 2px 0;

    }
    li button { padding: 2px 8px; font-size: 12px; margin-left: 8px; background: #ef4444; border-color: #ef4444; }
  </style>
</head>
<body>
<h1>Persistent notes</h1>

<input id="note" placeholder="Type a note...">
<button onclick="save()">Save</button>
<button class="clear" onclick="clearAll()">Clear all</button>

<h2>Saved</h2>
<ul id="list"></ul>

<p class="hint">Reload the page — your notes survive.
   Open DevTools → Application → Local Storage to inspect the raw data.</p>

<script>
  const KEY = 'lab.notes';

  function getNotes() {
    return JSON.parse(localStorage.getItem(KEY) || '[]');
  }

  function render() {
    const list = document.getElementById('list');
    list.innerHTML = '';
    getNotes().forEach((n, i) => {
      const li = document.createElement('li');
      li.textContent = n;
      const del = document.createElement('button');
      del.textContent = '×';
      del.onclick = () => remove(i);
      li.appendChild(del);
      list.appendChild(li);
    });
  }

  function save() {
    const input = document.getElementById('note');
    const val = input.value.trim();
    if (!val) return;
    const notes = getNotes();
    notes.push(val);
    localStorage.setItem(KEY, JSON.stringify(notes));
    input.value = '';
    render();
  }

  function remove(i) {
    const notes = getNotes();
    notes.splice(i, 1);
    localStorage.setItem(KEY, JSON.stringify(notes));
    render();
  }

  function clearAll() {
    localStorage.removeItem(KEY);
    render();
  }

  render();
<\/script>
</body>
</html>`

    li .del:hover { color: #ef4444; }
    .empty { color: #94a3b8; text-align: center; padding: 40px 0; }
    .stats {
      color: #94a3b8; font-size: 13px; margin-top: 16px;
      padding-top: 12px; border-top: 1px solid #e5e7eb;
      display: flex; justify-content: space-between;
    }
    .stats button {
      background: none; border: none; color: #94a3b8;
      cursor: pointer; font-size: 13px; padding: 0;
    }
    .stats button:hover { color: #ef4444; }
  </style>
</head>
<body>
<h1>todo</h1>

<form class="add" onsubmit="return addItem(event)">
  <input id="new" placeholder="What needs doing?" autofocus>
  <button type="submit">Add</button>
</form>

<ul id="list"></ul>

<div class="stats" id="stats"></div>

<script>
  const KEY = 'lab.todos';

  const load = () => JSON.parse(localStorage.getItem(KEY) || '[]');
  const save = items => localStorage.setItem(KEY, JSON.stringify(items));

  function addItem(e) {
    e.preventDefault();
    const input = document.getElementById('new');
    const text = input.value.trim();
    if (!text) return false;
    const items = load();
    items.push({ id: Date.now(), text, done: false });
    save(items);
    input.value = '';
    render();
    return false;
  }

  function toggle(id) {
    const items = load().map(i => i.id === id ? { ...i, done: !i.done } : i);
    save(items);
    render();
  }

  function remove(id) {
    save(load().filter(i => i.id !== id));
    render();
  }

  function clearDone() {
    save(load().filter(i => !i.done));
    render();
  }

  function render() {
    const items = load();
    const list = document.getElementById('list');
    list.innerHTML = '';

    if (items.length === 0) {
      const li = document.createElement('li');
      li.className = 'empty';
      li.textContent = 'Nothing here — add your first item above.';
      list.appendChild(li);
    } else {
      items.forEach(item => {
        const li = document.createElement('li');
        if (item.done) li.className = 'done';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.done;
        cb.onchange = () => toggle(item.id);

        const text = document.createElement('span');
        text.className = 'text';
        text.textContent = item.text;
        text.onclick = () => toggle(item.id);

        const del = document.createElement('button');
        del.className = 'del';
        del.textContent = '×';
        del.title = 'Delete';
        del.onclick = () => remove(item.id);

        li.appendChild(cb);
        li.appendChild(text);
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    const remaining = items.filter(i => !i.done).length;
    const total = items.length;
    const stats = document.getElementById('stats');
    if (total === 0) {
      stats.innerHTML = '';
    } else {
      stats.innerHTML = \`<span>\${remaining} of \${total} left</span>\` +
        (remaining < total ? '<button onclick="clearDone()">Clear completed</button>' : '');
    }
  }

  render();
<\/script>
</body>
</html>`
      }
    ]
  }

];

/* ──────────────────────────────────────────────────────
   App state + rendering
   ────────────────────────────────────────────────────── */
const $ = sel => document.querySelector(sel);
const state = {
  topic: 0,
  step: 0,
  tab: 0,
  // per-file edit buffer: key = "topicIdx:stepIdx:fileIdx"
  buffers: {}
};

const keyFor = (t, s, f) => `${t}:${s}:${f}`;

// A step may expose a single `code` string (legacy) OR an array of `files`.
// Normalise to an array so the rest of the app can treat them uniformly.
function getFiles(step) {
  if (step.files && step.files.length) return step.files;
  return [{ name: 'editor.html', code: step.code }];
}

// Return the live code for a given file, falling back to its original source.
function fileCode(topicIdx, stepIdx, files, fileIdx) {
  const k = keyFor(topicIdx, stepIdx, fileIdx);
  return (k in state.buffers) ? state.buffers[k] : files[fileIdx].code;
}

function render() {
  renderSide();
  const topic = TOPICS[state.topic];
  const step = topic.steps[state.step];
  const files = getFiles(step);
  if (state.tab >= files.length) state.tab = 0;

  $('#topicTitle').textContent = `${state.topic + 1}. ${topic.name}`;
  $('#topicHint').textContent = topic.sub;
  $('#pillTopic').textContent = `${state.topic + 1} / ${TOPICS.length}`;
  $('#pillStep').textContent = `${state.step + 1} / ${topic.steps.length}`;

  // step chips
  const row = $('#stepsRow');
  row.innerHTML = '';
  topic.steps.forEach((s, i) => {
    const b = document.createElement('button');
    b.className = 'step-chip' + (i === state.step ? ' active' : '');
    b.textContent = `Step ${i + 1} · ${s.title}`;
    b.addEventListener('click', () => { state.step = i; state.tab = 0; render(); });
    row.appendChild(b);
  });

  // step content
  const head = $('.step-head');
  head.classList.remove('fade-in'); void head.offsetWidth; head.classList.add('fade-in');
  $('#stepTitle').textContent = step.title;
  $('#stepDesc').innerHTML = step.desc;
  $('#stepNote').innerHTML = step.note || '';

  // file tabs (only render when more than one file)
  const tabBar = $('#tabBar');
  tabBar.innerHTML = '';
  if (files.length > 1) {
    files.forEach((f, i) => {
      const b = document.createElement('button');
      b.className = 'tab' + (i === state.tab ? ' active' : '');
      b.textContent = f.name;
      b.addEventListener('click', () => { state.tab = i; render(); });
      tabBar.appendChild(b);
    });
  }

  // editor — show the active file's current content
  const fileName = files[state.tab].name;
  const code = fileCode(state.topic, state.step, files, state.tab);
  if (cm) {
    suppressEditorChange = true;
    cm.setOption('mode', modeForFile(fileName));
    cm.setValue(code);
    cm.clearHistory();
    suppressEditorChange = false;
  } else {
    $('#editor').value = code;
  }

  // panel title reflects the active file's name
  const editorTitle = document.querySelector('.panel .panel-title');
  if (editorTitle) editorTitle.textContent = fileName;

  updatePreview();
  updateProgress();
}

function renderSide() {
  const side = $('#sideNav');
  side.innerHTML = '<h3>Tutorial</h3>';
  TOPICS.forEach((t, i) => {
    const b = document.createElement('button');
    b.className = 'topic-btn' + (i === state.topic ? ' active' : '');
    b.innerHTML = `
      <span class="num">${i + 1}</span>
      <span class="meta"><span>${t.name}</span><small>${t.sub}</small></span>`;
    b.addEventListener('click', () => {
      if (state.topic !== i) { state.topic = i; state.step = 0; render(); }
    });
    side.appendChild(b);
  });
}

function updatePreview() {
  const step = TOPICS[state.topic].steps[state.step];
  const files = getFiles(step);

  // Pick the entry HTML: active tab if it's HTML, otherwise the first HTML file.
  const activeName = files[state.tab].name.toLowerCase();
  let entryIdx = activeName.endsWith('.html') ? state.tab : files.findIndex(f => f.name.toLowerCase().endsWith('.html'));
  if (entryIdx < 0) entryIdx = state.tab;

  // Collect live contents for every file so edits are reflected in the preview.
  const live = files.map((f, i) => ({
    name: f.name,
    code: fileCode(state.topic, state.step, files, i)
  }));

  // Inline sibling <script src="..."> references.
  let html = live[entryIdx].code;
  html = html.replace(/<script\b[^>]*\bsrc=["']([^"']+)["'][^>]*>\s*<\/script>/gi, (match, src) => {
    const f = live.find(ff => ff.name === src || ff.name.endsWith('/' + src));
    return f ? `<script>\n${f.code}\n<\/script>` : match;
  });
  // Inline sibling <link rel=stylesheet href="..."> references (skip external URLs).
  html = html.replace(/<link\b[^>]*\bhref=["']([^"']+)["'][^>]*>/gi, (match, href) => {
    if (/^https?:\/\//i.test(href) || /^\/\//.test(href)) return match;
    const f = live.find(ff => ff.name === href);
    return f ? `<style>\n${f.code}\n</style>` : match;
  });

  $('#preview').srcdoc = html;
}

function updateProgress() {
  let total = 0, done = 0;
  TOPICS.forEach((t, ti) => {
    t.steps.forEach((s, si) => {
      total++;
      if (ti < state.topic || (ti === state.topic && si <= state.step)) done++;
    });
  });
  $('#progressBar').style.width = (done / total * 100) + '%';
}

/* ── Helpers: CodeMirror read/write ─────────────────── */
function editorValue() {
  return cm ? cm.getValue() : $('#editor').value;
}

function modeForFile(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  if (ext === 'js')   return 'javascript';
  if (ext === 'mjs')  return 'javascript';
  if (ext === 'json') return { name: 'javascript', json: true };
  if (ext === 'css')  return 'css';
  if (ext === 'xml' || ext === 'svg') return 'xml';
  return 'htmlmixed';
}

/* ── Events ─────────────────────────────────────────── */
let debounce;

$('#resetBtn').addEventListener('click', () => {
  // Clear every file's buffer for the current step.
  const files = getFiles(TOPICS[state.topic].steps[state.step]);
  files.forEach((_, i) => delete state.buffers[keyFor(state.topic, state.step, i)]);
  render();
});

$('#prevBtn').addEventListener('click', () => {
  if (state.step > 0) state.step--;
  else if (state.topic > 0) {
    state.topic--;
    state.step = TOPICS[state.topic].steps.length - 1;
  }
  state.tab = 0;
  render();
});

$('#nextBtn').addEventListener('click', () => {
  const t = TOPICS[state.topic];
  if (state.step < t.steps.length - 1) state.step++;
  else if (state.topic < TOPICS.length - 1) { state.topic++; state.step = 0; }
  state.tab = 0;
  render();
});

$('#copyBtn').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(editorValue());
    flash($('#copyBtn'), 'Copied!');
  } catch { flash($('#copyBtn'), 'Copy failed'); }
});

$('#formatBtn').addEventListener('click', () => {
  // minimal reflow: trim trailing spaces on each line
  const formatted = editorValue().split('\n').map(l => l.replace(/\s+$/,'')).join('\n');
  if (cm) {
    suppressEditorChange = true;
    cm.setValue(formatted);
    suppressEditorChange = false;
  } else {
    $('#editor').value = formatted;
  }
  state.buffers[keyFor(state.topic, state.step, state.tab)] = formatted;
  updatePreview();
});

$('#openTabBtn').addEventListener('click', () => {
  const blob = new Blob([editorValue()], { type: 'text/html' });
  window.open(URL.createObjectURL(blob), '_blank', 'noopener');
});

function flash(btn, msg) {
  const old = btn.textContent;
  btn.textContent = msg;
  setTimeout(() => btn.textContent = old, 900);
}

// keyboard shortcuts: Ctrl/Cmd + ← / →
document.addEventListener('keydown', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  if (e.key === 'ArrowRight') { e.preventDefault(); $('#nextBtn').click(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); $('#prevBtn').click(); }
});

/* ── CodeMirror init ──────────────────────────────── */
let cm = null;
let suppressEditorChange = false;

if (typeof CodeMirror !== 'undefined') {
  try {
    cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
      mode: 'htmlmixed',
      theme: 'material-darker',
      lineNumbers: true,
      lineWrapping: false,
      indentUnit: 2,
      tabSize: 2,
      indentWithTabs: false,
      matchBrackets: true,
      matchTags: { bothTags: true },
      autoCloseTags: true,
      autoCloseBrackets: true,
      styleActiveLine: { nonEmpty: true },
      foldGutter: true,
      gutters: ['CodeMirror-linenumbers', 'CodeMirror-foldgutter'],
      extraKeys: {
        Tab: cm => cm.replaceSelection('  ', 'end'),
        'Ctrl-Q': cm => cm.foldCode(cm.getCursor()),
        'Ctrl-.': cm => cm.foldCode(cm.getCursor()),
      },
    });
    cm.on('change', () => {
      if (suppressEditorChange) return;
      state.buffers[keyFor(state.topic, state.step, state.tab)] = cm.getValue();
      clearTimeout(debounce);
      debounce = setTimeout(updatePreview, 250);
    });

    // Alt-click on a tag token folds/unfolds that block (click the tag, like a tree).
    cm.on('mousedown', (instance, event) => {
      if (!event.altKey) return;
      const pos = instance.coordsChar({ left: event.clientX, top: event.clientY });
      const tok = instance.getTokenAt(pos);
      // Fold if we clicked on a tag name or bracket within a tag
      if (tok && tok.type && /\b(tag|bracket)\b/.test(tok.type)) {
        event.preventDefault();
        instance.foldCode(pos);
      }
    });
  } catch (err) {
    console.warn('CodeMirror init failed, falling back to plain textarea:', err);
    cm = null;
    // If CM partially wrapped the textarea, unhide it so editing still works.
    const ta = document.getElementById('editor');
    if (ta) ta.style.display = '';
    // Plain textarea fallback: propagate edits to state + preview.
    ta?.addEventListener('input', () => {
      state.buffers[keyFor(state.topic, state.step, state.tab)] = ta.value;
      clearTimeout(debounce);
      debounce = setTimeout(updatePreview, 250);
    });
  }
} else {
  // No CodeMirror available at all — plain textarea fallback.
  const ta = document.getElementById('editor');
  ta?.addEventListener('input', () => {
    state.buffers[keyFor(state.topic, state.step, state.tab)] = ta.value;
    clearTimeout(debounce);
    debounce = setTimeout(updatePreview, 250);
  });
}

render();
</script>

<script src="../home.js" defer></script>
</body>
</html>
